<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Tree — 思花风格</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(170deg, #6aadcc 0%, #a8d8ea 55%, #c8e8f4 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width  = W;
canvas.height = H;

// ── Config ──
const CFG = {
  startX: W * 0.28,
  startY: H * 0.98,
  startLen: 120,
  startAngle: -Math.PI / 2 + 0.15,   // slight right lean
  lenRatio: 0.72,
  angleSpread: 0.42,
  maxDepth: 11,
  growSpeed: 0.018,                   // fraction of tree grown per frame
};

// ── Tree node ──
// Each branch: { x1,y1, x2,y2, depth, delay, children[] }
const nodes = [];
let totalNodes = 0;

function buildTree(x, y, len, angle, depth, delay) {
  if (depth > CFG.maxDepth || len < 2) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  const node = { x1:x, y1:y, x2, y2, depth, delay, len,
                 order: totalNodes++, drawn: false };
  nodes.push(node);
  if (depth < CFG.maxDepth) {
    const spread = CFG.angleSpread * (0.85 + Math.random() * 0.3);
    buildTree(x2, y2, len * CFG.lenRatio * (0.92 + Math.random()*0.16),
              angle - spread * (0.7 + Math.random()*0.3),
              depth+1, delay + 1);
    buildTree(x2, y2, len * CFG.lenRatio * (0.88 + Math.random()*0.16),
              angle + spread * (0.6 + Math.random()*0.35),
              depth+1, delay + 1);
  }
}

buildTree(CFG.startX, CFG.startY, CFG.startLen, CFG.startAngle, 0, 0);

// ── Dandelion puffs (white radiating clusters) ──
const puffs = [];
for (const n of nodes) {
  if (n.depth >= 3 && n.depth <= 8 && Math.random() < 0.35) {
    puffs.push({
      x: n.x2, y: n.y2,
      r: 4 + (CFG.maxDepth - n.depth) * 2.2,
      rays: 10 + Math.floor(Math.random() * 8),
      order: n.order,
      alpha: 0.55 + Math.random() * 0.3,
    });
  }
}

// ── Flowers (pink) ──
const flowers = [];
for (const n of nodes) {
  if (n.depth >= 7 && Math.random() < 0.5) {
    flowers.push({
      x: n.x2 + (Math.random()-0.5)*6,
      y: n.y2 + (Math.random()-0.5)*6,
      r: 2 + Math.random() * 2,
      order: n.order,
      hue: 340 + Math.floor(Math.random()*20),
    });
  }
}

// ── Falling petals ──
const petals = Array.from({length:18}, () => ({
  x: CFG.startX + (Math.random()-0.5)*180,
  y: 100 + Math.random()*300,
  vx: -0.4 - Math.random()*0.6,
  vy: 0.5 + Math.random()*0.8,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-0.5)*0.05,
  rx: 3 + Math.random()*2,
  ry: 1.5 + Math.random()*1,
  alpha: 0,
  delay: 180 + Math.random()*120,
}));

// ── Drawing helpers ──
function drawBranch(n, alpha) {
  const w = Math.max(0.4, (CFG.maxDepth - n.depth) * 0.28 + 0.4);
  ctx.beginPath();
  ctx.moveTo(n.x1, n.y1);
  ctx.lineTo(n.x2, n.y2);
  ctx.strokeStyle = `rgba(38,32,28,${alpha})`;
  ctx.lineWidth = w;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function drawPuff(p, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  for (let i = 0; i < p.rays; i++) {
    const a = (i / p.rays) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a)*p.r, Math.sin(a)*p.r);
    ctx.strokeStyle = `rgba(255,255,255,${p.alpha * alpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // dot at tip
    ctx.beginPath();
    ctx.arc(Math.cos(a)*p.r, Math.sin(a)*p.r, 1.2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${p.alpha * alpha * 0.9})`;
    ctx.fill();
  }
  // soft center glow
  const g = ctx.createRadialGradient(0,0,0, 0,0,p.r*0.6);
  g.addColorStop(0, `rgba(255,255,255,${0.25*alpha})`);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(0,0, p.r*0.6, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

function drawFlower(f, alpha) {
  // petals (5-petal)
  for (let i=0; i<5; i++) {
    const a = (i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(
      f.x + Math.cos(a)*f.r*1.2,
      f.y + Math.sin(a)*f.r*1.2,
      f.r*0.9, f.r*0.5, a, 0, Math.PI*2
    );
    ctx.fillStyle = `hsla(${f.hue},80%,75%,${0.85*alpha})`;
    ctx.fill();
  }
  // center
  ctx.beginPath();
  ctx.arc(f.x, f.y, f.r*0.5, 0, Math.PI*2);
  ctx.fillStyle = `hsla(${f.hue+10},90%,55%,${0.9*alpha})`;
  ctx.fill();
}

// ── Animation ──
let frame = 0;
const GROW_FRAMES = 160;   // frames to grow whole tree

function easeInOut(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

function animate() {
  requestAnimationFrame(animate);
  frame++;

  // clear
  ctx.clearRect(0, 0, W, H);

  // background (re-draw each frame for petals to show)
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#5a9dbf');
  bg.addColorStop(0.55, '#9ccde4');
  bg.addColorStop(1, '#c2e4f2');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // progress: fraction of nodes to show
  const progress = Math.min(1, frame / GROW_FRAMES);

  const revealUpTo = Math.floor(easeInOut(progress) * totalNodes);

  // branches
  for (const n of nodes) {
    if (n.order > revealUpTo) continue;
    const localP = Math.min(1, (revealUpTo - n.order) / Math.max(1, totalNodes * 0.04));
    drawBranch(n, localP);
  }

  // puffs
  for (const p of puffs) {
    if (p.order > revealUpTo) continue;
    const a = Math.min(1, (revealUpTo - p.order) / Math.max(1, totalNodes * 0.05));
    drawPuff(p, a);
  }

  // flowers
  for (const f of flowers) {
    if (f.order > revealUpTo - 5) continue;
    const a = Math.min(1, (revealUpTo - f.order - 5) / Math.max(1, totalNodes * 0.05));
    drawFlower(f, a);
  }

  // falling petals (start after tree is mostly grown)
  if (frame > 130) {
    for (const p of petals) {
      if (frame < p.delay) continue;
      p.alpha = Math.min(0.85, p.alpha + 0.02);
      p.x += p.vx + Math.sin(frame*0.02 + p.delay)*0.3;
      p.y += p.vy;
      p.rot += p.vrot;
      if (p.y > H + 20) { p.y = -10; p.x = CFG.startX + (Math.random()-0.5)*200; p.alpha=0; }

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.rx, p.ry, 0, 0, Math.PI*2);
      ctx.fillStyle = `hsla(345,75%,78%,${p.alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }
}

window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  // 重新生成树
  const oldCFG = {...CFG};
  CFG.startX = W * 0.28;
  CFG.startY = H * 0.98;
  CFG.startLen = Math.min(W, H) / 5.8;
  nodes.length = 0;
  totalNodes = 0;
  buildTree(CFG.startX, CFG.startY, CFG.startLen, CFG.startAngle, 0, 0);
});

// 触摸支持（防止页面滑动）
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

animate();
</script>

<script>
// Generated Audio System - 电子脉冲
// 电子脉冲音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  // 方波脉冲
  function pulse(){
    if(!isActive)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    const delay=ctx.createDelay();delay.delayTime.value=0.15;
    const fb=ctx.createGain();fb.gain.value=0.35;
    o.frequency.value=220+Math.random()*220;o.type='square';
    g.gain.setValueAtTime(0.10,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    o.connect(g);g.connect(delay);delay.connect(fb);fb.connect(delay);g.connect(master);o.start();o.stop(ctx.currentTime+0.12);
    setTimeout(pulse,250+Math.random()*450);
  }
  pulse();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
