<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>春天 loading…</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#b8d9f0;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  touch-action:none;
}
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

function handleResize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  buildTree(0,H*0.05,0.40,85,9,F_UI_DONE,0.22);
  buildTree(W,H*0.02,Math.PI-0.35,78,8,F_UI_DONE+10,0.22);
  buildTree(0,H*0.50,0.18,60,7,F_UI_DONE+20,0.28);
  buildTree(W*0.18,H,-Math.PI/2+0.28,55,6,F_UI_DONE+25,0.28);
  buildTree(W*0.80,H,-Math.PI/2-0.22,50,6,F_UI_DONE+30,0.28);
}
window.addEventListener('resize',handleResize);

// ══════════════════════════════════════════════════
//  帧时间轴（全部用帧数，不用比例，避免换算混乱）
//  0   - 100  : UI出现，进度条推进到68%
//  100 - 280  : 进度卡住，枝干逐步长出
//  280 - 420  : 末梢花苞出现（所有tip节点）
//  420 - 580  : 花苞绽放成樱花，UI消失
//  580 - 800  : 满屏花雨 + 标题
//  800        : 循环
// ══════════════════════════════════════════════════
const F_UI_DONE    = 100;
const F_BUD_START  = 280;   // 花苞出现
const F_BLOOM_START= 420;   // 花苞→花
const F_TITLE      = 580;   // 标题
const F_TOTAL      = 800;
const STOP = 0.68;

// ══════════════════════════════════════════════════
//  树枝系统：帧数控制出现时机
// ══════════════════════════════════════════════════
const BRANCHES = [];

function buildTree(x, y, angle, len, depth, startFrame, jitter) {
  if (depth <= 0 || len < 4) return;
  const rng = () => (Math.random() - 0.5) * jitter;
  const ex = x + Math.cos(angle + rng()) * len;
  const ey = y + Math.sin(angle + rng()) * len;
  // 越末梢出现越晚，间隔20帧/层
  const sf = startFrame + 20 + Math.random() * 10;
  BRANCHES.push({
    x1: x, y1: y, x2: ex, y2: ey,
    depth,
    drawT: 0,
    startFrame: sf,
    lw: Math.max(0.5, depth * 0.42),
    isTip: depth <= 2,
    budR: 0, flowerR: 0,
    color: `hsl(${340+Math.random()*22},${62+Math.random()*22}%,${76+Math.random()*16}%)`,
    ex, ey,
  });
  const spread = 0.24 + Math.random() * 0.15;
  buildTree(ex, ey, angle - spread, len * 0.72, depth-1, sf, jitter * 0.85);
  buildTree(ex, ey, angle + spread, len * 0.70, depth-1, sf, jitter * 0.85);
  if (depth >= 5 && Math.random() < 0.35) {
    buildTree(ex, ey, angle - spread*0.4, len*0.5, depth-2, sf, jitter);
  }
}

// 5棵树，从画面四角和侧边伸入（思花构图）
buildTree(  0, H*0.05,  0.40, 85, 9, F_UI_DONE,      0.22);
buildTree(  W, H*0.02,  Math.PI-0.35, 78, 8, F_UI_DONE+10, 0.22);
buildTree(  0, H*0.50,  0.18, 60, 7, F_UI_DONE+20, 0.28);
buildTree(W*0.18, H, -Math.PI/2+0.28, 55, 6, F_UI_DONE+25, 0.28);
buildTree(W*0.80, H, -Math.PI/2-0.22, 50, 6, F_UI_DONE+30, 0.28);

// 预计算末梢节点（方便花苞/花绘制）
const TIPS = BRANCHES.filter(b => b.isTip);

// ══════════════════════════════════════════════════
//  飘落花瓣池
// ══════════════════════════════════════════════════
const PETALS = [];
function spawnPetal(x, y) {
  PETALS.push({
    x: x ?? Math.random()*W, y: y ?? -12,
    vx:(Math.random()-0.5)*1.6, vy:0.7+Math.random()*1.1,
    r:5+Math.random()*7,
    rot:Math.random()*Math.PI*2, vRot:(Math.random()-0.5)*0.08,
    alpha:0.9, wobble:Math.random()*Math.PI*2,
    color:`hsl(${336+Math.random()*28},${58+Math.random()*28}%,${78+Math.random()*14}%)`,
  });
}

// ══════════════════════════════════════════════════
//  圆角矩形
// ══════════════════════════════════════════════════
function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ══════════════════════════════════════════════════
//  绘制5瓣樱花（思花插画风，扁平圆润）
// ══════════════════════════════════════════════════
function drawSakura(x, y, r, color, alpha) {
  if (r < 0.5 || alpha < 0.01) return;
  ctx.save(); ctx.globalAlpha = alpha;
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    const pr = r * 0.80;
    const px = x + Math.cos(a)*pr;
    const py = y + Math.sin(a)*pr;
    ctx.beginPath(); ctx.arc(px, py, r*0.62, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    // 花瓣内侧深色纹
    ctx.beginPath(); ctx.arc(px, py, r*0.2, 0, Math.PI*2);
    ctx.fillStyle = `hsla(340,55%,62%,0.3)`; ctx.fill();
  }
  // 花蕊白
  ctx.beginPath(); ctx.arc(x,y,r*0.26,0,Math.PI*2);
  ctx.fillStyle='rgba(255,250,230,0.95)'; ctx.fill();
  // 雄蕊小点
  for(let i=0;i<6;i++){
    const sa=(i/6)*Math.PI*2;
    ctx.beginPath(); ctx.arc(x+Math.cos(sa)*r*0.18, y+Math.sin(sa)*r*0.18, 1.1, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,195,55,0.85)'; ctx.fill();
  }
  ctx.restore();
}

// 花苞（绿苞片+粉色花蕾）
function drawBud(x, y, r, color, alpha) {
  if (r < 0.3 || alpha < 0.01) return;
  ctx.save(); ctx.globalAlpha = alpha;
  // 绿色苞片
  ctx.beginPath();
  ctx.ellipse(x, y+r*0.15, r*0.38, r*0.55, Math.PI/12, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(80,130,55,0.75)'; ctx.fill();
  // 粉色花蕾
  ctx.beginPath();
  ctx.ellipse(x, y-r*0.1, r*0.30, r*0.48, -Math.PI/14, 0, Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  UI卡片
// ══════════════════════════════════════════════════
const CX = W/2-150, CY = H/2-65, CW=300, CH=130, CR=16;
const BX = CX+26, BY = CY+82, BW=248, BH=9, BR=5;

function drawUI(progress, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  // 卡片阴影+填充
  ctx.shadowColor='rgba(0,0,0,0.13)'; ctx.shadowBlur=26; ctx.shadowOffsetY=9;
  rRect(CX,CY,CW,CH,CR); ctx.fillStyle='rgba(255,255,255,0.90)'; ctx.fill();
  ctx.shadowColor='transparent';
  rRect(CX,CY,CW,CH,CR); ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1; ctx.stroke();

  // 顶部三圆点
  ctx.fillStyle='rgba(0,0,0,0.14)';
  [0,1,2].forEach(i=>{ ctx.beginPath(); ctx.arc(CX+14+i*13,CY+14,4,0,Math.PI*2); ctx.fill(); });

  // 标题
  ctx.font='500 13.5px -apple-system,"PingFang SC",sans-serif';
  ctx.fillStyle='rgba(30,30,40,0.80)'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('正在加载春天…', W/2, CY+40);
  ctx.font='11px -apple-system,sans-serif';
  ctx.fillStyle='rgba(80,80,100,0.50)';
  ctx.fillText('Spring · v2025.3', W/2, CY+58);

  // 进度条底
  rRect(BX,BY,BW,BH,BR); ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fill();
  // 进度条填色
  const fw = Math.max(BR*2, BW*progress);
  rRect(BX,BY,fw,BH,BR);
  const bg=ctx.createLinearGradient(BX,0,BX+fw,0);
  bg.addColorStop(0,'#f9a8d4'); bg.addColorStop(0.5,'#e879a4'); bg.addColorStop(1,'#c06090');
  ctx.fillStyle=bg; ctx.fill();

  // 百分比
  ctx.font='11px -apple-system,sans-serif'; ctx.fillStyle='rgba(100,60,80,0.55)';
  ctx.fillText(`${Math.round(progress*100)}%  · 请勿关闭窗口`, W/2, BY+BH+16);

  // 卡住时转圈
  if(progress>=STOP-0.005){
    const sx=BX+BW*STOP+13, sy=BY+BH/2;
    const spin=(Date.now()/480)%(Math.PI*2);
    ctx.beginPath(); ctx.arc(sx,sy,5,spin,spin+Math.PI*1.3);
    ctx.strokeStyle='rgba(190,70,120,0.7)'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  背景（天蓝 → 暖粉蓝）
// ══════════════════════════════════════════════════
function drawBg(f) {
  const bloom = Math.max(0, Math.min(1, (f-F_BLOOM_START)/120));
  const g = ctx.createLinearGradient(0,0,0,H);
  const r1=Math.round(175+bloom*35), g1=Math.round(210+bloom*8), b1=Math.round(238-bloom*18);
  const r2=Math.round(205+bloom*20), g2=Math.round(228+bloom*4), b2=Math.round(248-bloom*22);
  g.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  g.addColorStop(1, `rgb(${r2},${g2},${b2})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // 淡云
  ctx.fillStyle=`rgba(255,255,255,${0.06+bloom*0.05})`;
  [[W*0.12,H*0.18,55,14],[W*0.55,H*0.12,72,18],[W*0.82,H*0.22,48,12]].forEach(([cx,cy,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
  });
}

// ══════════════════════════════════════════════════
//  缓动
// ══════════════════════════════════════════════════
const easeOut  = t => 1-(1-t)**2.5;
const easeOut3 = t => 1-(1-t)**3;

// ══════════════════════════════════════════════════
//  主循环
// ══════════════════════════════════════════════════
let frame = 0;

function tick() {
  requestAnimationFrame(tick);
  frame++;
  if (frame > F_TOTAL) frame = 0;

  drawBg(frame);

  // ── 1. 枝干绘制 ──
  for (const b of BRANCHES) {
    if (frame < b.startFrame) continue;
    b.drawT = Math.min(1, (frame - b.startFrame) / 22);
    const ex = b.x1 + (b.x2-b.x1) * easeOut(b.drawT);
    const ey = b.y1 + (b.y2-b.y1) * easeOut(b.drawT);
    ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(ex,ey);
    ctx.strokeStyle=`rgba(48,24,10,${0.55+b.depth*0.04})`;
    ctx.lineWidth=b.lw; ctx.lineCap='round'; ctx.stroke();
  }

  // ── 2. 花苞（F_BUD_START ~ F_BLOOM_START）──
  if (frame >= F_BUD_START) {
    // 花苞出现进度（0→1 跨140帧）
    const budProgress = Math.min(1, (frame - F_BUD_START) / 140);
    for (const b of TIPS) {
      // 已经完成绘制的枝条才显花苞
      if (b.drawT < 0.9) continue;
      b.budR = Math.min(1, b.budR + 0.025);  // 每帧长大
      const r = (4 + (10-b.depth)*1.1) * easeOut(b.budR);

      if (frame < F_BLOOM_START) {
        // 纯花苞阶段
        drawBud(b.ex, b.ey, r, b.color, Math.min(1, b.budR*3));
      } else {
        // 花苞→花 过渡（F_BLOOM_START后160帧内全开）
        b.flowerR = Math.min(1, b.flowerR + 0.018);
        const openRatio = easeOut3(b.flowerR);
        if (openRatio < 0.5) {
          // 混合：花苞逐渐缩小，花朵逐渐展开
          drawBud(b.ex, b.ey, r*(1-openRatio*1.5), b.color, (1-openRatio*1.5));
          drawSakura(b.ex, b.ey, r*openRatio*1.4, b.color, openRatio*1.4);
        } else {
          drawSakura(b.ex, b.ey, r, b.color, 0.92);
          // 盛开后掉瓣
          if (Math.random() < 0.006) spawnPetal(b.ex, b.ey);
        }
      }
    }
  }

  // ── 3. UI卡片 ──
  let progress = 0;
  if (frame < F_UI_DONE) {
    progress = Math.min(STOP, easeOut(frame/F_UI_DONE) * (STOP+0.04));
    progress = Math.min(STOP, progress);
  } else {
    progress = STOP;
  }
  const uiAlpha = frame < F_BLOOM_START ? 1 : Math.max(0, 1-(frame-F_BLOOM_START)/70);
  if (uiAlpha > 0.01) drawUI(progress, uiAlpha);

  // ── 4. 花瓣飘落 ──
  if (frame > F_BLOOM_START && Math.random() < 0.10) spawnPetal();
  if (frame > F_TITLE      && Math.random() < 0.20) spawnPetal();

  for (let i=PETALS.length-1; i>=0; i--) {
    const p=PETALS[i];
    p.wobble+=0.04; p.x+=p.vx+Math.sin(p.wobble)*0.6; p.y+=p.vy; p.rot+=p.vRot; p.alpha-=0.0035;
    if(p.alpha<=0||p.y>H+20){PETALS.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*0.6,0,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
    ctx.strokeStyle='rgba(220,120,155,0.2)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,-p.r*0.5); ctx.lineTo(0,p.r*0.5); ctx.stroke();
    ctx.restore();
  }

  // ── 5. 最终标题 ──
  if (frame >= F_TITLE) {
    const tA = easeOut3(Math.min(1,(frame-F_TITLE)/70));
    ctx.save(); ctx.globalAlpha=tA;
    ctx.font='400 36px "Songti SC","SimSun","STSong",serif';
    ctx.fillStyle='rgba(185,65,95,0.90)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('春天到了', W/2, H/2+60);
    ctx.font='italic 12.5px Georgia,serif';
    ctx.fillStyle='rgba(180,90,120,0.52)';
    ctx.fillText('Spring has arrived · 加载完成', W/2, H/2+90);
    ctx.fillStyle=`rgba(225,135,165,${0.45*tA})`;
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.arc(W/2-40+i*20, H/2+108, 2.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

tick();
</script>

<script>
// Generated Audio System - 春天鸟语
// 春天鸟语音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  // 微风
  const bufSz=ctx.sampleRate*2,buf=ctx.createBuffer(1,bufSz,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bufSz;i++)d[i]=Math.random()*2-1;
  const wind=ctx.createBufferSource();wind.buffer=buf;wind.loop=true;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=350;
  const wg=ctx.createGain();wg.gain.value=0.08;
  wind.connect(lp);lp.connect(wg);wg.connect(master);wind.start();
  
  // 鸟鸣
  function chirp(){
    if(!isActive)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(1000+Math.random()*800,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600+Math.random()*400,ctx.currentTime+0.06);
    o.type='sine';
    g.gain.setValueAtTime(0.14,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+0.18);
    setTimeout(chirp,600+Math.random()*1800);
  }
  chirp();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
