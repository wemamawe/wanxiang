<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>陷阱 · Trap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a8fe0;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════════════════════
//  陷阱 — 文字马赛克 → 蕾丝网络 → 繁花绽放
//  蓝色背景 + 白色文字结构 + 粉花 + 黑蝶
// ══════════════════════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, S;

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  S = Math.min(W, H);
  buildCharGrid();
  buildDove();
}

// ── 全局时间 ──
let time = 0;
let phaseSmooth = 0;
const PHASE_DUR = 420;
const TRANS = 120;
const TOTAL = (PHASE_DUR + TRANS) * 3;
let cycleFrame = 0;

// ── 字符池 ──
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789αβγδεζηθλμπσφψω陷阱梦花蝶'.split('');

// ── 文字网格 ──
let GRID = [];
let gridCols = 0, gridRows = 0, cellSize = 0;
let squareX = 0, squareY = 0, squareSize = 0;

function buildCharGrid() {
  squareSize = S * 0.55;
  squareX = (W - squareSize) / 2;
  squareY = (H - squareSize) / 2;
  cellSize = squareSize / 28;
  gridCols = Math.floor(squareSize / cellSize);
  gridRows = Math.floor(squareSize / cellSize);
  GRID = [];
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      GRID.push({
        col: c, row: r,
        char: CHARS[Math.floor(Math.random() * CHARS.length)],
        x: squareX + c * cellSize + cellSize / 2,
        y: squareY + r * cellSize + cellSize / 2,
        phase: Math.random() * Math.PI * 2,
        // 网络连接信息
        connections: [],
        isDove: false,
      });
    }
  }
  // 随机建立连接（用于phase2蕾丝网络）
  for (const cell of GRID) {
    const neighbors = GRID.filter(g => {
      const dc = Math.abs(g.col - cell.col);
      const dr = Math.abs(g.row - cell.row);
      return (dc + dr > 0) && dc <= 2 && dr <= 2 && Math.random() < 0.15;
    });
    cell.connections = neighbors.slice(0, 3);
  }
}

// ── 白鸽轮廓（像素化）──
// 在28x28网格中定义一只简笔鸽子
const DOVE_BITMAP = [];
function buildDove() {
  // 简化鸽子轮廓 — 用数学曲线
  DOVE_BITMAP.length = 0;
  const cx = gridCols / 2, cy = gridRows / 2;
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      const dx = (c - cx) / (gridCols * 0.35);
      const dy = (r - cy) / (gridRows * 0.35);
      // 身体：椭圆
      const body = (dx * dx) / 1.0 + ((dy + 0.15) * (dy + 0.15)) / 0.4;
      // 左翅：倾斜椭圆
      const wx = dx + 0.5, wy = dy - 0.1;
      const wing1 = ((wx * 0.8 + wy * 0.6) * (wx * 0.8 + wy * 0.6)) / 0.6 +
                     ((wx * 0.6 - wy * 0.8) * (wx * 0.6 - wy * 0.8)) / 0.15;
      // 右翅
      const rx = dx - 0.5, ry = dy - 0.1;
      const wing2 = ((rx * 0.8 - ry * 0.6) * (rx * 0.8 - ry * 0.6)) / 0.6 +
                     ((rx * 0.6 + ry * 0.8) * (rx * 0.6 + ry * 0.8)) / 0.15;
      // 头
      const hx = dx, hy = dy + 0.55;
      const head = hx * hx + hy * hy;

      const isDove = body < 1 || wing1 < 1 || wing2 < 1 || head < 0.04;
      if (isDove) {
        const idx = r * gridCols + c;
        if (idx < GRID.length) GRID[idx].isDove = true;
        DOVE_BITMAP.push({col: c, row: r});
      }
    }
  }
}

// ── 花朵 ──
const FLOWERS_SPARSE = [];  // phase1稀疏
const FLOWERS_MED = [];     // phase2中等
const FLOWERS_DENSE = [];   // phase3密集

function initFlowers() {
  FLOWERS_SPARSE.length = 0;
  FLOWERS_MED.length = 0;
  FLOWERS_DENSE.length = 0;
  for (let i = 0; i < 8; i++) {
    FLOWERS_SPARSE.push(makeFlower());
  }
  for (let i = 0; i < 20; i++) {
    FLOWERS_MED.push(makeFlower());
  }
  for (let i = 0; i < 55; i++) {
    FLOWERS_DENSE.push(makeFlower());
  }
}

function makeFlower() {
  return {
    u: Math.random(),   // 方框内相对位置
    v: Math.random(),
    size: 0.012 + Math.random() * 0.018,
    phase: Math.random() * Math.PI * 2,
    petalCount: Math.random() < 0.3 ? 5 : 6,
  };
}
initFlowers();

// ── 蝴蝶 ──
let butterflyX = 0.78, butterflyY = 0.65; // 方框内相对位置
let bfTargetX = 0.78, bfTargetY = 0.65;

function drawButterfly(x, y, size, alpha) {
  const wingFlap = Math.sin(time * 0.06) * 0.7;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha;

  // 左翅
  ctx.save();
  ctx.scale(Math.cos(wingFlap), 1);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-size * 0.8, -size * 0.6, -size * 1.2, -size * 0.2, -size * 0.3, size * 0.2);
  ctx.bezierCurveTo(-size * 0.1, size * 0.1, 0, 0, 0, 0);
  ctx.fill();
  // 下翅
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-size * 0.7, size * 0.3, -size * 0.9, size * 0.7, -size * 0.2, size * 0.5);
  ctx.bezierCurveTo(-size * 0.05, size * 0.3, 0, 0, 0, 0);
  ctx.fill();
  ctx.restore();

  // 右翅
  ctx.save();
  ctx.scale(Math.cos(wingFlap + 0.3), 1);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size * 0.8, -size * 0.6, size * 1.2, -size * 0.2, size * 0.3, size * 0.2);
  ctx.bezierCurveTo(size * 0.1, size * 0.1, 0, 0, 0, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size * 0.7, size * 0.3, size * 0.9, size * 0.7, size * 0.2, size * 0.5);
  ctx.bezierCurveTo(size * 0.05, size * 0.3, 0, 0, 0, 0);
  ctx.fill();
  ctx.restore();

  // 翅纹
  ctx.strokeStyle = 'rgba(60,60,60,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 3; i++) {
    const a = -0.4 + i * 0.3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * size * 0.6, Math.sin(a) * size * 0.5);
    ctx.stroke();
  }

  // 身体
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.04, size * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  // 触角
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.2);
  ctx.bezierCurveTo(-size * 0.15, -size * 0.5, -size * 0.25, -size * 0.55, -size * 0.2, -size * 0.6);
  ctx.moveTo(0, -size * 0.2);
  ctx.bezierCurveTo(size * 0.15, -size * 0.5, size * 0.25, -size * 0.55, size * 0.2, -size * 0.6);
  ctx.stroke();

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── 粉色花朵绘制 ──
function drawPinkFlower(x, y, size, bloom) {
  if (bloom <= 0) return;
  const sz = size * S * bloom;
  ctx.save();
  ctx.translate(x, y);

  const count = 6;
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2;
    const px = Math.cos(a) * sz * 0.45;
    const py = Math.sin(a) * sz * 0.45;
    ctx.fillStyle = `rgba(245,160,180,${0.85 * bloom})`;
    ctx.beginPath();
    ctx.ellipse(px, py, sz * 0.38, sz * 0.22, a, 0, Math.PI * 2);
    ctx.fill();
  }
  // 黄色花心
  ctx.fillStyle = `rgba(240,210,60,${bloom})`;
  ctx.beginPath();
  ctx.arc(0, 0, sz * 0.18, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── 主绘制 ──
function draw() {
  requestAnimationFrame(draw);
  time++;
  cycleFrame = time % TOTAL;

  // 阶段计算
  const seg = PHASE_DUR + TRANS;
  if (cycleFrame < PHASE_DUR) {
    phaseSmooth = 0;
  } else if (cycleFrame < seg) {
    phaseSmooth = (cycleFrame - PHASE_DUR) / TRANS;
  } else if (cycleFrame < seg + PHASE_DUR) {
    phaseSmooth = 1;
  } else if (cycleFrame < seg * 2) {
    phaseSmooth = 1 + (cycleFrame - seg - PHASE_DUR) / TRANS;
  } else if (cycleFrame < seg * 2 + PHASE_DUR) {
    phaseSmooth = 2;
  } else {
    phaseSmooth = 2 + (cycleFrame - seg * 2 - PHASE_DUR) / TRANS;
    if (phaseSmooth > 2.99) phaseSmooth = 0;
  }

  // 权重
  const w1 = Math.max(0, 1 - Math.abs(phaseSmooth));
  const w2 = Math.max(0, 1 - Math.abs(phaseSmooth - 1));
  const w3 = Math.max(0, 1 - Math.abs(phaseSmooth - 2));
  const wRet = phaseSmooth > 2 ? (phaseSmooth - 2) : 0;
  const w1e = Math.min(1, w1 + wRet);

  // ── 蓝色背景 ──
  // phase1 明亮蓝，phase2 青蓝，phase3 深蓝
  const bgR = Math.round(26 * w1e + 20 * w2 + 18 * w3 + 26 * wRet);
  const bgG = Math.round(143 * w1e + 155 * w2 + 100 * w3 + 143 * wRet);
  const bgB = Math.round(224 * w1e + 230 * w2 + 200 * w3 + 224 * wRet);
  ctx.fillStyle = `rgb(${Math.min(255,30+bgR)},${Math.min(255,100+bgG/3)},${Math.min(255,180+bgB/5)})`;
  // 简化：用固定蓝底色+明度微调
  const brightness = w1e * 1 + w2 * 0.95 + w3 * 0.75;
  const r = Math.round(26 * brightness);
  const g = Math.round(143 * brightness);
  const b = Math.round(224 * brightness);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, W, H);

  // ── 方框区域 ──
  const SQ = squareSize;

  // ══ PHASE 1: 密集文字马赛克 + 白鸽轮廓 ══
  if (w1e > 0.01) {
    const fontSize = cellSize * 0.65;
    ctx.font = `400 ${fontSize}px "Courier New","SF Mono",monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (const cell of GRID) {
      const doveBoost = cell.isDove ? 0.35 : 0;
      const alpha = (0.25 + Math.sin(time * 0.01 + cell.phase) * 0.1 + doveBoost) * w1e;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillText(cell.char, cell.x, cell.y);
    }
  }

  // ══ PHASE 2: 蕾丝网络（稀疏字符+连接线）══
  if (w2 > 0.01) {
    // 连接线
    ctx.strokeStyle = `rgba(255,255,255,${w2 * 0.18})`;
    ctx.lineWidth = 0.5;
    for (const cell of GRID) {
      if (Math.random() > 0.4) continue; // 稀疏显示
      for (const nb of cell.connections) {
        ctx.beginPath();
        ctx.moveTo(cell.x, cell.y);
        ctx.lineTo(nb.x, nb.y);
        ctx.stroke();
      }
    }

    // 稀疏字符（只显示部分）
    const fontSize = cellSize * 0.55;
    ctx.font = `300 ${fontSize}px "Courier New",monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const cell of GRID) {
      const show = Math.sin(cell.phase * 5 + time * 0.005) > 0.2;
      if (!show) continue;
      const alpha = 0.3 * w2;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillText(cell.char, cell.x, cell.y);
    }
  }

  // ══ PHASE 3: 密集文字网络 + 繁花 ══
  if (w3 > 0.01) {
    // 密集网络线
    ctx.strokeStyle = `rgba(255,255,255,${w3 * 0.12})`;
    ctx.lineWidth = 0.4;
    for (const cell of GRID) {
      for (const nb of cell.connections) {
        ctx.beginPath();
        ctx.moveTo(cell.x, cell.y);
        ctx.lineTo(nb.x, nb.y);
        ctx.stroke();
      }
    }

    // 密集字符
    const fontSize = cellSize * 0.5;
    ctx.font = `300 ${fontSize}px "Courier New",monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const cell of GRID) {
      const alpha = (0.35 + Math.sin(time * 0.008 + cell.phase) * 0.1) * w3;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillText(cell.char, cell.x, cell.y);
    }
  }

  // ══ 花朵层 ══
  // Phase1: 稀疏
  if (w1e > 0.01) {
    for (const f of FLOWERS_SPARSE) {
      const fx = squareX + f.u * SQ;
      const fy = squareY + f.v * SQ;
      drawPinkFlower(fx, fy, f.size, w1e);
    }
  }
  // Phase2: 中等
  if (w2 > 0.01) {
    for (const f of FLOWERS_MED) {
      const fx = squareX + f.u * SQ;
      const fy = squareY + f.v * SQ;
      drawPinkFlower(fx, fy, f.size, w2);
    }
  }
  // Phase3: 密集
  if (w3 > 0.01) {
    for (const f of FLOWERS_DENSE) {
      const fx = squareX + f.u * SQ;
      const fy = squareY + f.v * SQ;
      const bloom = Math.min(1, w3 * 1.5);
      drawPinkFlower(fx, fy, f.size * 1.2, bloom);
    }
  }

  // ══ 蝴蝶 ══
  // 蝴蝶缓慢漂移
  if (time % 200 === 0) {
    bfTargetX = 0.55 + Math.random() * 0.35;
    bfTargetY = 0.4 + Math.random() * 0.35;
  }
  butterflyX += (bfTargetX - butterflyX) * 0.008;
  butterflyY += (bfTargetY - butterflyY) * 0.008;

  const bx = squareX + butterflyX * SQ;
  const by = squareY + butterflyY * SQ;
  const bSize = S * 0.035;
  drawButterfly(bx, by, bSize, 0.9);

  // ── 阶段指示点 ──
  const dotY = H * 0.96;
  for (let i = 0; i < 3; i++) {
    const dx = W / 2 + (i - 1) * 16;
    const isAct = Math.round(phaseSmooth) === i || (phaseSmooth > 2.5 && i === 0);
    ctx.fillStyle = isAct ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(dx, dotY, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── 事件 ──
resize();
window.addEventListener('resize', resize);
window.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
window.addEventListener('click', () => {
  const seg = PHASE_DUR + TRANS;
  const cur = Math.floor(cycleFrame / seg);
  const nxt = (cur + 1) % 3;
  time = time - cycleFrame + nxt * seg;
});

draw();
</script>
</body>
</html>
