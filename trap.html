<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>陷阱 - Trap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            touch-action:none;
        }
        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(139, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="trap"></canvas>
    <script>
        const canvas = document.getElementById('trap');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let centerX = width / 2;
        let centerY = height / 2;

        function handleResize(){
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize',handleResize);

        let mouseX = centerX;
        let mouseY = centerY;
        let time = 0;
        let cracks = [];

        // 鼠标移动事件
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if(e.touches[0]){
                mouseX = e.touches[0].clientX - rect.left;
                mouseY = e.touches[0].clientY - rect.top;
            }
        },{passive:false});

        // 裂纹类
        class Crack {
            constructor() {
                this.x = centerX;
                this.y = centerY;
                this.angle = Math.random() * Math.PI * 2;
                this.length = 0;
                this.maxLength = Math.random() * 150 + 100;
                this.speed = Math.random() * 3 + 2;
                this.opacity = 1;
            }

            update() {
                this.length += this.speed;
                if (this.length > this.maxLength) {
                    this.opacity -= 0.02;
                }
                return this.opacity > 0;
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = `rgba(220, 20, 60, ${this.opacity * 0.6})`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                const endX = this.x + Math.cos(this.angle) * this.length;
                const endY = this.y + Math.sin(this.angle) * this.length;
                ctx.lineTo(endX, endY);
                
                // 添加分支裂纹
                const branches = 3;
                for (let i = 0; i < branches; i++) {
                    const branchPos = this.length * (0.3 + i * 0.3);
                    const branchX = this.x + Math.cos(this.angle) * branchPos;
                    const branchY = this.y + Math.sin(this.angle) * branchPos;
                    const branchAngle = this.angle + (Math.random() - 0.5) * Math.PI / 3;
                    const branchLength = this.length * 0.3;
                    
                    ctx.moveTo(branchX, branchY);
                    ctx.lineTo(
                        branchX + Math.cos(branchAngle) * branchLength,
                        branchY + Math.sin(branchAngle) * branchLength
                    );
                }
                
                ctx.stroke();
                ctx.restore();
            }
        }

        // 绘制几何图形
        function drawShape(type, size, rotation, opacity, colorIndex) {
            const offsetX = (mouseX - centerX) * 0.02;
            const offsetY = (mouseY - centerY) * 0.02;
            const cx = centerX + offsetX;
            const cy = centerY + offsetY;

            // 颜色渐变：暗红→血红→亮红
            const colors = [
                `rgba(139, 0, 0, ${opacity})`,      // 暗红
                `rgba(178, 34, 34, ${opacity})`,    // 火砖红
                `rgba(220, 20, 60, ${opacity})`,    // 深红
                `rgba(255, 0, 0, ${opacity})`       // 亮红
            ];
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);
            ctx.strokeStyle = colors[colorIndex % colors.length];
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = colors[colorIndex % colors.length];
            ctx.beginPath();

            if (type === 'square') {
                // 正方形
                ctx.rect(-size / 2, -size / 2, size, size);
            } else if (type === 'hexagon') {
                // 六边形
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i;
                    const x = Math.cos(angle) * size;
                    const y = Math.sin(angle) * size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
            } else if (type === 'circle') {
                // 圆形
                ctx.arc(0, 0, size, 0, Math.PI * 2);
            }

            ctx.stroke();
            ctx.restore();
        }

        // 绘制扭曲的文字
        function drawDistortedText() {
            const text = '陷阱';
            const fontSize = 60;
            const offsetX = (mouseX - centerX) * 0.01;
            const offsetY = (mouseY - centerY) * 0.01;
            
            ctx.save();
            ctx.translate(centerX + offsetX, centerY + offsetY);
            
            // 绘制多层扭曲文字
            for (let layer = 0; layer < 5; layer++) {
                const opacity = 0.1 + (Math.sin(time * 0.03 + layer) * 0.5 + 0.5) * 0.3;
                const distortion = Math.sin(time * 0.05 + layer) * 10;
                
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = `rgba(220, 20, 60, ${opacity})`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255, 0, 0, 0.6)';
                
                // 几何切割效果
                ctx.save();
                ctx.rotate(Math.sin(time * 0.02 + layer) * 0.1);
                ctx.scale(1 + Math.sin(time * 0.04 + layer) * 0.1, 1);
                
                // 绘制切割线条
                for (let i = 0; i < 3; i++) {
                    ctx.save();
                    ctx.translate(distortion * (i - 1), 0);
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
                
                ctx.restore();
            }
            
            ctx.restore();
        }

        // 绘制黑洞漩涡
        function drawVortex() {
            const offsetX = (mouseX - centerX) * 0.015;
            const offsetY = (mouseY - centerY) * 0.015;
            const cx = centerX + offsetX;
            const cy = centerY + offsetY;

            // 绘制多层旋转的漩涡
            for (let layer = 0; layer < 8; layer++) {
                const radius = 120 - layer * 12;
                const segments = 36;
                const rotation = time * 0.02 + layer * 0.3;
                
                for (let i = 0; i < segments; i++) {
                    const angle1 = (i / segments) * Math.PI * 2 + rotation;
                    const angle2 = ((i + 1) / segments) * Math.PI * 2 + rotation;
                    
                    const innerRadius = radius * 0.7;
                    const opacity = (1 - layer / 8) * 0.3;
                    
                    const gradient = ctx.createRadialGradient(cx, cy, innerRadius, cx, cy, radius);
                    gradient.addColorStop(0, `rgba(0, 0, 0, ${opacity})`);
                    gradient.addColorStop(1, `rgba(139, 0, 0, ${opacity})`);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, angle1, angle2);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // 中心黑洞
            const blackHoleGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
            blackHoleGradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
            blackHoleGradient.addColorStop(0.5, 'rgba(20, 0, 0, 0.9)');
            blackHoleGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = blackHoleGradient;
            ctx.beginPath();
            ctx.arc(cx, cy, 80, 0, Math.PI * 2);
            ctx.fill();
        }

        // 主动画循环
        function animate() {
            time++;
            
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // 随机生成裂纹
            if (Math.random() < 0.05) {
                cracks.push(new Crack());
            }

            // 更新和绘制裂纹
            cracks = cracks.filter(crack => {
                const alive = crack.update();
                if (alive) crack.draw();
                return alive;
            });

            // 绘制多层几何图形（从外到内收缩）
            const shapes = ['circle', 'hexagon', 'square'];
            const layers = 15;
            
            for (let i = 0; i < layers; i++) {
                const progress = (time * 0.5 + i * 20) % 300;
                const size = 350 - progress;
                
                if (size > 10) {
                    const opacity = Math.max(0, 1 - progress / 300) * 0.8;
                    const rotation = (time * 0.01 + i * 0.2);
                    const shapeType = shapes[i % shapes.length];
                    const colorIndex = Math.floor(i / 3);
                    
                    drawShape(shapeType, size, rotation, opacity, colorIndex);
                }
            }

            // 绘制漩涡黑洞
            drawVortex();

            // 绘制扭曲文字
            drawDistortedText();

            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>

<script>
// Generated Audio System - 工业金属噪声
// 工业金属噪声音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  // 锯齿波失真
  const o=ctx.createOscillator();o.frequency.value=80;o.type='sawtooth';
  const dist=ctx.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<128;i++)curve[i]=-1+i/64;
  for(let i=128;i<256;i++)curve[i]=1-(i-128)/64;
  dist.curve=curve;
  const g=ctx.createGain();g.gain.value=0.18;
  o.connect(dist);dist.connect(g);g.connect(master);o.start();
  
  // 低频脉冲
  function pulse(){
    if(!isActive)return;
    const p=ctx.createOscillator(),pg=ctx.createGain();
    p.frequency.value=55;p.type='square';
    pg.gain.setValueAtTime(0.15,ctx.currentTime);
    pg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    p.connect(pg);pg.connect(master);p.start();p.stop(ctx.currentTime+0.15);
    setTimeout(pulse,400+Math.random()*600);
  }
  pulse();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
