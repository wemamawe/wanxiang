<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>等枝桠成繁华</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #7bbfd8;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    touch-action:none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W;
canvas.height = H;

function handleResize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  // 重新构建树
  branches.length=0; totalB=0;
  buildTree(W*0.18, -10, Math.PI/2 + 0.3,  0, 5);
  buildTree(W*0.55, -10, Math.PI/2 - 0.1,  0, 5);
  buildTree(W*0.85, -10,  Math.PI/2 - 0.35, 0, 4);
}
window.addEventListener('resize',handleResize);

// ── Branch node ──
const branches = [];
let totalB = 0;

// upward-spreading tree viewed from below
// origin near top-left, branches spread downward into frame
function buildTree(x, y, len, angle, depth, strokeW) {
  if (depth > 10 || len < 4) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  branches.push({ x1:x, y1:y, x2, y2, depth, strokeW, id: totalB++ });
  const newLen = len * (0.68 + Math.random()*0.1);
  const spread = 0.38 + Math.random()*0.1;
  buildTree(x2, y2, newLen, angle - spread*(0.8+Math.random()*0.4), depth+1, strokeW*0.75);
  buildTree(x2, y2, newLen, angle + spread*(0.7+Math.random()*0.4), depth+1, strokeW*0.75);
  if (depth < 4 && Math.random() < 0.3) {
    buildTree(x2, y2, newLen*0.7, angle + (Math.random()-0.5)*0.6, depth+2, strokeW*0.6);
  }
}

// Two main trunks from top, angled downward/outward (simulating upward view)
buildTree(W*0.18, -10, 130, Math.PI/2 + 0.3,  0, 5);
buildTree(W*0.55, -10, 120, Math.PI/2 - 0.1,  0, 5);
buildTree(W*0.85, -10,  90, Math.PI/2 - 0.35, 0, 4);

// ── Flowers ──
const flowers = [];
for (const b of branches) {
  if (b.depth >= 5 && Math.random() < 0.6) {
    for (let k=0; k<2+Math.floor(Math.random()*3); k++) {
      const t = Math.random();
      flowers.push({
        x: b.x1 + (b.x2-b.x1)*t + (Math.random()-0.5)*8,
        y: b.y1 + (b.y2-b.y1)*t + (Math.random()-0.5)*8,
        r: 3.5 + Math.random()*3.5,
        hue: 340 + Math.floor(Math.random()*15),
        sat: 60 + Math.floor(Math.random()*20),
        lid: b.id,
        petals: 4 + Math.floor(Math.random()*2),
      });
    }
  }
  if (b.depth >= 8 && Math.random() < 0.4) {
    flowers.push({
      x: b.x2, y: b.y2,
      r: 2.5 + Math.random()*2,
      hue: 345, sat: 55, lid: b.id, petals: 5,
    });
  }
}

// ── Leaves ──
const leaves = [];
for (const b of branches) {
  if (b.depth >= 4 && Math.random() < 0.25) {
    leaves.push({
      x: b.x2, y: b.y2,
      size: 4 + Math.random()*5,
      angle: Math.random()*Math.PI*2,
      lid: b.id,
    });
  }
}

// ── Falling petals ──
const petals = Array.from({length:22}, () => ({
  x: Math.random()*W,
  y: Math.random()*H*0.7,
  vx: (Math.random()-0.5)*0.6,
  vy: 0.4 + Math.random()*0.7,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-0.5)*0.04,
  rx: 3 + Math.random()*2.5,
  ry: 1.5 + Math.random(),
  alpha: 0.4 + Math.random()*0.4,
  delay: Math.random()*200,
}));

// ── Draw helpers ──
function drawFlower(f, alpha) {
  ctx.save();
  ctx.translate(f.x, f.y);
  const petCount = f.petals;
  for (let i=0; i<petCount; i++) {
    const a = (i/petCount)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(
      Math.cos(a)*f.r*1.1, Math.sin(a)*f.r*1.1,
      f.r*0.8, f.r*0.45, a, 0, Math.PI*2
    );
    ctx.fillStyle = `hsla(${f.hue},${f.sat}%,88%,${0.9*alpha})`;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(0, 0, f.r*0.4, 0, Math.PI*2);
  ctx.fillStyle = `hsla(${f.hue+5},85%,65%,${0.95*alpha})`;
  ctx.fill();
  ctx.restore();
}

function drawLeaf(l, alpha) {
  ctx.save();
  ctx.translate(l.x, l.y);
  ctx.rotate(l.angle);
  ctx.beginPath();
  ctx.ellipse(0, 0, l.size, l.size*0.45, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(120,190,80,${0.75*alpha})`;
  ctx.fill();
  ctx.restore();
}

// ── Sky glow at bottom ──
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#5a9fc0');
  grad.addColorStop(0.45,'#82c2dc');
  grad.addColorStop(0.72,'#a8d8ee');
  grad.addColorStop(1,   '#c4e8f6');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── Poem lines (Pretext-powered, measured once at init) ──
const POEM_TEXT = '桃之夭夭，灼灼其华。\n之子于归，宜其室家。\n桃之夭夭，有蕡其实。\n之子于归，宜其家室。';
const POEM_FONT = '20px "PingFang SC","Microsoft YaHei",serif';
const POEM_LINE_H = 34;
const POEM_MAX_W = 180;
let poemLines = null;

// Per-line fall state
let lineParticles = [];

function preparePoem() {
  const { prepareWithSegments, layoutWithLines } = window.__Pretext__;
  const prepared = prepareWithSegments(POEM_TEXT, POEM_FONT, { whiteSpace: 'pre-wrap' });
  poemLines = layoutWithLines(prepared, POEM_MAX_W, POEM_LINE_H).lines;

  const totalH = poemLines.length * POEM_LINE_H;
  const xRight = W - 28;
  const yTop   = H - 60 - totalH;

  // Each line gets its own petal-like fall trajectory
  lineParticles = poemLines.map((line, i) => {
    const targetX = xRight;
    const targetY = yTop + i * POEM_LINE_H + POEM_LINE_H * 0.8;
    return {
      text: line.text,
      tx: targetX,           // target x
      ty: targetY,           // target y
      x: targetX + (Math.random() - 0.5) * 120,  // start scattered
      y: -30 - i * 18,       // start above canvas, staggered
      rot: (Math.random() - 0.5) * 0.5,          // initial tilt
      vx: (Math.random() - 0.5) * 1.2,
      vy: 1.8 + Math.random() * 1.2,
      vrot: (Math.random() - 0.5) * 0.03,
      phase: Math.random() * Math.PI * 2,        // swaying phase
      landed: false,
      landFrame: -1,
      alpha: 0,
    };
  });
}

// Spring-damp approach to target
function spring(cur, target, vel, stiffness, damping) {
  const force = (target - cur) * stiffness - vel * damping;
  return { pos: cur + vel, vel: vel + force };
}

function updatePoem(globalFrame) {
  if (!lineParticles.length) return;
  const FALL_START = 150;   // frame when fall begins
  if (globalFrame < FALL_START) return;
  const t = globalFrame - FALL_START;

  lineParticles.forEach((p, i) => {
    const delay = i * 18;   // each line starts a bit later
    if (t < delay) return;
    const lt = t - delay;
    p.alpha = Math.min(1, lt / 20);

    if (p.landed) {
      // gentle spring settle after landing
      if (globalFrame - p.landFrame < 40) {
        const sf = (globalFrame - p.landFrame) / 40;
        p.rot = p.rot * (1 - sf * 0.18);  // tilt decays to 0
      } else {
        p.rot = 0;
      }
      return;
    }

    // Petal-like free fall with horizontal sway
    const sway = Math.sin(lt * 0.06 + p.phase) * 0.5;
    p.x += p.vx + sway;
    p.y += p.vy;
    p.rot += p.vrot;

    // Proximity to target → switch to spring homing
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 60 || p.y > p.ty) {
      // Spring pull to target
      const sx = spring(p.x, p.tx, p.vx, 0.12, 0.55);
      const sy = spring(p.y, p.ty, p.vy, 0.14, 0.58);
      p.x = sx.pos; p.vx = sx.vel;
      p.y = sy.pos; p.vy = sy.vel;
      p.vrot *= 0.82;

      if (dist < 1.5) {
        p.x = p.tx; p.y = p.ty;
        p.landed = true;
        p.landFrame = globalFrame;
      }
    }
  });
}

function drawPoem() {
  if (!lineParticles.length) return;
  lineParticles.forEach(p => {
    if (p.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.font = POEM_FONT;
    ctx.textAlign = 'right';
    // soft glow outline
    ctx.strokeStyle = 'rgba(255,255,255,0.72)';
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, 0, 0);
    ctx.fillStyle = 'rgba(50,32,28,0.9)';
    ctx.fillText(p.text, 0, 0);
    ctx.restore();
  });
}

// ── Animation ──
let frame = 0;
const GROW_FRAMES = 180;

function ease(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

function animate() {
  requestAnimationFrame(animate);
  frame++;

  drawSky();

  const progress = Math.min(1, frame / GROW_FRAMES);
  const revealUpTo = Math.floor(ease(progress) * totalB);

  // branches
  for (const b of branches) {
    if (b.id > revealUpTo) continue;
    const a = Math.min(1, (revealUpTo - b.id) / Math.max(1, totalB * 0.04));
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.strokeStyle = `rgba(35,28,22,${a})`;
    ctx.lineWidth = Math.max(0.5, b.strokeW);
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // leaves
  for (const l of leaves) {
    if (l.lid > revealUpTo - 3) continue;
    const a = Math.min(1, (revealUpTo - l.lid - 3) / Math.max(1, totalB*0.05));
    drawLeaf(l, a);
  }

  // flowers
  for (const f of flowers) {
    if (f.lid > revealUpTo - 5) continue;
    const a = Math.min(1, (revealUpTo - f.lid - 5) / Math.max(1, totalB*0.05));
    drawFlower(f, a);
  }

  // falling petals
  if (frame > 120) {
    for (const p of petals) {
      if (frame < p.delay + 120) continue;
      p.x += p.vx + Math.sin(frame*0.018 + p.delay)*0.5;
      p.y += p.vy;
      p.rot += p.vrot;
      if (p.y > H + 15) { p.y = -10; p.x = Math.random()*W; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.rx, p.ry, 0, 0, Math.PI*2);
      ctx.fillStyle = `hsla(345,72%,82%,${p.alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }

  // poem petal-fall animation
  updatePoem(frame);
  drawPoem();
}

// Load Pretext from CDN, then start
(function loadPretext() {
  // inject module shim so we can grab named exports
  const script = document.createElement('script');
  script.type = 'module';
  script.textContent = `
    import * as PT from 'https://esm.sh/@chenglou/pretext';
    window.__Pretext__ = PT;
    window.dispatchEvent(new Event('pretext-ready'));
  `;
  document.head.appendChild(script);
})();

window.addEventListener('pretext-ready', () => {
  preparePoem();
  animate();
});

// Fallback: if CDN fails, run without poem
setTimeout(() => {
  if (!poemLines) {
    console.warn('Pretext CDN timeout, running without poem');
    animate();
  }
}, 3000);
</script>

<script>
// Generated Audio System - 空灵人声pad
// 空灵人声pad音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  const freqs=[220,277.18,329.63];
  freqs.forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    const vib=ctx.createOscillator(),vg=ctx.createGain();
    o.frequency.value=f;o.type='sine';
    vib.frequency.value=3.5+i*0.5;vg.gain.value=2;
    vib.connect(vg);vg.connect(o.frequency);
    g.gain.value=0.08/(i+1);
    o.connect(g);g.connect(master);o.start();vib.start();
  });
  isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
