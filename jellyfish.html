<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水母灯 · Jellyfish Chandelier</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8f8f8;overflow:hidden;touch-action:none;display:flex;align-items:center;justify-content:center;min-height:100vh;}
canvas{display:block;}
#hint{position:fixed;bottom:4%;left:50%;transform:translateX(-50%);
  font:italic 12px Georgia,serif;color:rgba(80,120,140,0.4);
  letter-spacing:0.15em;animation:pulse 3s ease-in-out infinite;pointer-events:none;}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
#title{position:fixed;top:5%;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;opacity:0;transition:opacity 2s;}
#title.show{opacity:1;}
#title h1{font:300 22px 'Georgia',serif;color:rgba(60,100,120,0.55);letter-spacing:0.4em;}
#title p{font:italic 11px 'Georgia',serif;color:rgba(80,130,150,0.38);margin-top:4px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title"><h1>水 母 灯</h1><p>Jellyfish Chandelier · Watercolor Installation</p></div>
<div id="hint">轻触 · 漂动</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, cx, cy;
let time = 0;
let mouseX = -1000, mouseY = -1000;
let mouseDown = false;

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  cx = W / 2;
  cy = H * 0.08; // 吊顶中心
  buildStructure();
}

// ══════════════════════════════════════════════════
//  同心圆环（顶部金属框架）
// ══════════════════════════════════════════════════
const RINGS = [];
function buildRings() {
  RINGS.length = 0;
  const baseR = Math.min(W, H) * 0.22;
  for (let i = 0; i < 5; i++) {
    RINGS.push({
      r: baseR * (0.25 + i * 0.18),
      y: cy + i * 3,
      lw: 1.5 - i * 0.15,
      alpha: 0.4 - i * 0.04,
    });
  }
}

// ══════════════════════════════════════════════════
//  菱形网格线（从同心环垂挂的细线）
// ══════════════════════════════════════════════════
const STRINGS = [];
function buildStrings() {
  STRINGS.length = 0;
  const topR = RINGS[RINGS.length - 1].r;
  const stringCount = 36;
  const layers = 18;
  const bodyH = H * 0.72;

  for (let s = 0; s < stringCount; s++) {
    const angle = (s / stringCount) * Math.PI * 2;
    const pts = [];
    for (let l = 0; l <= layers; l++) {
      const t = l / layers;
      // 灯笼/水母轮廓：先膨胀再收束
      const bulge = Math.sin(t * Math.PI) * 1.15;
      const taper = 1 - t * 0.88;
      const profile = Math.max(0.05, bulge * taper);
      const r = topR * profile;
      const y = cy + t * bodyH;
      // 菱形网格：奇数层偏移半个间距
      const offset = (l % 2 === 0) ? 0 : Math.PI / stringCount;
      pts.push({
        x: cx + Math.cos(angle + offset) * r,
        y: y,
        baseX: cx + Math.cos(angle + offset) * r,
        baseY: y,
        r: r,
        angle: angle + offset,
      });
    }
    STRINGS.push(pts);
  }
}

// ══════════════════════════════════════════════════
//  水彩小鱼
// ══════════════════════════════════════════════════
const FISH = [];
function buildFish() {
  FISH.length = 0;
  const topR = RINGS[RINGS.length - 1].r;
  const bodyH = H * 0.72;
  const count = 42;

  for (let i = 0; i < count; i++) {
    const t = Math.random() * 0.92 + 0.04;
    const bulge = Math.sin(t * Math.PI) * 1.15;
    const taper = 1 - t * 0.88;
    const profile = Math.max(0.05, bulge * taper);
    const r = topR * profile * (0.5 + Math.random() * 0.45);
    const angle = Math.random() * Math.PI * 2;
    const y = cy + t * bodyH;
    // 底部鱼更大
    const size = 6 + t * 12 + Math.random() * 4;
    const hue = 160 + Math.random() * 30;
    FISH.push({
      x: cx + Math.cos(angle) * r,
      y: y,
      baseX: cx + Math.cos(angle) * r,
      baseY: y,
      size: size,
      hue: hue,
      sat: 45 + Math.random() * 25,
      lit: 55 + Math.random() * 20,
      angle: angle,
      facingAngle: (Math.random() - 0.5) * Math.PI,
      phase: Math.random() * Math.PI * 2,
      swimSpeed: 0.3 + Math.random() * 0.5,
      markings: Math.random() < 0.7,
      markHue: 35 + Math.random() * 20,
      depth: t,
    });
  }

  // 底部焦点大鱼
  FISH.push({
    x: cx,
    y: cy + bodyH * 0.96,
    baseX: cx,
    baseY: cy + bodyH * 0.96,
    size: 22,
    hue: 172,
    sat: 50,
    lit: 58,
    angle: 0,
    facingAngle: -Math.PI / 2,
    phase: 0,
    swimSpeed: 0.25,
    markings: true,
    markHue: 40,
    depth: 0.96,
    isBoss: true,
  });
}

// ══════════════════════════════════════════════════
//  蓝色花球珠
// ══════════════════════════════════════════════════
const SPHERES = [];
function buildSpheres() {
  SPHERES.length = 0;
  const topR = RINGS[RINGS.length - 1].r;
  const bodyH = H * 0.72;
  const count = 18;
  for (let i = 0; i < count; i++) {
    const t = Math.random() * 0.85 + 0.05;
    const bulge = Math.sin(t * Math.PI) * 1.15;
    const taper = 1 - t * 0.88;
    const profile = Math.max(0.05, bulge * taper);
    const r = topR * profile * (0.4 + Math.random() * 0.5);
    const angle = Math.random() * Math.PI * 2;
    SPHERES.push({
      x: cx + Math.cos(angle) * r,
      y: cy + t * bodyH,
      baseX: cx + Math.cos(angle) * r,
      baseY: cy + t * bodyH,
      r: 3 + Math.random() * 4,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ══════════════════════════════════════════════════
//  水晶菱形珠 + 珍珠
// ══════════════════════════════════════════════════
const CRYSTALS = [];
function buildCrystals() {
  CRYSTALS.length = 0;
  const topR = RINGS[RINGS.length - 1].r;
  const bodyH = H * 0.72;
  const count = 28;
  for (let i = 0; i < count; i++) {
    const t = Math.random() * 0.88 + 0.06;
    const bulge = Math.sin(t * Math.PI) * 1.15;
    const taper = 1 - t * 0.88;
    const profile = Math.max(0.05, bulge * taper);
    const r = topR * profile * (0.3 + Math.random() * 0.65);
    const angle = Math.random() * Math.PI * 2;
    CRYSTALS.push({
      x: cx + Math.cos(angle) * r,
      y: cy + t * bodyH,
      baseX: cx + Math.cos(angle) * r,
      baseY: cy + t * bodyH,
      isPearl: Math.random() < 0.45,
      r: 1.5 + Math.random() * 2.5,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function buildStructure() {
  buildRings();
  buildStrings();
  buildFish();
  buildSpheres();
  buildCrystals();
}

// ══════════════════════════════════════════════════
//  绘制水彩鱼（关键：水彩质感）
// ══════════════════════════════════════════════════
function drawFish(f) {
  const swim = Math.sin(time * f.swimSpeed * 3 + f.phase) * 0.12;
  const fx = f.x + Math.sin(time * f.swimSpeed + f.phase) * 3;
  const fy = f.y + Math.cos(time * f.swimSpeed * 0.7 + f.phase) * 2;
  const fa = f.facingAngle + swim;
  const sz = f.size;

  ctx.save();
  ctx.translate(fx, fy);
  ctx.rotate(fa);

  // 水彩质感：多层半透明叠加
  // 鱼身主体
  const bodyGrad = ctx.createRadialGradient(-sz*0.1, 0, 0, 0, 0, sz*0.7);
  bodyGrad.addColorStop(0, `hsla(${f.hue},${f.sat}%,${f.lit+15}%,0.65)`);
  bodyGrad.addColorStop(0.5, `hsla(${f.hue},${f.sat}%,${f.lit}%,0.55)`);
  bodyGrad.addColorStop(1, `hsla(${f.hue},${f.sat+10}%,${f.lit-10}%,0.25)`);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz*0.55, sz*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // 水彩晕染边缘（柔化）
  const edgeGrad = ctx.createRadialGradient(0, 0, sz*0.3, 0, 0, sz*0.65);
  edgeGrad.addColorStop(0, 'transparent');
  edgeGrad.addColorStop(1, `hsla(${f.hue},${f.sat+15}%,${f.lit+5}%,0.15)`);
  ctx.fillStyle = edgeGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz*0.65, sz*0.35, 0, 0, Math.PI*2);
  ctx.fill();

  // 尾鳍（透明水彩笔触）
  const tailWag = Math.sin(time * 5 + f.phase) * 0.25;
  ctx.fillStyle = `hsla(${f.hue},${f.sat-5}%,${f.lit+10}%,0.35)`;
  ctx.beginPath();
  ctx.moveTo(-sz*0.45, 0);
  ctx.quadraticCurveTo(-sz*0.7, -sz*0.3 + tailWag*sz, -sz*0.95, -sz*0.35 + tailWag*sz);
  ctx.quadraticCurveTo(-sz*0.65, tailWag*sz*0.5, -sz*0.95, sz*0.35 + tailWag*sz);
  ctx.quadraticCurveTo(-sz*0.7, sz*0.3 + tailWag*sz, -sz*0.45, 0);
  ctx.fill();

  // 背鳍
  ctx.fillStyle = `hsla(${f.hue},${f.sat}%,${f.lit+8}%,0.28)`;
  ctx.beginPath();
  ctx.moveTo(sz*0.1, -sz*0.25);
  ctx.quadraticCurveTo(0, -sz*0.45, -sz*0.25, -sz*0.32);
  ctx.quadraticCurveTo(-sz*0.1, -sz*0.25, sz*0.1, -sz*0.25);
  ctx.fill();

  // 黄橙色斑纹
  if (f.markings) {
    ctx.fillStyle = `hsla(${f.markHue},75%,62%,0.42)`;
    ctx.beginPath();
    ctx.ellipse(sz*0.05, -sz*0.02, sz*0.18, sz*0.09, 0.15, 0, Math.PI*2);
    ctx.fill();
    // 条纹
    ctx.strokeStyle = `hsla(${f.markHue},60%,55%,0.3)`;
    ctx.lineWidth = sz * 0.04;
    for (let s = 0; s < 3; s++) {
      const sx = sz*0.15 - s*sz*0.15;
      ctx.beginPath();
      ctx.moveTo(sx, -sz*0.2); ctx.lineTo(sx, sz*0.2);
      ctx.stroke();
    }
  }

  // 眼睛
  ctx.beginPath(); ctx.arc(sz*0.32, -sz*0.05, sz*0.06, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(20,20,30,0.7)'; ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.33, -sz*0.06, sz*0.025, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fill();

  ctx.restore();
}

// ══════════════════════════════════════════════════
//  绘制蓝色花球
// ══════════════════════════════════════════════════
function drawSphere(s) {
  const sx = s.x + Math.sin(time * 0.8 + s.phase) * 2;
  const sy = s.y + Math.cos(time * 0.6 + s.phase) * 1.5;
  const r = s.r;

  // 绣球花球效果
  const sg = ctx.createRadialGradient(sx-r*0.3, sy-r*0.3, 0, sx, sy, r*1.2);
  sg.addColorStop(0, 'rgba(100,140,220,0.75)');
  sg.addColorStop(0.5, 'rgba(50,80,180,0.65)');
  sg.addColorStop(1, 'rgba(30,50,140,0.35)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();

  // 花瓣纹理
  for (let p = 0; p < 6; p++) {
    const pa = (p/6)*Math.PI*2 + time*0.3;
    ctx.fillStyle = 'rgba(120,160,240,0.3)';
    ctx.beginPath();
    ctx.arc(sx + Math.cos(pa)*r*0.45, sy + Math.sin(pa)*r*0.45, r*0.35, 0, Math.PI*2);
    ctx.fill();
  }

  // 高光
  ctx.fillStyle = 'rgba(200,220,255,0.45)';
  ctx.beginPath(); ctx.arc(sx-r*0.25, sy-r*0.25, r*0.3, 0, Math.PI*2); ctx.fill();
}

// ══════════════════════════════════════════════════
//  绘制水晶珠/珍珠
// ══════════════════════════════════════════════════
function drawCrystal(c) {
  const ccx = c.x + Math.sin(time * 0.6 + c.phase) * 1.5;
  const ccy = c.y + Math.cos(time * 0.5 + c.phase) * 1;
  const r = c.r;

  if (c.isPearl) {
    // 珍珠：柔白泛光
    const pg = ctx.createRadialGradient(ccx-r*0.3, ccy-r*0.3, 0, ccx, ccy, r);
    pg.addColorStop(0, 'rgba(255,255,250,0.88)');
    pg.addColorStop(0.6, 'rgba(240,235,225,0.65)');
    pg.addColorStop(1, 'rgba(210,200,190,0.35)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.ellipse(ccx, ccy, r, r*0.75, 0, 0, Math.PI*2); ctx.fill();
  } else {
    // 水晶菱形珠
    const sparkle = 0.5 + Math.sin(time * 3 + c.phase) * 0.3;
    ctx.fillStyle = `rgba(220,230,255,${sparkle})`;
    ctx.save(); ctx.translate(ccx, ccy); ctx.rotate(Math.PI/4);
    ctx.fillRect(-r, -r, r*2, r*2);
    // 切面高光
    ctx.fillStyle = `rgba(255,255,255,${sparkle * 0.6})`;
    ctx.fillRect(-r*0.5, -r*0.5, r, r);
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════
//  吊线悬挂点
// ══════════════════════════════════════════════════
function drawCeilingMount() {
  // 天花板挂钩
  ctx.fillStyle = 'rgba(160,155,150,0.35)';
  ctx.beginPath(); ctx.arc(cx, cy - 15, 4, 0, Math.PI*2); ctx.fill();
  // 挂线
  ctx.strokeStyle = 'rgba(160,155,150,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, cy - 15); ctx.stroke();
}

// ══════════════════════════════════════════════════
//  鼠标交互：微风扰动
// ══════════════════════════════════════════════════
function applyWind() {
  if (mouseX < 0) return;
  const wind = (mouseX - cx) * 0.006;
  const windY = (mouseY - cy) * 0.002;

  for (const pts of STRINGS) {
    for (const p of pts) {
      const dy = (p.baseY - cy) / (H * 0.72);
      p.x = p.baseX + wind * dy * 30 + Math.sin(time * 1.5 + p.angle * 3) * dy * 4;
      p.y = p.baseY + windY * dy * 8 + Math.cos(time * 1.2 + p.angle * 2) * dy * 2;
    }
  }

  for (const f of FISH) {
    const dy = (f.baseY - cy) / (H * 0.72);
    f.x = f.baseX + wind * dy * 28 + Math.sin(time * f.swimSpeed + f.phase) * 5;
    f.y = f.baseY + windY * dy * 6 + Math.cos(time * f.swimSpeed * 0.7 + f.phase) * 3;
  }

  for (const s of SPHERES) {
    const dy = (s.baseY - cy) / (H * 0.72);
    s.x = s.baseX + wind * dy * 25;
    s.y = s.baseY + windY * dy * 5;
  }

  for (const c of CRYSTALS) {
    const dy = (c.baseY - cy) / (H * 0.72);
    c.x = c.baseX + wind * dy * 25;
    c.y = c.baseY + windY * dy * 5;
  }
}

// 自然摆动（无鼠标时）
function naturalSway() {
  const sw = Math.sin(time * 0.4) * 8;
  const swY = Math.cos(time * 0.3) * 3;

  for (const pts of STRINGS) {
    for (const p of pts) {
      const dy = (p.baseY - cy) / (H * 0.72);
      p.x = p.baseX + sw * dy + Math.sin(time * 1.5 + p.angle * 3) * dy * 5;
      p.y = p.baseY + swY * dy + Math.cos(time * 1.2 + p.angle * 2) * dy * 2;
    }
  }

  for (const f of FISH) {
    const dy = (f.baseY - cy) / (H * 0.72);
    f.x = f.baseX + sw * dy + Math.sin(time * f.swimSpeed + f.phase) * 5;
    f.y = f.baseY + swY * dy + Math.cos(time * f.swimSpeed * 0.7 + f.phase) * 3;
  }

  for (const s of SPHERES) {
    const dy = (s.baseY - cy) / (H * 0.72);
    s.x = s.baseX + sw * dy;
    s.y = s.baseY + swY * dy;
  }

  for (const c of CRYSTALS) {
    const dy = (c.baseY - cy) / (H * 0.72);
    c.x = c.baseX + sw * dy;
    c.y = c.baseY + swY * dy;
  }
}

// ══════════════════════════════════════════════════
//  主绘制
// ══════════════════════════════════════════════════
function draw() {
  requestAnimationFrame(draw);
  time += 0.012;

  // 背景：纯白微暖
  ctx.fillStyle = '#f8f7f5';
  ctx.fillRect(0, 0, W, H);

  // 鼠标交互或自然摆动
  if (mouseX > 0 && mouseX < W) {
    applyWind();
  } else {
    naturalSway();
  }

  drawCeilingMount();

  // 同心金属环
  for (const ring of RINGS) {
    const ry = ring.y + Math.sin(time * 0.3) * 1;
    ctx.strokeStyle = `rgba(170,165,155,${ring.alpha})`;
    ctx.lineWidth = ring.lw;
    ctx.beginPath();
    ctx.ellipse(cx, ry, ring.r, ring.r * 0.12, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 菱形网格线
  ctx.strokeStyle = 'rgba(180,180,175,0.15)';
  ctx.lineWidth = 0.6;
  for (const pts of STRINGS) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();
  }

  // 横向连线（菱形网格横连）
  for (let l = 0; l < 18; l++) {
    ctx.beginPath();
    for (let s = 0; s < STRINGS.length; s++) {
      if (STRINGS[s][l]) {
        if (s === 0) ctx.moveTo(STRINGS[s][l].x, STRINGS[s][l].y);
        else ctx.lineTo(STRINGS[s][l].x, STRINGS[s][l].y);
      }
    }
    ctx.closePath();
    ctx.stroke();
  }

  // 水晶珠/珍珠（底层）
  for (const c of CRYSTALS) drawCrystal(c);

  // 蓝色花球
  for (const s of SPHERES) drawSphere(s);

  // 水彩鱼群（按深度排序，远处先画）
  const sortedFish = [...FISH].sort((a,b) => a.depth - b.depth);
  for (const f of sortedFish) drawFish(f);
}

// ══════════════════════════════════════════════════
//  事件
// ══════════════════════════════════════════════════
C.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
C.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });
C.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: false });
C.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

window.addEventListener('resize', resize);
resize();

setTimeout(() => document.getElementById('title').classList.add('show'), 800);

draw();
</script>

<script>
// Generated Audio System - 水下气泡
// 水下气泡音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  function bubble(){
    if(!isActive)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(300+Math.random()*200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(600+Math.random()*400,ctx.currentTime+0.25);
    o.type='sine';
    g.gain.setValueAtTime(0.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+0.35);
    // 噪声气泡
    const bufSz=ctx.sampleRate*0.05,buf=ctx.createBuffer(1,bufSz,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/bufSz*10);
    const src=ctx.createBufferSource();src.buffer=buf;
    const ng=ctx.createGain();ng.gain.value=0.06;
    src.connect(ng);ng.connect(master);src.start();
    setTimeout(bubble,500+Math.random()*1500);
  }
  bubble();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
