<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愿与愁 · Wish and Sorrow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'KaiTi', 'STKaiti', serif;
            overflow: hidden;
        }
        
        canvas {
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="520" height="700"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        // 鼠标位置
        let mouseX = width / 2;
        let mouseY = height / 2;
        
        // 分界线控制点
        const dividerPoints = [];
        const numPoints = 15;
        for (let i = 0; i < numPoints; i++) {
            dividerPoints.push({
                y: (height / (numPoints - 1)) * i,
                offset: 0,
                velocity: Math.random() * 0.5 - 0.25,
                baseX: width / 2
            });
        }
        
        // 萤火虫粒子（左侧 - 愿）
        const fireflies = [];
        for (let i = 0; i < 30; i++) {
            fireflies.push({
                x: Math.random() * width / 2,
                y: Math.random() * height,
                size: Math.random() * 3 + 1,
                speedY: -(Math.random() * 0.5 + 0.3),
                speedX: Math.random() * 0.4 - 0.2,
                alpha: Math.random(),
                alphaChange: Math.random() * 0.02 + 0.01,
                color: Math.random() > 0.5 ? 'rgba(255, 200, 100' : 'rgba(255, 170, 80'
            });
        }
        
        // 雨滴粒子（右侧 - 愁）
        const raindrops = [];
        for (let i = 0; i < 40; i++) {
            raindrops.push({
                x: Math.random() * width / 2 + width / 2,
                y: Math.random() * height,
                size: Math.random() * 2 + 1,
                speedY: Math.random() * 2 + 1,
                speedX: Math.random() * 0.3 - 0.15,
                length: Math.random() * 10 + 5,
                alpha: Math.random() * 0.6 + 0.3,
                color: Math.random() > 0.5 ? 'rgba(100, 150, 255' : 'rgba(80, 120, 200'
            });
        }
        
        // 诗句（左侧 - 愿）
        const wishPoems = [
            { text: '愿你走出半生', y: 150, alpha: 0, targetAlpha: 1, speed: 0.5 },
            { text: '归来仍是少年', y: 200, alpha: 0, targetAlpha: 1, speed: 0.5 }
        ];
        
        // 诗句（右侧 - 愁）
        const sorrowPoems = [
            { text: '此情可待成追忆', y: 500, alpha: 0, targetAlpha: 1, speed: 0.5 },
            { text: '只是当时已惘然', y: 550, alpha: 0, targetAlpha: 1, speed: 0.5 }
        ];
        
        // 鼠标移动监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // 更新分界线
        function updateDivider() {
            dividerPoints.forEach((point, i) => {
                // 受鼠标影响
                const distanceToMouse = Math.abs(point.y - mouseY);
                const mouseInfluence = Math.max(0, 1 - distanceToMouse / 150);
                const pushForce = (mouseX - width / 2) * mouseInfluence * 0.3;
                
                // 自然波动
                point.offset += point.velocity;
                if (Math.abs(point.offset) > 50) {
                    point.velocity *= -0.8;
                }
                point.velocity += (Math.random() - 0.5) * 0.1;
                point.velocity *= 0.98;
                
                // 结合鼠标和自然波动
                point.baseX = width / 2 + point.offset + pushForce;
            });
        }
        
        // 绘制分界线
        function drawDivider() {
            ctx.beginPath();
            ctx.moveTo(dividerPoints[0].baseX, 0);
            
            for (let i = 0; i < dividerPoints.length - 1; i++) {
                const curr = dividerPoints[i];
                const next = dividerPoints[i + 1];
                const midX = (curr.baseX + next.baseX) / 2;
                const midY = (curr.y + next.y) / 2;
                ctx.quadraticCurveTo(curr.baseX, curr.y, midX, midY);
            }
            
            const last = dividerPoints[dividerPoints.length - 1];
            ctx.lineTo(last.baseX, height);
            
            // 绘制渐变效果
            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            gradient.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(100, 150, 255, 0.3)');
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        // 更新萤火虫
        function updateFireflies() {
            fireflies.forEach(fly => {
                fly.y += fly.speedY;
                fly.x += fly.speedX;
                
                // 闪烁效果
                fly.alpha += fly.alphaChange;
                if (fly.alpha > 1 || fly.alpha < 0.2) {
                    fly.alphaChange *= -1;
                }
                
                // 重置位置
                if (fly.y < -10) {
                    fly.y = height + 10;
                    fly.x = Math.random() * width / 2;
                }
                if (fly.x < 0 || fly.x > width / 2) {
                    fly.speedX *= -1;
                }
            });
        }
        
        // 绘制萤火虫
        function drawFireflies() {
            fireflies.forEach(fly => {
                ctx.beginPath();
                ctx.arc(fly.x, fly.y, fly.size, 0, Math.PI * 2);
                ctx.fillStyle = fly.color + ', ' + fly.alpha + ')';
                ctx.shadowBlur = 15;
                ctx.shadowColor = fly.color + ', 1)';
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }
        
        // 更新雨滴
        function updateRaindrops() {
            raindrops.forEach(drop => {
                drop.y += drop.speedY;
                drop.x += drop.speedX;
                
                // 重置位置
                if (drop.y > height + 20) {
                    drop.y = -20;
                    drop.x = Math.random() * width / 2 + width / 2;
                }
                if (drop.x < width / 2 || drop.x > width) {
                    drop.speedX *= -1;
                }
            });
        }
        
        // 绘制雨滴
        function drawRaindrops() {
            raindrops.forEach(drop => {
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x + drop.speedX * 2, drop.y + drop.length);
                ctx.strokeStyle = drop.color + ', ' + drop.alpha + ')';
                ctx.lineWidth = drop.size;
                ctx.lineCap = 'round';
                ctx.stroke();
            });
        }
        
        // 更新诗句动画
        function updatePoems() {
            wishPoems.forEach((poem, i) => {
                poem.alpha += (poem.targetAlpha - poem.alpha) * 0.02;
                poem.y += poem.speed;
                if (poem.y > 250) {
                    poem.y = 100;
                    poem.alpha = 0;
                }
            });
            
            sorrowPoems.forEach((poem, i) => {
                poem.alpha += (poem.targetAlpha - poem.alpha) * 0.02;
                poem.y += poem.speed;
                if (poem.y > 650) {
                    poem.y = 450;
                    poem.alpha = 0;
                }
            });
        }
        
        // 绘制诗句
        function drawPoems() {
            ctx.font = '22px KaiTi';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 10;
            
            // 左侧诗句（愿）
            wishPoems.forEach(poem => {
                ctx.fillStyle = `rgba(255, 220, 150, ${poem.alpha})`;
                ctx.shadowColor = 'rgba(255, 200, 100, 0.8)';
                ctx.fillText(poem.text, width / 4, poem.y);
            });
            
            // 右侧诗句（愁）
            sorrowPoems.forEach(poem => {
                ctx.fillStyle = `rgba(150, 180, 255, ${poem.alpha})`;
                ctx.shadowColor = 'rgba(100, 150, 255, 0.8)';
                ctx.fillText(poem.text, width * 3 / 4, poem.y);
            });
            
            ctx.shadowBlur = 0;
        }
        
        // 绘制背景渐变
        function drawBackground() {
            // 左侧暖色
            const leftGradient = ctx.createLinearGradient(0, 0, width / 2, height);
            leftGradient.addColorStop(0, '#2d1810');
            leftGradient.addColorStop(0.5, '#4a2c1a');
            leftGradient.addColorStop(1, '#3d2415');
            ctx.fillStyle = leftGradient;
            ctx.fillRect(0, 0, width / 2, height);
            
            // 右侧冷色
            const rightGradient = ctx.createLinearGradient(width / 2, 0, width, height);
            rightGradient.addColorStop(0, '#0f1825');
            rightGradient.addColorStop(0.5, '#1a2740');
            rightGradient.addColorStop(1, '#142030');
            ctx.fillStyle = rightGradient;
            ctx.fillRect(width / 2, 0, width / 2, height);
        }
        
        // 主动画循环
        function animate() {
            drawBackground();
            
            updateDivider();
            updateFireflies();
            updateRaindrops();
            updatePoems();
            
            drawFireflies();
            drawRaindrops();
            drawDivider();
            drawPoems();
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
    </script>
</body>
</html>
