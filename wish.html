<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>愿与愁 · Wish & Sorrow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f2eb;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════════════════════
//  愿与愁 — 手写笔记本 + 游动的鱼 + 文字排斥 + 水波纹
//  零外部依赖，自行实现逐字排版+物理
// ══════════════════════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, S;

// ── A4 纸张区域（210:297 比例，居中）──
let PX, PY, PW, PH; // 纸张左上角 x,y 和宽高

function calcPaper() {
  const A4_RATIO = 297 / 210; // ≈1.414
  const pad = 24; // 屏幕边距
  const maxW = W - pad * 2;
  const maxH = H - pad * 2;
  if (maxW / maxH < 1 / A4_RATIO) {
    // 宽度受限
    PW = maxW;
    PH = PW * A4_RATIO;
  } else {
    // 高度受限
    PH = maxH;
    PW = PH / A4_RATIO;
  }
  PX = (W - PW) / 2;
  PY = (H - PH) / 2;
}

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  S = Math.min(PW || W, PH || H);
  calcPaper();
  S = Math.min(PW, PH);
  rebuildLayout();
  // 重置鱼到纸张内
  FISH[0].x = PX + PW * 0.3; FISH[0].y = PY + PH * 0.55;
  FISH[1].x = PX + PW * 0.65; FISH[1].y = PY + PH * 0.5;
  FISH[2].x = PX + PW * 0.5; FISH[2].y = PY + PH * 0.45;
}

// ── 时间 & 阶段 ──
let time = 0, phaseSmooth = 0;
const PHASE_DUR = 450, TRANS = 130;
const TOTAL = (PHASE_DUR + TRANS) * 3;
let cycleFrame = 0;

// ── 信件文本（用 \n 分行）──
const TEXTS = [
  '亲爱的：\n\n今天又下雨了。\n窗外的梧桐叶被打得啪啪响，\n我坐在桌前，突然很想你。\n\n你说过，愿是一条鱼，\n可以在任何水域里自由游动。\n我想了很久，觉得愿更像是\n一颗投入湖心的石子——\n水花溅起的瞬间很美，\n但涟漪终会消散。\n\n你还好吗？',
  '我们说好不说再见的。\n\n可是每一封信，\n都像是一次小小的告别。\n你走了以后，\n我开始画一些奇怪的东西——\n圆圈，波浪，还有鱼。\n\n也许鱼不需要眼泪，\n因为它们一直住在水里。\n但我不是鱼啊。\n\n想你的时候，\n连笔迹都是弯的。',
  '有些念头像细胞一样分裂。\n\n一个想你的念头，\n变成两个，四个，八个……\n最后长成奇怪的形状，\n在稿纸上蔓延开来。\n\n我在纸上画了一只虫。\n它很小，但翅膀很精致。\n我想它大概也不知道\n自己为什么会飞。\n\n就像我不知道\n这封信该寄往哪里。',
];

// ── 逐字排版 → 字符粒子 ──
const charSets = [[], [], []];

function rebuildLayout() {
  const marginX = PX + PW * 0.12; // 纸张内左边距
  const fontSize = PW * 0.038;
  const LH = fontSize * 1.65;
  const startY = PY + PH * 0.06;
  const charW = fontSize * 0.95; // 中文等宽近似

  for (let t = 0; t < 3; t++) {
    charSets[t] = [];
    const lines = TEXTS[t].split('\n');
    let lineIdx = 0;
    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      if (line === '') { lineIdx++; continue; }
      for (let ci = 0; ci < line.length; ci++) {
        const ch = line[ci];
        const isWide = /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(ch);
        const tx = marginX + ci * (isWide ? charW : charW * 0.55);
        const ty = startY + lineIdx * LH + LH * 0.78;
        charSets[t].push({
          char: ch,
          tx, ty,
          x: tx, y: ty,
          vx: 0, vy: 0,
          phase: Math.random() * Math.PI * 2,
        });
      }
      lineIdx++;
    }
  }
}

// ── 鱼类 ──
class Fish {
  constructor(x, y, style) {
    this.x = x; this.y = y;
    this.size = 0;
    this.style = style;
    this.vx = 0; this.vy = 0;
    this.angle = 0;
    this.tailPhase = 0;
    this.wanderTimer = 0;
    this.wanderX = x; this.wanderY = y;
  }

  update() {
    this.wanderTimer--;
    if (this.wanderTimer <= 0) {
      this.wanderTimer = 80 + Math.random() * 160;
      // 鱼只在纸张范围内游动
      const margin = this.size * 2;
      this.wanderX = PX + margin + Math.random() * (PW - margin * 2);
      this.wanderY = PY + margin + Math.random() * (PH - margin * 2);
    }
    const dx = this.wanderX - this.x;
    const dy = this.wanderY - this.y;
    this.vx += dx * 0.001;
    this.vy += dy * 0.001;
    this.vx *= 0.982;
    this.vy *= 0.982;
    this.x += this.vx;
    this.y += this.vy;
    // 限制在纸张内（碰壁反弹）
    const m = this.size * 1.5;
    if (this.x < PX + m) { this.x = PX + m; this.vx *= -0.5; }
    if (this.x > PX + PW - m) { this.x = PX + PW - m; this.vx *= -0.5; }
    if (this.y < PY + m) { this.y = PY + m; this.vy *= -0.5; }
    if (this.y > PY + PH - m) { this.y = PY + PH - m; this.vy *= -0.5; }

    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > 0.15) {
      const ta = Math.atan2(this.vy, this.vx);
      let diff = ta - this.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      this.angle += diff * 0.06;
    }
    this.tailPhase += 0.08 + spd * 0.03;
  }

  draw(alpha) {
    if (alpha < 0.01) return;
    const sz = this.size;
    if (sz < 2) return;
    const tail = Math.sin(this.tailPhase) * 0.4;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    if (this.style === 0) {
      // ── 精致描线鱼 ──
      // 身体
      ctx.strokeStyle = 'rgba(40,70,130,0.6)';
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.ellipse(0, 0, sz, sz * 0.4, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(160,200,240,0.08)';
      ctx.fill();
      // 尾巴
      ctx.beginPath();
      ctx.moveTo(sz * 0.75, 0);
      ctx.quadraticCurveTo(sz * 1.1, sz * tail - sz * 0.35, sz * 1.5, sz * tail - sz * 0.5);
      ctx.moveTo(sz * 0.75, 0);
      ctx.quadraticCurveTo(sz * 1.1, sz * tail + sz * 0.35, sz * 1.5, sz * tail + sz * 0.5);
      ctx.stroke();
      // 鳞弧
      ctx.strokeStyle = 'rgba(40,70,130,0.18)';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(-sz * 0.15 + i * sz * 0.22, 0, sz * 0.16, -0.6, 0.6);
        ctx.stroke();
      }
      // 背鳍
      ctx.strokeStyle = 'rgba(40,70,130,0.35)';
      ctx.beginPath();
      ctx.moveTo(-sz * 0.2, -sz * 0.36);
      ctx.quadraticCurveTo(0, -sz * 0.62, sz * 0.3, -sz * 0.36);
      ctx.stroke();
      // 眼
      ctx.fillStyle = 'rgba(30,50,100,0.7)';
      ctx.beginPath();
      ctx.arc(-sz * 0.55, -sz * 0.05, sz * 0.07, 0, Math.PI * 2);
      ctx.fill();
      // 气泡
      ctx.strokeStyle = 'rgba(60,100,160,0.2)';
      ctx.lineWidth = 0.7;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(-sz * 0.85 - i * sz * 0.2, -sz * 0.1 - i * sz * 0.12 + Math.sin(time * 0.04 + i) * 3, sz * (0.035 + i * 0.018), 0, Math.PI * 2);
        ctx.stroke();
      }
    } else if (this.style === 1) {
      // ── 童趣鱼 ──
      ctx.strokeStyle = 'rgba(40,60,130,0.55)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(-sz, 0);
      ctx.bezierCurveTo(-sz * 0.5, -sz * 0.6, sz * 0.5, -sz * 0.5, sz * 0.7, 0);
      ctx.bezierCurveTo(sz * 0.5, sz * 0.5, -sz * 0.5, sz * 0.6, -sz, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sz * 0.5, 0);
      ctx.lineTo(sz * 1.3, sz * tail - sz * 0.4);
      ctx.moveTo(sz * 0.5, 0);
      ctx.lineTo(sz * 1.3, sz * tail + sz * 0.4);
      ctx.stroke();
      ctx.fillStyle = 'rgba(40,60,130,0.6)';
      ctx.beginPath();
      ctx.arc(-sz * 0.4, -sz * 0.08, sz * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(-sz * 0.72, sz * 0.05, sz * 0.08, -0.4, 0.4);
      ctx.stroke();
    } else {
      // ── 素描鱼 ──
      ctx.strokeStyle = 'rgba(30,50,110,0.4)';
      ctx.lineWidth = 0.8;
      for (let l = 0; l < 3; l++) {
        const o = (l - 1) * 1.2;
        ctx.beginPath();
        ctx.ellipse(o, o * 0.4, sz * (0.96 + l * 0.03), sz * (0.36 + l * 0.01), 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(sz * 0.65, 0);
      ctx.bezierCurveTo(sz, -sz * 0.3 + sz * tail, sz * 1.2, -sz * 0.5 + sz * tail, sz * 1.4, -sz * 0.4 + sz * tail);
      ctx.moveTo(sz * 0.65, 0);
      ctx.bezierCurveTo(sz, sz * 0.3 + sz * tail, sz * 1.2, sz * 0.5 + sz * tail, sz * 1.4, sz * 0.4 + sz * tail);
      ctx.stroke();
      ctx.fillStyle = 'rgba(30,50,110,0.45)';
      ctx.beginPath();
      ctx.arc(-sz * 0.45, -sz * 0.05, sz * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

const FISH = [
  new Fish(300, 400, 0),
  new Fish(500, 350, 1),
  new Fish(400, 300, 2),
];

// ── 水波纹 ──
const RIPPLES = [];
function addRipple(x, y) {
  RIPPLES.push({ x, y, r: 0, life: 1 });
}

// ── A4纸张绘制 ──
function drawA4Paper() {
  // 纸张阴影
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#faf8f3';
  ctx.fillRect(PX, PY, PW, PH);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // 纸张纹理
  ctx.globalAlpha = 0.015;
  for (let i = 0; i < 120; i++) {
    ctx.fillStyle = i % 3 === 0 ? '#c8c0b0' : '#ddd4c4';
    const tx = PX + ((i * 97 + time * 0.06) % PW);
    const ty = PY + ((i * 157) % PH);
    ctx.fillRect(tx, ty, 1.5, 1);
  }
  ctx.globalAlpha = 1;
}

// ── 笔记本横线（限制在纸张内）──
function drawNotebook() {
  const lineH = PW * 0.05;
  const startY = PY + PH * 0.06;
  const marginLeft = PX + PW * 0.05;
  const marginRight = PX + PW * 0.95;
  ctx.strokeStyle = 'rgba(160,190,220,0.22)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let y = startY; y < PY + PH * 0.95; y += lineH) {
    ctx.moveTo(marginLeft, y); ctx.lineTo(marginRight, y);
  }
  ctx.stroke();
  // 红色竖线（页边距）
  ctx.strokeStyle = 'rgba(200,100,100,0.25)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(PX + PW * 0.1, PY + PH * 0.03);
  ctx.lineTo(PX + PW * 0.1, PY + PH * 0.97);
  ctx.stroke();
}

// ── 物理 ──
function fishRepel(chars, fish, str) {
  const R = fish.size * 4;
  for (const ch of chars) {
    const dx = ch.x - fish.x;
    const dy = ch.y - fish.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < R && d > 0.5) {
      const f = (1 - d / R) * str;
      ch.vx += (dx / d) * f;
      ch.vy += (dy / d) * f;
    }
  }
}

function rippleEffect(chars) {
  for (const rp of RIPPLES) {
    if (rp.life <= 0) continue;
    for (const ch of chars) {
      const dx = ch.x - rp.x;
      const dy = ch.y - rp.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      const ring = Math.abs(d - rp.r);
      if (ring < 12) {
        const w = rp.life * (1 - ring / 12) * 1.5;
        const a = Math.atan2(dy, dx);
        ch.vx += Math.cos(a) * w * 0.15;
        ch.vy += Math.sin(a) * w * 0.25;
      }
    }
  }
}

function stepChars(chars) {
  for (const ch of chars) {
    ch.vx += (ch.tx - ch.x) * 0.035;
    ch.vy += (ch.ty - ch.y) * 0.035;
    ch.vx *= 0.86;
    ch.vy *= 0.86;
    ch.x += ch.vx;
    ch.y += ch.vy;
  }
}

// ── 绘制字符（逐字出现）──
function drawChars(chars, alpha, style) {
  if (alpha < 0.01) return;
  const fontSize = PW * 0.038;
  const phaseT = cycleFrame % (PHASE_DUR + TRANS);
  const total = Math.floor(phaseT * 0.5);

  for (let i = 0; i < Math.min(chars.length, total); i++) {
    const ch = chars[i];
    const ca = Math.min(1, (total - i) * 0.25) * alpha;
    if (ca < 0.01) continue;

    const disp = Math.sqrt((ch.x - ch.tx) ** 2 + (ch.y - ch.ty) ** 2);
    const ink = Math.max(0.25, 1 - disp * 0.01);

    let f;
    if (style === 0) f = `400 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
    else if (style === 1) f = `400 ${fontSize * (1 + Math.sin(i * 0.3) * 0.06)}px "STXingkai","STKaiti","KaiTi",serif`;
    else f = `500 ${fontSize * (1 + Math.sin(i * 0.5) * 0.08)}px "STKaiti","KaiTi",serif`;

    ctx.font = f;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(30,50,100,${ca * 0.7 * ink})`;
    ctx.fillText(ch.char, ch.x, ch.y);
  }
}

// ── 插画（简化）──
function drawBubble(x, y, size, a) {
  if (a < 0.01) return;
  ctx.save(); ctx.globalAlpha = a * 0.4;
  ctx.strokeStyle = 'rgba(60,90,140,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y - size);
  ctx.bezierCurveTo(x + size * 0.8, y - size * 0.8, x + size * 0.7, y + size * 0.2, x, y + size * 0.9);
  ctx.bezierCurveTo(x - size * 0.7, y + size * 0.2, x - size * 0.8, y - size * 0.8, x, y - size);
  ctx.stroke();
  ctx.fillStyle = 'rgba(180,210,240,0.06)'; ctx.fill();
  ctx.restore();
}

function drawDoodles(cx, cy, size, a) {
  if (a < 0.01) return;
  ctx.save(); ctx.globalAlpha = a * 0.45;
  ctx.strokeStyle = 'rgba(40,70,140,0.2)'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(cx + Math.sin(i * 2.3) * size * 0.5, cy + Math.cos(i * 1.7) * size * 0.4, size * (0.1 + i * 0.025), 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawOrganic(cx, cy, size, a) {
  if (a < 0.01) return;
  ctx.save(); ctx.globalAlpha = a;
  ctx.strokeStyle = 'rgba(30,60,130,0.22)'; ctx.lineWidth = 0.7;
  for (let i = 0; i < 5; i++) {
    const ang = time * 0.002 + i * Math.PI * 2 / 5;
    const ox = cx + Math.cos(ang) * size * 0.35;
    const oy = cy + Math.sin(ang) * size * 0.25;
    const r = size * (0.12 + Math.sin(i * 1.3) * 0.06);
    ctx.beginPath();
    for (let j = 0; j <= 10; j++) {
      const ja = (j / 10) * Math.PI * 2;
      const rr = r * (1 + Math.sin(ja * 3 + i) * 0.2);
      j === 0 ? ctx.moveTo(ox + Math.cos(ja) * rr, oy + Math.sin(ja) * rr) : ctx.lineTo(ox + Math.cos(ja) * rr, oy + Math.sin(ja) * rr);
    }
    ctx.closePath(); ctx.stroke();
  }
  // 小虫
  const ix = cx + size * 0.3, iy = cy - size * 0.1, is2 = size * 0.06;
  ctx.fillStyle = 'rgba(25,40,80,0.45)';
  ctx.beginPath(); ctx.ellipse(ix, iy, is2 * 0.3, is2 * 0.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ix + is2 * 0.5, iy, is2 * 0.35, is2 * 0.25, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ix + is2, iy, is2 * 0.45, is2 * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(40,70,140,0.3)'; ctx.lineWidth = 0.4;
  ctx.fillStyle = 'rgba(180,210,240,0.06)';
  ctx.beginPath(); ctx.ellipse(ix + is2 * 0.5, iy - is2 * 0.3, is2 * 0.6, is2 * 0.3, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ── 墨滴 ──
const INKDROPS = [];

// ══ 主循环 ══
function draw() {
  requestAnimationFrame(draw);
  time++;
  cycleFrame = time % TOTAL;

  // 阶段
  const seg = PHASE_DUR + TRANS;
  if (cycleFrame < PHASE_DUR) phaseSmooth = 0;
  else if (cycleFrame < seg) phaseSmooth = (cycleFrame - PHASE_DUR) / TRANS;
  else if (cycleFrame < seg + PHASE_DUR) phaseSmooth = 1;
  else if (cycleFrame < seg * 2) phaseSmooth = 1 + (cycleFrame - seg - PHASE_DUR) / TRANS;
  else if (cycleFrame < seg * 2 + PHASE_DUR) phaseSmooth = 2;
  else { phaseSmooth = 2 + (cycleFrame - seg * 2 - PHASE_DUR) / TRANS; if (phaseSmooth > 2.99) phaseSmooth = 0; }

  const w1 = Math.max(0, 1 - Math.abs(phaseSmooth));
  const w2 = Math.max(0, 1 - Math.abs(phaseSmooth - 1));
  const w3 = Math.max(0, 1 - Math.abs(phaseSmooth - 2));
  const wR = phaseSmooth > 2 ? phaseSmooth - 2 : 0;
  const w1e = Math.min(1, w1 + wR);

  // 更新鱼尺寸（基于纸张宽度）
  FISH[0].size = PW * 0.04;
  FISH[1].size = PW * 0.035;
  FISH[2].size = PW * 0.028;

  // 更新所有鱼（始终运行物理）
  FISH.forEach(f => f.update());

  // 鱼产生波纹
  if (time % 25 === 0) {
    if (w1e > 0.3) addRipple(FISH[0].x, FISH[0].y);
    if (w2 > 0.3) addRipple(FISH[1].x, FISH[1].y);
    if (w3 > 0.3) addRipple(FISH[2].x, FISH[2].y);
  }

  // 物理
  if (w1e > 0.1) { fishRepel(charSets[0], FISH[0], 1.8); rippleEffect(charSets[0]); stepChars(charSets[0]); }
  if (w2 > 0.1) { fishRepel(charSets[1], FISH[1], 2.0); rippleEffect(charSets[1]); stepChars(charSets[1]); }
  if (w3 > 0.1) { fishRepel(charSets[2], FISH[2], 1.4); rippleEffect(charSets[2]); stepChars(charSets[2]); }

  // ── 绘制 ──
  // 屏幕底色（纸张外）
  ctx.fillStyle = '#e8e4dc';
  ctx.fillRect(0, 0, W, H);
  // A4纸张
  drawA4Paper();
  drawNotebook();
  // 裁剪到纸张范围（波纹/文字/鱼不溢出）
  ctx.save();
  ctx.beginPath();
  ctx.rect(PX, PY, PW, PH);
  ctx.clip();

  // 水波纹
  for (let i = RIPPLES.length - 1; i >= 0; i--) {
    const rp = RIPPLES[i];
    rp.r += 1.0;
    rp.life -= 0.01;
    if (rp.life <= 0) { RIPPLES.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(100,150,200,${rp.life * 0.1})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Phase 1
  if (w1e > 0.01) {
    drawChars(charSets[0], w1e, 0);
    drawBubble(PX + PW * 0.22, PY + PH * 0.78, PW * 0.08, w1e * 0.5);
    FISH[0].draw(w1e);
  }
  // Phase 2
  if (w2 > 0.01) {
    drawChars(charSets[1], w2, 1);
    drawDoodles(PX + PW * 0.72, PY + PH * 0.62, PW * 0.12, w2);
    FISH[1].draw(w2);
  }
  // Phase 3
  if (w3 > 0.01) {
    drawChars(charSets[2], w3, 2);
    drawOrganic(PX + PW * 0.65, PY + PH * 0.55, PW * 0.18, w3);
    FISH[2].draw(w3);
  }

  // 墨滴
  if (Math.random() < 0.006) INKDROPS.push({ x: PX + PW * (0.15 + Math.random() * 0.7), y: PY + PH * (0.1 + Math.random() * 0.75), r: 0, max: 1.5 + Math.random() * 2.5, life: 1 });
  for (let i = INKDROPS.length - 1; i >= 0; i--) {
    const d = INKDROPS[i]; d.r = Math.min(d.max, d.r + 0.1); d.life -= 0.005;
    if (d.life <= 0) { INKDROPS.splice(i, 1); continue; }
    ctx.fillStyle = `rgba(30,50,100,${d.life * 0.1})`;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fill();
  }

  // 解除裁剪
  ctx.restore();

  // 阶段指示（纸张底部下方）
  const dotY = PY + PH + 14;
  for (let i = 0; i < 3; i++) {
    const act = Math.round(phaseSmooth) === i || (phaseSmooth > 2.5 && i === 0);
    ctx.fillStyle = act ? 'rgba(40,60,120,0.6)' : 'rgba(160,170,190,0.3)';
    ctx.beginPath(); ctx.arc(W / 2 + (i - 1) * 16, dotY, 3, 0, Math.PI * 2); ctx.fill();
  }
}

// ── 事件 ──
resize();
window.addEventListener('resize', resize);
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
window.addEventListener('click', () => {
  const seg = PHASE_DUR + TRANS;
  const cur = Math.floor(cycleFrame / seg);
  time = time - cycleFrame + ((cur + 1) % 3) * seg;
});

draw();
</script>
