<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>雨书 · Rain Book</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4ead5;overflow:hidden;touch-action:none}
canvas{display:block}
#p{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(244,234,213,.95);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1.5s}
#p .i{text-align:center;color:#5a4a3a}
#p .t{font:36px "Songti SC","SimSun","KaiTi",serif;letter-spacing:10px;margin-bottom:12px}
#p .s{font:13px "Songti SC","SimSun",serif;opacity:.45;margin-bottom:28px;letter-spacing:3px}
#p .c{width:68px;height:68px;border-radius:50%;
  border:1.5px solid rgba(90,74,58,.25);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#p .c:hover{background:rgba(90,74,58,.06)}
#p .r{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;
  border-left:18px solid rgba(90,74,58,.5);margin-left:4px}
</style>
</head>
<body>
<div id="p"><div class="i">
  <div class="t">雨 书</div>
  <div class="s">雨湿古卷 · 字随水去 · 纸上空留</div>
  <div class="c"><div class="r"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;C.width=W;C.height=H;

// ═══════════════════════════════════════
//  《关雎》— 诗经·国风·周南
// ═══════════════════════════════════════
const poem=[
  '關關雎鳩',
  '在河之洲',
  '窈窕淑女',
  '君子好逑',
  '參差荇菜',
  '左右流之',
  '窈窕淑女',
  '寤寐求之',
  '求之不得',
  '寤寐思服',
  '悠哉悠哉',
  '輾轉反側',
  '參差荇菜',
  '左右采之',
  '窈窕淑女',
  '琴瑟友之',
  '參差荇菜',
  '左右芼之',
  '窈窕淑女',
  '鐘鼓樂之',
];

// ═══════════════════════════════════════
//  古籍排版参数
// ═══════════════════════════════════════
const FONT='"Songti SC","SimSun","KaiTi",serif';
let bookX,bookY,bookW,bookH,charSz,colGap,rowGap,cols,rows;
let charGrid=[]; // {ch, col, row, x, y, alive, alpha, dripping, dripped}

function layoutBook(){
  const s=Math.min(W,H);
  charSz=Math.max(16,Math.floor(s*.038));
  colGap=charSz*1.8;
  rowGap=charSz*1.5;
  // 竖排：列从右到左，行从上到下
  cols=poem.length;
  rows=4; // 每列4字
  bookW=cols*colGap+colGap;
  bookH=rows*rowGap+charSz*2;
  bookX=(W-bookW)/2;
  bookY=(H-bookH)/2-H*.05;

  charGrid=[];
  for(let c=0;c<cols;c++){
    const line=poem[c];
    for(let r=0;r<line.length;r++){
      // 竖排从右到左
      const x=bookX+bookW-colGap*(c+1);
      const y=bookY+charSz*1.2+r*rowGap;
      charGrid.push({
        ch:line[r], col:c, row:r,
        x, y,
        alive:true, alpha:1,
        dripping:false, dripT:0, dripped:false,
        // 水渍
        wetAlpha:0,
      });
    }
  }
}
layoutBook();

// ═══════════════════════════════════════
//  水珠粒子（从书页滴落，内含文字）
// ═══════════════════════════════════════
const DM=300;
const dx=new Float32Array(DM),dy=new Float32Array(DM);
const dvx=new Float32Array(DM),dvy=new Float32Array(DM);
const da=new Float32Array(DM); // alpha
const dsz=new Float32Array(DM); // size
const dch=new Array(DM); // 内含的文字
const dph=new Float32Array(DM);
const dstate=new Uint8Array(DM); // 0=hanging 1=falling 2=splash
const dhang=new Float32Array(DM); // hang progress
let dc=0;

function spawnDrop(x,y,ch){
  if(dc>=DM)return;
  dx[dc]=x;dy[dc]=y;
  dvx[dc]=0;dvy[dc]=0;
  da[dc]=.9;
  dsz[dc]=charSz*.5+Math.random()*charSz*.3;
  dch[dc]=ch;
  dph[dc]=Math.random()*Math.PI*2;
  dstate[dc]=0; // hanging
  dhang[dc]=0;
  dc++;
}

// 水花碎裂小粒子
const SM=200;
const sx=new Float32Array(SM),sy=new Float32Array(SM);
const svx=new Float32Array(SM),svy=new Float32Array(SM);
const sa=new Float32Array(SM),ssr=new Float32Array(SM);
const sch=new Array(SM);
let scc=0;

function spawnSplash(x,y,ch){
  // 水花 + 文字碎片
  for(let i=0;i<5&&scc<SM;i++){
    const a=Math.random()*Math.PI*2;
    const s=1+Math.random()*3;
    sx[scc]=x+(Math.random()-.5)*8;
    sy[scc]=y+(Math.random()-.5)*4;
    svx[scc]=Math.cos(a)*s;svy[scc]=Math.sin(a)*s-1;
    sa[scc]=.7;ssr[scc]=2+Math.random()*3;
    sch[scc]=i===0?ch:null; // 第一个碎片带文字
    scc++;
  }
}

// ═══════════════════════════════════════
//  雨滴（背景氛围）
// ═══════════════════════════════════════
const RN=60;
const rx=new Float32Array(RN),ry=new Float32Array(RN);
const rvy2=new Float32Array(RN),ral=new Float32Array(RN);
for(let i=0;i<RN;i++){
  rx[i]=Math.random()*W;ry[i]=Math.random()*H;
  rvy2[i]=2+Math.random()*4;ral[i]=.04+Math.random()*.08;
}

// ═══════════════════════════════════════
//  绘制古籍书页
// ═══════════════════════════════════════
function drawBook(t){
  // 书页背景（泛黄宣纸质感）
  const bx=bookX-charSz,by=bookY-charSz;
  const bw=bookW+charSz*2,bh=bookH+charSz*2;

  // 纸张
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=20;ctx.shadowOffsetY=5;
  ctx.fillStyle='#f0e4c8';
  ctx.fillRect(bx,by,bw,bh);
  ctx.shadowBlur=0;

  // 纸张纹理（细横线）
  ctx.globalAlpha=.03;
  ctx.strokeStyle='#8a7a5a';ctx.lineWidth=.5;
  for(let i=0;i<bh;i+=3){
    ctx.beginPath();ctx.moveTo(bx,by+i);ctx.lineTo(bx+bw,by+i);ctx.stroke();
  }

  // 书页边框（线装书风格）
  ctx.globalAlpha=.15;
  ctx.strokeStyle='#6a5a4a';ctx.lineWidth=1.5;
  ctx.strokeRect(bx+4,by+4,bw-8,bh-8);
  // 内框
  ctx.globalAlpha=.08;
  ctx.strokeRect(bx+10,by+10,bw-20,bh-20);

  // 装订线（左侧）
  ctx.globalAlpha=.12;
  ctx.strokeStyle='#8a6a4a';ctx.lineWidth=2;
  const bindX=bx+bw-8;
  for(let i=0;i<4;i++){
    const yy=by+bh*.2+i*bh*.2;
    ctx.beginPath();ctx.moveTo(bindX-2,yy-8);ctx.lineTo(bindX-2,yy+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bindX+2,yy-8);ctx.lineTo(bindX+2,yy+8);ctx.stroke();
  }
  ctx.restore();

  // 水渍痕迹
  charGrid.forEach(g=>{
    if(g.wetAlpha>.01){
      ctx.globalAlpha=g.wetAlpha*.15;
      ctx.fillStyle='#b8a888';
      ctx.beginPath();
      ctx.ellipse(g.x,g.y+charSz*.3,charSz*.5,charSz*.6,0,0,Math.PI*2);
      ctx.fill();
    }
  });

  // 绘制文字
  ctx.font=charSz+'px '+FONT;
  ctx.textAlign='center';ctx.textBaseline='middle';
  charGrid.forEach(g=>{
    if(!g.alive&&!g.dripping)return;
    let a=g.alpha;
    if(g.dripping){
      // 文字溶解效果：变淡+微微下移
      const dp=g.dripT;
      a*=Math.max(0,1-dp);
    }
    if(a<.01)return;
    ctx.globalAlpha=a;
    // 墨色，湿了之后略浅
    const wet=g.wetAlpha;
    const r2=Math.floor(40+wet*30);
    const g2=Math.floor(30+wet*25);
    const b2=Math.floor(25+wet*20);
    ctx.fillStyle='rgb('+r2+','+g2+','+b2+')';
    const yOff=g.dripping?g.dripT*charSz*.3:0;
    ctx.fillText(g.ch,g.x,g.y+yOff);
  });
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  绘制水珠
// ═══════════════════════════════════════
function drawDrops(){
  for(let i=0;i<dc;i++){
    if(da[i]<.02)continue;
    const x=dx[i],y=dy[i],sz=dsz[i];
    ctx.save();

    if(dstate[i]===0){
      // 悬挂：水珠拉长，底部圆顶部尖
      const stretch=1+dhang[i]*.5;
      ctx.globalAlpha=da[i]*.5;
      ctx.fillStyle='rgba(180,200,220,.4)';
      ctx.beginPath();
      ctx.ellipse(x,y+sz*stretch*.3,sz*.4,sz*stretch*.5,0,0,Math.PI*2);
      ctx.fill();
      // 水珠高光
      ctx.globalAlpha=da[i]*.3;
      ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.beginPath();
      ctx.ellipse(x-sz*.1,y-sz*.1,sz*.12,sz*.15,0,0,Math.PI*2);
      ctx.fill();
      // 内含文字
      if(dch[i]){
        ctx.globalAlpha=da[i]*.6;
        ctx.font=Math.floor(sz*.7)+'px '+FONT;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(60,45,35,.7)';
        ctx.fillText(dch[i],x,y+sz*stretch*.15);
      }
    }else if(dstate[i]===1){
      // 下落：水滴形（上尖下圆）
      ctx.globalAlpha=da[i]*.45;
      ctx.fillStyle='rgba(170,195,215,.45)';
      ctx.beginPath();
      ctx.moveTo(x,y-sz*.6); // 上尖
      ctx.quadraticCurveTo(x-sz*.35,y-sz*.1,x-sz*.3,y+sz*.2);
      ctx.quadraticCurveTo(x,y+sz*.5,x+sz*.3,y+sz*.2);
      ctx.quadraticCurveTo(x+sz*.35,y-sz*.1,x,y-sz*.6);
      ctx.fill();
      // 高光
      ctx.globalAlpha=da[i]*.2;
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath();
      ctx.ellipse(x-sz*.08,y-sz*.2,sz*.08,sz*.12,-.3,0,Math.PI*2);
      ctx.fill();
      // 内含文字（随水珠旋转微动）
      if(dch[i]){
        ctx.globalAlpha=da[i]*.5;
        ctx.font=Math.floor(sz*.6)+'px '+FONT;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(60,45,35,.6)';
        ctx.fillText(dch[i],x,y);
      }
    }
    ctx.restore();
  }
}

function updateDrops(){
  let alive=0;
  for(let i=0;i<dc;i++){
    dph[i]+=.02;
    if(dstate[i]===0){
      // 悬挂→拉长→断裂下落
      dhang[i]+=.008+Math.random()*.004;
      dy[i]+=.15; // 缓慢下移
      if(dhang[i]>1){dstate[i]=1;dvy[i]=1;}
    }else if(dstate[i]===1){
      // 下落
      dvy[i]+=.12; // 重力
      dvx[i]+=Math.sin(dph[i])*.02;
      dx[i]+=dvx[i];dy[i]+=dvy[i];
      da[i]-=.003;
      // 落到书页底部以下
      if(dy[i]>bookY+bookH+charSz*2){
        spawnSplash(dx[i],dy[i],dch[i]);
        da[i]=0;
      }
      // 落出屏幕
      if(dy[i]>H+30)da[i]=0;
    }
    if(da[i]>.01){
      if(alive!==i){dx[alive]=dx[i];dy[alive]=dy[i];dvx[alive]=dvx[i];dvy[alive]=dvy[i];
        da[alive]=da[i];dsz[alive]=dsz[i];dch[alive]=dch[i];dph[alive]=dph[i];
        dstate[alive]=dstate[i];dhang[alive]=dhang[i];}
      alive++;
    }
  }
  dc=alive;
}

function updateDrawSplash(){
  let alive=0;
  for(let i=0;i<scc;i++){
    svx[i]*=.97;svy[i]+=.06;
    sx[i]+=svx[i];sy[i]+=svy[i];
    sa[i]-=.008;
    if(sa[i]<.02||sy[i]>H+20)continue;
    ctx.globalAlpha=sa[i]*.4;
    ctx.fillStyle='rgba(170,195,215,.5)';
    ctx.beginPath();ctx.arc(sx[i],sy[i],ssr[i]*sa[i],0,Math.PI*2);ctx.fill();
    // 碎片中的文字
    if(sch[i]){
      ctx.globalAlpha=sa[i]*.4;
      ctx.font='10px '+FONT;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(60,45,35,.5)';
      ctx.fillText(sch[i],sx[i],sy[i]);
    }
    if(alive!==i){sx[alive]=sx[i];sy[alive]=sy[i];svx[alive]=svx[i];svy[alive]=svy[i];
      sa[alive]=sa[i];ssr[alive]=ssr[i];sch[alive]=sch[i];}
    alive++;
  }
  scc=alive;ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  背景雨丝
// ═══════════════════════════════════════
function drawRain(){
  ctx.strokeStyle='rgba(150,170,190,.08)';ctx.lineWidth=1;
  for(let i=0;i<RN;i++){
    ry[i]+=rvy2[i];
    if(ry[i]>H+10){ry[i]=-10;rx[i]=Math.random()*W;}
    ctx.globalAlpha=ral[i];
    ctx.beginPath();ctx.moveTo(rx[i],ry[i]);ctx.lineTo(rx[i]-.5,ry[i]-8-rvy2[i]*2);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  调度：文字逐个消失
// ═══════════════════════════════════════
let dripQueue=[];
let nextDripT=0;
let dripIdx=0;
let allDripped=false;

function initDripQueue(){
  // 从第一列第一行开始，竖排从右到左，从上到下
  dripQueue=charGrid.slice().sort((a,b)=>{
    if(a.col!==b.col)return a.col-b.col; // 右列先（col小=右）
    return a.row-b.row;
  });
  nextDripT=2; // 2秒后开始
  dripIdx=0;
}

// ═══════════════════════════════════════
//  主循环
// ═══════════════════════════════════════
let started=false,startTime=0;

function tick(){
  requestAnimationFrame(tick);
  if(!started){
    // 背景
    ctx.fillStyle='#f4ead5';ctx.fillRect(0,0,W,H);
    return;
  }
  const t=(performance.now()-startTime)/1000;

  // 背景（天色偏灰蓝，雨天）
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#e8e0d0');
  bg.addColorStop(.5,'#ede5d5');
  bg.addColorStop(1,'#f0e8d8');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 雨丝
  drawRain();

  // 调度文字滴落
  if(dripIdx<dripQueue.length&&t>=nextDripT){
    const g=dripQueue[dripIdx];
    g.dripping=true;
    g.dripT=0;
    g.wetAlpha=1;
    // 生成水珠
    spawnDrop(g.x,g.y+charSz*.5,g.ch);
    dripIdx++;
    // 间隔递减（越来越快）
    const progress=dripIdx/dripQueue.length;
    if(progress<.3) nextDripT=t+.8+Math.random()*.4; // 慢
    else if(progress<.6) nextDripT=t+.4+Math.random()*.3; // 中
    else if(progress<.85) nextDripT=t+.2+Math.random()*.15; // 快
    else nextDripT=t+.08+Math.random()*.08; // 极快
  }
  if(dripIdx>=dripQueue.length&&!allDripped) allDripped=true;

  // 更新正在溶解的文字
  charGrid.forEach(g=>{
    if(g.dripping){
      g.dripT+=.015;
      if(g.dripT>=1){
        g.dripping=false;
        g.alive=false;
        g.alpha=0;
      }
    }
    // 水渍慢慢干
    if(g.wetAlpha>0) g.wetAlpha-=.001;
  });

  // 绘制书页
  drawBook(t);

  // 水珠
  updateDrops();
  drawDrops();
  updateDrawSplash();

  // 结语
  const aliveCount=charGrid.filter(g=>g.alive||g.dripping).length;
  if(aliveCount===0&&dc===0){
    const fadeT=t-(startTime/1000+nextDripT);
    const ea=Math.min(.6,fadeT*.08);
    if(ea>.01){
      ctx.save();ctx.globalAlpha=ea;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=Math.floor(charSz*.9)+'px '+FONT;
      ctx.fillStyle='rgba(90,74,58,.8)';
      ctx.fillText('字已隨水去',W/2,H/2-charSz*.6);
      ctx.fillText('紙上空留痕',W/2,H/2+charSz*.6);
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudio(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.08;m.connect(ac.destination);
  // 雨声白噪
  const sz=ac.sampleRate*2;
  const buf=ac.createBuffer(1,sz,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*.3;
  const rain=ac.createBufferSource();rain.buffer=buf;rain.loop=true;
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=800;
  const rg=ac.createGain();rg.gain.value=.15;
  rain.connect(lp);lp.connect(rg);rg.connect(m);rain.start();
  // 水滴声（定期）
  function dropSound(){
    if(!started)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(800+Math.random()*400,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(200+Math.random()*100,ac.currentTime+.15);
    g.gain.setValueAtTime(.03,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);
    o.connect(g);g.connect(m);o.start();o.stop(ac.currentTime+.25);
    setTimeout(dropSound,500+Math.random()*2000);
  }
  setTimeout(dropSound,1000);
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
document.getElementById('p').addEventListener('click',()=>{
  const b=document.getElementById('p');
  b.style.opacity='0';setTimeout(()=>b.style.display='none',1500);
  started=true;startTime=performance.now();
  initDripQueue();
  initAudio();
},{once:true});
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;C.width=W;C.height=H;layoutBook();initDripQueue();});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
tick();
</script>
</body>
</html>
