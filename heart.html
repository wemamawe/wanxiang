<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please do not approach. — Heart</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #faf9f7;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 630;
canvas.width = W; canvas.height = H;

const OX = 240, OY = 455;

// Branches [x1,y1,x2,y2,sw] — heart shaped canopy
const BRANCHES = [
  // trunk
  [240,455, 240,350, 4],
  // heart left lobe — goes up-left then curves
  [240,380, 190,340, 2.4],
  [190,340, 148,310, 2.2],
  [148,310, 122,278, 2.0],
  [122,278, 130,250, 1.8],
  [130,250, 158,238, 1.6],
  // heart right lobe
  [240,380, 290,340, 2.4],
  [290,340, 332,310, 2.2],
  [332,310, 358,278, 2.0],
  [358,278, 350,250, 1.8],
  [350,250, 322,238, 1.6],
  // converging to bottom point of heart
  [240,350, 210,375, 1.8],
  [240,350, 270,375, 1.8],
  [210,375, 220,400, 1.5],
  [270,375, 260,400, 1.5],
  [220,400, 240,418, 1.2],
  [260,400, 240,418, 1.2],
  // top center dip
  [240,350, 222,318, 1.6],
  [240,350, 258,318, 1.6],
  // twigs
  [122,278,  98,268, 1.2],
  [130,250, 115,235, 1.1],
  [158,238, 148,222, 1.0],
  [358,278, 382,268, 1.2],
  [350,250, 365,235, 1.1],
  [322,238, 332,222, 1.0],
  [222,318, 215,302, 1.0],
  [258,318, 265,302, 1.0],
];

// Flowers placed along heart outline [cx,cy,r,hue]
const FLOWERS = [
  // top center dip
  [240,314, 6, 343], [226,308, 5.5, 340], [254,308, 5.5, 346],
  // left lobe outer
  [ 96,264, 7, 345], [112,250, 6.5, 341], [128,238, 6, 344],
  [148,224, 5.5, 347], [160,238, 5, 342],
  // left lobe inner  
  [140,308, 5.5, 344], [155,292, 5, 341], [170,278, 5, 346],
  [178,260, 5, 344],
  // right lobe outer
  [384,264, 7, 343], [368,250, 6.5, 347], [352,238, 6, 342],
  [332,224, 5.5, 345], [320,238, 5, 341],
  // right lobe inner
  [340,308, 5.5, 344], [325,292, 5, 347], [310,278, 5, 342],
  [302,260, 5, 344],
  // bottom point
  [240,420, 5.5, 343], [228,408, 4.5, 346], [252,408, 4.5, 341],
  [222,395, 4, 344], [258,395, 4, 344],
  // scattered
  [104,272, 4, 347], [376,272, 4, 342],
  [215,300, 4, 344], [265,300, 4, 344],
  // tiny
  [118,256, 3, 343], [142,230, 3, 347], [338,230, 3, 343],
  [362,256, 3, 347], [236,302, 3, 344], [244,302, 3, 344],
];

const LEAVES = [
  [178,268, 5, 2.2, -0.4],
  [302,268, 5, 2.2, 0.4],
  [150,236, 4, 2, -0.3],
  [330,236, 4, 2, 0.3],
  [238,306, 4, 2, -0.1],
];

const FENCE_START = 115;
const TEXT_START  = 150;
let frame = 0;

const petals = Array.from({length:6}, (_, i) => ({
  x: 185+i*18, y: 300+(i%3)*15,
  vx: (i%2===0?-1:1)*(0.3+Math.random()*0.4),
  vy: 0.5+Math.random()*0.6,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-0.5)*0.04,
  rx:4, ry:2.2, delay:165+i*22,
}));

function easeOut(t){ return 1-Math.pow(1-t,2); }
function easeBack(t){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}

function drawFlower(cx,cy,r,hue,alpha){
  if(r<0.1||alpha<=0) return;
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(cx+Math.cos(a)*r*1.1, cy+Math.sin(a)*r*1.1, r*0.85,r*0.48, a,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},68%,83%,${0.88*alpha})`;
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r*0.45,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue+8},82%,62%,${0.95*alpha})`; ctx.fill();
}

function drawLeaf(lx,ly,rx,ry,angle,alpha){
  ctx.save(); ctx.translate(lx,ly); ctx.rotate(angle);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(110,185,75,${0.78*alpha})`; ctx.fill(); ctx.restore();
}

function drawFencePost(x,y,alpha){
  if(alpha<=0) return;
  const dy=(1-alpha)*14;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.moveTo(x,y+dy); ctx.lineTo(x,y+42+dy);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.6; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y+dy,2.8,0,Math.PI*2);
  ctx.fillStyle='#aaa'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(x,y+42+dy,4,2,0,0,Math.PI*2);
  ctx.fillStyle='#bbb'; ctx.fill(); ctx.restore();
}

function drawRope(t,yBase,alpha){
  if(alpha<=0) return;
  const pts=[[110,yBase+12],[160,yBase+28],[240,yBase+24],[320,yBase+20],[370,yBase+12]];
  const totalSegs=4, drawSegs=t*totalSegs;
  ctx.save(); ctx.strokeStyle=`rgba(192,48,80,${alpha})`;
  ctx.lineWidth=1.4; ctx.setLineDash([8,4]);
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let s=0;s<totalSegs;s++){
    const segT=Math.min(1,drawSegs-s);
    if(segT<=0) break;
    ctx.lineTo(pts[s][0]+(pts[s+1][0]-pts[s][0])*segT, pts[s][1]+(pts[s+1][1]-pts[s][1])*segT);
  }
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function loop(){
  requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#faf9f7'; ctx.fillRect(0,0,W,H);

  // base ring
  const baseA=Math.min(1,frame/20);
  ctx.beginPath(); ctx.ellipse(OX,OY+6,30,9,0,0,Math.PI*2);
  ctx.strokeStyle=`rgba(185,185,185,${baseA})`; ctx.lineWidth=1.2; ctx.stroke();

  // branches
  const bReveal=Math.min(1,frame/95)*BRANCHES.length;
  for(let i=0;i<BRANCHES.length;i++){
    if(i>bReveal) break;
    const a=Math.min(1,bReveal-i);
    const b=BRANCHES[i];
    ctx.beginPath(); ctx.moveTo(b[0],b[1]); ctx.lineTo(b[2],b[3]);
    ctx.strokeStyle=`rgba(38,30,24,${easeOut(a)})`; ctx.lineWidth=b[4]; ctx.lineCap='round'; ctx.stroke();
  }

  // flowers
  const fStart=38;
  if(frame>fStart){
    const ft=frame-fStart;
    for(let i=0;i<FLOWERS.length;i++){
      const t=Math.min(1,Math.max(0,(ft-i*1.6)/18));
      if(t<=0) continue;
      const [cx,cy,maxR,hue]=FLOWERS[i];
      drawFlower(cx,cy,maxR*easeBack(t),hue,Math.min(1,t*3));
    }
    for(let i=0;i<LEAVES.length;i++){
      const t=Math.min(1,Math.max(0,(ft-i*3-8)/15));
      if(t<=0) continue;
      const [lx,ly,rx,ry,ang]=LEAVES[i];
      drawLeaf(lx,ly,rx*t,ry*t,ang,Math.min(1,t*2));
    }
  }

  // fence
  if(frame>FENCE_START){
    const ft=frame-FENCE_START;
    [[110,400],[160,404],[320,404],[370,400]].forEach(([px,py],i)=>{
      const t=Math.min(1,Math.max(0,(ft-i*5)/15));
      drawFencePost(px,py,easeOut(t));
    });
    drawRope(Math.min(1,Math.max(0,(ft-25)/30)),400,Math.min(1,Math.max(0,(ft-25)/30)));
    drawRope(Math.min(1,Math.max(0,(ft-40)/30)),414,Math.min(1,Math.max(0,(ft-40)/30)));
  }

  // caption
  if(frame>TEXT_START){
    const ta=Math.min(1,(frame-TEXT_START)/30);
    ctx.save(); ctx.globalAlpha=ta;
    ctx.font='italic 15px "Palatino Linotype","Book Antiqua",Palatino,serif';
    ctx.textAlign='center'; ctx.fillStyle='#aaa';
    ctx.fillText('Please do not approach.', W/2, 558);
    ctx.restore();
  }

  // petals
  if(frame>165){
    for(const p of petals){
      if(frame<p.delay) continue;
      p.x+=p.vx+Math.sin(frame*0.02+p.delay)*0.3; p.y+=p.vy; p.rot+=p.vrot;
      if(p.y>H+10){p.y=-10; p.x=160+Math.random()*160;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);
      ctx.fillStyle='hsla(345,72%,80%,0.75)'; ctx.fill(); ctx.restore();
    }
  }
}

loop();
</script>
</body>
</html>
