<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please do not approach. — Heart</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #faf9f7;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

window.addEventListener("resize", () => { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; prepareLabel(); });

const OX = 240, OY = 455;

// Branches [x1,y1,x2,y2,sw] — heart shaped canopy
// Strategy: trunk goes up, splits left/right outward, each lobe
// arches up then inward to form the heart bumps, then trunk
// continues down to heart point at bottom.
const BRANCHES = [
  // trunk upper (center)
  [240,455, 240,370, 4],
  // ── LEFT LOBE: branch goes left & up, arches, tips inward ──
  [240,400, 205,370, 2.5],   // left fork base
  [205,370, 168,348, 2.3],
  [168,348, 138,318, 2.1],   // left outer
  [138,318, 118,288, 1.9],
  [118,288, 112,258, 1.7],   // left top-outer
  [112,258, 128,234, 1.5],   // arching inward toward dip
  [128,234, 158,222, 1.3],
  [158,222, 190,218, 1.1],   // top of left bump
  // ── RIGHT LOBE ──
  [240,400, 275,370, 2.5],
  [275,370, 312,348, 2.3],
  [312,348, 342,318, 2.1],
  [342,318, 362,288, 1.9],
  [362,288, 368,258, 1.7],
  [368,258, 352,234, 1.5],
  [352,234, 322,222, 1.3],
  [322,222, 290,218, 1.1],   // top of right bump
  // ── Center dip (top of heart) ──
  [240,370, 222,332, 1.8],
  [240,370, 258,332, 1.8],
  [222,332, 210,312, 1.4],
  [258,332, 270,312, 1.4],
  // ── Heart bottom point ──
  [240,370, 230,400, 1.6],
  [240,370, 250,400, 1.6],
  [230,400, 240,425, 1.2],
  [250,400, 240,425, 1.2],
  // ── Extra twigs ──
  [112,258,  95,248, 1.1],
  [118,288,  98,280, 1.0],
  [368,258, 385,248, 1.1],
  [362,288, 382,280, 1.0],
  [190,218, 215,210, 1.0],
  [290,218, 265,210, 1.0],
];

// Flowers along heart outline [cx,cy,r,hue]
const FLOWERS = [
  // top center dip
  [215,308, 6, 343], [240,305, 5.5, 340], [265,308, 6, 346],
  [208,318, 5, 344], [272,318, 5, 342],
  // left lobe top bump
  [192,214, 7, 345], [175,218, 6.5, 341], [162,224, 6, 344],
  [200,208, 5.5, 347],
  // left lobe outer curve
  [ 94,244, 7, 343], [106,264, 6.5, 347], [116,282, 6, 342],
  [132,302, 5.5, 345], [148,318, 5, 341],
  // left lobe upper arc
  [118,238, 5.5, 344], [128,225, 5, 341],
  // right lobe top bump
  [288,214, 7, 345], [305,218, 6.5, 343], [318,224, 6, 347],
  [280,208, 5.5, 341],
  // right lobe outer curve
  [386,244, 7, 343], [374,264, 6.5, 345], [364,282, 6, 342],
  [348,302, 5.5, 347], [332,318, 5, 344],
  // right lobe upper arc
  [362,238, 5.5, 342], [352,225, 5, 346],
  // heart point bottom
  [240,428, 5.5, 343], [232,415, 4.5, 346], [248,415, 4.5, 341],
  [228,402, 4, 344], [252,402, 4, 344],
  // scattered extras
  [ 82,250, 4, 347], [398,250, 4, 342],
  [168,212, 4, 344], [312,212, 4, 344],
  // tiny
  [100,258, 3, 343], [142,308, 3, 347], [338,308, 3, 343],
  [380,258, 3, 347], [220,302, 3, 344], [260,302, 3, 344],
];

const LEAVES = [
  [165,222, 5, 2.2, -0.4],
  [315,222, 5, 2.2, 0.4],
  [110,270, 4, 2, -0.3],
  [370,270, 4, 2, 0.3],
  [238,308, 4, 2, -0.1],
];

const FENCE_START = 115;
const TEXT_START  = 150;
let frame = 0;

const petals = Array.from({length:6}, (_, i) => ({
  x: 185+i*18, y: 300+(i%3)*15,
  vx: (i%2===0?-1:1)*(0.3+Math.random()*0.4),
  vy: 0.5+Math.random()*0.6,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-0.5)*0.04,
  rx:4, ry:2.2, delay:165+i*22,
}));

// ── Museum label (Pretext-powered) ──
const LABEL = {
  title:  'Cherry Blossom Viewing Canopy',
  latin:  'Prunus serrulata \u00b7 Rosaceae',
  body:   'Installed 2024. This specimen blooms for approximately two weeks each spring. Please admire from a safe distance to protect the root system.',
  note:   'Please do not approach.',
};
const LABEL_W = 220;
const LABEL_PAD = 16;
let labelLines = null;
let labelCard = null;  // { cardX, cardY, cardW, totalH, sections }

// Fall state for the label card
const labelFall = {
  y: -200,          // current y offset (absolute, starts above canvas)
  vy: 0,
  rot: 0,           // tilt angle (radians)
  vrot: 0,
  swayPhase: Math.random() * Math.PI * 2,
  landed: false,
  landFrame: -1,
  alpha: 0,
};

function prepareLabel() {
  const { prepareWithSegments, layoutWithLines } = window.__Pretext__;

  const bodyFont  = '13px "Palatino Linotype","Book Antiqua",Palatino,serif';
  const titleFont = 'bold 14px "Palatino Linotype","Book Antiqua",Palatino,serif';
  const latinFont = 'italic 12px "Palatino Linotype","Book Antiqua",Palatino,serif';
  const noteFont  = 'italic 13px "Palatino Linotype","Book Antiqua",Palatino,serif';
  const LH = 20;

  const sections = [
    { lines: layoutWithLines(prepareWithSegments(LABEL.title, titleFont), LABEL_W, LH).lines,
      font: titleFont, color: '#444', gap: 4 },
    { lines: layoutWithLines(prepareWithSegments(LABEL.latin, latinFont), LABEL_W, LH).lines,
      font: latinFont, color: '#888', gap: 10 },
    { lines: layoutWithLines(prepareWithSegments(LABEL.body, bodyFont),   LABEL_W, LH).lines,
      font: bodyFont,  color: '#666', gap: 12 },
    { lines: layoutWithLines(prepareWithSegments(LABEL.note, noteFont),   LABEL_W, LH).lines,
      font: noteFont,  color: '#c03055', gap: 0 },
  ];

  let totalH = LABEL_PAD * 2;
  sections.forEach((s, i) => {
    totalH += s.lines.length * LH;
    if (i < sections.length - 1) totalH += s.gap;
  });

  const cardW = LABEL_W + LABEL_PAD * 2;
  const cardX = (W - cardW) / 2;
  const targetY = H - 30 - totalH;

  labelLines = { lh: LH, sections };
  labelCard  = { cardX, targetY, cardW, totalH, lh: LH, sections };

  // Start position: slightly left of center, above canvas
  labelFall.y    = -totalH - 20;
  labelFall.vy   = 2.2;
  labelFall.rot  = (Math.random() - 0.5) * 0.12;
  labelFall.vrot = (Math.random() - 0.5) * 0.006;
}

function springVal(cur, target, vel, k, d) {
  const f = (target - cur) * k - vel * d;
  return { pos: cur + vel, vel: vel + f };
}

function updateLabel(globalFrame) {
  if (!labelCard) return;
  const FALL_START = TEXT_START;
  if (globalFrame < FALL_START) return;
  const t = globalFrame - FALL_START;

  labelFall.alpha = Math.min(1, t / 25);

  if (labelFall.landed) {
    // damp out residual tilt
    labelFall.rot  *= 0.88;
    labelFall.vrot *= 0.88;
    return;
  }

  const { targetY } = labelCard;
  const sway = Math.sin(t * 0.045 + labelFall.swayPhase) * 0.4;
  labelFall.rot += labelFall.vrot + sway * 0.003;

  const dist = targetY - labelFall.y;

  if (Math.abs(dist) < 80) {
    // Spring homing phase
    const sy = springVal(labelFall.y, targetY, labelFall.vy, 0.10, 0.52);
    labelFall.y  = sy.pos;
    labelFall.vy = sy.vel;
    labelFall.vrot *= 0.80;

    if (Math.abs(dist) < 1.2) {
      labelFall.y = targetY;
      labelFall.vy = 0;
      labelFall.landed = true;
      labelFall.landFrame = globalFrame;
    }
  } else {
    // Free fall with sway
    labelFall.y  += labelFall.vy + sway;
    labelFall.vy += 0.08;  // gentle gravity
    labelFall.vy  = Math.min(labelFall.vy, 5.5);
  }
}

function drawLabel() {
  if (!labelCard || labelFall.alpha <= 0) return;
  const { cardX, cardW, totalH, lh, sections } = labelCard;
  const cardY = labelFall.y;
  const cx = cardX + cardW / 2;  // pivot around card center

  ctx.save();
  ctx.globalAlpha = labelFall.alpha;
  ctx.translate(cx, cardY + totalH / 2);
  ctx.rotate(labelFall.rot);
  ctx.translate(-cx, -(cardY + totalH / 2));

  // card background
  ctx.fillStyle = 'rgba(250,248,244,0.94)';
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, totalH, 4);
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,170,155,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // top accent bar
  ctx.fillStyle = 'rgba(192,48,80,0.75)';
  ctx.fillRect(cardX, cardY, cardW, 3);

  // text
  let curY = cardY + LABEL_PAD + lh * 0.8;
  sections.forEach((s, i) => {
    ctx.font = s.font;
    ctx.fillStyle = s.color;
    ctx.textAlign = 'left';
    s.lines.forEach(line => {
      ctx.fillText(line.text, cardX + LABEL_PAD, curY);
      curY += lh;
    });
    if (i < sections.length - 1) curY += s.gap;
  });

  // divider above note
  ctx.strokeStyle = 'rgba(180,170,155,0.4)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cardX + LABEL_PAD, cardY + totalH - LABEL_PAD - lh - 6);
  ctx.lineTo(cardX + cardW - LABEL_PAD, cardY + totalH - LABEL_PAD - lh - 6);
  ctx.stroke();

  ctx.restore();
}

// ── Load Pretext, then start ──
function easeOut(t){ return 1-Math.pow(1-t,2); }
function easeBack(t){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}

function drawFlower(cx,cy,r,hue,alpha){
  if(r<0.1||alpha<=0) return;
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(cx+Math.cos(a)*r*1.1, cy+Math.sin(a)*r*1.1, r*0.85,r*0.48, a,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},68%,83%,${0.88*alpha})`;
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r*0.45,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue+8},82%,62%,${0.95*alpha})`; ctx.fill();
}

function drawLeaf(lx,ly,rx,ry,angle,alpha){
  ctx.save(); ctx.translate(lx,ly); ctx.rotate(angle);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(110,185,75,${0.78*alpha})`; ctx.fill(); ctx.restore();
}

function drawFencePost(x,y,alpha){
  if(alpha<=0) return;
  const dy=(1-alpha)*14;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.moveTo(x,y+dy); ctx.lineTo(x,y+42+dy);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.6; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y+dy,2.8,0,Math.PI*2);
  ctx.fillStyle='#aaa'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(x,y+42+dy,4,2,0,0,Math.PI*2);
  ctx.fillStyle='#bbb'; ctx.fill(); ctx.restore();
}

function drawRope(t,yBase,alpha){
  if(alpha<=0) return;
  const pts=[[110,yBase+12],[160,yBase+28],[240,yBase+24],[320,yBase+20],[370,yBase+12]];
  const totalSegs=4, drawSegs=t*totalSegs;
  ctx.save(); ctx.strokeStyle=`rgba(192,48,80,${alpha})`;
  ctx.lineWidth=1.4; ctx.setLineDash([8,4]);
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let s=0;s<totalSegs;s++){
    const segT=Math.min(1,drawSegs-s);
    if(segT<=0) break;
    ctx.lineTo(pts[s][0]+(pts[s+1][0]-pts[s][0])*segT, pts[s][1]+(pts[s+1][1]-pts[s][1])*segT);
  }
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function loop(){
  requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#faf9f7'; ctx.fillRect(0,0,W,H);

  // base ring
  const baseA=Math.min(1,frame/20);
  ctx.beginPath(); ctx.ellipse(OX,OY+6,30,9,0,0,Math.PI*2);
  ctx.strokeStyle=`rgba(185,185,185,${baseA})`; ctx.lineWidth=1.2; ctx.stroke();

  // branches
  const bReveal=Math.min(1,frame/95)*BRANCHES.length;
  for(let i=0;i<BRANCHES.length;i++){
    if(i>bReveal) break;
    const a=Math.min(1,bReveal-i);
    const b=BRANCHES[i];
    ctx.beginPath(); ctx.moveTo(b[0],b[1]); ctx.lineTo(b[2],b[3]);
    ctx.strokeStyle=`rgba(38,30,24,${easeOut(a)})`; ctx.lineWidth=b[4]; ctx.lineCap='round'; ctx.stroke();
  }

  // flowers
  const fStart=38;
  if(frame>fStart){
    const ft=frame-fStart;
    for(let i=0;i<FLOWERS.length;i++){
      const t=Math.min(1,Math.max(0,(ft-i*1.6)/18));
      if(t<=0) continue;
      const [cx,cy,maxR,hue]=FLOWERS[i];
      drawFlower(cx,cy,maxR*easeBack(t),hue,Math.min(1,t*3));
    }
    for(let i=0;i<LEAVES.length;i++){
      const t=Math.min(1,Math.max(0,(ft-i*3-8)/15));
      if(t<=0) continue;
      const [lx,ly,rx,ry,ang]=LEAVES[i];
      drawLeaf(lx,ly,rx*t,ry*t,ang,Math.min(1,t*2));
    }
  }

  // fence
  if(frame>FENCE_START){
    const ft=frame-FENCE_START;
    [[110,400],[160,404],[320,404],[370,400]].forEach(([px,py],i)=>{
      const t=Math.min(1,Math.max(0,(ft-i*5)/15));
      drawFencePost(px,py,easeOut(t));
    });
    drawRope(Math.min(1,Math.max(0,(ft-25)/30)),400,Math.min(1,Math.max(0,(ft-25)/30)));
    drawRope(Math.min(1,Math.max(0,(ft-40)/30)),414,Math.min(1,Math.max(0,(ft-40)/30)));
  }

  // museum label fall animation
  updateLabel(frame);
  drawLabel();

  // petals
  if(frame>165){
    for(const p of petals){
      if(frame<p.delay) continue;
      p.x+=p.vx+Math.sin(frame*0.02+p.delay)*0.3; p.y+=p.vy; p.rot+=p.vrot;
      if(p.y>H+10){p.y=-10; p.x=160+Math.random()*160;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);
      ctx.fillStyle='hsla(345,72%,80%,0.75)'; ctx.fill(); ctx.restore();
    }
  }
}

(function loadPretext() {
  const script = document.createElement('script');
  script.type = 'module';
  script.textContent = `
    import * as PT from 'https://esm.sh/@chenglou/pretext';
    window.__Pretext__ = PT;
    window.dispatchEvent(new Event('pretext-ready'));
  `;
  document.head.appendChild(script);
})();

window.addEventListener('pretext-ready', () => {
  prepareLabel();
  loop();
});

setTimeout(() => {
  if (!labelLines) {
    console.warn('Pretext CDN timeout, running without label');
// 触摸支持（防止页面滑动）
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });
    loop();
  }
}, 3000);
</script>

<script>
// Generated Audio System - 轻柔钢琴和弦
// 轻柔钢琴和弦音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  const chords=[[261.63,329.63,392],[293.66,369.99,440],[246.94,311.13,369.99]];
  let idx=0;
  function chord(){
    if(!isActive)return;
    const notes=chords[idx%chords.length];idx++;
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.06/(i+1),ctx.currentTime+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.8);
      o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+3);
      // 泛音
      const h=ctx.createOscillator(),hg=ctx.createGain();
      h.frequency.value=f*2;h.type='sine';hg.gain.value=0.02;
      h.connect(hg);hg.connect(master);h.start();h.stop(ctx.currentTime+2.5);
    });
    setTimeout(chord,3000+Math.random()*2000);
  }
  chord();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
