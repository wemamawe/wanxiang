<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧梦 - Old Dream</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a15;
            font-family: 'STKaiti', 'KaiTi', serif;
            overflow: hidden; touch-action: none;
        }
        canvas {
            display: block;
            box-shadow: 0 0 60px rgba(100, 80, 150, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 画布尺寸
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 鼠标位置
        let mouseX = -1000;
        let mouseY = -1000;
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });
        canvas.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        // 诗句文本
        const poem = [
            '旧梦如烟',
            '散作满天星',
            '你来过',
            '却又走了',
            '留一地月光'
        ];
        
        // 光环粒子类
        class LightRing {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 40 + Math.random() * 60;
                this.speed = 0.2 + Math.random() * 0.3;
                this.angle = Math.random() * Math.PI * 2;
                this.opacity = 0.1 + Math.random() * 0.2;
                this.hue = Math.random() * 60 + 30; // 暖金到琥珀色
            }
            
            update() {
                this.angle += 0.001;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 边界循环
                if (this.x < -100) this.x = canvas.width + 100;
                if (this.x > canvas.width + 100) this.x = -100;
                if (this.y < -100) this.y = canvas.height + 100;
                if (this.y > canvas.height + 100) this.y = -100;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${this.opacity})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 50%, ${this.opacity * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            }
        }
        
        // 漂浮粒子类
        class Particle {
            constructor(x, y, isText = false) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = isText ? 2 + Math.random() * 3 : 1 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = 0.3 + Math.random() * 0.7;
                this.color = isText ? 
                    (Math.random() > 0.5 ? '#ffd88e' : '#e8b4ff') : 
                    ['#ffd88e', '#ffaa66', '#e8b4ff'][Math.floor(Math.random() * 3)];
                this.blur = 4 + Math.random() * 6;
                this.life = isText ? 0 : 1;
                this.maxLife = 180 + Math.random() * 120;
            }
            
            update() {
                // 鼠标排斥效果
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    this.speedX += (dx / dist) * force * 0.5;
                    this.speedY += (dy / dist) * force * 0.5;
                }
                
                this.x += this.speedX;
                this.y += this.speedY;
                
                // 速度衰减
                this.speedX *= 0.98;
                this.speedY *= 0.98;
                
                // 边界循环
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                
                // 生命周期
                this.life++;
                if (this.life > this.maxLife * 0.7) {
                    this.opacity *= 0.98;
                }
            }
            
            draw() {
                ctx.save();
                ctx.shadowBlur = this.blur;
                ctx.shadowColor = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            isDead() {
                return this.opacity < 0.01 || this.life > this.maxLife;
            }
        }
        
        // 文字字符类
        class TextChar {
            constructor(char, x, y, delay) {
                this.char = char;
                this.x = x;
                this.y = y;
                this.delay = delay;
                this.opacity = 0;
                this.phase = 'fadein'; // fadein, hold, dissolve
                this.timer = 0;
                this.holdTime = 120;
                this.dissolveParticles = [];
            }
            
            update() {
                this.timer++;
                
                if (this.timer < this.delay) return;
                
                const t = this.timer - this.delay;
                
                if (this.phase === 'fadein') {
                    this.opacity = Math.min(1, t / 60);
                    if (this.opacity >= 1) {
                        this.phase = 'hold';
                        this.timer = 0;
                    }
                } else if (this.phase === 'hold') {
                    if (this.timer > this.holdTime) {
                        this.phase = 'dissolve';
                        this.createDissolveParticles();
                    }
                } else if (this.phase === 'dissolve') {
                    this.opacity = Math.max(0, 1 - this.timer / 60);
                    this.dissolveParticles.forEach(p => p.update());
                    this.dissolveParticles = this.dissolveParticles.filter(p => !p.isDead());
                }
            }
            
            createDissolveParticles() {
                const count = 15 + Math.random() * 10;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 1.5;
                    const p = new Particle(this.x, this.y, true);
                    p.speedX = Math.cos(angle) * speed;
                    p.speedY = Math.sin(angle) * speed;
                    this.dissolveParticles.push(p);
                }
            }
            
            draw() {
                if (this.timer < this.delay) return;
                
                // 绘制原字符
                if (this.opacity > 0) {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = '#ffe4b8';
                    ctx.font = '32px STKaiti, KaiTi, serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffd88e';
                    ctx.fillText(this.char, this.x, this.y);
                    ctx.restore();
                }
                
                // 绘制溶解粒子
                this.dissolveParticles.forEach(p => p.draw());
            }
            
            isDone() {
                return this.phase === 'dissolve' && this.opacity <= 0 && this.dissolveParticles.length === 0;
            }
        }
        
        // 初始化
        const lightRings = [];
        for (let i = 0; i < 8; i++) {
            lightRings.push(new LightRing());
        }
        
        const particles = [];
        for (let i = 0; i < 120; i++) {
            particles.push(new Particle());
        }
        
        let textChars = [];
        let cycleTimer = 0;
        const cycleDuration = 1200; // 完整循环时长
        
        function initText() {
            textChars = [];
            let charIndex = 0;
            
            poem.forEach((line, lineIndex) => {
                const y = 200 + lineIndex * 70;
                const chars = line.split('');
                const totalWidth = chars.length * 35;
                const startX = (canvas.width - totalWidth) / 2 + 17;
                
                chars.forEach((char, i) => {
                    textChars.push(new TextChar(
                        char,
                        startX + i * 35,
                        y,
                        charIndex * 8
                    ));
                    charIndex++;
                });
            });
        }
        
        initText();
        
        // 动画循环
        function animate() {
            // 背景渐变（深蓝到暗紫）
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f0a2e');
            gradient.addColorStop(0.5, '#1a0f3a');
            gradient.addColorStop(1, '#0a0618');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制光环
            lightRings.forEach(ring => {
                ring.update();
                ring.draw();
            });
            
            // 绘制粒子
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                
                if (p.isDead()) {
                    particles[index] = new Particle();
                }
            });
            
            // 绘制文字
            textChars.forEach(tc => {
                tc.update();
                tc.draw();
            });
            
            // 循环控制
            cycleTimer++;
            if (cycleTimer > cycleDuration) {
                if (textChars.every(tc => tc.isDone())) {
                    cycleTimer = 0;
                    initText();
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // Resize 监听
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initText();
        });
        animate();
    </script>

<script>
// Generated Audio System - 梦境pad
// 梦境pad音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  const freqs=[174.61,220,261.63,329.63];
  freqs.forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    const lfo=ctx.createOscillator(),lfog=ctx.createGain();
    o.frequency.value=f;o.type='sine';
    lfo.frequency.value=0.25+i*0.15;lfog.gain.value=3;
    lfo.connect(lfog);lfog.connect(o.frequency);
    g.gain.value=0.06/(i+1);
    o.connect(g);g.connect(master);o.start();lfo.start();
  });
  isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
