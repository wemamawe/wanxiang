<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湿帘 · 重制</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f4f6f8; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 700;
canvas.width = W; canvas.height = H;

// ══════════════════════════════════════
//  水珠类
// ══════════════════════════════════════
class Drop {
  constructor(x, y) {
    this.x = x ?? (30 + Math.random() * (W - 60));
    this.y = y ?? (20 + Math.random() * H * 0.6);
    this.r  = 4 + Math.random() * 14;
    this.vy = 0;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.gravity = 0.008 + Math.random() * 0.012;
    this.friction = 0.988;
    this.sliding  = false;
    this.slideDelay = Math.floor(80 + Math.random() * 200);  // 静止多少帧后开始滑
    this.age  = Math.floor(Math.random() * 120);
    this.alive = true;
    this.trail = [];
    // 合并吸引半径
    this.mergeR = this.r * 1.4;
  }

  update(drops) {
    this.age++;

    if (!this.sliding && this.age > this.slideDelay) {
      // 尝试合并附近小珠
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        if (d === this || !d.alive || d.sliding) continue;
        if (d.r >= this.r) continue;
        const dist = Math.hypot(d.x - this.x, d.y - this.y);
        if (dist < this.r + d.r * 0.8) {
          // 吸收
          const newR = Math.sqrt(this.r*this.r + d.r*d.r*0.6);
          this.r = Math.min(newR, 22);
          this.mergeR = this.r * 1.4;
          d.alive = false;
        }
      }
      // 达到临界才滑落
      if (this.r > 11) this.sliding = true;
    }

    if (this.sliding) {
      this.trail.push({ x: this.x, y: this.y, r: this.r * 0.35 });
      if (this.trail.length > 30) this.trail.shift();
      this.vy += this.gravity;
      this.vy *= this.friction;
      this.y  += this.vy;
      this.x  += this.vx;
      // 滑落中珠子变小（水留在轨迹上）
      this.r = Math.max(4, this.r - 0.012);
      if (this.y > H + 40 || this.r < 4) this.alive = false;
    } else {
      // 静止时轻微呼吸
      this.r += 0.006;
    }
  }

  draw() {
    if (!this.alive) return;

    // 水痕轨迹
    if (this.trail.length > 2) {
      ctx.save();
      for (let i = 1; i < this.trail.length; i++) {
        const t = i / this.trail.length;
        const p = this.trail[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (0.3 + t * 0.7), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,170,220,${t * 0.18})`;
        ctx.fill();
      }
      ctx.restore();
    }

    const r = this.r;

    // 水珠底部阴影（贴在玻璃上的感觉）
    ctx.save();
    ctx.filter = 'blur(3px)';
    ctx.beginPath();
    ctx.ellipse(this.x + 1, this.y + r * 0.5, r * 0.8, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(80,140,200,0.12)';
    ctx.fill();
    ctx.filter = 'none';
    ctx.restore();

    // 水珠本体 — 用径向渐变模拟玻璃球折射
    const gx = this.x - r * 0.25;
    const gy = this.y - r * 0.30;
    const grd = ctx.createRadialGradient(gx, gy, r * 0.04, this.x, this.y, r);
    grd.addColorStop(0,    'rgba(255,255,255,0.90)');
    grd.addColorStop(0.18, 'rgba(210,235,255,0.70)');
    grd.addColorStop(0.55, 'rgba(100,170,220,0.45)');
    grd.addColorStop(0.85, 'rgba(60,130,190,0.35)');
    grd.addColorStop(1,    'rgba(40,100,160,0.20)');

    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // 边缘描边（极淡）
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(80,150,210,0.22)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 主高光
    ctx.beginPath();
    ctx.ellipse(this.x - r*0.22, this.y - r*0.26, r*0.28, r*0.18, -0.4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fill();

    // 副高光（右下小反光）
    ctx.beginPath();
    ctx.ellipse(this.x + r*0.30, this.y + r*0.28, r*0.10, r*0.06, 0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();
  }
}

// ══════════════════════════════════════
//  雨丝（极细、极淡）
// ══════════════════════════════════════
const rainLines = Array.from({length: 55}, () => ({
  x:  Math.random() * W,
  y:  Math.random() * H,
  len: 12 + Math.random() * 20,
  spd: 9 + Math.random() * 5,
  alpha: 0.04 + Math.random() * 0.07,
}));

// ══════════════════════════════════════
//  涟漪（雨滴撞击扩散）
// ══════════════════════════════════════
const ripples = [];
function addRipple(x, y) {
  ripples.push({ x, y, r: 2, alpha: 0.5, spd: 1.6 });
}

// ══════════════════════════════════════
//  诗句（在水珠间轻轻浮现）
// ══════════════════════════════════════
const POEM = '帘外雨潺潺，春意阑珊';
let poemAlpha = 0;
let poemDir = 1;

// ══════════════════════════════════════
//  初始化水珠
// ══════════════════════════════════════
let drops = Array.from({length: 28}, () => new Drop());
let frame = 0;

function spawnDrop() {
  const x = 30 + Math.random() * (W - 60);
  const y = 30 + Math.random() * H * 0.5;
  drops.push(new Drop(x, y));
  addRipple(x, y);
}

// ══════════════════════════════════════
//  绘制玻璃背景（极淡纹理）
// ══════════════════════════════════════
function drawBackground() {
  // 主背景
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#f0f4f8');
  bg.addColorStop(0.4, '#eef2f6');
  bg.addColorStop(1,   '#e8ecf0');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 极淡的竖向光条（玻璃折射感）
  for (let i = 0; i < 5; i++) {
    const lx = (i / 4) * W * 0.8 + W * 0.1;
    const lg = ctx.createLinearGradient(lx - 30, 0, lx + 30, 0);
    lg.addColorStop(0,   'rgba(255,255,255,0)');
    lg.addColorStop(0.5, 'rgba(255,255,255,0.06)');
    lg.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = lg;
    ctx.fillRect(lx - 30, 0, 60, H);
  }
}

// ══════════════════════════════════════
//  主循环
// ══════════════════════════════════════
function tick() {
  requestAnimationFrame(tick);
  frame++;

  drawBackground();

  // 雨丝
  ctx.save();
  for (const r of rainLines) {
    r.y += r.spd;
    if (r.y > H + 25) { r.y = -25; r.x = Math.random() * W; }
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 0.6, r.y + r.len);
    ctx.strokeStyle = `rgba(100,160,210,${r.alpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }
  ctx.restore();

  // 涟漪
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.spd;
    rp.alpha -= 0.018;
    if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rp.r, rp.r * 0.35, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(90,155,210,${rp.alpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // 新雨滴（每50帧）
  if (frame % 50 === 0 && drops.length < 42) {
    spawnDrop();
  }

  // 清理死亡水珠
  if (frame % 120 === 0) {
    drops = drops.filter(d => d.alive);
    while (drops.length < 22) spawnDrop();
  }

  // 更新&绘制水珠（小珠先画，大珠后画）
  drops.sort((a, b) => a.r - b.r);
  for (const d of drops) {
    d.update(drops);
    d.draw();
  }

  // 诗句淡入淡出
  poemAlpha += poemDir * 0.003;
  if (poemAlpha >= 0.55) poemDir = -1;
  if (poemAlpha <= 0.0)  poemDir =  1;

  ctx.save();
  ctx.globalAlpha = Math.max(0, poemAlpha);
  ctx.font = '14px "Songti SC","STSong","SimSun",serif';
  ctx.fillStyle = 'rgba(70,110,150,1)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '4px';
  ctx.fillText(POEM, W / 2, H - 52);
  ctx.restore();

  // 署名
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.font = '11px "Songti SC",serif';
  ctx.fillStyle = 'rgba(80,120,160,1)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('湿  帘', W - 22, H - 20);
  ctx.restore();
}

tick();
</script>
</body>
</html>
