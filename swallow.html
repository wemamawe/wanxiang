<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燕返</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #ece8e0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 520, H = 700;
canvas.width = W; canvas.height = H;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  信纸参数
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PX = 80, PY = 70, PW = 360, PH = 530;
const ML = 50, MR = 24, MT = 38;
const LINE_H = 27;
const FONT = '15px "Songti SC","SimSun","STSong",serif';
const LINE_COLOR  = 'rgba(100,140,210,0.26)';
const RED_LINE    = 'rgba(200,55,55,0.52)';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  信件文字
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LETTER = [
  '兰成，',
  '经过一年半的长时间考虑，我已',
  '决定，不想再拖累你了。',
  '',
  '你是懂我的，懂我深处那些连我',
  '自己都说不清的东西。那时我以',
  '为，能握住的就是幸福。',
  '',
  '后来我知道了你与小周的事。我',
  '压着心里的火，试图去理解，去',
  '包容。可终究是徒劳。',
  '',
  '随附稿酬三十万法郎，算是这段',
  '感情的终结。此后你不必再来，',
  '来信我也不会看的。',
  '',
  '                        爱玲',
  '              一九四七年·六月',
];

// 预计算每个字符的像素坐标（供燕子起飞用）
// 用 measureText 逐字累加 x
const charMap = [];  // {char, x, y, rowIdx, colIdx}
ctx.font = FONT;

LETTER.forEach((line, row) => {
  const baseX = PX + ML;
  const baseY = PY + MT + (row + 0.82) * LINE_H;
  let cx = baseX;
  for (let col = 0; col < line.length; col++) {
    const ch = line[col];
    const cw = ctx.measureText(ch).width;
    charMap.push({ char: ch, x: cx + cw * 0.5, y: baseY, row, col });
    cx += cw;
  }
});

const TOTAL_CHARS = charMap.length;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  燕子形状：真实燕子剪影
//  - 两片弯刀翅膀（细长，末端尖锐）
//  - 叉形剪刀尾
//  - 小圆头
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawSwallowShape(ctx, sz, wing) {
  // wing: 0=完全展开 Math.PI=完全收拢
  // 翅膀拍动：用 sin 控制上下位移
  const flap = Math.sin(wing);           // -1 ~ 1
  const wSpan = sz * 2.8;               // 全翼展
  const wCurve = sz * 0.5 + flap * sz * 0.3;  // 翼弯曲

  ctx.beginPath();

  // 左翼（弯刀形）
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(
    -wSpan * 0.35, -wCurve,
    -wSpan * 0.75, -wCurve * 0.3,
    -wSpan * 0.88, wCurve * 0.15
  );
  ctx.bezierCurveTo(
    -wSpan * 0.6,  wCurve * 0.5,
    -wSpan * 0.2,  wCurve * 0.2,
    0, 0
  );

  // 右翼（镜像）
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(
    wSpan * 0.35, -wCurve,
    wSpan * 0.75, -wCurve * 0.3,
    wSpan * 0.88,  wCurve * 0.15
  );
  ctx.bezierCurveTo(
    wSpan * 0.6,  wCurve * 0.5,
    wSpan * 0.2,  wCurve * 0.2,
    0, 0
  );

  // 身体（纺锤形）
  ctx.moveTo(0, -sz * 0.15);
  ctx.ellipse(0, sz * 0.15, sz * 0.18, sz * 0.42, 0, 0, Math.PI * 2);

  // 剪刀尾（两叉）
  const tailBase = sz * 0.55;
  const tailLen  = sz * 0.9;
  const tailSpread = sz * 0.45;
  ctx.moveTo(-sz * 0.1, tailBase);
  ctx.bezierCurveTo(-sz*0.15, tailBase + tailLen*0.5, -tailSpread, tailBase + tailLen*0.7, -tailSpread * 1.1, tailBase + tailLen);
  ctx.moveTo(sz * 0.1, tailBase);
  ctx.bezierCurveTo( sz*0.15, tailBase + tailLen*0.5,  tailSpread, tailBase + tailLen*0.7,  tailSpread * 1.1, tailBase + tailLen);

  ctx.fillStyle   = '#18181a';
  ctx.strokeStyle = '#18181a';
  ctx.lineWidth   = sz * 0.18;
  ctx.lineCap     = 'round';
  ctx.fill();
  ctx.stroke();
}

function drawSwallow(x, y, sz, wing, alpha, angle) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  drawSwallowShape(ctx, sz, wing);
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  字符→燕子粒子
//  每个字符在被"消除"时，从其位置生出一只燕子
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const charBirds = charMap.map((cm, i) => {
  const angle = -Math.PI * 0.3 + (Math.random() - 0.5) * Math.PI * 0.8;
  const spd   = 0.25 + Math.random() * 0.35;   // 慢速起飞
  return {
    ox: cm.x, oy: cm.y,    // 出生坐标（文字位置）
    x:  cm.x, y:  cm.y,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd - 0.1,
    ax: (Math.random() - 0.5) * 0.004,  // 微小横向加速
    ay: -0.005 + Math.random() * 0.003, // 微弱上升
    sz: 2.8 + Math.random() * 1.6,
    wing: Math.random() * Math.PI * 2,
    wingSpd: 0.07 + Math.random() * 0.05,
    alpha: 0,
    born: false,
    charIdx: i,
    // 飞行角度（朝向速度方向）
    flyAngle: angle - Math.PI / 2,
  };
});

// 背景常驻漂浮燕子（少量）
const bgBirds = Array.from({ length: 6 }, () => {
  const angle = Math.random() * Math.PI * 2;
  const spd   = 0.18 + Math.random() * 0.22;
  return {
    x: Math.random() * W, y: Math.random() * H,
    vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
    sz: 2.2 + Math.random() * 1.5,
    wing: Math.random() * Math.PI * 2,
    wingSpd: 0.055 + Math.random() * 0.035,
    alpha: 0.08 + Math.random() * 0.10,
  };
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  信纸绘制
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawPaper(a) {
  ctx.save();
  ctx.globalAlpha = a;
  ctx.shadowColor = 'rgba(0,0,0,0.10)';
  ctx.shadowBlur  = 16; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 5;
  ctx.fillStyle   = '#f9f7f1';
  ctx.fillRect(PX, PY, PW, PH);
  ctx.shadowColor = 'transparent';

  // 横线
  const nLines = Math.floor((PH - MT - 16) / LINE_H);
  for (let i = 0; i <= nLines; i++) {
    const ly = PY + MT + i * LINE_H;
    if (ly > PY + PH - 12) break;
    ctx.beginPath();
    ctx.moveTo(PX + 6, ly); ctx.lineTo(PX + PW - 6, ly);
    ctx.strokeStyle = LINE_COLOR; ctx.lineWidth = 0.75; ctx.stroke();
  }
  // 红线
  const rx = PX + ML - 10;
  ctx.beginPath(); ctx.moveTo(rx, PY+10); ctx.lineTo(rx, PY+PH-10);
  ctx.strokeStyle = RED_LINE; ctx.lineWidth = 1.1; ctx.stroke();
  // 边框
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  ctx.strokeRect(PX, PY, PW, PH);
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  文字绘制（逐字显示，每字可单独隐藏）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// charVisible[i] = true → 显示文字  false → 文字已变成燕子
const charVisible = new Array(TOTAL_CHARS).fill(false);

function drawLetterChars(showUpTo) {
  ctx.save();
  ctx.font = FONT;
  ctx.fillStyle = 'rgba(28,18,12,0.87)';
  ctx.textAlign  = 'left';
  ctx.textBaseline = 'alphabetic';
  for (let i = 0; i < showUpTo && i < TOTAL_CHARS; i++) {
    if (!charVisible[i]) continue;
    const cm = charMap[i];
    // 以字符中心为基准，左对齐还原
    const cw = ctx.measureText(cm.char).width;
    ctx.fillText(cm.char, cm.x - cw * 0.5, cm.y);
  }
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  蜡封
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawSeal(a) {
  if (a <= 0) return;
  const sx = PX + PW - 48, sy = PY + PH - 46;
  ctx.save(); ctx.globalAlpha = a;
  const g = ctx.createRadialGradient(sx-3, sy-4, 2, sx, sy, 17);
  g.addColorStop(0, '#ec5a5a'); g.addColorStop(0.55, '#c02e3a'); g.addColorStop(1, '#881520');
  ctx.beginPath(); ctx.arc(sx, sy, 17, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(255,190,190,0.35)'; ctx.lineWidth = 0.8;
  for (let i = 0; i < 6; i++) {
    const a2 = (i/6)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(sx, sy);
    ctx.lineTo(sx+Math.cos(a2)*13, sy+Math.sin(a2)*13); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(sx, sy, 5.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,170,170,0.3)'; ctx.fill();
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  标题
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawTitle(a) {
  if (a <= 0) return;
  ctx.save(); ctx.globalAlpha = a; ctx.textAlign = 'center';
  ctx.font = '30px "Songti SC","SimSun",serif';
  ctx.fillStyle = '#241a10';
  ctx.fillText('燕  返', W/2, PY - 24);
  ctx.font = '12px "Songti SC","SimSun",serif';
  ctx.fillStyle = 'rgba(70,50,30,0.58)';
  ctx.fillText('似曾相识燕归来', W/2, PY - 8);
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  时间线
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  F0   0  ~ 55   : 纸张淡入
//  F1  55  ~ 55+TC*2.8 : 打字机（每字 2.8 帧）
//  F2  +40          : 蜡封出现
//  F3  +60          : 文字逐字变成燕子（每字 3 帧）
//  F4  +TC*3+80     : 信纸淡出，燕子漫天
//  F5  +80          : 标题淡入

let frame = 0;
const easeOut  = t => 1 - Math.pow(1-t, 2);
const easeOut3 = t => 1 - Math.pow(1-t, 3);

// 预计算各阶段起始帧
const F0 = 0,  DUR0 = 55;
const F1 = DUR0, DUR1 = TOTAL_CHARS * 2.8;
const F2 = F1 + DUR1 + 40, DUR2 = 35;
const F3 = F2 + DUR2, DUR3 = TOTAL_CHARS * 3;   // 每字 3 帧间隔
const F4 = F3 + DUR3 + 60, DUR4 = 100;
const F5 = F4 + DUR4, DUR5 = 70;

// 记录每只 charBird 的激活帧
charBirds.forEach((b, i) => {
  b.activateAt = F3 + i * 3;   // 每隔 3 帧激活一只
});

function tick() {
  requestAnimationFrame(tick);
  frame++;

  // 背景
  ctx.fillStyle = '#edeae2';
  ctx.fillRect(0, 0, W, H);

  // ── 背景常驻漂浮燕 ──
  for (const b of bgBirds) {
    b.x += b.vx + Math.sin(frame*0.011+b.wing)*0.25;
    b.y += b.vy + Math.cos(frame*0.008+b.wing)*0.18;
    b.wing += b.wingSpd;
    if (b.x < -30) b.x = W+15; if (b.x > W+30) b.x = -15;
    if (b.y < -30) b.y = H+15; if (b.y > H+30) b.y = -15;
    // 后期才显眼
    const bgVis = frame > F4 ? Math.min(1, (frame-F4)/80) : 0.25;
    drawSwallow(b.x, b.y, b.sz, b.wing, b.alpha * bgVis, 0);
  }

  // ── Phase 0: 纸张淡入 ──
  const paperShowT = Math.min(1, Math.max(0, (frame - F0) / DUR0));
  const paperFadeT = frame > F4 ? Math.max(0, 1 - (frame-F4)/DUR4) : 1;
  if (paperShowT > 0) drawPaper(easeOut(paperShowT) * paperFadeT);

  // ── Phase 1: 打字机 ──
  if (frame >= F1) {
    const shown = Math.min(TOTAL_CHARS, Math.floor((frame - F1) / 2.8));
    // 标记哪些字可见
    for (let i = 0; i < TOTAL_CHARS; i++) {
      if (i < shown && !charBirds[i].born) charVisible[i] = true;
    }
    const textFade = frame > F4 ? Math.max(0, 1 - (frame-F4)/(DUR4*0.7)) : 1;
    ctx.save(); ctx.globalAlpha = textFade;
    drawLetterChars(shown);
    ctx.restore();
  }

  // ── Phase 2: 蜡封 ──
  if (frame >= F2) {
    const sealT  = Math.min(1, (frame-F2)/DUR2);
    const sealFd = frame > F4 ? Math.max(0, 1 - (frame-F4)/(DUR4*0.6)) : 1;
    drawSeal(easeOut3(sealT) * sealFd);
  }

  // ── Phase 3: 字→燕 ──
  if (frame >= F3) {
    for (const b of charBirds) {
      if (frame < b.activateAt) continue;

      if (!b.born) {
        b.born = true;
        charVisible[b.charIdx] = false;  // 文字消失
      }

      const age = frame - b.activateAt;

      // 淡入
      b.alpha = Math.min(0.82, age / 18);

      // 缓慢起飞：初期慢，之后自然加速
      const accelT = Math.min(1, age / 90);
      b.vx += b.ax + accelT * (Math.random()-0.5)*0.003;
      b.vy += b.ay - accelT * 0.002;  // 越来越往上
      // 速度上限
      b.vx = Math.sign(b.vx) * Math.min(Math.abs(b.vx), 1.8);
      b.vy = Math.max(b.vy, -1.6);

      b.x += b.vx;
      b.y += b.vy;
      b.wing += b.wingSpd;

      // 飞行角度跟随速度方向
      const targetAngle = Math.atan2(b.vy, b.vx) - Math.PI/2;
      b.flyAngle += (targetAngle - b.flyAngle) * 0.08;

      // 飞出边界→重置为漂浮
      if (b.x < -50 || b.x > W+50 || b.y < -60 || b.y > H+60) {
        b.x = Math.random() * W;
        b.y = Math.random() * H;
        b.vx = (Math.random()-0.5)*0.4;
        b.vy = -0.1 - Math.random()*0.3;
        b.alpha = 0.12 + Math.random()*0.15;
      }

      drawSwallow(b.x, b.y, b.sz, b.wing, b.alpha, b.flyAngle);
    }
  }

  // ── Phase 5: 标题 ──
  if (frame >= F5) {
    drawTitle(easeOut(Math.min(1, (frame-F5)/DUR5)));
  }
}

tick();
</script>
</body>
</html>
