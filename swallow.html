<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>燕返 · 张爱玲</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #edeae2;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    touch-action:none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

function handleResize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize',handleResize);

// ══════════════════════════════════════════
//  字体 & 信纸常量
// ══════════════════════════════════════════
const PX=80, PY=62, PW=360, PH=550;
const ML=50, MT=38, LINE_H=27;
const FONT_BODY = '15px "Songti SC","SimSun","STSong",serif';
const FONT_TITLE= 'bold 17px "Songti SC","SimSun",serif';
const FONT_QUOTE= 'italic 14px "Songti SC","SimSun",serif';
const FONT_BIG  = '26px "Songti SC","SimSun",serif';

// ══════════════════════════════════════════
//  三幕内容
// ══════════════════════════════════════════
// 每幕：{ lines, font, style }
// style: 'normal' | 'quote' | 'center'
const ACTS = [
  // ── 幕一：序（居中大字，浮在信纸之上）──
  {
    type: 'overlay',   // 不用信纸，直接浮在背景
    lines: [
      { text: '一九四四年，上海', font: FONT_QUOTE, color: 'rgba(80,55,35,0.75)', align: 'center' },
      { text: '', font: FONT_BODY },
      { text: '他来了。', font: FONT_BIG, color: 'rgba(35,22,12,0.90)', align: 'center' },
      { text: '', font: FONT_BODY },
      { text: '她爱了。', font: FONT_BIG, color: 'rgba(35,22,12,0.90)', align: 'center' },
    ],
    holdFrames: 90,   // 打完后停留帧数
  },

  // ── 幕二：回忆碎片 ──
  {
    type: 'paper',
    lines: [
      '我不断地回忆，',
      '不断地思索，',
      '试图从过往的点滴里',
      '找到坚持下去的理由，',
      '可终究是徒劳。',
      '',
      '你曾说：',
      '「岁月静好，现世安稳。」',
      '',
      '那时的我，以为',
      '握住的就是一切。',
    ],
    holdFrames: 60,
  },

  // ── 幕三：告别信（信纸）──
  {
    type: 'paper',
    lines: [
      '兰成，',
      '经过一年半的长时间考虑，',
      '我已决定，不想再拖累',
      '你了。',
      '',
      '后来我知道了你与小周',
      '的事。我压着心里的火，',
      '试图去理解，去包容。',
      '可终究是徒劳。',
      '',
      '随附稿酬三十万法郎，',
      '算是这段感情的终结。',
      '此后你不必再来，',
      '来信我也不会看的。',
      '',
      '                  爱玲',
      '        一九四七年·六月',
    ],
    holdFrames: 80,
    hasSeal: true,
  },
];

// ══════════════════════════════════════════
//  预计算字符坐标（每幕独立）
// ══════════════════════════════════════════
function buildCharMap(lines, type) {
  ctx.save();
  const map = [];
  lines.forEach((lineObj, row) => {
    const text = typeof lineObj === 'string' ? lineObj : lineObj.text;
    const font = typeof lineObj === 'string' ? FONT_BODY : (lineObj.font || FONT_BODY);
    const align= typeof lineObj === 'string' ? 'left' : (lineObj.align || 'left');
    ctx.font = font;
    let baseX, baseY;
    if (type === 'overlay') {
      baseY = PY + 120 + row * (LINE_H + 10);
      baseX = align === 'center' ? W / 2 : PX + ML;
    } else {
      baseY = PY + MT + (row + 0.82) * LINE_H;
      baseX = PX + ML;
    }
    let cx = baseX;
    if (align === 'center') {
      const tw = ctx.measureText(text).width;
      cx = baseX - tw / 2;
    }
    for (let col = 0; col < text.length; col++) {
      const ch = text[col];
      const cw = ctx.measureText(ch).width;
      map.push({ char: ch, x: cx + cw*0.5, y: baseY,
                 font, color: typeof lineObj === 'object' ? lineObj.color : null,
                 row, col });
      cx += cw;
    }
  });
  ctx.restore();
  return map;
}

const actCharMaps = ACTS.map(a => buildCharMap(a.lines, a.type));

// ══════════════════════════════════════════
//  燕子形状（真实剪影）
// ══════════════════════════════════════════
function drawSwallowShape(sz, wing) {
  const flap  = Math.sin(wing);
  const wSpan = sz * 2.8;
  const wCurve= sz * 0.48 + flap * sz * 0.28;

  ctx.beginPath();
  // 左翼
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-wSpan*.35,-wCurve,-wSpan*.75,-wCurve*.3,-wSpan*.88,wCurve*.14);
  ctx.bezierCurveTo(-wSpan*.58, wCurve*.48,-wSpan*.2, wCurve*.18, 0,0);
  // 右翼
  ctx.moveTo(0,0);
  ctx.bezierCurveTo( wSpan*.35,-wCurve, wSpan*.75,-wCurve*.3, wSpan*.88,wCurve*.14);
  ctx.bezierCurveTo( wSpan*.58, wCurve*.48, wSpan*.2, wCurve*.18, 0,0);
  // 身体
  ctx.moveTo(0,-sz*.14);
  ctx.ellipse(0,sz*.14,sz*.16,sz*.40,0,0,Math.PI*2);
  // 剪刀尾
  const tb=sz*.52, tl=sz*.88, ts=sz*.42;
  ctx.moveTo(-sz*.09,tb);
  ctx.bezierCurveTo(-sz*.14,tb+tl*.5,-ts,tb+tl*.68,-ts*1.08,tb+tl);
  ctx.moveTo( sz*.09,tb);
  ctx.bezierCurveTo( sz*.14,tb+tl*.5, ts,tb+tl*.68, ts*1.08,tb+tl);

  ctx.fillStyle='#191818'; ctx.strokeStyle='#191818';
  ctx.lineWidth=sz*.16; ctx.lineCap='round';
  ctx.fill(); ctx.stroke();
}

function drawSwallow(x,y,sz,wing,alpha,angle) {
  if (alpha<.01) return;
  ctx.save();
  ctx.globalAlpha=alpha; ctx.translate(x,y);
  if (angle) ctx.rotate(angle);
  drawSwallowShape(sz,wing);
  ctx.restore();
}

// ══════════════════════════════════════════
//  信纸绘制
// ══════════════════════════════════════════
function drawPaper(a) {
  ctx.save(); ctx.globalAlpha=a;
  ctx.shadowColor='rgba(0,0,0,0.09)'; ctx.shadowBlur=16;
  ctx.shadowOffsetX=3; ctx.shadowOffsetY=5;
  ctx.fillStyle='#f9f6f0'; ctx.fillRect(PX,PY,PW,PH);
  ctx.shadowColor='transparent';
  const nL=Math.floor((PH-MT-14)/LINE_H);
  for(let i=0;i<=nL;i++){
    const ly=PY+MT+i*LINE_H;
    if(ly>PY+PH-10) break;
    ctx.beginPath(); ctx.moveTo(PX+6,ly); ctx.lineTo(PX+PW-6,ly);
    ctx.strokeStyle='rgba(100,140,210,0.24)'; ctx.lineWidth=.72; ctx.stroke();
  }
  const rx=PX+ML-10;
  ctx.beginPath(); ctx.moveTo(rx,PY+10); ctx.lineTo(rx,PY+PH-10);
  ctx.strokeStyle='rgba(198,52,52,0.50)'; ctx.lineWidth=1.1; ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.04)'; ctx.lineWidth=1;
  ctx.strokeRect(PX,PY,PW,PH);
  ctx.restore();
}

// ══════════════════════════════════════════
//  蜡封
// ══════════════════════════════════════════
function drawSeal(a) {
  if(a<=0) return;
  const sx=PX+PW-46, sy=PY+PH-44;
  ctx.save(); ctx.globalAlpha=a;
  const g=ctx.createRadialGradient(sx-3,sy-4,2,sx,sy,16);
  g.addColorStop(0,'#ec5858'); g.addColorStop(.55,'#c02d38'); g.addColorStop(1,'#881420');
  ctx.beginPath(); ctx.arc(sx,sy,16,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(255,185,185,0.32)'; ctx.lineWidth=.8;
  for(let i=0;i<6;i++){
    const a2=(i/6)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(sx,sy);
    ctx.lineTo(sx+Math.cos(a2)*12,sy+Math.sin(a2)*12); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,165,165,0.28)'; ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════
//  字符→燕子粒子（每幕独立一组）
// ══════════════════════════════════════════
function makeBirds(charMap) {
  return charMap.map((cm,i)=>{
    const angle=-Math.PI*.3+(Math.random()-.5)*Math.PI*.8;
    const spd=.22+Math.random()*.3;
    return {
      ox:cm.x, oy:cm.y, x:cm.x, y:cm.y,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-.08,
      ax:(Math.random()-.5)*.004, ay:-.005+Math.random()*.003,
      sz:2.6+Math.random()*1.5,
      wing:Math.random()*Math.PI*2, wingSpd:.07+Math.random()*.05,
      alpha:0, born:false, charIdx:i,
      flyAngle:angle-Math.PI/2,
    };
  });
}

const actBirds = ACTS.map((_,ai) => makeBirds(actCharMaps[ai]));

// 背景漂浮燕（少量，始终存在）
const bgBirds = Array.from({length:7},()=>{
  const a=Math.random()*Math.PI*2, spd=.16+Math.random()*.2;
  return { x:Math.random()*W, y:Math.random()*H, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
           sz:2+Math.random()*1.4, wing:Math.random()*Math.PI*2,
           wingSpd:.05+Math.random()*.035, alpha:.07+Math.random()*.08 };
});

// ══════════════════════════════════════════
//  绘制字符（可按 charVisible 隐藏）
// ══════════════════════════════════════════
function drawChars(charMap, visibleSet, globalAlpha) {
  if (globalAlpha<=0) return;
  ctx.save(); ctx.globalAlpha=globalAlpha;
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  for (let i=0; i<charMap.length; i++) {
    if (!visibleSet[i]) continue;
    const cm=charMap[i];
    ctx.font=cm.font;
    ctx.fillStyle=cm.color||'rgba(28,18,12,0.87)';
    const cw=ctx.measureText(cm.char).width;
    ctx.fillText(cm.char, cm.x-cw*.5, cm.y);
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  动画状态机
// ══════════════════════════════════════════
// 每幕节奏：
//   [IN]  纸张/背景淡入     40帧
//   [TYPE] 逐字打字         chars * 2.6帧
//   [HOLD] 停留             holdFrames
//   [FLY]  字变燕子离开     chars * 3帧
//   [OUT]  幕间过渡         40帧

const DUR_IN   = 40;
const DUR_CHAR = 2.6;   // 帧/字
const DUR_FLY  = 3.0;   // 帧/字（变燕子间隔）
const DUR_OUT  = 40;

// 计算每幕起始帧
let actStarts = [];
let cur = 0;
ACTS.forEach((act, ai) => {
  actStarts.push(cur);
  const nc = actCharMaps[ai].length;
  cur += DUR_IN + nc*DUR_CHAR + act.holdFrames + nc*DUR_FLY + DUR_OUT;
});
const TOTAL_FRAMES = cur + 80;

// 大结局：所有燕子飞散后，标题淡入
const TITLE_START = TOTAL_FRAMES - 70;

let frame = 0;
const easeOut  = t => 1-Math.pow(1-t,2);
const easeOut3 = t => 1-Math.pow(1-t,3);

// 状态：每幕的 charVisible、birds 激活帧
const actVisible = ACTS.map((_,ai) => new Array(actCharMaps[ai].length).fill(false));
const actBirdAt  = ACTS.map((_,ai) => {
  const birds = actBirds[ai];
  return birds.map((b,i) => 0); // 激活帧动态设置
});

// 预计算每幕各阶段帧号
const actPhases = ACTS.map((act,ai)=>{
  const s  = actStarts[ai];
  const nc = actCharMaps[ai].length;
  return {
    inEnd:   s + DUR_IN,
    typeEnd: s + DUR_IN + nc*DUR_CHAR,
    holdEnd: s + DUR_IN + nc*DUR_CHAR + act.holdFrames,
    flyEnd:  s + DUR_IN + nc*DUR_CHAR + act.holdFrames + nc*DUR_FLY,
    outEnd:  s + DUR_IN + nc*DUR_CHAR + act.holdFrames + nc*DUR_FLY + DUR_OUT,
  };
});

function drawTitle(a) {
  if(a<=0) return;
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
  ctx.font='30px "Songti SC","SimSun",serif';
  ctx.fillStyle='#241a10';
  ctx.fillText('燕  返', W/2, H/2-30);
  ctx.font='13px "Songti SC","SimSun",serif';
  ctx.fillStyle='rgba(70,50,30,0.58)';
  ctx.fillText('似曾相识燕归来', W/2, H/2-8);
  ctx.font=FONT_QUOTE;
  ctx.fillStyle='rgba(80,55,35,0.45)';
  ctx.fillText('— 张爱玲  一九四七', W/2, H/2+14);
  ctx.restore();
}

function tick() {
  requestAnimationFrame(tick);
  frame++;

  // 背景
  ctx.fillStyle='#edeae2'; ctx.fillRect(0,0,W,H);

  // 背景常驻漂浮燕
  const bgVis = Math.min(1, frame/120);
  for(const b of bgBirds){
    b.x+=b.vx+Math.sin(frame*.011+b.wing)*.22;
    b.y+=b.vy+Math.cos(frame*.008+b.wing)*.16;
    b.wing+=b.wingSpd;
    if(b.x<-30) b.x=W+15; if(b.x>W+30) b.x=-15;
    if(b.y<-30) b.y=H+15; if(b.y>H+30) b.y=-15;
    drawSwallow(b.x,b.y,b.sz,b.wing,b.alpha*bgVis,0);
  }

  // ── 逐幕渲染 ──
  ACTS.forEach((act, ai) => {
    const p  = actPhases[ai];
    const s  = actStarts[ai];

    if (frame < s || frame > p.outEnd + 10) return;

    // 淡入系数（幕间过渡）
    const inT   = Math.min(1, Math.max(0, (frame - s) / DUR_IN));
    const outT  = frame >= p.holdEnd
      ? Math.min(1, (frame - p.holdEnd) / (p.outEnd - p.holdEnd))
      : 0;
    const actA  = easeOut(inT) * (1 - easeOut(outT));

    // 信纸（仅 paper 类型）
    if (act.type==='paper') {
      drawPaper(actA);
    }

    // 打字机：显示字符
    if (frame >= p.inEnd && frame < p.flyEnd) {
      const shown = Math.min(actCharMaps[ai].length,
        Math.floor((frame - p.inEnd) / DUR_CHAR));
      for(let i=0;i<shown;i++){
        if(!actBirds[ai][i].born) actVisible[ai][i]=true;
      }
    }

    // 字符绘制
    const textA = frame >= p.holdEnd
      ? Math.max(0, 1 - (frame - p.holdEnd) / ((p.flyEnd - p.holdEnd) * .6))
      : actA;
    drawChars(actCharMaps[ai], actVisible[ai], textA);

    // 蜡封（第三幕专属）
    if(act.hasSeal && frame >= p.typeEnd){
      const sealT = Math.min(1,(frame-p.typeEnd)/35);
      const sealA = actA * easeOut3(sealT) * (frame>=p.holdEnd ? Math.max(0,1-(frame-p.holdEnd)/40) : 1);
      drawSeal(sealA);
    }

    // 字→燕（hold 结束后开始）
    if (frame >= p.holdEnd) {
      const birds = actBirds[ai];
      birds.forEach((b,i) => {
        const activateAt = p.holdEnd + i * DUR_FLY;
        if (frame < activateAt) return;
        if (!b.born) { b.born=true; actVisible[ai][i]=false; }
        const age = frame - activateAt;
        b.alpha = Math.min(0.80, age/16);
        const accelT=Math.min(1,age/85);
        b.vx+=b.ax+accelT*(Math.random()-.5)*.003;
        b.vy+=b.ay-accelT*.002;
        b.vx=Math.sign(b.vx)*Math.min(Math.abs(b.vx),1.9);
        b.vy=Math.max(b.vy,-1.7);
        b.x+=b.vx; b.y+=b.vy; b.wing+=b.wingSpd;
        const ta=Math.atan2(b.vy,b.vx)-Math.PI/2;
        b.flyAngle+=(ta-b.flyAngle)*.08;
        // 边界重置
        if(b.x<-55||b.x>W+55||b.y<-65||b.y>H+65){
          b.x=Math.random()*W; b.y=Math.random()*H;
          b.vx=(Math.random()-.5)*.45; b.vy=-.12-Math.random()*.28;
          b.alpha=.10+Math.random()*.14;
        }
        drawSwallow(b.x,b.y,b.sz,b.wing,b.alpha,b.flyAngle);
      });
    }
  });

  // 最终标题
  if(frame >= TITLE_START){
    drawTitle(easeOut(Math.min(1,(frame-TITLE_START)/65)));
  }
}

tick();
</script>

<script>
// Generated Audio System - 古琴泛音
// 古琴泛音音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  const notes=[196,220,246.94,293.66,329.63];
  function pluck(){
    if(!isActive)return;
    const f=notes[Math.floor(Math.random()*notes.length)];
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+1.8);
    // 高频泛音
    const h=ctx.createOscillator(),hg=ctx.createGain();
    h.frequency.value=f*3;h.type='sine';
    hg.gain.setValueAtTime(0.04,ctx.currentTime);
    hg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
    h.connect(hg);hg.connect(master);h.start();h.stop(ctx.currentTime+1);
    setTimeout(pluck,2000+Math.random()*3000);
  }
  pluck();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
