<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨梅 · 水墨生长树</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2520;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; touch-action: none;
  }
  canvas {
    display: block;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = window.innerWidth, H = window.innerHeight; canvas.width = W; canvas.height = H;

  // ─── 宣纸噪点背景 ───────────────────────────────────────────
  function drawPaperTexture() {
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);

    // 细腻噪点
    const imgData = ctx.getImageData(0, 0, W, H);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 18;
      d[i]   = Math.max(0, Math.min(255, d[i]   + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n * 0.9));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n * 0.7));
    }
    ctx.putImageData(imgData, 0, 0);

    // 边缘淡晕
    const vignette = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
    vignette.addColorStop(0, 'rgba(210,190,160,0)');
    vignette.addColorStop(1, 'rgba(180,160,130,0.18)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  // ─── 树结构生成 ──────────────────────────────────────────────
  const branches = [];

  function generateBranch(x1, y1, angle, length, depth, maxDepth, parentIdx) {
    if (depth > maxDepth || length < 2) return;

    const x2 = x1 + Math.cos(angle) * length;
    const y2 = y1 + Math.sin(angle) * length;
    const width = Math.max(0.4, (maxDepth - depth + 1) * 0.85 - 0.2);
    const alpha = 0.75 - depth * 0.06;
    const isLeaf = depth >= maxDepth - 1;

    const idx = branches.length;
    branches.push({ x1, y1, x2, y2, depth, width, alpha, isLeaf, drawn: false, progress: 0 });

    // 分叉数量：浅层2-3叉，深层2叉
    const fork = (depth < 3) ? 3 : (depth < 6) ? 2 : 2;
    const spreadBase = 0.35 + depth * 0.025;

    for (let i = 0; i < fork; i++) {
      const spread = (i - (fork-1)/2) * spreadBase;
      const jitter = (Math.random() - 0.5) * 0.18;
      const newAngle = angle + spread + jitter;
      const shrink = 0.62 + Math.random() * 0.12;
      const newLen = length * shrink;
      generateBranch(x2, y2, newAngle, newLen, depth + 1, maxDepth, idx);
    }
  }

  // 生成树：主干 + 副干
  generateBranch(260, 660, -Math.PI/2, 90, 0, 8, -1);

  // ─── 水墨描边枝条 ────────────────────────────────────────────
  function drawBranchInk(b) {
    const { x1, y1, x2, y2, depth, width, alpha, progress } = b;

    // 当前绘制终点（动画进度）
    const cx2 = x1 + (x2 - x1) * progress;
    const cy2 = y1 + (y2 - y1) * progress;

    // 4层晕染叠加
    for (let layer = 0; layer < 4; layer++) {
      const lw = width + layer * 0.8;
      const la = alpha * (0.22 - layer * 0.04);
      const ox = (Math.random() - 0.5) * 0.6;
      const oy = (Math.random() - 0.5) * 0.6;

      ctx.beginPath();
      ctx.moveTo(x1 + ox, y1 + oy);

      // 轻微弯曲感
      const mx = (x1 + cx2) / 2 + (Math.random() - 0.5) * width * 1.2;
      const my = (y1 + cy2) / 2 + (Math.random() - 0.5) * width * 1.2;
      ctx.quadraticCurveTo(mx + ox, my + oy, cx2 + ox, cy2 + oy);

      ctx.strokeStyle = `rgba(18,14,10,${la})`;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }

    // 主线
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    const mx2 = (x1 + cx2) / 2 + (Math.random() - 0.5) * width * 0.5;
    const my2 = (y1 + cy2) / 2 + (Math.random() - 0.5) * width * 0.5;
    ctx.quadraticCurveTo(mx2, my2, cx2, cy2);
    ctx.strokeStyle = `rgba(18,14,10,${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();

    // 末端墨点（progress=1时）
    if (progress >= 0.98 && b.isLeaf) {
      const dotR = width * 1.4 + Math.random() * 0.8;
      ctx.save();
      ctx.filter = 'blur(1px)';
      ctx.beginPath();
      ctx.arc(cx2, cy2, dotR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(12,9,6,${alpha * 0.7})`;
      ctx.fill();
      ctx.filter = 'none';
      ctx.restore();
    }
  }

  // ─── 梅花 ────────────────────────────────────────────────────
  function drawPlumFlower(x, y, size, alpha) {
    const petals = 5;
    for (let i = 0; i < petals; i++) {
      const a = (i / petals) * Math.PI * 2 - Math.PI / 2;
      const px = x + Math.cos(a) * size * 0.55;
      const py = y + Math.sin(a) * size * 0.55;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(a + Math.PI / 2);

      // 花瓣
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.38, size * 0.28, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,200,210,${alpha * 0.82})`;
      ctx.fill();
      // 花瓣描边晕
      ctx.strokeStyle = `rgba(210,160,170,${alpha * 0.4})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    }

    // 花蕊
    ctx.beginPath();
    ctx.arc(x, y, size * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,230,160,${alpha * 0.95})`;
    ctx.fill();

    // 花丝
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const ex = x + Math.cos(a) * size * 0.28;
      const ey = y + Math.sin(a) * size * 0.28;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(200,140,120,${alpha * 0.6})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      // 花粉点
      ctx.beginPath();
      ctx.arc(ex, ey, 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,200,100,${alpha * 0.9})`;
      ctx.fill();
    }
  }

  // ─── 飘落花瓣 ────────────────────────────────────────────────
  const petals = [];
  function initPetals() {
    for (let i = 0; i < 18; i++) {
      petals.push(createPetal());
    }
  }

  function createPetal(fromTop) {
    return {
      x: Math.random() * W,
      y: fromTop ? -20 : Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5,
      vy: 0.3 + Math.random() * 0.5,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.03,
      size: 4 + Math.random() * 4,
      alpha: 0.4 + Math.random() * 0.4,
      sway: Math.random() * Math.PI * 2,
      swaySpeed: 0.01 + Math.random() * 0.02
    };
  }

  function updatePetals() {
    for (let i = 0; i < petals.length; i++) {
      const p = petals[i];
      p.sway += p.swaySpeed;
      p.x += p.vx + Math.sin(p.sway) * 0.4;
      p.y += p.vy;
      p.rot += p.vrot;
      if (p.y > H + 20) {
        petals[i] = createPetal(true);
      }
    }
  }

  function drawPetals() {
    for (const p of petals) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.65, p.size * 0.38, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(235,185,195,${p.alpha})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(210,155,165,${p.alpha * 0.5})`;
      ctx.lineWidth = 0.4;
      ctx.stroke();
      ctx.restore();
    }
  }

  // ─── 题字 ────────────────────────────────────────────────────
  function drawCalligraphy() {
    ctx.save();
    const tx = 448, ty = 600;

    // 晕染底层
    for (let i = 0; i < 3; i++) {
      const ox = (Math.random() - 0.5) * 2.5;
      const oy = (Math.random() - 0.5) * 2.5;
      ctx.font = `bold 36px "SimSun", "宋体", serif`;
      ctx.fillStyle = `rgba(18,14,10,0.08)`;
      ctx.fillText('墨梅', tx + ox, ty + oy);
    }

    // 主字
    ctx.font = `bold 34px "SimSun", "宋体", serif`;
    ctx.fillStyle = 'rgba(22,16,10,0.82)';
    ctx.fillText('墨梅', tx, ty);

    // 描边晕
    ctx.strokeStyle = 'rgba(18,14,10,0.15)';
    ctx.lineWidth = 2.5;
    ctx.strokeText('墨梅', tx, ty);

    // 落款小字
    ctx.font = `12px "SimSun", "宋体", serif`;
    ctx.fillStyle = 'rgba(22,16,10,0.55)';
    ctx.fillText('癸卯冬', tx + 4, ty + 18);

    ctx.restore();
  }

  // ─── 印章 ────────────────────────────────────────────────────
  function drawSeal() {
    ctx.save();
    const sx = 446, sy = 625, sw = 28, sh = 28;
    ctx.strokeStyle = 'rgba(180,50,40,0.7)';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.font = `bold 11px "SimSun", serif`;
    ctx.fillStyle = 'rgba(180,50,40,0.75)';
    ctx.fillText('清', sx + 7, sy + 13);
    ctx.fillText('风', sx + 7, sy + 24);
    ctx.restore();
  }

  // ─── 动画系统 ────────────────────────────────────────────────
  // 按深度分层，逐层动画
  const maxDepth = 8;
  let currentLayer = 0;
  let layerProgress = 0;
  const LAYER_SPEED = 0.025; // 每帧进度增量
  let animDone = false;
  let flowerAlphas = {}; // branchIdx -> alpha (for fade-in)

  // 按深度分组
  const byDepth = [];
  for (let d = 0; d <= maxDepth; d++) {
    byDepth[d] = branches.filter(b => b.depth === d);
  }

  // 纸张纹理缓存
  const paperCanvas = document.createElement('canvas');
  paperCanvas.width = W;
  paperCanvas.height = H;
  const paperCtx = paperCanvas.getContext('2d');

  function buildPaper() {
    paperCtx.fillStyle = '#f5f0e8';
    paperCtx.fillRect(0, 0, W, H);
    const imgData = paperCtx.getImageData(0, 0, W, H);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 16;
      d[i]   = Math.max(0, Math.min(255, d[i]   + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n * 0.85));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n * 0.65));
    }
    paperCtx.putImageData(imgData, 0, 0);
    const vignette = paperCtx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.78);
    vignette.addColorStop(0, 'rgba(215,195,165,0)');
    vignette.addColorStop(1, 'rgba(178,155,120,0.2)');
    paperCtx.fillStyle = vignette;
    paperCtx.fillRect(0, 0, W, H);
  }

  buildPaper();
  initPetals();

  // 缓入函数
  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function frame() {
    // 清除并绘制纸张
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(paperCanvas, 0, 0);

    // 更新动画状态
    if (!animDone) {
      layerProgress += LAYER_SPEED;
      if (layerProgress >= 1) {
        layerProgress = 1;
        // 将当前层所有枝条标为完成
        if (byDepth[currentLayer]) {
          byDepth[currentLayer].forEach(b => { b.progress = 1; b.drawn = true; });
        }
        currentLayer++;
        layerProgress = 0;
        if (currentLayer > maxDepth) {
          animDone = true;
        }
      }
      // 更新当前层进度（缓入）
      if (currentLayer <= maxDepth && byDepth[currentLayer]) {
        const ep = easeInOut(layerProgress);
        byDepth[currentLayer].forEach(b => { b.progress = ep; });
      }
    }

    // 绘制已完成层
    for (let d = 0; d < currentLayer; d++) {
      if (byDepth[d]) {
        byDepth[d].forEach(b => {
          if (b.progress > 0) drawBranchInk(b);
        });
      }
    }
    // 绘制当前动画层
    if (currentLayer <= maxDepth && byDepth[currentLayer]) {
      byDepth[currentLayer].forEach(b => {
        if (b.progress > 0) drawBranchInk(b);
      });
    }

    // 花朵（动画完成后渐入）
    if (animDone || currentLayer >= maxDepth - 1) {
      const leafBranches = branches.filter(b => b.isLeaf && b.progress >= 0.98);
      leafBranches.forEach((b, i) => {
        if (!flowerAlphas[i]) flowerAlphas[i] = 0;
        flowerAlphas[i] = Math.min(1, flowerAlphas[i] + 0.008);
        const fa = flowerAlphas[i];
        if (fa > 0.01) {
          const fsize = 5 + (8 - b.depth) * 0.6;
          drawPlumFlower(b.x2, b.y2, fsize, fa);
        }
      });
    }

    // 飘落花瓣（动画完成后才出现）
    if (animDone || currentLayer >= maxDepth) {
      updatePetals();
      drawPetals();
    }

    // 题字（动画完成后绘制）
    if (animDone || currentLayer >= maxDepth) {
      drawCalligraphy();
      drawSeal();
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    buildPaper();
    // 重新生成树（可选，或保持原树结构）
  });

// 触摸支持（防止页面滑动）
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });
  frame();

})();
</script>

<script>
// Generated Audio System - 水墨滴墨声
// 水墨滴墨声音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  function drop(){
    if(!isActive)return;
    const bufSz=ctx.sampleRate*0.05,buf=ctx.createBuffer(1,bufSz,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/bufSz*8);
    const src=ctx.createBufferSource();src.buffer=buf;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=800;
    const g=ctx.createGain();g.gain.value=0.18;
    src.connect(lp);lp.connect(g);g.connect(master);src.start();
    setTimeout(drop,1200+Math.random()*2800);
  }
  drop();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
