<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漩涡 · 重制</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f4f6f8; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; touch-action:none; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

let CX = W / 2, CY = H * 0.42;
const MAX_R = Math.min(W,H) * 0.35;

function handleResize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  CX = W / 2; CY = H * 0.42;
}
window.addEventListener('resize',handleResize);

// ══════════════════════════════════════
//  粒子（浅色背景版：深蓝色粒子，有旋臂结构）
// ══════════════════════════════════════
const PARTICLE_COUNT = 360;
const ARM_COUNT = 3;  // 螺旋臂数量

function makeParticle() {
  // 偏向某条旋臂角度
  const armBase = (Math.floor(Math.random() * ARM_COUNT) / ARM_COUNT) * Math.PI * 2;
  const armSpread = 0.3 + Math.random() * 0.5;
  const angle  = armBase + armSpread;
  const radius = 18 + Math.random() * (MAX_R - 18);
  return {
    angle,
    radius,
    speed:   0.010 + Math.random() * 0.016,
    shrink:  0.08  + Math.random() * 0.16,
    size:    0.6   + Math.random() * 1.8,
    alpha:   0.25  + Math.random() * 0.65,
    hue:     200   + Math.random() * 25,
  };
}

const particles = Array.from({length: PARTICLE_COUNT}, makeParticle);

// ══════════════════════════════════════
//  汉字序列
// ══════════════════════════════════════
const CHARS = ['归', '散', '念', '逝', '忘', '还', '寻', '望'];
let charIdx   = 0;
let charAlpha = 0;
let charScale = 1.0;
let charPhase = 'in';   // 'in' | 'hold' | 'out'
let charFrame = 0;
const DUR_IN   = 55;
const DUR_HOLD = 50;
const DUR_OUT  = 45;

// ══════════════════════════════════════
//  主循环
// ══════════════════════════════════════
let frame = 0;

function tick() {
  requestAnimationFrame(tick);
  frame++;

  // 浅色背景（带极淡拖尾）
  ctx.fillStyle = 'rgba(244,246,248,0.22)';
  ctx.fillRect(0, 0, W, H);

  // 完全重绘背景（避免拖尾覆盖文字）
  // 先画一层完整背景
  if (frame === 1) {
    ctx.fillStyle = '#f4f6f8';
    ctx.fillRect(0, 0, W, H);
  }

  // 粒子
  for (const p of particles) {
    p.angle  += p.speed;
    p.radius -= p.shrink;
    if (p.radius < 6) {
      // 重置到旋臂外圈
      const armBase = (Math.floor(Math.random() * ARM_COUNT) / ARM_COUNT) * Math.PI * 2;
      p.angle  = armBase + 0.2 + Math.random() * 0.6;
      p.radius = MAX_R * (0.45 + Math.random() * 0.55);
      p.speed  = 0.010 + Math.random() * 0.016;
      p.shrink = 0.08  + Math.random() * 0.16;
    }

    const t    = 1 - p.radius / MAX_R;   // 0=外圈 1=中心
    const px   = CX + Math.cos(p.angle) * p.radius;
    const py   = CY + Math.sin(p.angle) * p.radius;
    const sz   = p.size * (1 + t * 1.8);

    // 颜色：外圈蓝灰，内圈深蓝；中心附近有微暖色
    const light = Math.floor(50 + (1-t)*90);
    const blue  = Math.floor(140 + (1-t)*70);
    // 极内圈加橙色光晕
    const warmR = t > 0.85 ? Math.floor((t-0.85)/0.15 * 80) : 0;
    const alpha = p.alpha * (0.25 + t * 0.75);

    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${light + warmR},${light+15},${blue},${alpha})`;
    ctx.fill();
  }

  // 中心暖色光晕（橙红，对应截图中的R色点）
  const warmGlow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 40);
  warmGlow.addColorStop(0,   'rgba(220,120,60,0.18)');
  warmGlow.addColorStop(0.5, 'rgba(200,90,40,0.06)');
  warmGlow.addColorStop(1,   'rgba(200,90,40,0)');
  ctx.fillStyle = warmGlow;
  ctx.beginPath(); ctx.arc(CX, CY, 40, 0, Math.PI*2); ctx.fill();

  // 外层冷色光晕
  const glow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 100);
  glow.addColorStop(0,   'rgba(80,130,210,0.06)');
  glow.addColorStop(1,   'rgba(80,130,210,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(CX, CY, 100, 0, Math.PI*2); ctx.fill();

  // 汉字状态机
  charFrame++;
  if (charPhase === 'in') {
    charAlpha = Math.min(0.82, charFrame / DUR_IN * 0.82);
    charScale = 1.0;
    if (charFrame >= DUR_IN) { charPhase = 'hold'; charFrame = 0; }
  } else if (charPhase === 'hold') {
    charAlpha = 0.82;
    if (charFrame >= DUR_HOLD) { charPhase = 'out'; charFrame = 0; }
  } else {
    charAlpha = Math.max(0, 0.82 - charFrame / DUR_OUT * 0.82);
    charScale = 1.0 + charFrame / DUR_OUT * 0.12;
    if (charFrame >= DUR_OUT) {
      charPhase = 'in'; charFrame = 0;
      charIdx = (charIdx + 1) % CHARS.length;
      charScale = 1.0;
    }
  }

  // 绘制汉字
  ctx.save();
  ctx.globalAlpha = charAlpha;
  ctx.translate(CX, CY);
  ctx.scale(charScale, charScale);
  ctx.font = `${Math.floor(58 / charScale)}px "Songti SC","STSong","SimSun",serif`;
  ctx.fillStyle = 'rgba(35,65,120,1)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(CHARS[charIdx], 0, 0);
  ctx.restore();

  // 署名
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.font = '11px "Songti SC",serif';
  ctx.fillStyle = 'rgba(60,100,160,1)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('漩  涡', W - 22, H - 20);
  ctx.restore();
}

tick();
</script>

<script>
// Generated Audio System - 深空嗡鸣
// 深空嗡鸣音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  const freqs=[55,82.41,110];
  freqs.forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=f;o.type='sine';g.gain.value=0.12/(i+1);
    o.connect(g);g.connect(master);o.start();
    // 微弱泛音
    const h=ctx.createOscillator(),hg=ctx.createGain();
    h.frequency.value=f*2;h.type='sine';hg.gain.value=0.03/(i+1);
    h.connect(hg);hg.connect(master);h.start();
  });
  isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
