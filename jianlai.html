<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本命字 · 剑来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;overflow:hidden;touch-action:none}
canvas{display:block}
#playBtn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1s}
#playBtn .inner{text-align:center;color:#d4c8a0}
#playBtn .title{font:36px "Songti SC","SimSun","KaiTi",serif;letter-spacing:12px;margin-bottom:14px;
  text-shadow:0 0 30px rgba(255,200,80,.3)}
#playBtn .sub{font:14px "Songti SC","SimSun",serif;opacity:.45;margin-bottom:28px}
#playBtn .circle{width:70px;height:70px;border-radius:50%;
  border:1.5px solid rgba(212,200,160,.35);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#playBtn .circle:hover{background:rgba(212,200,160,.08);border-color:rgba(212,200,160,.6)}
#playBtn .tri{width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;
  border-left:20px solid rgba(212,200,160,.65);margin-left:4px}
</style>
</head>
<body>
<div id="playBtn"><div class="inner">
  <div class="title">本 命 字</div>
  <div class="sub">千万经典 · 凝形厮杀 · 归于文字</div>
  <div class="circle"><div class="tri"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;
canvas.width=W;canvas.height=H;

// ═══════════════════════════════════════
//  儒家经典文字库
// ═══════════════════════════════════════
const CLASSICS='学而时习之不亦说乎有朋自远方来不亦乐乎人不知而不愠不亦君子乎'+
'吾日三省吾身为人谋而不忠乎与朋友交而不信乎传不习乎'+
'温故而知新可以为师矣学而不思则罔思而不学则殆'+
'知之为知之不知为不知是知也三人行必有我师焉'+
'己所不欲勿施于人君子坦荡荡小人长戚戚'+
'士不可以不弘毅任重而道远仁以为己任不亦重乎死而后已不亦远乎'+
'大学之道在明明德在亲民在止于至善知止而后有定定而后能静'+
'格物致知诚意正心修身齐家治国平天下'+
'天命之谓性率性之谓道修道之谓教道也者不可须臾离也'+
'博学之审问之慎思之明辨之笃行之'+
'天将降大任于是人也必先苦其心志劳其筋骨饿其体肤空乏其身'+
'穷则独善其身达则兼善天下民为贵社稷次之君为轻'+
'富贵不能淫贫贱不能移威武不能屈此之谓大丈夫'+
'天行健君子以自强不息地势坤君子以厚德载物'+
'积善之家必有余庆积不善之家必有余殃'+
'人心惟危道心惟微惟精惟一允执厥中'+
'玉不琢不成器人不学不知道是故古之王者建国君民教学为先';
function randChar(){return CLASSICS[Math.floor(Math.random()*CLASSICS.length)];}

// ═══════════════════════════════════════
//  预渲染文字纹理（性能关键）
// ═══════════════════════════════════════
const CHAR_SIZES=[8,10,12,14];
const charCanvasMap=new Map();
function getCharCanvas(ch,size,hue,lit){
  const key=ch+size+hue+lit;
  if(charCanvasMap.has(key))return charCanvasMap.get(key);
  const c=document.createElement('canvas');
  const s=size*2; c.width=s; c.height=s;
  const x=c.getContext('2d');
  x.font=`${size}px "Songti SC","SimSun","KaiTi",serif`;
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle=`hsl(${hue},85%,${lit}%)`;
  x.fillText(ch,s/2,s/2);
  charCanvasMap.set(key,c);
  return c;
}
// 预热常用字符
for(let i=0;i<CLASSICS.length;i++){
  const ch=CLASSICS[i];
  CHAR_SIZES.forEach(sz=>{
    getCharCanvas(ch,sz,42,60);
    getCharCanvas(ch,sz,42,75);
    getCharCanvas(ch,sz,25,55);
  });
}

// ═══════════════════════════════════════
//  龙形路径（精细版 — 中国龙）
//  鹿角龙头 → 蛇身蜿蜒三波 → 尾尖卷曲
//  宽度：头粗 → 中间匀称 → 尾细
// ═══════════════════════════════════════
function dragonPath(cx,cy,scale,frame){
  const pts=[];
  const N=200;
  // 龙身主轴：三段 S 弯
  for(let i=0;i<=N;i++){
    const t=i/N; // 0=尾 1=头
    // 主轴 X：从左到右
    const px=cx+(t-0.5)*scale*2.6;
    // 蜿蜒：三波 + 动态
    const wave1=Math.sin(t*Math.PI*3.2+frame*0.025)*scale*0.28;
    const wave2=Math.sin(t*Math.PI*1.8+frame*0.015+1)*scale*0.12;
    const wave3=Math.sin(t*Math.PI*5+frame*0.04)*scale*0.04;
    let py=cy+wave1+wave2+wave3;
    // 龙头上翘（t>0.88）
    const headT=Math.max(0,(t-0.88)/0.12);
    py-=headT*headT*scale*0.55;
    // 龙头前伸微下弯（最末端）
    const noseT=Math.max(0,(t-0.96)/0.04);
    py+=noseT*scale*0.12;
    // 尾部上卷（t<0.08）
    const tailT=Math.max(0,(0.08-t)/0.08);
    py-=tailT*tailT*scale*0.35;
    // 宽度轮廓：纺锤形
    let w;
    if(t<0.06) w=t/0.06*0.3; // 尾尖
    else if(t<0.15) w=0.3+(t-0.06)/0.09*0.5; // 尾根渐粗
    else if(t<0.82) w=0.8+Math.sin((t-0.15)/0.67*Math.PI)*0.2; // 身干
    else if(t<0.92) w=0.85-(t-0.82)/0.1*0.3; // 颈部收细
    else w=0.55+Math.sin((t-0.92)/0.08*Math.PI)*0.45; // 头部膨大
    w*=scale*0.13;
    // 鳞片锯齿（背脊）
    const spine=(i%4<2)?scale*0.015:0;
    pts.push({x:px,y:py-spine,w});
  }
  // 龙须（两条，从头部延伸）
  const head=pts[pts.length-1];
  const neck=pts[pts.length-15];
  const dir=Math.atan2(head.y-neck.y,head.x-neck.x);
  // 左须
  for(let j=0;j<25;j++){
    const t=j/24;
    const curl=Math.sin(t*Math.PI*2+frame*0.06)*scale*0.06;
    pts.push({
      x:head.x+Math.cos(dir-0.4)*t*scale*0.35+curl*Math.sin(dir),
      y:head.y+Math.sin(dir-0.4)*t*scale*0.35-curl*Math.cos(dir),
      w:scale*0.015*(1-t*0.8), whisker:true
    });
  }
  // 右须
  for(let j=0;j<25;j++){
    const t=j/24;
    const curl=Math.sin(t*Math.PI*2+frame*0.06+1)*scale*0.06;
    pts.push({
      x:head.x+Math.cos(dir+0.4)*t*scale*0.35+curl*Math.sin(dir),
      y:head.y+Math.sin(dir+0.4)*t*scale*0.35-curl*Math.cos(dir),
      w:scale*0.015*(1-t*0.8), whisker:true
    });
  }
  // 鹿角（从头顶分叉）
  const hornBase={x:head.x-Math.sin(dir)*scale*0.08,y:head.y-Math.cos(dir)*scale*0.08};
  for(let side=-1;side<=1;side+=2){
    for(let j=0;j<15;j++){
      const t=j/14;
      const branchAngle=dir-Math.PI/2+side*0.6+t*side*0.3;
      pts.push({
        x:hornBase.x+Math.cos(branchAngle)*t*scale*0.2,
        y:hornBase.y+Math.sin(branchAngle)*t*scale*0.2-t*scale*0.08,
        w:scale*0.02*(1-t*0.7), horn:true
      });
      // 分叉
      if(j===8){
        for(let k=0;k<8;k++){
          const t2=k/7;
          pts.push({
            x:hornBase.x+Math.cos(branchAngle)*0.57*scale*0.2+Math.cos(branchAngle+side*0.8)*t2*scale*0.1,
            y:hornBase.y+Math.sin(branchAngle)*0.57*scale*0.2+Math.sin(branchAngle+side*0.8)*t2*scale*0.1-t2*scale*0.05,
            w:scale*0.012*(1-t2*0.8), horn:true
          });
        }
      }
    }
  }
  // 四爪（分布在身体两侧）
  const clawPositions=[0.25,0.45,0.6,0.75];
  clawPositions.forEach(ct=>{
    const ci=Math.floor(ct*N);
    const bp=pts[ci];
    if(!bp)return;
    for(let side=-1;side<=1;side+=2){
      // 上臂
      for(let j=0;j<10;j++){
        const t=j/9;
        pts.push({
          x:bp.x+side*bp.w*1.2+side*t*scale*0.08,
          y:bp.y+bp.w*0.8+t*scale*0.1,
          w:scale*0.018*(1-t*0.5), claw:true
        });
      }
      // 爪指（3根）
      const pawBase={x:bp.x+side*bp.w*1.2+side*scale*0.08,y:bp.y+bp.w*0.8+scale*0.1};
      for(let f=0;f<3;f++){
        const fa=(f-1)*0.35+side*0.2;
        for(let k=0;k<5;k++){
          const t=k/4;
          pts.push({
            x:pawBase.x+Math.cos(Math.PI/2+fa)*t*scale*0.04,
            y:pawBase.y+Math.sin(Math.PI/2+fa)*t*scale*0.04,
            w:scale*0.008*(1-t*0.6), claw:true
          });
        }
      }
    }
  });
  return pts;
}

// ═══════════════════════════════════════
//  虎形路径（精细版 — 扑击姿态）
// ═══════════════════════════════════════
function tigerPath(cx,cy,scale,frame){
  const pts=[];
  // 虎身主轴：弓身扑击
  const N=120;
  for(let i=0;i<=N;i++){
    const t=i/N; // 0=尾 1=头
    const px=cx+(t-0.5)*scale*1.8;
    // 背部弧线 + 动态呼吸
    const spine=-Math.sin(t*Math.PI*0.9+0.1)*scale*0.28;
    const breath=Math.sin(frame*0.035+t*2)*scale*0.015;
    // 臀部隆起
    const hip=t<0.3?Math.sin((t/0.3)*Math.PI*0.5)*scale*0.06:0;
    // 肩部隆起
    const shoulder=(t>0.65&&t<0.85)?Math.sin(((t-0.65)/0.2)*Math.PI)*scale*0.05:0;
    // 头部
    const headT=Math.max(0,(t-0.88)/0.12);
    const headUp=-headT*headT*scale*0.2;
    // 口鼻前伸
    const snout=Math.max(0,(t-0.95)/0.05)*scale*0.08;
    let py=cy+spine+breath+hip+shoulder+headUp+snout;
    // 宽度
    let w;
    if(t<0.05) w=t/0.05*0.15; // 尾尖
    else if(t<0.12) w=0.15+(t-0.05)/0.07*0.5; // 尾根
    else if(t<0.35) w=0.65+Math.sin(((t-0.12)/0.23)*Math.PI*0.5)*0.35; // 臀
    else if(t<0.65) w=0.85; // 腰
    else if(t<0.85) w=0.85+Math.sin(((t-0.65)/0.2)*Math.PI*0.5)*0.2; // 肩胸
    else if(t<0.93) w=0.8-(t-0.85)/0.08*0.3; // 颈
    else w=0.5+Math.sin(((t-0.93)/0.07)*Math.PI)*0.35; // 头
    w*=scale*0.14;
    // 虎斑纹理（背脊锯齿）
    const stripe=(i%6<3)?scale*0.008:0;
    pts.push({x:px,y:py-stripe,w});
  }
  // 尾巴（上翘弯曲）
  const tailBase=pts[2];
  for(let j=0;j<30;j++){
    const t=j/29;
    const tailAngle=Math.PI+0.3-t*1.5+Math.sin(frame*0.04+t*2)*0.2;
    pts.push({
      x:tailBase.x+Math.cos(tailAngle)*t*scale*0.5,
      y:tailBase.y+Math.sin(tailAngle)*t*scale*0.5-t*t*scale*0.15,
      w:scale*0.04*(1-t*0.7), tail:true
    });
  }
  // 四肢
  const legPos=[
    {t:0.22,dir:1,len:0.3,label:'hindR'},
    {t:0.3,dir:1,len:0.28,label:'hindL'},
    {t:0.7,dir:1,len:0.32,label:'foreR'},
    {t:0.8,dir:1,len:0.3,label:'foreL'},
  ];
  legPos.forEach(leg=>{
    const ci=Math.floor(leg.t*N);
    const bp=pts[ci];if(!bp)return;
    const isForeLeg=leg.t>0.5;
    // 前腿前伸扑击，后腿蹬地
    const kickAngle=isForeLeg?Math.PI/2-0.5:Math.PI/2+0.3;
    for(let j=0;j<15;j++){
      const t=j/14;
      const angle=kickAngle+Math.sin(frame*0.03+leg.t*5)*0.1*t;
      pts.push({
        x:bp.x+Math.cos(angle)*t*scale*leg.len,
        y:bp.y+Math.sin(angle)*t*scale*leg.len+bp.w*0.6,
        w:scale*0.04*(1-t*0.5), leg:true
      });
    }
    // 爪
    const pawX=bp.x+Math.cos(kickAngle)*scale*leg.len;
    const pawY=bp.y+Math.sin(kickAngle)*scale*leg.len+bp.w*0.6;
    for(let f=0;f<3;f++){
      const fa=(f-1)*0.25;
      for(let k=0;k<4;k++){
        const t=k/3;
        pts.push({
          x:pawX+Math.cos(kickAngle+fa)*t*scale*0.04,
          y:pawY+Math.sin(kickAngle+fa)*t*scale*0.04,
          w:scale*0.01*(1-t*0.5), claw:true
        });
      }
    }
  });
  // 耳朵
  const headPt=pts[N];
  for(let side=-1;side<=1;side+=2){
    for(let j=0;j<8;j++){
      const t=j/7;
      pts.push({
        x:headPt.x+side*headPt.w*0.5-t*scale*0.01,
        y:headPt.y-headPt.w*0.6-t*scale*0.08,
        w:scale*0.025*(1-t*0.6), ear:true
      });
    }
  }
  return pts;
}

// ═══════════════════════════════════════
//  粒子系统（优化版：减少绘制开销）
// ═══════════════════════════════════════
const TOTAL=1500; // 降到1500，更流畅
const P=new Float32Array(TOTAL*10);
// 布局: [x,y,vx,vy,targetX,targetY,size,alpha,glowI,state]
// state: 0=rain 1=gather 2=form 3=clash 4=scatter 5=fall
const pChars=new Array(TOTAL);
const pSide=new Uint8Array(TOTAL); // 0=dragon 1=tiger
const pHue=new Uint8Array(TOTAL);
const pLit=new Uint8Array(TOTAL);
const pCharCache=new Array(TOTAL); // prerendered
const pRot=new Float32Array(TOTAL);
const pRotV=new Float32Array(TOTAL);
const pPhase=new Float32Array(TOTAL);
// clash velocities
const pCvx=new Float32Array(TOTAL);
const pCvy=new Float32Array(TOTAL);

function initParticles(){
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    P[o]=Math.random()*W;          // x
    P[o+1]=-Math.random()*H*2.5;   // y
    P[o+2]=(Math.random()-.5)*.6;   // vx
    P[o+3]=1.5+Math.random()*3;     // vy
    P[o+4]=0;P[o+5]=0;              // targetXY
    const sz=CHAR_SIZES[Math.floor(Math.random()*CHAR_SIZES.length)];
    P[o+6]=sz;                       // size
    P[o+7]=.15+Math.random()*.4;     // alpha
    P[o+8]=0;                        // glow
    P[o+9]=0;                        // state=rain
    pChars[i]=randChar();
    pSide[i]=i<TOTAL/2?0:1;
    pHue[i]=pSide[i]===0?42:25;
    pLit[i]=55+Math.floor(Math.random()*25);
    pCharCache[i]=getCharCanvas(pChars[i],sz,pHue[i],pLit[i]);
    pRot[i]=(Math.random()-.5)*.3;
    pRotV[i]=(Math.random()-.5)*.02;
    pPhase[i]=Math.random()*Math.PI*2;
  }
}
initParticles();

// ═══════════════════════════════════════
//  状态转换
// ═══════════════════════════════════════
function setAllState(state){
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    P[o+9]=state;
    if(state===0){ // rain
      P[o]=Math.random()*W;
      P[o+1]=-20-Math.random()*H;
      P[o+2]=(Math.random()-.5)*.5;
      P[o+3]=1.5+Math.random()*3.5;
      P[o+7]=.15+Math.random()*.4;
      P[o+8]=0;
    } else if(state===4){ // scatter
      const ang=Math.random()*Math.PI*2;
      const spd=2+Math.random()*7;
      P[o+2]=Math.cos(ang)*spd;
      P[o+3]=Math.sin(ang)*spd;
      P[o+8]=1;
    } else if(state===5){ // fall
      P[o+3]=.2+Math.random()*.8;
      P[o+2]=(Math.random()-.5)*.4;
      P[o+8]=0;
    }
  }
}

function assignTargets(frame){
  const scale=Math.min(W,H)*0.28;
  const dPts=dragonPath(W*0.28,H*0.4,scale,frame);
  const tPts=tigerPath(W*0.72,H*0.55,scale,frame);
  let di=0,ti=0;
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    let pt;
    if(pSide[i]===0){
      pt=dPts[di%dPts.length];
      di++;
    }else{
      pt=tPts[ti%tPts.length];
      ti++;
    }
    // 添加随机偏移使形态更有体积感
    const offsetR=(Math.random()-.5)*pt.w*2.5;
    const offsetA=Math.random()*Math.PI*2;
    P[o+4]=pt.x+Math.cos(offsetA)*offsetR;
    P[o+5]=pt.y+Math.sin(offsetA)*offsetR;
  }
}

function triggerClash(){
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    P[o+9]=3;
    if(pSide[i]===0){
      pCvx[i]=5+(Math.random()-.5)*3;
      pCvy[i]=-1+(Math.random()-.5)*3;
    }else{
      pCvx[i]=-5+(Math.random()-.5)*3;
      pCvy[i]=1+(Math.random()-.5)*3;
    }
    P[o+8]=1;
  }
}

// ═══════════════════════════════════════
//  粒子更新（优化：纯数组运算）
// ═══════════════════════════════════════
function updateParticles(){
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    const state=P[o+9];
    pRot[i]+=pRotV[i];
    pPhase[i]+=.02;

    if(state===0){ // rain
      P[o]+=P[o+2];
      P[o+1]+=P[o+3];
      if(P[o+7]<.6) P[o+7]+=.003;
      if(P[o+1]>H+20){P[o+1]=-20;P[o]=Math.random()*W;}
    }
    else if(state===1){ // gather
      const dx=P[o+4]-P[o];
      const dy=P[o+5]-P[o+1];
      const dist=Math.sqrt(dx*dx+dy*dy)+.1;
      const f=Math.min(.06,600/(dist*dist+80));
      P[o+2]+=dx*f; P[o+3]+=dy*f;
      P[o+2]*=.91; P[o+3]*=.91;
      P[o]+=P[o+2]; P[o+1]+=P[o+3];
      if(P[o+7]<.85) P[o+7]+=.008;
      if(P[o+8]<.5) P[o+8]+=.004;
    }
    else if(state===2){ // form
      const dx=P[o+4]-P[o];
      const dy=P[o+5]-P[o+1];
      P[o]+=dx*.08;
      P[o+1]+=dy*.08;
      P[o+7]=.8+Math.sin(pPhase[i])*.1;
      P[o+8]=.5+Math.sin(pPhase[i]*.5)*.2;
    }
    else if(state===3){ // clash
      P[o]+=pCvx[i]; P[o+1]+=pCvy[i];
      pCvx[i]*=.975; pCvy[i]*=.975;
      if(P[o+7]>.25)P[o+7]-=.002;
      P[o+8]*=.993;
    }
    else if(state===4){ // scatter
      P[o]+=P[o+2]; P[o+1]+=P[o+3];
      P[o+2]*=.965; P[o+3]*=.965;
      P[o+3]+=.025;
      if(P[o+7]>.08) P[o+7]-=.003;
      P[o+8]*=.98;
    }
    else if(state===5){ // fall
      P[o]+=P[o+2]+Math.sin(pPhase[i])*.25;
      P[o+1]+=P[o+3];
      if(P[o+7]>.04) P[o+7]-=.0008;
      if(P[o+1]>H+20){P[o+1]=-10;P[o+7]=.12;}
    }
  }
}

// ═══════════════════════════════════════
//  粒子绘制（优化：drawImage 代替 fillText）
// ═══════════════════════════════════════
function drawParticles(){
  for(let i=0;i<TOTAL;i++){
    const o=i*10;
    const a=P[o+7];
    if(a<.02)continue;
    const x=P[o],y=P[o+1],sz=P[o+6],glow=P[o+8];
    // 光晕（只给 glow>0.15 的粒子画）
    if(glow>.15){
      const gr=sz*2;
      ctx.globalAlpha=a*glow*.25;
      ctx.fillStyle=pSide[i]===0?'rgba(255,210,80,1)':'rgba(255,140,50,1)';
      ctx.beginPath();
      ctx.arc(x,y,gr,0,Math.PI*2);
      ctx.fill();
    }
    // 文字（用缓存的离屏 canvas）
    ctx.globalAlpha=a;
    const cc=pCharCache[i];
    const half=cc.width/2;
    if(Math.abs(pRot[i])>.01){
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(pRot[i]);
      ctx.drawImage(cc,-half,-half);
      ctx.restore();
    }else{
      ctx.drawImage(cc,x-half,y-half);
    }
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  火花（轻量）
// ═══════════════════════════════════════
const MAX_SPARKS=150;
const sparkData=new Float32Array(MAX_SPARKS*6); // x,y,vx,vy,life,r
let sparkCount=0;

function addSparks(cx,cy,n){
  for(let i=0;i<n&&sparkCount<MAX_SPARKS;i++){
    const o=sparkCount*6;
    sparkData[o]=cx; sparkData[o+1]=cy;
    const ang=Math.random()*Math.PI*2;
    const spd=3+Math.random()*8;
    sparkData[o+2]=Math.cos(ang)*spd;
    sparkData[o+3]=Math.sin(ang)*spd;
    sparkData[o+4]=1;
    sparkData[o+5]=1+Math.random()*2;
    sparkCount++;
  }
}

function updateDrawSparks(){
  ctx.globalAlpha=1;
  let alive=0;
  for(let i=0;i<sparkCount;i++){
    const o=i*6;
    sparkData[o]+=sparkData[o+2];
    sparkData[o+1]+=sparkData[o+3];
    sparkData[o+2]*=.95;sparkData[o+3]*=.95;
    sparkData[o+3]+=.06;
    sparkData[o+4]-=.015;
    if(sparkData[o+4]<=0)continue;
    ctx.beginPath();
    ctx.arc(sparkData[o],sparkData[o+1],sparkData[o+5]*sparkData[o+4],0,Math.PI*2);
    ctx.fillStyle=`rgba(255,200,80,${sparkData[o+4]*.8})`;
    ctx.fill();
    // 存活的移到前面
    if(alive!==i){
      for(let j=0;j<6;j++) sparkData[alive*6+j]=sparkData[o+j];
    }
    alive++;
  }
  sparkCount=alive;
}

// ═══════════════════════════════════════
//  动画调度
// ═══════════════════════════════════════
let startTime=0,started=false,frame=0;
let prevPhase='',clashDone=false,scatterDone=false,fallDone=false;

function getPhase(t){
  if(t<4)return'rain';
  if(t<9)return'gather';
  if(t<12.5)return'form';
  if(t<16.5)return'clash';
  if(t<20)return'scatter';
  return'fall';
}

function tick(){
  requestAnimationFrame(tick);
  frame++;
  if(!started){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);return;}

  const t=(performance.now()-startTime)/1000;
  const phase=getPhase(t);

  // 相位切换
  if(phase!==prevPhase){
    if(phase==='gather'){assignTargets(frame);for(let i=0;i<TOTAL;i++)P[i*10+9]=1;}
    if(phase==='form'){for(let i=0;i<TOTAL;i++)P[i*10+9]=2;}
    if(phase==='clash'&&!clashDone){clashDone=true;triggerClash();}
    if(phase==='scatter'&&!scatterDone){scatterDone=true;setAllState(4);}
    if(phase==='fall'&&!fallDone){fallDone=true;setAllState(5);}
    prevPhase=phase;
  }

  // gather/form 持续更新目标
  if(phase==='gather'||phase==='form') assignTargets(frame);

  // clash 火花
  if(phase==='clash'){
    const ct=t-12.5;
    if(ct>.3&&ct<3.5&&frame%3===0){
      addSparks(W*.5+(Math.random()-.5)*120,H*.48+(Math.random()-.5)*90,4);
    }
  }

  updateParticles();

  // ── 绘制 ──
  // 全清（比半透明覆盖更快）
  ctx.fillStyle='#080810';
  ctx.fillRect(0,0,W,H);

  // 背景氛围光
  if(phase==='form'||phase==='clash'){
    const int=phase==='clash'?.1:.04;
    ctx.globalAlpha=int;
    // 龙光
    const dg=ctx.createRadialGradient(W*.28,H*.4,20,W*.28,H*.4,280);
    dg.addColorStop(0,'rgba(255,200,50,1)');dg.addColorStop(1,'rgba(255,180,30,0)');
    ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);
    // 虎光
    const tg=ctx.createRadialGradient(W*.72,H*.55,20,W*.72,H*.55,280);
    tg.addColorStop(0,'rgba(255,100,30,1)');tg.addColorStop(1,'rgba(200,60,20,0)');
    ctx.fillStyle=tg;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // 碰撞闪光
  if(phase==='clash'){
    const ct=t-12.5;
    const fa=ct<.2?ct/.2*.35:Math.max(0,.35-(ct-.2)*.06);
    if(fa>.01){
      ctx.globalAlpha=fa;
      const fg=ctx.createRadialGradient(W*.5,H*.48,5,W*.5,H*.48,350);
      fg.addColorStop(0,'rgba(255,255,200,1)');
      fg.addColorStop(.3,'rgba(255,200,100,1)');
      fg.addColorStop(1,'rgba(200,100,50,0)');
      ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }
  }

  // 「儒」字
  if(t>.5&&t<5){
    const ra=t<1.5?(t-.5):Math.max(0,1-(t-3)/2);
    if(ra>.01){
      ctx.save();ctx.globalAlpha=ra*.55;
      ctx.font='120px "Songti SC","SimSun","KaiTi",serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,215,80,1)';
      ctx.fillText('儒',W/2,H/2);
      ctx.restore();
    }
  }

  // 龙虎标签
  if(phase==='form'){
    ctx.save();ctx.globalAlpha=.2;
    ctx.font='48px "Songti SC","SimSun","KaiTi",serif';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,220,100,1)';ctx.fillText('龙',W*.28,H*.12);
    ctx.fillStyle='rgba(255,140,60,1)';ctx.fillText('虎',W*.72,H*.88);
    ctx.restore();
  }

  drawParticles();
  updateDrawSparks();

  // 暗角
  ctx.globalAlpha=1;
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // 结尾
  if(t>21){
    const ea=Math.min(.5,(t-21)/3);
    ctx.save();ctx.globalAlpha=ea;ctx.textAlign='center';
    ctx.font='24px "Songti SC","SimSun","KaiTi",serif';
    ctx.fillStyle='rgba(200,180,120,1)';
    ctx.fillText('千万经典文字  凝形而战  化字而归',W/2,H/2-15);
    ctx.font='14px "Songti SC","SimSun",serif';
    ctx.globalAlpha=ea*.6;ctx.fillStyle='rgba(160,145,100,1)';
    ctx.fillText('— 剑来 · 本命字',W/2,H/2+15);
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
const playBtn=document.getElementById('playBtn');
function start(){
  playBtn.style.opacity='0';
  setTimeout(()=>playBtn.style.display='none',1000);
  started=true;startTime=performance.now();
  initAudioSystem();
}
playBtn.addEventListener('click',start,{once:true});

window.addEventListener('resize',()=>{
  W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;
});
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

tick();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudioSystem(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.15;m.connect(ac.destination);
  // drone
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=40;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.08,ac.currentTime+3);
  dg.gain.linearRampToValueAtTime(.04,ac.currentTime+8);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+22);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=120;
  dr.connect(lp);lp.connect(dg);dg.connect(m);
  dr.start();dr.stop(ac.currentTime+23);
  // 汇聚上升
  setTimeout(()=>{
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sine';r.frequency.setValueAtTime(100,ac.currentTime);
    r.frequency.exponentialRampToValueAtTime(450,ac.currentTime+5);
    rg.gain.setValueAtTime(.05,ac.currentTime);
    rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+5);
    r.connect(rg);rg.connect(m);r.start();r.stop(ac.currentTime+5.5);
  },4000);
  // 碰撞
  setTimeout(()=>{
    const sz=ac.sampleRate*.5,b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/sz*6);
    const s=ac.createBufferSource();s.buffer=b;
    const g=ac.createGain();g.gain.value=.25;
    s.connect(g);g.connect(m);s.start();
    const imp=ac.createOscillator(),ig=ac.createGain();
    imp.type='sine';imp.frequency.setValueAtTime(80,ac.currentTime);
    imp.frequency.exponentialRampToValueAtTime(20,ac.currentTime+.5);
    ig.gain.setValueAtTime(.2,ac.currentTime);
    ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.8);
    imp.connect(ig);ig.connect(m);imp.start();imp.stop(ac.currentTime+1);
  },12500);
  // 余韵
  setTimeout(()=>{
    [220,330,440,554].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.3);
      g.gain.linearRampToValueAtTime(.03,ac.currentTime+i*.3+.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
      o.connect(g);g.connect(m);
      o.start(ac.currentTime+i*.3);o.stop(ac.currentTime+5);
    });
  },16500);
}
</script>
