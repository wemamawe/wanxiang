<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本命字 · 剑来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;overflow:hidden;touch-action:none}
canvas{display:block}
#p{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1.2s}
#p .i{text-align:center;color:#d4c8a0}
#p .t{font:38px "Songti SC","SimSun","KaiTi",serif;letter-spacing:14px;margin-bottom:14px;
  text-shadow:0 0 40px rgba(255,200,80,.3)}
#p .s{font:13px "Songti SC","SimSun",serif;opacity:.4;margin-bottom:30px;letter-spacing:4px}
#p .c{width:72px;height:72px;border-radius:50%;
  border:1.5px solid rgba(212,200,160,.3);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#p .c:hover{background:rgba(212,200,160,.08)}
#p .r{width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;
  border-left:22px solid rgba(212,200,160,.6);margin-left:5px}
</style>
</head>
<body>
<div id="p"><div class="i">
  <div class="t">本 命 字</div>
  <div class="s">蓄势 · 凝形 · 厮杀 · 落字 · 归无</div>
  <div class="c"><div class="r"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;C.width=W;C.height=H;

const TXT='学而时习之不亦说乎有朋自远方来不亦乐乎人不知而不愠不亦君子乎'+
'温故而知新可以为师矣学而不思则罔思而不学则殆'+
'己所不欲勿施于人君子坦荡荡小人长戚戚'+
'士不可以不弘毅任重而道远仁以为己任死而后已不亦远乎'+
'大学之道在明明德在亲民在止于至善'+
'格物致知诚意正心修身齐家治国平天下'+
'天命之谓性率性之谓道修道之谓教'+
'博学之审问之慎思之明辨之笃行之'+
'天将降大任于是人也必先苦其心志劳其筋骨'+
'富贵不能淫贫贱不能移威武不能屈此之谓大丈夫'+
'天行健君子以自强不息地势坤君子以厚德载物'+
'穷则独善其身达则兼善天下民为贵社稷次之君为轻';
const rc=()=>TXT[Math.floor(Math.random()*TXT.length)];

// ═══════════════════════════════════════
//  预渲染文字缓存
// ═══════════════════════════════════════
const SZ=[9,11,13,15];
const ccm=new Map();
function gCC(ch,sz,hue,lit){
  const k=ch+sz+hue+lit;if(ccm.has(k))return ccm.get(k);
  const cv=document.createElement('canvas'),s=Math.ceil(sz*2.5);cv.width=s;cv.height=s;
  const x=cv.getContext('2d');
  x.font=sz+'px "Songti SC","SimSun","KaiTi",serif';
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle='hsl('+hue+',80%,'+lit+'%)';
  x.fillText(ch,s/2,s/2);
  ccm.set(k,cv);return cv;
}
for(let i=0;i<TXT.length;i++)SZ.forEach(s=>{gCC(TXT[i],s,42,60);gCC(TXT[i],s,210,55);gCC(TXT[i],s,42,35);});

// ═══════════════════════════════════════
//  预渲染剑（离屏canvas）— 性能关键
//  只渲染一次，每帧用 drawImage 贴图
// ═══════════════════════════════════════
function renderSwordCanvas(hue){
  const len=400;
  const bw=len*.055; // 剑身半宽
  const cv=document.createElement('canvas');
  const cw=Math.ceil(bw*12),ch=Math.ceil(len*1.3);
  cv.width=cw;cv.height=ch;
  const x=cv.getContext('2d');
  const ox=cw/2,oy=ch-len*.2; // 剑柄底部

  // === 剑身形状（古剑剑锋） ===
  // 剑尖→剑身→护手→剑柄
  // 剑尖：锋利三角形，占剑身前15%
  // 剑身：双刃，略向外弧（有刃线）
  // 护手：宽出剑身
  // 剑柄：窄于剑身

  const tipY=oy-len;        // 剑尖
  const neckY=oy-len*.85;   // 剑锋底部（尖端开始变宽）
  const bodyTopY=oy-len*.82;// 剑身上端
  const guardY=oy;          // 护手
  const handleY=oy+len*.16; // 剑柄底

  // 剑身宽度变化：尖端窄→中部略宽→护手处收窄
  const bladeW=bw;      // 最宽处
  const tipW=bw*.06;    // 剑尖宽度（几乎为0）
  const neckW=bw*.5;    // 剑锋底部宽度
  const guardW=bw*2.2;  // 护手宽
  const handleW=bw*.4;  // 剑柄宽

  // --- 剑身光晕 ---
  x.globalAlpha=.12;
  const g=x.createLinearGradient(ox,tipY-10,ox,handleY);
  g.addColorStop(0,'hsla('+hue+',90%,85%,1)');
  g.addColorStop(.15,'hsla('+hue+',80%,75%,.8)');
  g.addColorStop(.5,'hsla('+hue+',70%,60%,.4)');
  g.addColorStop(1,'hsla('+hue+',50%,40%,0)');
  x.fillStyle=g;
  x.beginPath();
  x.moveTo(ox,tipY-10);
  x.lineTo(ox-bladeW*2,oy-len*.4);
  x.lineTo(ox-bladeW*2,guardY);
  x.lineTo(ox+bladeW*2,guardY);
  x.lineTo(ox+bladeW*2,oy-len*.4);
  x.closePath();x.fill();

  // --- 剑身轮廓 ---
  x.globalAlpha=.12;
  x.strokeStyle='hsla('+hue+',75%,78%,1)';x.lineWidth=1.2;
  x.beginPath();
  // 剑尖（锋利三角）
  x.moveTo(ox,tipY);
  // 左刃 — 剑尖到剑身，略微外弧
  x.quadraticCurveTo(ox-neckW*1.1,neckY,ox-bladeW,bodyTopY);
  // 左刃身 — 微弧（中间略宽）
  x.quadraticCurveTo(ox-bladeW*1.08,oy-len*.45,ox-bladeW*.95,guardY-5);
  // 护手左
  x.lineTo(ox-guardW,guardY-2);
  x.lineTo(ox-guardW,guardY+6);
  // 剑柄左
  x.lineTo(ox-handleW,guardY+6);
  x.lineTo(ox-handleW,handleY-4);
  // 剑首（柄底圆）
  x.quadraticCurveTo(ox-handleW*1.3,handleY,ox,handleY+3);
  x.quadraticCurveTo(ox+handleW*1.3,handleY,ox+handleW,handleY-4);
  // 剑柄右
  x.lineTo(ox+handleW,guardY+6);
  x.lineTo(ox+guardW,guardY+6);
  x.lineTo(ox+guardW,guardY-2);
  // 护手右
  x.lineTo(ox+bladeW*.95,guardY-5);
  // 右刃身
  x.quadraticCurveTo(ox+bladeW*1.08,oy-len*.45,ox+bladeW,bodyTopY);
  // 右刃 — 剑尖
  x.quadraticCurveTo(ox+neckW*1.1,neckY,ox,tipY);
  x.closePath();x.stroke();

  // --- 剑脊（中线，凸起感） ---
  x.globalAlpha=.06;
  x.strokeStyle='hsla('+hue+',65%,75%,1)';x.lineWidth=1;
  x.beginPath();
  x.moveTo(ox,tipY+5);
  x.lineTo(ox,guardY-3);
  x.stroke();
  // 剑脊两侧淡线（表示血槽）
  x.globalAlpha=.035;
  x.lineWidth=.5;
  [-1,1].forEach(side=>{
    x.beginPath();
    x.moveTo(ox+side*bladeW*.35,bodyTopY+5);
    x.lineTo(ox+side*bladeW*.3,guardY-8);
    x.stroke();
  });

  // --- 刃线（剑身边缘高亮） ---
  x.globalAlpha=.08;
  x.strokeStyle='hsla('+hue+',85%,85%,1)';x.lineWidth=.8;
  [-1,1].forEach(side=>{
    x.beginPath();
    x.moveTo(ox+side*tipW,tipY+2);
    x.quadraticCurveTo(ox+side*neckW*1.1,neckY,ox+side*bladeW,bodyTopY);
    x.quadraticCurveTo(ox+side*bladeW*1.08,oy-len*.45,ox+side*bladeW*.95,guardY-5);
    x.stroke();
  });

  // --- 剑尖高光 ---
  x.globalAlpha=.2;
  const tipGlow=x.createRadialGradient(ox,tipY+15,2,ox,tipY+15,len*.08);
  tipGlow.addColorStop(0,'hsla('+hue+',90%,90%,1)');
  tipGlow.addColorStop(1,'hsla('+hue+',80%,70%,0)');
  x.fillStyle=tipGlow;
  x.fillRect(ox-bw*2,tipY-5,bw*4,len*.15);

  // --- 文字填充 ---
  const step=9;
  const rows=Math.floor(len/step);
  for(let i=0;i<rows;i++){
    const ct=i/rows; // 0=柄端 1=尖端
    const cy=oy-len*ct;
    // 计算该位置剑身宽度
    let lw;
    if(ct>.97) lw=tipW; // 剑尖极窄
    else if(ct>.85) lw=tipW+(neckW-tipW)*((ct-.85)/.12); // 剑锋区域向外扩
    else if(ct>.15) lw=bladeW*(.9+Math.sin((ct-.15)/.7*Math.PI)*.1); // 剑身微弧
    else lw=handleW; // 剑柄
    const cols=Math.max(1,Math.floor(lw*2/step));
    for(let j=0;j<cols;j++){
      const cx2=ox-lw+(j+.5)*(lw*2)/cols;
      const ch2=rc();
      const sz=SZ[Math.floor(Math.random()*SZ.length)];
      const lit=42+Math.floor(ct*28); // 尖端更亮
      x.globalAlpha=.25+ct*.5;
      x.font=sz+'px "Songti SC","SimSun","KaiTi",serif';
      x.textAlign='center';x.textBaseline='middle';
      x.fillStyle='hsl('+hue+',80%,'+lit+'%)';
      x.fillText(ch2,cx2,cy);
    }
  }
  // 护手文字
  x.globalAlpha=.4;
  for(let j=-3;j<=3;j++){
    x.font='11px "Songti SC","SimSun","KaiTi",serif';
    x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='hsl('+hue+',80%,68%)';
    x.fillText(rc(),ox+j*guardW/3.5,guardY+2);
  }

  return {cv,ox,oy,len};
}

const swordA=renderSwordCanvas(42);
const swordB=renderSwordCanvas(210);

// 画剑：一次 drawImage
function drawSword(sword,cx,cy,angle,scale,alpha){
  if(alpha<.01)return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  const sc=scale*baseSwordLen()/sword.len;
  ctx.scale(sc,sc);
  ctx.drawImage(sword.cv,-sword.ox,-sword.oy);
  ctx.restore();
}

// ═══════════════════════════════════════
//  文字雨粒子（蓄势+凝形）
// ═══════════════════════════════════════
const N=1200;
const px=new Float32Array(N),py=new Float32Array(N);
const pvx=new Float32Array(N),pvy=new Float32Array(N);
const pa=new Float32Array(N);
const pst=new Uint8Array(N);
const ptx=new Float32Array(N),pty=new Float32Array(N);
const psd=new Uint8Array(N);
const pcc=new Array(N);
for(let i=0;i<N;i++){
  px[i]=Math.random()*W;py[i]=-Math.random()*H*3;
  pvx[i]=(Math.random()-.5)*.4;pvy[i]=2+Math.random()*4;
  pa[i]=.05+Math.random()*.3;pst[i]=0;
  psd[i]=i<N/2?0:1;
  const hue=psd[i]===0?42:210;
  pcc[i]=gCC(rc(),SZ[Math.floor(Math.random()*SZ.length)],hue,50+Math.floor(Math.random()*20));
}

// ═══════════════════════════════════════
//  编排式双剑 — 有快有慢，层层递进，镜头有远有近
//
//  第一幕 试探（9-11s）：远景，剑小，缓慢逼近，1次碰撞
//  第二幕 交锋（11-14s）：中景，剑渐大，节奏加快，2次碰撞
//  第三幕 激战（14-17s）：近景，剑大，电光火石，3次碰撞
//  第四幕 终击（17-18.5s）：特写，最后3连击，爆裂
// ═══════════════════════════════════════
function baseSwordLen(){return Math.min(W,H)*.38;}

const sAs={x:0,y:0,angle:0,sc:1};
const sBs={x:0,y:0,angle:0,sc:1};
let clashFlash=0,clashFx=0,clashFy=0;
let nextClash=0;

// 碰撞编排
// aAng/bAng: 碰撞瞬间两剑的角度偏移（相对于“尖对尖”的基础角度）
// move: 碰撞前运动方式 stab=突刺 slash=斜斩 chop=上劷下 cross=交叉
const clashes=[
  // 第一幕 试探：远景、慢
  {t:10.5,sc:.3, zoom:1, n:20, str:.7, spd:.4, aAng:0,   bAng:0,    move:'stab'},   // 正面突刺
  // 第二幕 交锋
  {t:12,  sc:.45,zoom:1.2, n:30, str:.9, spd:.7, aAng:-.6, bAng:.4,   move:'slash'},  // 斜斩
  {t:13.2,sc:.55,zoom:1.3, n:35, str:1.0,spd:.9, aAng:.8,  bAng:-.3,  move:'chop'},   // 上劷下
  // 第三幕 激战
  {t:14.2,sc:.65,zoom:1.5, n:45, str:1.1,spd:1.2,aAng:-.9, bAng:.7,   move:'cross'},  // 交叉斩
  {t:15,  sc:.75,zoom:1.6, n:50, str:1.2,spd:1.5,aAng:.5,  bAng:.5,   move:'slash'},  // 同向斜前
  {t:15.8,sc:.82,zoom:1.7, n:60, str:1.3,spd:1.8,aAng:-1.2,bAng:-.8,  move:'chop'},   // 双劷
  // 第四幕 终击
  {t:16.5,sc:.9, zoom:1.9, n:70, str:1.5,spd:2.2,aAng:.7,  bAng:-.9,  move:'cross'},  // 电光交叉
  {t:17,  sc:.95,zoom:2.0, n:80, str:1.6,spd:2.5,aAng:-1.0,bAng:.6,   move:'slash'},  // 横斩
  {t:17.4,sc:1.0,zoom:2.2, n:100,str:1.8,spd:3.0,aAng:0,   bAng:0,    move:'stab'},   // 最终突刺
];

let swordPhase='wait';
let phaseT=0;
let recoilAngle=0;
let curZoom=1;
let curSpd=.3;
let curAOff=0,curBOff=0; // 当前角度偏移（平滑过渡）
let moveType='stab';

function getSwordState(t){
  if(t<9)return;
  
  let sc=.25,targetZoom=1,targetSpd=.3;
  let tgtAOff=0,tgtBOff=0;
  if(nextClash<clashes.length){
    const ci=clashes[nextClash];
    const prevSc=nextClash>0?clashes[nextClash-1].sc:.2;
    const prevZoom=nextClash>0?clashes[nextClash-1].zoom:1;
    const prevSpd=nextClash>0?clashes[nextClash-1].spd:.3;
    const prevT=nextClash>0?clashes[nextClash-1].t:9;
    const p=Math.min(1,(t-prevT)/(ci.t-prevT));
    sc=prevSc+(ci.sc-prevSc)*p;
    targetZoom=prevZoom+(ci.zoom-prevZoom)*p;
    targetSpd=prevSpd+(ci.spd-prevSpd)*p;
    // 碰撞前渐变到进攻角度
    tgtAOff=ci.aAng*p;
    tgtBOff=ci.bAng*p;
    moveType=ci.move;
  }else{
    sc=1;targetZoom=1.5;targetSpd=.5;
  }
  curZoom+=(targetZoom-curZoom)*.05;
  curSpd+=(targetSpd-curSpd)*.08;
  curAOff+=(tgtAOff-curAOff)*.06;
  curBOff+=(tgtBOff-curBOff)*.06;
  
  const cx=W*.5,cy=H*.43;
  
  // 碰撞
  if(nextClash<clashes.length&&t>=clashes[nextClash].t){
    const ci=clashes[nextClash];
    clashFlash=1;
    clashFx=cx;clashFy=cy;
    spawnFall(cx,cy,ci.n,ci.str);
    addSpark(cx,cy,Math.floor(ci.n*.3));
    playClash(ci.str/1.8);
    recoilAngle=ci.aAng+Math.random()*.8-.4;
    swordPhase='recoil';phaseT=t;
    nextClash++;
  }
  
  let sepX,sepY;
  const swordR=Math.min(W,H)*(.15-.06*sc);
  
  if(swordPhase==='recoil'){
    const rt=t-phaseT;
    const recoilTime=Math.max(.25,.6-curSpd*.12);
    const rp=Math.min(1,rt/recoilTime);
    const recoilDist=swordR*(1-rp);
    const wobbleStr=swordR*(.05+curSpd*.02);
    const wobble=Math.sin(rt*18)*wobbleStr*Math.max(0,1-rp);
    sepX=Math.cos(recoilAngle)*(recoilDist+wobble);
    sepY=Math.sin(recoilAngle)*(recoilDist+wobble)*.7;
    // 弹开时角度复位
    curAOff*=.92;curBOff*=.92;
    if(rp>=1){swordPhase='approach';phaseT=t;}
  }else{
    let approachP=0;
    if(nextClash<clashes.length){
      const nextT=clashes[nextClash].t;
      const startT=swordPhase==='wait'?9:phaseT;
      const dur=nextT-startT;
      if(dur>0) approachP=Math.min(1,(t-startT)/dur);
    }
    const ep=approachP<.7
      ? approachP/.7*approachP/.7*.3
      : .3+((approachP-.7)/.3)*((approachP-.7)/.3)*.7;
    const dist=swordR*(1-ep*.9);
    
    // 根据进攻方式改变轨迹
    const phase2=t-9;
    let offX=0,offY=0;
    if(moveType==='slash'){
      offX=Math.sin(approachP*Math.PI)*swordR*.4;
      offY=Math.cos(approachP*Math.PI*.5)*swordR*.12;
    }else if(moveType==='chop'){
      offX=Math.sin(approachP*Math.PI*.8)*swordR*.15;
      offY=-Math.cos(approachP*Math.PI)*swordR*.35;
    }else if(moveType==='cross'){
      offX=Math.sin(approachP*Math.PI*1.5)*swordR*.3;
      offY=Math.cos(approachP*Math.PI)*swordR*.18;
    }
    
    const rotAngle=phase2*curSpd*1.2;
    sepX=Math.cos(rotAngle)*dist+offX;
    sepY=Math.sin(rotAngle)*dist*.65+offY;
  }
  
  sAs.x=cx+sepX;sAs.y=cy+sepY;sAs.sc=sc;
  sBs.x=cx-sepX;sBs.y=cy-sepY;sBs.sc=sc;
  // 基础角度：剑尖指向对方
  const baseA=Math.atan2(sBs.y-sAs.y,sBs.x-sAs.x)+Math.PI/2;
  const baseB=Math.atan2(sAs.y-sBs.y,sAs.x-sBs.x)+Math.PI/2;
  // 叠加进攻角度偏移
  sAs.angle=baseA+curAOff;
  sBs.angle=baseB+curBOff;
  
  if(clashFlash>0)clashFlash*=.86;
}

// ═══════════════════════════════════════
//  剑气残影
// ═══════════════════════════════════════
const TL=18;
const trA=[],trB=[];
for(let i=0;i<TL;i++){trA.push({x:-99,y:-99});trB.push({x:-99,y:-99});}
function pushTrail(tr,x,y){tr.pop();tr.unshift({x,y});}
function drawTrail(tr,hue){
  ctx.lineCap='round';
  for(let i=1;i<tr.length;i++){
    if(tr[i].x<-50||tr[i-1].x<-50)continue;
    const a=(1-i/tr.length);
    ctx.globalAlpha=a*.15;
    ctx.strokeStyle='hsla('+hue+',80%,70%,1)';
    ctx.lineWidth=3-i*.15;
    ctx.beginPath();ctx.moveTo(tr[i-1].x,tr[i-1].y);ctx.lineTo(tr[i].x,tr[i].y);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  落字粒子
// ═══════════════════════════════════════
const FM=2000;
const fx=new Float32Array(FM),fy=new Float32Array(FM);
const fvx=new Float32Array(FM),fvy=new Float32Array(FM);
const fal=new Float32Array(FM);
const frt=new Float32Array(FM),fph=new Float32Array(FM);
const fcc=new Array(FM);
let fc=0;

function spawnFall(cx,cy,n,str){
  for(let i=0;i<n&&fc<FM;i++){
    const a=Math.random()*Math.PI*2,s=(1.5+Math.random()*5)*str;
    fx[fc]=cx+(Math.random()-.5)*15;fy[fc]=cy+(Math.random()-.5)*15;
    fvx[fc]=Math.cos(a)*s;fvy[fc]=Math.sin(a)*s-1.5;
    fal[fc]=.45+Math.random()*.35;
    frt[fc]=Math.random()*Math.PI*2;fph[fc]=Math.random()*Math.PI*2;
    fcc[fc]=gCC(rc(),SZ[Math.floor(Math.random()*SZ.length)],Math.random()<.5?42:210,50+Math.floor(Math.random()*20));
    fc++;
  }
}

function updateDrawFall(){
  let alive=0;
  for(let i=0;i<fc;i++){
    fvx[i]*=.99;fvy[i]+=.025;
    fx[i]+=fvx[i]+Math.sin(fph[i])*.2;fy[i]+=fvy[i];
    frt[i]+=.005;fph[i]+=.015;
    fal[i]-=.001;
    if(fal[i]<.015||fy[i]>H+40)continue;
    const c=fcc[i],hs=c.width/2;
    ctx.globalAlpha=fal[i];
    ctx.drawImage(c,fx[i]-hs,fy[i]-hs); // 省掉 rotate 的 save/restore
    if(alive!==i){fx[alive]=fx[i];fy[alive]=fy[i];fvx[alive]=fvx[i];fvy[alive]=fvy[i];
      fal[alive]=fal[i];frt[alive]=frt[i];fph[alive]=fph[i];fcc[alive]=fcc[i];}
    alive++;
  }
  fc=alive;ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  火花（精简）
// ═══════════════════════════════════════
const SM=150;
const skx=new Float32Array(SM),sky=new Float32Array(SM);
const skvx=new Float32Array(SM),skvy=new Float32Array(SM);
const skl=new Float32Array(SM),skr=new Float32Array(SM);
let skc=0;
function addSpark(cx,cy,n){
  for(let i=0;i<n&&skc<SM;i++){
    const a=Math.random()*Math.PI*2,s=4+Math.random()*12;
    skx[skc]=cx;sky[skc]=cy;skvx[skc]=Math.cos(a)*s;skvy[skc]=Math.sin(a)*s;
    skl[skc]=1;skr[skc]=1+Math.random()*2;skc++;
  }
}
function drawSparks(){
  let alive=0;
  for(let i=0;i<skc;i++){
    skx[i]+=skvx[i];sky[i]+=skvy[i];skvx[i]*=.92;skvy[i]*=.92;skvy[i]+=.08;
    skl[i]-=.025;
    if(skl[i]<=0)continue;
    ctx.globalAlpha=skl[i]*.8;
    ctx.fillStyle='#ffd060';
    ctx.fillRect(skx[i]-skr[i]*skl[i],sky[i]-skr[i]*skl[i],skr[i]*skl[i]*2,skr[i]*skl[i]*2);
    if(alive!==i){skx[alive]=skx[i];sky[alive]=sky[i];skvx[alive]=skvx[i];skvy[alive]=skvy[i];
      skl[alive]=skl[i];skr[alive]=skr[i];}
    alive++;
  }
  skc=alive;ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  背景微雨
// ═══════════════════════════════════════
const BN=80;
const bx=new Float32Array(BN),by2=new Float32Array(BN),bvy=new Float32Array(BN);
const bcc=new Array(BN);
for(let i=0;i<BN;i++){
  bx[i]=Math.random()*W;by2[i]=Math.random()*H;bvy[i]=.2+Math.random()*.5;
  bcc[i]=gCC(rc(),SZ[Math.floor(Math.random()*2)],42,30);
}
function drawBg(){
  for(let i=0;i<BN;i++){
    by2[i]+=bvy[i];if(by2[i]>H+20){by2[i]=-20;bx[i]=Math.random()*W;}
    ctx.globalAlpha=.04;ctx.drawImage(bcc[i],bx[i],by2[i]);
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  凝形目标
// ═══════════════════════════════════════
let gatherDone=false;
function swordPoints(cx,cy,angle,len,count){
  const pts=[],bw=len*.07,cos=Math.cos(angle),sin=Math.sin(angle);
  for(let i=0;i<count;i++){
    const t=Math.random(),yL=-len*(1-t);
    let w;if(t>.95)w=bw*.2;else if(t>.12)w=bw;else w=bw*1.5;
    const xL=(Math.random()-.5)*w*2;
    pts.push({x:cx+xL*cos-yL*sin,y:cy+xL*sin+yL*cos});
  }
  return pts;
}
function assignGatherTargets(){
  const sl=baseSwordLen();
  const ptsA=swordPoints(W*.38,H*.45,-.78,sl,N/2);
  const ptsB=swordPoints(W*.62,H*.45,Math.PI+.78,sl,N/2);
  let ai=0,bi=0;
  for(let i=0;i<N;i++){
    if(psd[i]===0){const p=ptsA[ai%ptsA.length];ptx[i]=p.x;pty[i]=p.y;ai++;}
    else{const p=ptsB[bi%ptsB.length];ptx[i]=p.x;pty[i]=p.y;bi++;}
  }
}

// ═══════════════════════════════════════
//  镜头
// ═══════════════════════════════════════
function getZoom(t){
  if(t<5)return 1;
  if(t<6)return 1+2*(t-5);
  if(t<8)return 3;
  if(t<9.5)return 3-2*((t-8)/1.5); // 拉远到正常
  // 厮杀阶段：用curZoom（由碰撞表驱动）
  if(t<18.5)return curZoom;
  // 归无：慢慢拉远
  return Math.max(1,curZoom-(t-18.5)*.5);
}

// ═══════════════════════════════════════
//  主循环
// ═══════════════════════════════════════
let started=false,startTime=0,frame=0,lastT=0;
let finalBurst=false,swordsInited=false;

function tick(){
  requestAnimationFrame(tick);
  frame++;
  if(!started){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);return;}
  const t=(performance.now()-startTime)/1000;
  const dt=Math.min(.033,t-lastT||.016);lastT=t;

  if(t>=4.8&&!gatherDone){gatherDone=true;assignGatherTargets();}
  if(t>=8.5&&!swordsInited){swordsInited=true;swordPhase='approach';phaseT=9;nextClash=0;}

  ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);
  drawBg();

  const zoom=getZoom(t);
  const zoomActive=zoom>1.01;
  const ccx=W/2,ccy=H*.45;

  // ─── 蓄势 0-5s ───
  if(t<5.5){
    const fadeOut=t>5?Math.max(0,1-(t-5)/.5):1;
    for(let i=0;i<N;i++){
      if(pst[i]===1)continue;
      px[i]+=pvx[i];py[i]+=pvy[i];
      if(pa[i]<.45)pa[i]+=.003;
      if(py[i]>H+20){py[i]=-20-Math.random()*50;px[i]=Math.random()*W;}
      ctx.globalAlpha=pa[i]*fadeOut;
      ctx.drawImage(pcc[i],px[i]-pcc[i].width/2,py[i]-pcc[i].height/2);
    }
    ctx.globalAlpha=1;
  }

  // ─── 凝形 5-9s ───
  if(t>=5&&t<9.5){
    if(zoomActive){ctx.save();ctx.translate(ccx,ccy);ctx.scale(zoom,zoom);ctx.translate(-ccx,-ccy);}
    const fadeIn=Math.min(1,(t-5)/.5);
    for(let i=0;i<N;i++){
      if(pst[i]===0&&t>=5)pst[i]=1;
      if(pst[i]!==1)continue;
      const dx=ptx[i]-px[i],dy=pty[i]-py[i];
      const gp=Math.min(t-5,4)/4;
      const f=Math.min(.04+gp*.06,500/(dx*dx+dy*dy+40));
      pvx[i]+=dx*f;pvy[i]+=dy*f;pvx[i]*=.89;pvy[i]*=.89;
      px[i]+=pvx[i];py[i]+=pvy[i];
      if(pa[i]<.8)pa[i]+=.005;
      ctx.globalAlpha=pa[i]*fadeIn;
      ctx.drawImage(pcc[i],px[i]-pcc[i].width/2,py[i]-pcc[i].height/2);
    }
    ctx.globalAlpha=1;
    // 剑轮廓渐显
    if(t>7){
      const sa=Math.min(1,(t-7)/2);
      drawSword(swordA,W*.38,H*.45,-.78,1,sa*.5);
      drawSword(swordB,W*.62,H*.45,Math.PI+.78,1,sa*.5);
    }
    if(zoomActive)ctx.restore();
  }

  // ─── 厮杀 9-20s ───
  if(t>=8.5){
    if(t<18.5)getSwordState(t);

    let sAlpha;
    if(t<9.5)sAlpha=Math.min(1,(t-8.5));
    else if(t<18)sAlpha=1;
    else if(t<20)sAlpha=Math.max(0,1-(t-18)/2);
    else sAlpha=0;

    if(sAlpha>.01){
      if(zoomActive){ctx.save();ctx.translate(ccx,ccy);ctx.scale(zoom,zoom);ctx.translate(-ccx,-ccy);}
      // 剑气残影
      pushTrail(trA,sAs.x,sAs.y);pushTrail(trB,sBs.x,sBs.y);
      drawTrail(trA,42);drawTrail(trB,210);
      // 双剑（用碰撞表的scale缩放）
      drawSword(swordA,sAs.x,sAs.y,sAs.angle,sAs.sc,sAlpha);
      drawSword(swordB,sBs.x,sBs.y,sBs.angle,sBs.sc,sAlpha);
      if(zoomActive)ctx.restore();
    }

    // 碰撞闪光
    if(clashFlash>.05){
      const g=ctx.createRadialGradient(clashFx,clashFy,3,clashFx,clashFy,200);
      g.addColorStop(0,'rgba(255,255,220,'+clashFlash*.35+')');
      g.addColorStop(.3,'rgba(255,200,120,'+clashFlash*.12+')');
      g.addColorStop(1,'rgba(200,150,80,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }
  }

  // ─── 归无 ───
  if(t>18&&!finalBurst){
    finalBurst=true;
    spawnFall(W*.5,H*.43,250,1.8);
    addSpark(W*.5,H*.43,50);
    playBurst();
  }

  updateDrawFall();
  drawSparks();

  // 「儒」字
  if(t>.5&&t<5.5){
    const ra=t<1.8?(t-.5)/1.3:Math.max(0,1-(t-3)/2.5);
    if(ra>.01){
      ctx.save();ctx.globalAlpha=ra*.4;
      ctx.font='110px "Songti SC","SimSun","KaiTi",serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(255,200,50,.3)';ctx.shadowBlur=35;
      ctx.fillStyle='rgba(255,215,80,1)';
      ctx.fillText('儒',W/2,H/2);
      ctx.shadowBlur=0;ctx.restore();
    }
  }

  // 暗角
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fillRect(0,0,W,40);ctx.fillRect(0,H-40,W,40);
  ctx.fillRect(0,0,40,H);ctx.fillRect(W-40,0,40,H);

  // 结语（归无后显示，与落字共存）
  if(t>20){
    const ea=Math.min(.45,(t-20)/3);
    ctx.save();ctx.globalAlpha=ea;ctx.textAlign='center';
    ctx.font='26px "Songti SC","SimSun","KaiTi",serif';
    ctx.fillStyle='rgba(200,180,120,1)';
    ctx.fillText('以文铸剑  字落如雨  归于虚无',W/2,H/2-15);
    ctx.font='14px "Songti SC","SimSun",serif';
    ctx.globalAlpha=ea*.55;ctx.fillStyle='rgba(160,145,100,1)';
    ctx.fillText('— 剑来 · 本命字',W/2,H/2+18);
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
document.getElementById('p').addEventListener('click',()=>{
  const b=document.getElementById('p');
  b.style.opacity='0';setTimeout(()=>b.style.display='none',1200);
  started=true;startTime=performance.now();lastT=0;
  initAudio();
},{once:true});
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;C.width=W;C.height=H;});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
tick();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
let ac,mg;
function initAudio(){
  ac=new(AudioContext||webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=.12;mg.connect(ac.destination);
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=42;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.06,ac.currentTime+3);
  dg.gain.setValueAtTime(.06,ac.currentTime+18);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+23);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=100;
  dr.connect(lp);lp.connect(dg);dg.connect(mg);dr.start();dr.stop(ac.currentTime+25);
  setTimeout(()=>{
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sine';r.frequency.setValueAtTime(70,ac.currentTime);
    r.frequency.exponentialRampToValueAtTime(400,ac.currentTime+3.5);
    rg.gain.setValueAtTime(.03,ac.currentTime);
    rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+3.5);
    r.connect(rg);rg.connect(mg);r.start();r.stop(ac.currentTime+4);
  },5000);
  setTimeout(()=>{
    [196,294,392,523].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.4);
      g.gain.linearRampToValueAtTime(.02,ac.currentTime+i*.4+.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
      o.connect(g);g.connect(mg);o.start(ac.currentTime+i*.4);o.stop(ac.currentTime+5);
    });
  },20000);
}
function playClash(intensity){
  if(!ac)return;
  const n=ac.sampleRate*(.04+intensity*.05);
  const buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/n*9);
  const s=ac.createBufferSource();s.buffer=buf;
  const g=ac.createGain();g.gain.value=.12+intensity*.1;
  s.connect(g);g.connect(mg);s.start();
  const ring=ac.createOscillator(),rg=ac.createGain();
  ring.type='sine';ring.frequency.value=700+Math.random()*400;
  rg.gain.setValueAtTime(.04+intensity*.02,ac.currentTime);
  rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.35);
  ring.connect(rg);rg.connect(mg);ring.start();ring.stop(ac.currentTime+.4);
}
function playBurst(){
  if(!ac)return;
  const n=ac.sampleRate*.5,buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/n*3.5);
  const s=ac.createBufferSource();s.buffer=buf;
  const g=ac.createGain();g.gain.value=.35;s.connect(g);g.connect(mg);s.start();
  const imp=ac.createOscillator(),ig=ac.createGain();
  imp.type='sine';imp.frequency.setValueAtTime(100,ac.currentTime);
  imp.frequency.exponentialRampToValueAtTime(18,ac.currentTime+.6);
  ig.gain.setValueAtTime(.3,ac.currentTime);
  ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.8);
  imp.connect(ig);ig.connect(mg);imp.start();imp.stop(ac.currentTime+1);
}
