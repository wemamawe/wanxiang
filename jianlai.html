<script type="module">
import*as THREE from'three';

// ═══════════════════════════════════════
//  经典文字库

// ═══════════════════════════════════════
//  文字纹理图集（预渲染64个字到一张大纹理）
// ═══════════════════════════════════════
const ATLAS_SIZE=1024, CELL=64, COLS=ATLAS_SIZE/CELL;
const atlasCanvas=document.createElement('canvas');
atlasCanvas.width=atlasCanvas.height=ATLAS_SIZE;
const atlasCtx=atlasCanvas.getContext('2d');
atlasCtx.fillStyle='rgba(0,0,0,0)';
atlasCtx.fillRect(0,0,ATLAS_SIZE,ATLAS_SIZE);
atlasCtx.font='48px "Songti SC","SimSun","KaiTi",serif';
atlasCtx.textAlign='center';atlasCtx.textBaseline='middle';
const atlasChars=[];
for(let i=0;i<COLS*COLS;i++){
  const ch=randChar();

  atlasCtx.fillText(ch,col*CELL+CELL/2,row*CELL+CELL/2);
}

// ═══════════════════════════════════════
//  Three.js 场景
// ═══════════════════════════════════════

scene.fog=new THREE.FogExp2(0x080810,.0008);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,2000);
camera.position.set(0,20,180);
camera.lookAt(0,0,0);

// ═══════════════════════════════════════
//  程序化龙模型（蛇身+头+角+须+爪）
// ═══════════════════════════════════════
function createDragonGeometry(){
  const path=new THREE.CurvePath();
  // 蜿蜒S形脊椎（用CatmullRom曲线）
  const spinePoints=[
    new THREE.Vector3(-80,0,0),
    new THREE.Vector3(-55,12,8),
    new THREE.Vector3(-30,-5,-6),
    new THREE.Vector3(-5,15,10),
    new THREE.Vector3(20,-8,-5),
    new THREE.Vector3(45,10,8),
    new THREE.Vector3(60,25,3),   // 颈部上扬
    new THREE.Vector3(70,40,-2),  // 头部高昂
    new THREE.Vector3(75,48,0),   // 鼻尖
  ];
  const spine=new THREE.CatmullRomCurve3(spinePoints);

  // 沿脊椎生成管状几何体（变截面）
  const segments=120, radialSeg=12;
  const frames=spine.computeFrenetFrames(segments,false);
  const positions=[],uvs=[],indices=[];

  for(let i=0;i<=segments;i++){
    const t=i/segments;
    const pt=spine.getPointAt(t);
    const N=frames.normals[i];
    const B=frames.binormals[i];
    // 截面半径变化：尾细→身粗→颈细→头大
    let radius;
    if(t<.05) radius=t/.05*1.5;         // 尾尖
    else if(t<.15) radius=1.5+((t-.05)/.1)*3; // 尾→身
    else if(t<.7) radius=4.5+Math.sin((t-.15)/.55*Math.PI)*.8; // 身干
    else if(t<.82) radius=4.5-((t-.7)/.12)*2; // 身→颈
    else if(t<.9) radius=2.5;            // 颈
    else radius=2.5+Math.sin((t-.9)/.1*Math.PI)*2.5; // 头
    // 龙鳞锯齿（沿背脊微凸）
    for(let j=0;j<=radialSeg;j++){
      const a=(j/radialSeg)*Math.PI*2;
      let r=radius;
      // 背脊凸起
      if(a>Math.PI*.35&&a<Math.PI*.65) r+=.8;
      // 腹部稍平
      if(a>Math.PI*1.3&&a<Math.PI*1.7) r*=.85;
      const x=pt.x+N.x*Math.cos(a)*r+B.x*Math.sin(a)*r;
      const y=pt.y+N.y*Math.cos(a)*r+B.y*Math.sin(a)*r;
      const z=pt.z+N.z*Math.cos(a)*r+B.z*Math.sin(a)*r;
      positions.push(x,y,z);
      uvs.push(j/radialSeg,t);
    }
  }
  // 面索引
  for(let i=0;i<segments;i++){
    for(let j=0;j<radialSeg;j++){
      const a=i*(radialSeg+1)+j;
      const b=a+radialSeg+1;
      indices.push(a,b,a+1, b,b+1,a+1);
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  // 附加部件：角、须、爪（简化为细管）
  const parts=[geo];

  // 鹿角（两根，从头部Y轴上方分叉）
  const headPt=spine.getPointAt(.92);
  for(let side=-1;side<=1;side+=2){
    const hornPts=[
      new THREE.Vector3(headPt.x+side*2,headPt.y+3,headPt.z),
      new THREE.Vector3(headPt.x+side*5,headPt.y+12,headPt.z-2),
      new THREE.Vector3(headPt.x+side*7,headPt.y+18,headPt.z+1),
      new THREE.Vector3(headPt.x+side*6,headPt.y+22,headPt.z-1),
    ];
    const hornCurve=new THREE.CatmullRomCurve3(hornPts);
    const hornGeo=new THREE.TubeGeometry(hornCurve,12,0.6,6,false);
    parts.push(hornGeo);
    // 分叉
    const branchPts=[
      hornPts[1].clone(),
      new THREE.Vector3(headPt.x+side*9,headPt.y+16,headPt.z+side*3),
      new THREE.Vector3(headPt.x+side*10,headPt.y+19,headPt.z+side*2),
    ];
    const branchCurve=new THREE.CatmullRomCurve3(branchPts);
    parts.push(new THREE.TubeGeometry(branchCurve,8,.4,5,false));
  }

  // 龙须（两条，从口鼻下方飘出）
  const nosePt=spine.getPointAt(.98);
  for(let side=-1;side<=1;side+=2){
    const whiskerPts=[
      new THREE.Vector3(nosePt.x+side*1.5,nosePt.y-1,nosePt.z),
      new THREE.Vector3(nosePt.x+side*4,nosePt.y-4,nosePt.z+side*5),
      new THREE.Vector3(nosePt.x+side*3,nosePt.y-8,nosePt.z+side*10),
      new THREE.Vector3(nosePt.x+side*5,nosePt.y-6,nosePt.z+side*15),
    ];
    const wCurve=new THREE.CatmullRomCurve3(whiskerPts);
    parts.push(new THREE.TubeGeometry(wCurve,10,.25,4,false));
  }

  // 四爪
  const clawTs=[.25,.4,.55,.65];
  clawTs.forEach(ct=>{
    const cp=spine.getPointAt(ct);
    for(let side=-1;side<=1;side+=2){
      const clawPts=[
        new THREE.Vector3(cp.x,cp.y-3,cp.z+side*4),
        new THREE.Vector3(cp.x+2,cp.y-10,cp.z+side*7),
        new THREE.Vector3(cp.x+1,cp.y-14,cp.z+side*6),
      ];
      const cCurve=new THREE.CatmullRomCurve3(clawPts);
      parts.push(new THREE.TubeGeometry(cCurve,6,.5,4,false));
      // 三趾
      const tip=clawPts[2];
      for(let f=-1;f<=1;f++){
        const toePts=[
          tip.clone(),
          new THREE.Vector3(tip.x+f*1.5,tip.y-3,tip.z+f*side),
        ];
        const toeCurve=new THREE.CatmullRomCurve3(toePts);
        parts.push(new THREE.TubeGeometry(toeCurve,3,.2,3,false));
      }
    }
  });

  // 合并所有部件
  return mergeGeometries(parts);
}

function mergeGeometries(geos){
  // 简单合并：统一到一个大 BufferGeometry
  let totalV=0,totalI=0;
  geos.forEach(g=>{
    totalV+=g.attributes.position.count;
    totalI+=g.index?g.index.count:(g.attributes.position.count);
  });
  const pos=new Float32Array(totalV*3);
  const norm=new Float32Array(totalV*3);
  const uv=new Float32Array(totalV*2);
  const idx=new Uint32Array(totalI);
  let vOff=0,iOff=0,vCount=0;
  geos.forEach(g=>{
    const p=g.attributes.position.array;
    const n=g.attributes.normal?g.attributes.normal.array:new Float32Array(p.length);
    const u=g.attributes.uv?g.attributes.uv.array:new Float32Array(p.length/3*2);
    pos.set(p,vOff*3);
    norm.set(n,vOff*3);
    uv.set(u,vOff*2);
    if(g.index){
      const gi=g.index.array;
      for(let i=0;i<gi.length;i++) idx[iOff+i]=gi[i]+vCount;
      iOff+=gi.length;
    }else{
      for(let i=0;i<p.length/3;i++) idx[iOff+i]=vCount+i;
      iOff+=p.length/3;
    }
    vCount+=p.length/3;
    vOff=vCount;
  });
  const merged=new THREE.BufferGeometry();
  merged.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  merged.setAttribute('normal',new THREE.Float32BufferAttribute(norm,3));
  merged.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  merged.setIndex(new THREE.BufferAttribute(new Uint32Array(idx.buffer,0,iOff),1));
  return merged;
}

// ═══════════════════════════════════════
//  程序化虎模型
// ═══════════════════════════════════════
function createTigerGeometry(){
  // 虎身主轴
  const spinePoints=[
    new THREE.Vector3(50,-5,0),    // 尾根
    new THREE.Vector3(35,-2,0),    // 臀
    new THREE.Vector3(15,2,0),     // 腰
    new THREE.Vector3(-5,5,0),     // 背
    new THREE.Vector3(-25,8,0),    // 肩
    new THREE.Vector3(-40,12,0),   // 颈
    new THREE.Vector3(-50,18,0),   // 头
    new THREE.Vector3(-55,20,0),   // 口鼻
  ];
  const spine=new THREE.CatmullRomCurve3(spinePoints);
  const segments=80,radialSeg=10;
  const frames=spine.computeFrenetFrames(segments,false);
  const positions=[],uvs=[],indices=[];

  for(let i=0;i<=segments;i++){
    const t=i/segments;
    const pt=spine.getPointAt(t);
    const N=frames.normals[i];
    const B=frames.binormals[i];
    let radius;
    if(t<.1) radius=3+t/.1*3;         // 臀渐粗
    else if(t<.3) radius=6+Math.sin((t-.1)/.2*Math.PI)*.5; // 臀最粗
    else if(t<.55) radius=5.5;         // 腰腹
    else if(t<.75) radius=5.5+Math.sin((t-.55)/.2*Math.PI)*1; // 肩胸
    else if(t<.85) radius=5-((t-.75)/.1)*2; // 颈收
    else radius=3+Math.sin((t-.85)/.15*Math.PI)*2; // 头
    for(let j=0;j<=radialSeg;j++){
      const a=(j/radialSeg)*Math.PI*2;
      let r=radius;
      // 背脊微凸
      if(a>Math.PI*.4&&a<Math.PI*.6) r+=.4;
      // 腹部平
      if(a>Math.PI*1.3&&a<Math.PI*1.7) r*=.8;
      const x=pt.x+N.x*Math.cos(a)*r+B.x*Math.sin(a)*r;
      const y=pt.y+N.y*Math.cos(a)*r+B.y*Math.sin(a)*r;
      const z=pt.z+N.z*Math.cos(a)*r+B.z*Math.sin(a)*r;
      positions.push(x,y,z);
      uvs.push(j/radialSeg,t);
    }
  }
  for(let i=0;i<segments;i++){
    for(let j=0;j<radialSeg;j++){
      const a=i*(radialSeg+1)+j;
      const b=a+radialSeg+1;
      indices.push(a,b,a+1,b,b+1,a+1);
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const parts=[geo];

  // 尾巴（上翘S弯）
  const tailPts=[
    spinePoints[0].clone(),
    new THREE.Vector3(60,-2,3),
    new THREE.Vector3(70,5,0),
    new THREE.Vector3(72,12,-2),
    new THREE.Vector3(68,18,1),
  ];
  parts.push(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(tailPts),15,1,5,false));

  // 四肢（粗壮）
  const legs=[
    {base:.15,side:1,angle:Math.PI/2+.2,len:18},  // 后右
    {base:.15,side:-1,angle:Math.PI/2+.2,len:18}, // 后左
    {base:.7,side:1,angle:Math.PI/2-.3,len:20},   // 前右（前伸）
    {base:.7,side:-1,angle:Math.PI/2-.3,len:20},  // 前左
  ];
  legs.forEach(leg=>{
    const bp=spine.getPointAt(leg.base);
    const legPts=[
      new THREE.Vector3(bp.x,bp.y-3,bp.z+leg.side*5),
      new THREE.Vector3(bp.x+(leg.base>.5?-5:3),bp.y-12,bp.z+leg.side*7),
      new THREE.Vector3(bp.x+(leg.base>.5?-8:2),bp.y-18,bp.z+leg.side*6),
    ];
    const lCurve=new THREE.CatmullRomCurve3(legPts);
    parts.push(new THREE.TubeGeometry(lCurve,8,1.2,5,false));
    // 爪
    const tip=legPts[2];
    for(let f=-1;f<=1;f++){
      const tp=[tip.clone(),new THREE.Vector3(tip.x+f*1.2+(leg.base>.5?-2:1),tip.y-3,tip.z+f*leg.side)];
      parts.push(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(tp),3,.3,3,false));
    }
  });

  // 耳朵
  const headPt=spine.getPointAt(.92);
  for(let side=-1;side<=1;side+=2){
    const earPts=[
      new THREE.Vector3(headPt.x-1,headPt.y+4,headPt.z+side*3),
      new THREE.Vector3(headPt.x-2,headPt.y+9,headPt.z+side*4),
      new THREE.Vector3(headPt.x-1,headPt.y+11,headPt.z+side*3),
    ];
    parts.push(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(earPts),5,.6,4,false));
  }

  return mergeGeometries(parts);
}

// ═══════════════════════════════════════
//  从3D模型表面采样点
// ═══════════════════════════════════════
function sampleSurface(geometry,count){
  const pos=geometry.attributes.position;
  const idx=geometry.index;
  const pts=[];
  const triCount=idx?idx.count/3:pos.count/3;
  for(let i=0;i<count;i++){
    const triIdx=Math.floor(Math.random()*triCount);
    let a,b,c;
    if(idx){
      a=idx.getX(triIdx*3);b=idx.getX(triIdx*3+1);c=idx.getX(triIdx*3+2);
    }else{a=triIdx*3;b=triIdx*3+1;c=triIdx*3+2;}
    const va=new THREE.Vector3().fromBufferAttribute(pos,a);
    const vb=new THREE.Vector3().fromBufferAttribute(pos,b);
    const vc=new THREE.Vector3().fromBufferAttribute(pos,c);
    // 随机重心坐标
    let u=Math.random(),v=Math.random();
    if(u+v>1){u=1-u;v=1-v;}
    const w=1-u-v;
    pts.push(new THREE.Vector3(
      va.x*u+vb.x*v+vc.x*w,
      va.y*u+vb.y*v+vc.y*w,
      va.z*u+vb.z*v+vc.z*w
    ));
  }
  return pts;
}

// ═══════════════════════════════════════
//  创建模型 & 采样
// ═══════════════════════════════════════
const dragonGeo=createDragonGeometry();
const tigerGeo=createTigerGeometry();

const PARTICLE_COUNT=1200;
const dragonSurfacePts=sampleSurface(dragonGeo,PARTICLE_COUNT);
const tigerSurfacePts=sampleSurface(tigerGeo,PARTICLE_COUNT);

// ═══════════════════════════════════════
//  文字粒子（InstancedMesh 方案用 Sprite）
//  用 Points + 自定义 ShaderMaterial
// ═══════════════════════════════════════
const TOTAL=PARTICLE_COUNT*2;
const atlasTexture=new THREE.CanvasTexture(atlasCanvas);
atlasTexture.minFilter=THREE.LinearFilter;

// 自定义着色器：每个点是一个带文字纹理的方块
const pointGeo=new THREE.BufferGeometry();
const posArr=new Float32Array(TOTAL*3);
const targetArr=new Float32Array(TOTAL*3);
const uvOffsetArr=new Float32Array(TOTAL*2); // 图集UV偏移
const sideArr=new Float32Array(TOTAL); // 0=dragon 1=tiger
const randArr=new Float32Array(TOTAL); // 随机种子

for(let i=0;i<TOTAL;i++){
  // 初始位置：散落在空中
  posArr[i*3]=(Math.random()-.5)*300;
  posArr[i*3+1]=Math.random()*200+50;
  posArr[i*3+2]=(Math.random()-.5)*100;
  // 图集UV
  const charIdx=Math.floor(Math.random()*COLS*COLS);
  uvOffsetArr[i*2]=(charIdx%COLS)/COLS;
  uvOffsetArr[i*2+1]=Math.floor(charIdx/COLS)/COLS;
  sideArr[i]=i<PARTICLE_COUNT?0:1;
  randArr[i]=Math.random();
  // 目标位置
  const pts=i<PARTICLE_COUNT?dragonSurfacePts:tigerSurfacePts;
  const pi=i<PARTICLE_COUNT?i:i-PARTICLE_COUNT;
  const tp=pts[pi];
  // 龙偏左，虎偏右
  if(i<PARTICLE_COUNT){
    targetArr[i*3]=tp.x-40;targetArr[i*3+1]=tp.y;targetArr[i*3+2]=tp.z;
  }else{
    targetArr[i*3]=tp.x+40;targetArr[i*3+1]=tp.y;targetArr[i*3+2]=tp.z;
  }
}

pointGeo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
pointGeo.setAttribute('aTarget',new THREE.BufferAttribute(targetArr,3));
pointGeo.setAttribute('aUvOffset',new THREE.BufferAttribute(uvOffsetArr,2));
pointGeo.setAttribute('aSide',new THREE.BufferAttribute(sideArr,1));
pointGeo.setAttribute('aRand',new THREE.BufferAttribute(randArr,1));

const pointMat=new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0},
    uPhase:{value:0}, // 0=rain 1=gather 2=form 3=clash 4=fall
    uAtlas:{value:atlasTexture},
    uCellSize:{value:1.0/COLS},
    uPointSize:{value:Math.min(innerWidth,innerHeight)*.035},
  },
  vertexShader:`
    attribute vec3 aTarget;
    attribute vec2 aUvOffset;
    attribute float aSide;
    attribute float aRand;
    uniform float uTime;
    uniform float uPhase;
    uniform float uPointSize;
    varying vec2 vUvOffset;
    varying float vAlpha;
    varying float vGlow;
    varying float vSide;

    // 噪声
    float hash(float n){return fract(sin(n)*43758.5453);}

    void main(){
      vUvOffset=aUvOffset;
      vSide=aSide;
      vec3 pos=position;
      vec3 tgt=aTarget;
      float t=uTime;
      float r=aRand;

      if(uPhase<0.5){
        // rain：从上方飘落
        pos.y=mod(position.y-t*15.0*(0.5+r),300.0)+50.0;
        pos.x+=sin(t*0.5+r*6.28)*2.0;
        pos.z+=cos(t*0.3+r*3.14)*1.5;
        vAlpha=0.3+r*0.4;
        vGlow=0.0;
      }
      else if(uPhase<1.5){
        // gather：向目标汇聚
        float gatherT=clamp(uPhase-0.5,0.0,1.0);
        float ease=gatherT*gatherT*(3.0-2.0*gatherT); // smoothstep
        pos=mix(pos,tgt,ease);
        // 添加螺旋轨迹
        float spiral=(1.0-ease)*20.0;
        pos.x+=sin(t*2.0+r*6.28)*spiral*(1.0-ease);
        pos.z+=cos(t*2.0+r*6.28)*spiral*(1.0-ease);
        vAlpha=0.4+ease*0.5;
        vGlow=ease*0.6;
      }
      else if(uPhase<2.5){
        // form：锁定在表面，微微呼吸
        pos=tgt;
        pos+=normalize(tgt)*sin(t*3.0+r*6.28)*0.3;
        vAlpha=0.85+sin(t*2.0+r*3.0)*0.1;
        vGlow=0.6+sin(t*1.5)*0.2;
      }
      else if(uPhase<3.5){
        // clash：龙虎对冲
        float clashT=uPhase-2.5;
        vec3 clashDir=aSide<0.5?vec3(1.0,-0.2,0.0):vec3(-1.0,0.2,0.0);
        pos=tgt+clashDir*clashT*60.0;
        // 碰撞后散射
        if(clashT>0.3){
          float scatter=(clashT-0.3)*2.0;
          vec3 dir=normalize(vec3(hash(r*100.0)-0.5,hash(r*200.0)-0.5,hash(r*300.0)-0.5));
          pos+=dir*scatter*40.0;
        }
        vAlpha=max(0.2,0.9-clashT*0.4);
        vGlow=max(0.0,1.0-clashT*0.8);
      }
      else{
        // fall：缓缓飘落
        float fallT=uPhase-3.5;
        pos=tgt+vec3(
          sin(t*0.5+r*6.28)*20.0,
          -fallT*10.0*(0.3+r*0.7),
          cos(t*0.3+r*3.14)*15.0
        );
        pos.x+=(hash(r*50.0)-0.5)*fallT*30.0;
        vAlpha=max(0.05,0.5-fallT*0.08);
        vGlow=0.0;
      }

      vec4 mvPos=modelViewMatrix*vec4(pos,1.0);
      gl_Position=projectionMatrix*mvPos;
      gl_PointSize=uPointSize*300.0/(-mvPos.z);
      gl_PointSize=clamp(gl_PointSize,2.0,64.0);
    }
  `,
  fragmentShader:`
    uniform sampler2D uAtlas;
    uniform float uCellSize;
    varying vec2 vUvOffset;
    varying float vAlpha;
    varying float vGlow;
    varying float vSide;

    void main(){
      vec2 uv=gl_PointCoord*uCellSize+vUvOffset;
      vec4 texColor=texture2D(uAtlas,uv);
      if(texColor.a<0.1) discard;
      // 龙金色，虎橙红
      vec3 tint=vSide<0.5?vec3(1.0,0.85,0.3):vec3(1.0,0.55,0.2);
      vec3 color=texColor.rgb*tint;
      // 光晕
      color+=tint*vGlow*0.3;
      gl_FragColor=vec4(color,texColor.a*vAlpha);
    }
  `,
  transparent:true,
  depthWrite:false,
  blending:THREE.AdditiveBlending,
});

const pointCloud=new THREE.Points(pointGeo,pointMat);
scene.add(pointCloud);

// ═══════════════════════════════════════
//  半透明龙虎轮廓（辅助感知形体）
// ═══════════════════════════════════════
const ghostMat=new THREE.MeshBasicMaterial({
  color:0xffd050, transparent:true, opacity:0, // 初始隐藏
  wireframe:false, side:THREE.DoubleSide,
  blending:THREE.AdditiveBlending, depthWrite:false,
});
const dragonMesh=new THREE.Mesh(dragonGeo.clone(),ghostMat.clone());
dragonMesh.position.x=-40;
dragonMesh.material.color.set(0xffd050);
scene.add(dragonMesh);

const tigerMesh=new THREE.Mesh(tigerGeo.clone(),ghostMat.clone());
tigerMesh.position.x=40;
tigerMesh.material.color.set(0xff6830);
scene.add(tigerMesh);

// ═══════════════════════════════════════
//  2D 叠加层（「儒」字 + 结尾文字）
// ═══════════════════════════════════════
const overlay=document.createElement('canvas');
overlay.width=innerWidth;overlay.height=innerHeight;
overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5';
document.body.appendChild(overlay);
const octx=overlay.getContext('2d');

// ═══════════════════════════════════════
//  动画主循环
// ═══════════════════════════════════════
let started=false,startTime=0;
const clock=new THREE.Clock();

// 时间轴
// 0-4: rain  4-10: gather  10-14: form  14-18: clash  18+: fall
function getPhase(t){
  if(t<4)return 0;
  if(t<10)return .5+((t-4)/6)*.999; // 0.5→1.499 = gather
  if(t<14)return 2; // form
  if(t<18)return 2.5+((t-14)/4)*.999; // clash
  return 4+((t-18)/6); // fall
}

function animate(){
  requestAnimationFrame(animate);
  if(!started){renderer.render(scene,camera);return;}

  const t=(performance.now()-startTime)/1000;
  const phase=getPhase(t);

  // uniform 更新
  pointMat.uniforms.uTime.value=t;
  pointMat.uniforms.uPhase.value=phase;

  // gather 时让粒子位置更新（vertex shader 用 position 做起始）
  // 但因为 shader 里做 mix，需要保持 position 在 rain 位置不变
  // 所以 position 只做初始散布，target 做最终位置

  // 幽灵模型透明度
  if(phase>=1.8&&phase<3.5){
    const ghostA=phase<2?((phase-1.8)/.2)*.04:.04;
    dragonMesh.material.opacity=ghostA;
    tigerMesh.material.opacity=ghostA;
  }else{
    dragonMesh.material.opacity=0;
    tigerMesh.material.opacity=0;
  }

  // 龙虎模型微动
  dragonMesh.rotation.y=Math.sin(t*.3)*.05;
  dragonMesh.position.y=Math.sin(t*.5)*2;
  tigerMesh.rotation.y=Math.sin(t*.3+1)*.04;
  tigerMesh.position.y=Math.sin(t*.4+.5)*1.5;

  // 相机缓慢环绕
  const camAngle=t*.03;
  const camR=180+Math.sin(t*.1)*20;
  camera.position.x=Math.sin(camAngle)*camR*.3;
  camera.position.z=Math.cos(camAngle)*camR;
  camera.position.y=20+Math.sin(t*.15)*10;
  camera.lookAt(0,10,0);

  renderer.render(scene,camera);

  // 2D overlay
  octx.clearRect(0,0,overlay.width,overlay.height);
  // 「儒」字
  if(t>.5&&t<5){
    const ra=t<1.5?(t-.5):Math.max(0,1-(t-3)/2);
    if(ra>.01){
      octx.save();octx.globalAlpha=ra*.5;
      octx.font='120px "Songti SC","SimSun","KaiTi",serif';
      octx.textAlign='center';octx.textBaseline='middle';
      octx.fillStyle='rgba(255,215,80,1)';
      octx.shadowColor='rgba(255,200,50,.5)';octx.shadowBlur=40;
      octx.fillText('儒',overlay.width/2,overlay.height/2);
      octx.restore();
    }
  }
  // 龙虎标签
  if(phase>=2&&phase<3){
    octx.save();octx.globalAlpha=.25;
    octx.font='42px "Songti SC","SimSun","KaiTi",serif';
    octx.textAlign='center';
    octx.fillStyle='rgba(255,220,100,1)';
    octx.fillText('龙',overlay.width*.3,overlay.height*.12);
    octx.fillStyle='rgba(255,140,60,1)';
    octx.fillText('虎',overlay.width*.7,overlay.height*.12);
    octx.restore();
  }
  // 碰撞闪光
  if(phase>=2.5&&phase<3.2){
    const fa=Math.max(0,.3-(phase-2.5));
    if(fa>.01){
      const g=octx.createRadialGradient(overlay.width/2,overlay.height/2,5,overlay.width/2,overlay.height/2,300);
      g.addColorStop(0,`rgba(255,255,200,${fa})`);
      g.addColorStop(1,'rgba(200,100,50,0)');
      octx.fillStyle=g;
      octx.fillRect(0,0,overlay.width,overlay.height);
    }
  }
  // 结尾文字
  if(t>22){
    const ea=Math.min(.5,(t-22)/3);
    octx.save();octx.globalAlpha=ea;octx.textAlign='center';
    octx.font='24px "Songti SC","SimSun","KaiTi",serif';
    octx.fillStyle='rgba(200,180,120,1)';
    octx.fillText('千万经典文字  凝形而战  化字而归',overlay.width/2,overlay.height/2-15);
    octx.font='14px "Songti SC","SimSun",serif';
    octx.globalAlpha=ea*.6;octx.fillStyle='rgba(160,145,100,1)';
    octx.fillText('— 剑来 · 本命字',overlay.width/2,overlay.height/2+15);
    octx.restore();
  }
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
const playBtn=document.getElementById('playBtn');
playBtn.addEventListener('click',()=>{
  playBtn.style.opacity='0';
  setTimeout(()=>playBtn.style.display='none',1000);
  started=true;startTime=performance.now();
  initAudioSystem();
},{once:true});

window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  overlay.width=w;overlay.height=h;
  pointMat.uniforms.uPointSize.value=Math.min(w,h)*.035;
});

animate();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudioSystem(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.15;m.connect(ac.destination);
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=40;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.08,ac.currentTime+3);
  dg.gain.linearRampToValueAtTime(.04,ac.currentTime+10);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+22);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=120;
  dr.connect(lp);lp.connect(dg);dg.connect(m);
  dr.start();dr.stop(ac.currentTime+24);
  setTimeout(()=>{
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sine';r.frequency.setValueAtTime(100,ac.currentTime);
    r.frequency.exponentialRampToValueAtTime(450,ac.currentTime+6);
    rg.gain.setValueAtTime(.05,ac.currentTime);
    rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+6);
    r.connect(rg);rg.connect(m);r.start();r.stop(ac.currentTime+6.5);
  },4000);
  setTimeout(()=>{
    const sz=ac.sampleRate*.5,b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/sz*6);
    const s=ac.createBufferSource();s.buffer=b;
    const g=ac.createGain();g.gain.value=.3;
    s.connect(g);g.connect(m);s.start();
    const imp=ac.createOscillator(),ig=ac.createGain();
    imp.type='sine';imp.frequency.setValueAtTime(80,ac.currentTime);
    imp.frequency.exponentialRampToValueAtTime(20,ac.currentTime+.5);
    ig.gain.setValueAtTime(.25,ac.currentTime);
    ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.8);
    imp.connect(ig);ig.connect(m);imp.start();imp.stop(ac.currentTime+1);
  },14000);
  setTimeout(()=>{
    [220,330,440,554].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.3);
      g.gain.linearRampToValueAtTime(.03,ac.currentTime+i*.3+.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
      o.connect(g);g.connect(m);
      o.start(ac.currentTime+i*.3);o.stop(ac.currentTime+5);
    });
  },18000);
}
</script>
</body>
