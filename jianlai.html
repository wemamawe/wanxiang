<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本命字 · 剑来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;overflow:hidden;touch-action:none}
canvas{display:block}
#playBtn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1s}
#playBtn .inner{text-align:center;color:#d4c8a0}
#playBtn .title{font:36px "Songti SC","SimSun","KaiTi",serif;letter-spacing:12px;margin-bottom:14px;
  text-shadow:0 0 30px rgba(255,200,80,.3)}
#playBtn .sub{font:14px "Songti SC","SimSun",serif;opacity:.45;margin-bottom:28px}
#playBtn .circle{width:70px;height:70px;border-radius:50%;
  border:1.5px solid rgba(212,200,160,.35);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#playBtn .circle:hover{background:rgba(212,200,160,.08);border-color:rgba(212,200,160,.6)}
#playBtn .tri{width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;
  border-left:20px solid rgba(212,200,160,.65);margin-left:4px}
</style>
</head>
<body>
<div id="playBtn"><div class="inner">
  <div class="title">本 命 字</div>
  <div class="sub">千万经典 · 凝龙化虎 · 缠斗碎裂 · 归于文字</div>
  <div class="circle"><div class="tri"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;
C.width=W;C.height=H;

// ═══════════════════════════════════════
//  经典文字
// ═══════════════════════════════════════
const TXT='学而时习之不亦说乎有朋自远方来不亦乐乎人不知而不愠不亦君子乎'+
'吾日三省吾身为人谋而不忠乎与朋友交而不信乎传不习乎'+
'温故而知新可以为师矣学而不思则罔思而不学则殆'+
'己所不欲勿施于人君子坦荡荡小人长戚戚'+
'大学之道在明明德在亲民在止于至善'+
'格物致知诚意正心修身齐家治国平天下'+
'天命之谓性率性之谓道修道之谓教'+
'博学之审问之慎思之明辨之笃行之'+
'天将降大任于是人也必先苦其心志劳其筋骨'+
'富贵不能淫贫贱不能移威武不能屈此之谓大丈夫'+
'天行健君子以自强不息地势坤君子以厚德载物'+
'人心惟危道心惟微惟精惟一允执厥中';
const rc=()=>TXT[Math.floor(Math.random()*TXT.length)];

// ═══════════════════════════════════════
//  预渲染文字缓存
// ═══════════════════════════════════════
const SIZES=[8,10,12,14,16];
const cache=new Map();
function getCC(ch,sz,h,l){
  const k=ch+sz+h+l;
  if(cache.has(k))return cache.get(k);
  const c=document.createElement('canvas');
  const s=sz*2.5;c.width=s;c.height=s;
  const x=c.getContext('2d');
  x.font=`${sz}px "Songti SC","SimSun","KaiTi",serif`;
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle=`hsl(${h},80%,${l}%)`;
  x.fillText(ch,s/2,s/2);
  cache.set(k,c);return c;
}
// 预热
for(let i=0;i<TXT.length;i++){
  SIZES.forEach(s=>{ getCC(TXT[i],s,42,65); getCC(TXT[i],s,30,55); });
}

// ═══════════════════════════════════════
//  龙轮廓（手绘贝塞尔 — 中国水墨龙）
//  以 0-1 归一化坐标定义，运行时缩放
//  龙身蜿蜒成 S 形，头在右上，尾在左下
// ═══════════════════════════════════════
function drawDragonPath(ctx,ox,oy,w,h,t){
  // 动态偏移（呼吸+游动）
  const b=Math.sin(t*1.2)*3;
  const sw=Math.sin(t*0.8)*5; // 游动
  ctx.beginPath();
  // === 龙身外轮廓（上侧，从尾到头）===
  // 尾尖
  ctx.moveTo(ox+w*.02+sw, oy+h*.65+b);
  // 尾→第一个弯（上升）
  ctx.bezierCurveTo(
    ox+w*.08+sw,oy+h*.58+b, ox+w*.14+sw*.8,oy+h*.48+b, ox+w*.2+sw*.6,oy+h*.42+b
  );
  // 第一弯顶部→第二个弯（下降）
  ctx.bezierCurveTo(
    ox+w*.28+sw*.4,oy+h*.35+b, ox+w*.36+sw*.2,oy+h*.45+b, ox+w*.42,oy+h*.52+b
  );
  // 第二弯底部→第三个弯（上升，龙身最粗处）
  ctx.bezierCurveTo(
    ox+w*.48,oy+h*.58+b, ox+w*.54,oy+h*.48+b, ox+w*.6,oy+h*.38+b
  );
  // 颈部（收细上扬）
  ctx.bezierCurveTo(
    ox+w*.66,oy+h*.28+b, ox+w*.72,oy+h*.18+b, ox+w*.76,oy+h*.12+b
  );
  // 龙头上缘（膨大）
  ctx.bezierCurveTo(
    ox+w*.79,oy+h*.08+b, ox+w*.84,oy+h*.06+b, ox+w*.88,oy+h*.08+b
  );
  // 龙头前端（口鼻）
  ctx.bezierCurveTo(
    ox+w*.92,oy+h*.10+b, ox+w*.96,oy+h*.14+b, ox+w*.98,oy+h*.18+b
  );
  // === 龙头下颌 → 龙身下侧（从头回到尾）===
  // 下颌
  ctx.bezierCurveTo(
    ox+w*.95,oy+h*.22+b, ox+w*.90,oy+h*.24+b, ox+w*.84,oy+h*.20+b
  );
  // 颈部下侧
  ctx.bezierCurveTo(
    ox+w*.78,oy+h*.24+b, ox+w*.72,oy+h*.30+b, ox+w*.66,oy+h*.38+b
  );
  // 身体下侧（腹部，比上侧略低→体积感）
  ctx.bezierCurveTo(
    ox+w*.60,oy+h*.48+b, ox+w*.54,oy+h*.60+b, ox+w*.48,oy+h*.64+b
  );
  ctx.bezierCurveTo(
    ox+w*.42,oy+h*.62+b, ox+w*.36,oy+h*.56+b, ox+w*.28,oy+h*.48+b
  );
  ctx.bezierCurveTo(
    ox+w*.20,oy+h*.52+b, ox+w*.14+sw*.5,oy+h*.62+b, ox+w*.08+sw*.8,oy+h*.68+b
  );
  // 回到尾尖
  ctx.bezierCurveTo(
    ox+w*.05+sw,oy+h*.70+b, ox+w*.03+sw,oy+h*.67+b, ox+w*.02+sw,oy+h*.65+b
  );
  ctx.closePath();

  // === 龙角（两根，从头顶伸出）===
  // 左角
  ctx.moveTo(ox+w*.80,oy+h*.10+b);
  ctx.bezierCurveTo(ox+w*.78,oy+h*.02+b,ox+w*.75,oy-h*.03+b,ox+w*.72,oy-h*.02+b);
  ctx.bezierCurveTo(ox+w*.74,oy+h*.01+b,ox+w*.77,oy+h*.05+b,ox+w*.80,oy+h*.10+b);
  // 右角
  ctx.moveTo(ox+w*.84,oy+h*.08+b);
  ctx.bezierCurveTo(ox+w*.86,oy+h*.0+b,ox+w*.88,oy-h*.04+b,ox+w*.90,oy-h*.02+b);
  ctx.bezierCurveTo(ox+w*.88,oy+h*.02+b,ox+w*.86,oy+h*.05+b,ox+w*.84,oy+h*.08+b);

  // === 龙须（两条，从口鼻下飘出）===
  ctx.moveTo(ox+w*.95,oy+h*.18+b);
  ctx.bezierCurveTo(ox+w*.98,oy+h*.25+b,ox+w*1.02,oy+h*.30+b,ox+w*.99,oy+h*.36+b);
  ctx.moveTo(ox+w*.96,oy+h*.20+b);
  ctx.bezierCurveTo(ox+w*1.0,oy+h*.28+b,ox+w*1.04,oy+h*.34+b,ox+w*1.02,oy+h*.40+b);

  // === 龙爪（四只，从身体下方伸出）===
  const clawXs=[.22,.38,.52,.64];
  clawXs.forEach(cx=>{
    const cy=cx<.4?.55:.54;
    ctx.moveTo(ox+w*cx,oy+h*(cy+.05)+b);
    ctx.bezierCurveTo(ox+w*(cx-.02),oy+h*(cy+.12)+b,ox+w*(cx+.01),oy+h*(cy+.18)+b,ox+w*(cx-.01),oy+h*(cy+.22)+b);
    // 三趾
    for(let f=-1;f<=1;f++){
      ctx.moveTo(ox+w*(cx-.01),oy+h*(cy+.22)+b);
      ctx.lineTo(ox+w*(cx-.01+f*.015),oy+h*(cy+.25)+b);
    }
  });
}

// ═══════════════════════════════════════
//  虎轮廓（手绘 — 水墨猛虎扑击姿态）
// ═══════════════════════════════════════
function drawTigerPath(ctx,ox,oy,w,h,t){
  const b=Math.sin(t*1.5+1)*3;
  ctx.beginPath();
  // === 虎身上侧（从尾到头）===
  // 尾尖（上翘）
  ctx.moveTo(ox+w*.98, oy+h*.25+b);
  ctx.bezierCurveTo(ox+w*.95,oy+h*.20+b, ox+w*.92,oy+h*.28+b, ox+w*.88,oy+h*.35+b);
  // 臀部（隆起）
  ctx.bezierCurveTo(ox+w*.82,oy+h*.32+b, ox+w*.76,oy+h*.28+b, ox+w*.70,oy+h*.30+b);
  // 背部
  ctx.bezierCurveTo(ox+w*.60,oy+h*.28+b, ox+w*.50,oy+h*.26+b, ox+w*.40,oy+h*.25+b);
  // 肩部（隆起）
  ctx.bezierCurveTo(ox+w*.32,oy+h*.22+b, ox+w*.26,oy+h*.18+b, ox+w*.22,oy+h*.20+b);
  // 颈部
  ctx.bezierCurveTo(ox+w*.18,oy+h*.22+b, ox+w*.14,oy+h*.20+b, ox+w*.12,oy+h*.16+b);
  // 头顶
  ctx.bezierCurveTo(ox+w*.10,oy+h*.12+b, ox+w*.06,oy+h*.10+b, ox+w*.04,oy+h*.14+b);
  // 口鼻（张口咆哮）
  ctx.bezierCurveTo(ox+w*.02,oy+h*.18+b, ox+w*.01,oy+h*.22+b, ox+w*.02,oy+h*.26+b);

  // === 虎下颌 → 身体下侧 ===
  // 下颌（张开→口腔）
  ctx.bezierCurveTo(ox+w*.04,oy+h*.30+b, ox+w*.08,oy+h*.32+b, ox+w*.12,oy+h*.28+b);
  // 胸部
  ctx.bezierCurveTo(ox+w*.16,oy+h*.32+b, ox+w*.20,oy+h*.38+b, ox+w*.24,oy+h*.40+b);
  // 腹部
  ctx.bezierCurveTo(ox+w*.34,oy+h*.42+b, ox+w*.50,oy+h*.44+b, ox+w*.62,oy+h*.42+b);
  // 后腹→臀
  ctx.bezierCurveTo(ox+w*.72,oy+h*.40+b, ox+w*.80,oy+h*.42+b, ox+w*.86,oy+h*.40+b);
  // 尾根
  ctx.bezierCurveTo(ox+w*.90,oy+h*.38+b, ox+w*.94,oy+h*.32+b, ox+w*.98,oy+h*.25+b);
  ctx.closePath();

  // === 耳朵 ===
  ctx.moveTo(ox+w*.08,oy+h*.12+b);
  ctx.bezierCurveTo(ox+w*.07,oy+h*.04+b,ox+w*.06,oy+h*.02+b,ox+w*.05,oy+h*.06+b);
  ctx.lineTo(ox+w*.07,oy+h*.10+b);
  ctx.moveTo(ox+w*.11,oy+h*.12+b);
  ctx.bezierCurveTo(ox+w*.12,oy+h*.04+b,ox+w*.13,oy+h*.02+b,ox+w*.14,oy+h*.06+b);
  ctx.lineTo(ox+w*.12,oy+h*.10+b);

  // === 前腿（扑击前伸）===
  ctx.moveTo(ox+w*.20,oy+h*.38+b);
  ctx.bezierCurveTo(ox+w*.16,oy+h*.50+b,ox+w*.10,oy+h*.60+b,ox+w*.06,oy+h*.68+b);
  ctx.bezierCurveTo(ox+w*.05,oy+h*.70+b,ox+w*.04,oy+h*.72+b,ox+w*.03,oy+h*.70+b);
  ctx.moveTo(ox+w*.06,oy+h*.68+b);
  ctx.lineTo(ox+w*.04,oy+h*.72+b);
  ctx.moveTo(ox+w*.06,oy+h*.68+b);
  ctx.lineTo(ox+w*.07,oy+h*.72+b);
  // 第二前腿
  ctx.moveTo(ox+w*.26,oy+h*.40+b);
  ctx.bezierCurveTo(ox+w*.22,oy+h*.52+b,ox+w*.18,oy+h*.62+b,ox+w*.14,oy+h*.70+b);
  ctx.lineTo(ox+w*.12,oy+h*.73+b);
  ctx.moveTo(ox+w*.14,oy+h*.70+b);
  ctx.lineTo(ox+w*.15,oy+h*.73+b);

  // === 后腿（蹬地）===
  ctx.moveTo(ox+w*.72,oy+h*.40+b);
  ctx.bezierCurveTo(ox+w*.70,oy+h*.52+b,ox+w*.68,oy+h*.62+b,ox+w*.66,oy+h*.70+b);
  ctx.lineTo(ox+w*.64,oy+h*.73+b);
  ctx.moveTo(ox+w*.66,oy+h*.70+b);
  ctx.lineTo(ox+w*.67,oy+h*.73+b);
  ctx.moveTo(ox+w*.80,oy+h*.42+b);
  ctx.bezierCurveTo(ox+w*.78,oy+h*.54+b,ox+w*.76,oy+h*.64+b,ox+w*.74,oy+h*.70+b);
  ctx.lineTo(ox+w*.72,oy+h*.73+b);
  ctx.moveTo(ox+w*.74,oy+h*.70+b);
  ctx.lineTo(ox+w*.75,oy+h*.73+b);

  // === 虎斑纹（几道弧线）===
  for(let i=0;i<5;i++){
    const sx=.30+i*.10;
    ctx.moveTo(ox+w*sx,oy+h*.28+b);
    ctx.bezierCurveTo(ox+w*(sx+.02),oy+h*.32+b,ox+w*(sx+.01),oy+h*.36+b,ox+w*(sx-.01),oy+h*.38+b);
  }
}

// ═══════════════════════════════════════
//  从轮廓区域内采样点
// ═══════════════════════════════════════
// 在离屏canvas上画轮廓，然后随机撒点判断是否在内部
function sampleInsidePath(drawFn,ox,oy,w,h,count){
  const oc=document.createElement('canvas');
  oc.width=Math.ceil(w+40);oc.height=Math.ceil(h+40);
  const ox2=oc.getContext('2d');
  drawFn(ox2,20-ox,20-oy,w,h,0);
  ox2.fillStyle='#fff';ox2.fill();
  const imgData=ox2.getImageData(0,0,oc.width,oc.height);
  const d=imgData.data;
  const pts=[];
  let tries=0;
  while(pts.length<count&&tries<count*20){
    tries++;
    const px=Math.random()*oc.width;
    const py=Math.random()*oc.height;
    const idx=(Math.floor(py)*oc.width+Math.floor(px))*4;
    if(d[idx+3]>128){ // 在轮廓内
      pts.push({x:px-20+ox, y:py-20+oy});
    }
  }
  return pts;
}

// ═══════════════════════════════════════
//  粒子
// ═══════════════════════════════════════
const TOTAL=1800;
const px=new Float32Array(TOTAL);
const py=new Float32Array(TOTAL);
const pvx=new Float32Array(TOTAL);
const pvy=new Float32Array(TOTAL);
const ptx=new Float32Array(TOTAL); // 目标
const pty=new Float32Array(TOTAL);
const psz=new Uint8Array(TOTAL);
const palpha=new Float32Array(TOTAL);
const pglow=new Float32Array(TOTAL);
const pstate=new Uint8Array(TOTAL); // 0rain 1gather 2form 3clash 4scatter 5fall
const pside=new Uint8Array(TOTAL); // 0=龙 1=虎
const pchar=new Array(TOTAL);
const pcache=new Array(TOTAL);
const prot=new Float32Array(TOTAL);
const protv=new Float32Array(TOTAL);
const pph=new Float32Array(TOTAL);

function initParticles(){
  for(let i=0;i<TOTAL;i++){
    px[i]=Math.random()*W;
    py[i]=-Math.random()*H*2.5;
    pvx[i]=(Math.random()-.5)*.5;
    pvy[i]=1.5+Math.random()*3.5;
    const sz=SIZES[Math.floor(Math.random()*SIZES.length)];
    psz[i]=sz;
    palpha[i]=.12+Math.random()*.35;
    pglow[i]=0;
    pstate[i]=0;
    pside[i]=i<TOTAL/2?0:1;
    pchar[i]=rc();
    const hue=pside[i]===0?42:30;
    const lit=55+Math.floor(Math.random()*25);
    pcache[i]=getCC(pchar[i],sz,hue,lit);
    prot[i]=(Math.random()-.5)*.3;
    protv[i]=(Math.random()-.5)*.015;
    pph[i]=Math.random()*Math.PI*2;
  }
}
initParticles();

// 龙虎布局参数
let dragonRect,tigerRect;
function calcLayout(){
  const s=Math.min(W,H);
  const dw=s*.55, dh=s*.45;
  // 龙在左上
  dragonRect={x:W*.05, y:H*.08, w:dw, h:dh};
  // 虎在右下（面向左）
  tigerRect={x:W*.95-dw, y:H*.92-dh*.85, w:dw, h:dh*.75};
}
calcLayout();

// 采样目标点
let dragonPts=[],tigerPts=[];
function resample(){
  calcLayout();
  const dr=dragonRect,tr=tigerRect;
  dragonPts=sampleInsidePath(drawDragonPath,dr.x,dr.y,dr.w,dr.h,TOTAL/2);
  tigerPts=sampleInsidePath(drawTigerPath,tr.x,tr.y,tr.w,tr.h,TOTAL/2);
  // 分配目标
  for(let i=0;i<TOTAL;i++){
    if(pside[i]===0){
      const p=dragonPts[i%dragonPts.length];
      ptx[i]=p.x; pty[i]=p.y;
    }else{
      const p=tigerPts[(i-TOTAL/2)%tigerPts.length];
      ptx[i]=p.x; pty[i]=p.y;
    }
  }
}
resample();

// ═══════════════════════════════════════
//  状态切换
// ═══════════════════════════════════════
function setRain(){
  for(let i=0;i<TOTAL;i++){
    pstate[i]=0;
    px[i]=Math.random()*W;
    py[i]=-20-Math.random()*H*1.5;
    pvx[i]=(Math.random()-.5)*.4;
    pvy[i]=1.5+Math.random()*3;
    palpha[i]=.1+Math.random()*.35;
    pglow[i]=0;
  }
}

function setGather(){
  resample();
  for(let i=0;i<TOTAL;i++){ pstate[i]=1; pglow[i]=0; }
}

function setForm(){
  for(let i=0;i<TOTAL;i++){ pstate[i]=2; }
}

function setClash(){
  // 龙虎对冲：龙粒子往右冲，虎粒子往左冲
  const cx=W*.5, cy=H*.45;
  for(let i=0;i<TOTAL;i++){
    pstate[i]=3;
    const dx=cx-px[i], dy=cy-py[i];
    const dist=Math.hypot(dx,dy)+1;
    pvx[i]=dx/dist*6+(Math.random()-.5)*2;
    pvy[i]=dy/dist*4+(Math.random()-.5)*2;
    pglow[i]=1;
  }
}

function setScatter(){
  for(let i=0;i<TOTAL;i++){
    pstate[i]=4;
    const a=Math.random()*Math.PI*2;
    const s=3+Math.random()*8;
    pvx[i]=Math.cos(a)*s;
    pvy[i]=Math.sin(a)*s;
    pglow[i]=.8;
  }
}

function setFall(){
  for(let i=0;i<TOTAL;i++){
    pstate[i]=5;
    pvy[i]=.3+Math.random()*.8;
    pvx[i]=(Math.random()-.5)*.4;
    pglow[i]=0;
  }
}

// ═══════════════════════════════════════
//  更新
// ═══════════════════════════════════════
function update(){
  for(let i=0;i<TOTAL;i++){
    prot[i]+=protv[i];
    pph[i]+=.02;
    const st=pstate[i];
    if(st===0){ // rain
      px[i]+=pvx[i]; py[i]+=pvy[i];
      if(palpha[i]<.55) palpha[i]+=.003;
      if(py[i]>H+20){py[i]=-20;px[i]=Math.random()*W;}
    }else if(st===1){ // gather
      const dx=ptx[i]-px[i], dy=pty[i]-py[i];
      const d=Math.sqrt(dx*dx+dy*dy)+.1;
      const f=Math.min(.07,500/(d*d+60));
      pvx[i]+=dx*f; pvy[i]+=dy*f;
      pvx[i]*=.90; pvy[i]*=.90;
      px[i]+=pvx[i]; py[i]+=pvy[i];
      if(palpha[i]<.85)palpha[i]+=.006;
      if(pglow[i]<.5)pglow[i]+=.003;
    }else if(st===2){ // form
      const dx=ptx[i]-px[i], dy=pty[i]-py[i];
      px[i]+=dx*.1; py[i]+=dy*.1;
      palpha[i]=.75+Math.sin(pph[i])*.12;
      pglow[i]=.4+Math.sin(pph[i]*.7)*.15;
    }else if(st===3){ // clash
      px[i]+=pvx[i]; py[i]+=pvy[i];
      pvx[i]*=.97; pvy[i]*=.97;
      if(palpha[i]>.3) palpha[i]-=.002;
      pglow[i]*=.993;
    }else if(st===4){ // scatter
      px[i]+=pvx[i]; py[i]+=pvy[i];
      pvx[i]*=.96; pvy[i]*=.96;
      pvy[i]+=.03;
      if(palpha[i]>.08) palpha[i]-=.003;
      pglow[i]*=.98;
    }else{ // fall
      px[i]+=pvx[i]+Math.sin(pph[i])*.3;
      py[i]+=pvy[i];
      if(palpha[i]>.04) palpha[i]-=.0008;
      if(py[i]>H+20){py[i]=-10;palpha[i]=.12;}
    }
  }
}

// ═══════════════════════════════════════
//  绘制粒子
// ═══════════════════════════════════════
function drawP(){
  for(let i=0;i<TOTAL;i++){
    const a=palpha[i];
    if(a<.02)continue;
    const x=px[i],y=py[i],g=pglow[i];
    // 光晕
    if(g>.12){
      ctx.globalAlpha=a*g*.2;
      ctx.fillStyle=pside[i]===0?'#ffd050':'#ff7030';
      ctx.beginPath();ctx.arc(x,y,psz[i]*1.8,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=a;
    const cc=pcache[i],hs=cc.width/2;
    if(Math.abs(prot[i])>.01){
      ctx.save();ctx.translate(x,y);ctx.rotate(prot[i]);
      ctx.drawImage(cc,-hs,-hs);ctx.restore();
    }else{
      ctx.drawImage(cc,x-hs,y-hs);
    }
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  龙虎轮廓描边（若隐若现）
// ═══════════════════════════════════════
function drawGhostOutlines(t,phase){
  if(phase<'gather'||phase>'clash') return;
  const dr=dragonRect,tr=tigerRect;
  // 龙轮廓
  ctx.save();
  drawDragonPath(ctx,dr.x,dr.y,dr.w,dr.h,t);
  const da=phase==='form'?.06:.03;
  ctx.strokeStyle=`rgba(255,210,80,${da})`;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // 龙体内微光
  const dg=ctx.createRadialGradient(dr.x+dr.w*.55,dr.y+dr.h*.35,10,dr.x+dr.w*.55,dr.y+dr.h*.35,dr.w*.4);
  dg.addColorStop(0,`rgba(255,200,60,${da*.5})`);
  dg.addColorStop(1,'rgba(255,180,40,0)');
  ctx.fillStyle=dg;ctx.fill();
  ctx.restore();

  // 虎轮廓
  ctx.save();
  drawTigerPath(ctx,tr.x,tr.y,tr.w,tr.h,t);
  ctx.strokeStyle=`rgba(255,120,50,${da})`;
  ctx.lineWidth=1.5;
  ctx.stroke();
  const tg=ctx.createRadialGradient(tr.x+tr.w*.4,tr.y+tr.h*.35,10,tr.x+tr.w*.4,tr.y+tr.h*.35,tr.w*.4);
  tg.addColorStop(0,`rgba(255,100,30,${da*.5})`);
  tg.addColorStop(1,'rgba(200,60,20,0)');
  ctx.fillStyle=tg;ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════
//  火花
// ═══════════════════════════════════════
const MX=200;
const sk=new Float32Array(MX*6);
let sc=0;
function addSparks(cx,cy,n){
  for(let i=0;i<n&&sc<MX;i++){
    const o=sc*6;
    sk[o]=cx;sk[o+1]=cy;
    const a=Math.random()*Math.PI*2,s=3+Math.random()*10;
    sk[o+2]=Math.cos(a)*s;sk[o+3]=Math.sin(a)*s;
    sk[o+4]=1;sk[o+5]=1+Math.random()*2.5;
    sc++;
  }
}
function drawSparks(){
  let alive=0;
  for(let i=0;i<sc;i++){
    const o=i*6;
    sk[o]+=sk[o+2];sk[o+1]+=sk[o+3];
    sk[o+2]*=.94;sk[o+3]*=.94;sk[o+3]+=.08;
    sk[o+4]-=.014;
    if(sk[o+4]<=0)continue;
    ctx.beginPath();
    ctx.arc(sk[o],sk[o+1],sk[o+5]*sk[o+4],0,Math.PI*2);
    ctx.fillStyle=`rgba(255,210,80,${sk[o+4]*.8})`;
    ctx.fill();
    if(alive!==i) for(let j=0;j<6;j++)sk[alive*6+j]=sk[o+j];
    alive++;
  }
  sc=alive;
}

// ═══════════════════════════════════════
//  动画主循环
// ═══════════════════════════════════════
let started=false,startTime=0,frame=0;
let phase='',prevPhase='';

function getPhase(t){
  if(t<4.5)return'rain';
  if(t<10)return'gather';
  if(t<14)return'form';
  if(t<15)return'clash';
  if(t<18)return'scatter';
  return'fall';
}

function tick(){
  requestAnimationFrame(tick);
  frame++;
  if(!started){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);return;}

  const t=(performance.now()-startTime)/1000;
  phase=getPhase(t);

  if(phase!==prevPhase){
    if(phase==='rain')setRain();
    if(phase==='gather')setGather();
    if(phase==='form')setForm();
    if(phase==='clash')setClash();
    if(phase==='scatter')setScatter();
    if(phase==='fall')setFall();
    prevPhase=phase;
  }

  // form 阶段持续更新目标（龙虎在微动）
  if(phase==='form'&&frame%30===0) resample();

  // clash 产生火花
  if(phase==='clash'){
    const ct=t-14;
    if(ct>.1&&ct<.9&&frame%2===0){
      addSparks(W*.5+(Math.random()-.5)*120,H*.45+(Math.random()-.5)*80,6);
    }
  }

  update();

  // 绘制
  ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);

  // 龙虎轮廓
  drawGhostOutlines(t,phase);

  // 碰撞中心闪光
  if(phase==='clash'){
    const ct=t-14;
    const fa=ct<.15?ct/.15*.4:Math.max(0,.4-(ct-.15)*.5);
    if(fa>.01){
      const g=ctx.createRadialGradient(W*.5,H*.45,5,W*.5,H*.45,350);
      g.addColorStop(0,`rgba(255,255,200,${fa})`);
      g.addColorStop(.3,`rgba(255,200,100,${fa*.5})`);
      g.addColorStop(1,'rgba(200,100,50,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }
  }

  // 「儒」字
  if(t>.5&&t<5.5){
    const ra=t<1.5?(t-.5):Math.max(0,1-(t-3.5)/2);
    if(ra>.01){
      ctx.save();ctx.globalAlpha=ra*.5;
      ctx.font='120px "Songti SC","SimSun","KaiTi",serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(255,200,50,.4)';ctx.shadowBlur=40;
      ctx.fillStyle='rgba(255,215,80,1)';
      ctx.fillText('儒',W/2,H/2);
      ctx.shadowBlur=0;ctx.restore();
    }
  }

  // 龙/虎 标签
  if(phase==='form'){
    ctx.save();ctx.globalAlpha=.18;
    ctx.font='44px "Songti SC","SimSun","KaiTi",serif';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,220,100,1)';
    ctx.fillText('龙',dragonRect.x+dragonRect.w*.5,dragonRect.y-20);
    ctx.fillStyle='rgba(255,140,60,1)';
    ctx.fillText('虎',tigerRect.x+tigerRect.w*.5,tigerRect.y-20);
    ctx.restore();
  }

  drawP();
  drawSparks();

  // 暗角
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // 结尾
  if(t>22){
    const ea=Math.min(.5,(t-22)/3);
    ctx.save();ctx.globalAlpha=ea;ctx.textAlign='center';
    ctx.font='24px "Songti SC","SimSun","KaiTi",serif';
    ctx.fillStyle='rgba(200,180,120,1)';
    ctx.fillText('千万经典文字  凝形而战  化字而归',W/2,H/2-15);
    ctx.font='14px "Songti SC","SimSun",serif';
    ctx.globalAlpha=ea*.6;ctx.fillStyle='rgba(160,145,100,1)';
    ctx.fillText('— 剑来 · 本命字',W/2,H/2+15);
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
document.getElementById('playBtn').addEventListener('click',()=>{
  const btn=document.getElementById('playBtn');
  btn.style.opacity='0';setTimeout(()=>btn.style.display='none',1000);
  started=true;startTime=performance.now();
  initAudio();
},{once:true});

window.addEventListener('resize',()=>{
  W=innerWidth;H=innerHeight;C.width=W;C.height=H;
  calcLayout();resample();
});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

tick();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudio(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.15;m.connect(ac.destination);
  // drone
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=40;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.08,ac.currentTime+3);
  dg.gain.linearRampToValueAtTime(.05,ac.currentTime+10);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+22);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=120;
  dr.connect(lp);lp.connect(dg);dg.connect(m);
  dr.start();dr.stop(ac.currentTime+24);
  // 汇聚
  setTimeout(()=>{
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sine';r.frequency.setValueAtTime(100,ac.currentTime);
    r.frequency.exponentialRampToValueAtTime(500,ac.currentTime+5);
    rg.gain.setValueAtTime(.05,ac.currentTime);
    rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+5);
    r.connect(rg);rg.connect(m);r.start();r.stop(ac.currentTime+5.5);
  },4500);
  // 碰撞
  setTimeout(()=>{
    const sz=ac.sampleRate*.4,b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/sz*5);
    const s=ac.createBufferSource();s.buffer=b;
    const g=ac.createGain();g.gain.value=.35;
    s.connect(g);g.connect(m);s.start();
    const imp=ac.createOscillator(),ig=ac.createGain();
    imp.type='sine';imp.frequency.setValueAtTime(90,ac.currentTime);
    imp.frequency.exponentialRampToValueAtTime(20,ac.currentTime+.5);
    ig.gain.setValueAtTime(.3,ac.currentTime);
    ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.8);
    imp.connect(ig);ig.connect(m);imp.start();imp.stop(ac.currentTime+1);
  },14000);
  // 余韵
  setTimeout(()=>{
    [220,330,440,554].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.3);
      g.gain.linearRampToValueAtTime(.03,ac.currentTime+i*.3+.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
      o.connect(g);g.connect(m);
      o.start(ac.currentTime+i*.3);o.stop(ac.currentTime+5);
    });
  },18000);
}
</script>
