<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree of Life v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
#ui {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:10;
}
.btn {
  padding:8px 18px; border-radius:20px; border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.4); color:rgba(255,255,255,0.7);
  cursor:pointer; font-size:13px; backdrop-filter:blur(6px);
  transition:all .25s; user-select:none;
}
.btn:hover { background:rgba(255,255,255,0.12); }
.btn.active { background:rgba(255,210,120,0.2); border-color:rgba(255,210,120,0.6); color:#ffd890; }
#caption {
  position:fixed; bottom:92px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.7); font-size:17px; letter-spacing:5px;
  pointer-events:none; transition:opacity .7s;
  text-shadow:0 0 20px rgba(255,200,100,0.5);
}
</style>
</head>
<body>
<div id="caption">种子破土</div>
<div id="ui">
  <button class="btn active" onclick="goStage(0)">🌱 发芽</button>
  <button class="btn" onclick="goStage(1)">🌿 生长</button>
  <button class="btn" onclick="goStage(2)">🌸 开花</button>
  <button class="btn" onclick="goStage(3)">🍑 结果</button>
  <button class="btn" onclick="goStage(4)">🍂 落叶</button>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 7, 22);
camera.lookAt(0, 7, 0);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Sky (gradient + fog) ──
const SKY_CONFIGS = [
  { top:'#87ceeb', bot:'#d0eeff', fog:0xc8e8f8 },  // 发芽 — 晴天蓝
  { top:'#5bb8f5', bot:'#c2e8ff', fog:0xb0dcf8 },  // 生长 — 明亮蓝天
  { top:'#6ab4f0', bot:'#e8d0f8', fog:0xc0d8f8 },  // 开花 — 淡紫蓝
  { top:'#68b0e8', bot:'#f8ddc0', fog:0xc8d8e8 },  // 结果 — 暖蓝
  { top:'#a8c4d8', bot:'#d8c890', fog:0xc0b880 },  // 落叶 — 秋日灰蓝
];

// Sky plane (canvas texture)
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 2; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const skyTex = new THREE.CanvasTexture(skyCanvas);
const skyMat = new THREE.MeshBasicMaterial({ map:skyTex, side:THREE.BackSide, depthWrite:false });
const skyGeo = new THREE.SphereGeometry(200, 16, 8);
const skyMesh = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyMesh);

function updateSky(cfg) {
  const g = skyCtx.createLinearGradient(0,0,0,512);
  g.addColorStop(0, cfg.top); g.addColorStop(1, cfg.bot);
  skyCtx.fillStyle=g; skyCtx.fillRect(0,0,2,512);
  skyTex.needsUpdate = true;
  scene.fog = new THREE.Fog(cfg.fog, 30, 120);
  scene.background = new THREE.Color(cfg.top);
  // clouds
  if (!scene.userData.clouds) {
    scene.userData.clouds = [];
    const cloudMat = new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.82});
    for (let i=0;i<8;i++) {
      const g = new THREE.Group();
      const n = 3+Math.floor(Math.random()*3);
      for (let k=0;k<n;k++) {
        const r = 1.5+Math.random()*2;
        const s = new THREE.Mesh(new THREE.SphereGeometry(r,8,6), cloudMat.clone());
        s.position.set((Math.random()-.5)*r*2, (Math.random()-.5)*r*0.4, (Math.random()-.5)*r);
        g.add(s);
      }
      g.position.set((Math.random()-.5)*80, 22+Math.random()*12, -30-Math.random()*40);
      scene.add(g);
      scene.userData.clouds.push({mesh:g, speed:0.005+Math.random()*0.008});
    }
  }
}
updateSky(SKY_CONFIGS[0]);

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0xaaccff, 1.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff0dd, 2.0);
sunLight.position.set(8, 20, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 60;
sunLight.shadow.camera.left = -15;
sunLight.shadow.camera.right = 15;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -5;
scene.add(sunLight);

const fillLight = new THREE.PointLight(0x6644cc, 1.2, 40);
fillLight.position.set(-8, 10, 5);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xffa060, 0.8, 30);
rimLight.position.set(5, 8, -8);
scene.add(rimLight);

// ── Ground ──
const groundGeo = new THREE.PlaneGeometry(80, 80, 1, 1);
const groundMat = new THREE.MeshLambertMaterial({ color:0x2a5a18 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ── Build tree branch data ──
const branches = [];
function buildBranch(px,py,pz, dx,dy,dz, len, radius, depth) {
  if (depth > 8 || len < 0.1) return;
  const ex = px+dx*len, ey = py+dy*len, ez = pz+dz*len;
  branches.push({px,py,pz,ex,ey,ez,radius,depth,order:branches.length});
  if (depth >= 8) return;
  const spread = 0.38 + depth*0.01;
  const lr = len*(0.67+depth*0.003);
  // rotate dir left
  const up = new THREE.Vector3(0,1,0);
  const dir = new THREE.Vector3(dx,dy,dz).normalize();
  const lAxis = new THREE.Vector3().crossVectors(dir, up).normalize();
  if (lAxis.lengthSq() < 0.01) lAxis.set(1,0,0);
  const lDir = dir.clone().applyAxisAngle(lAxis, spread);
  buildBranch(ex,ey,ez, lDir.x,lDir.y,lDir.z, lr, radius*0.7, depth+1);
  const rDir = dir.clone().applyAxisAngle(lAxis, -spread*0.9);
  // slight random twist around Y per branch
  rDir.applyAxisAngle(up, (depth%2===0?0.2:-0.2));
  buildBranch(ex,ey,ez, rDir.x,rDir.y,rDir.z, lr*0.95, radius*0.68, depth+1);
}
buildBranch(0,0,0, 0,1,0, 4.2, 0.18, 0);  // 更高的树

const TOTAL = branches.length;
const tips = branches.filter(b=>b.depth>=6);

// ── Branch meshes ──
const branchGroup = new THREE.Group();
scene.add(branchGroup);
const branchMeshes = [];
for (const b of branches) {
  const start = new THREE.Vector3(b.px,b.py,b.pz);
  const end   = new THREE.Vector3(b.ex,b.ey,b.ez);
  const dir   = end.clone().sub(start);
  const len   = dir.length();
  const geo   = new THREE.CylinderGeometry(b.radius*0.55, b.radius, len, 5, 1);
  const mat   = new THREE.MeshLambertMaterial({ color:new THREE.Color().setHSL(0.07, 0.4, 0.12+b.depth*0.01) });
  const mesh  = new THREE.Mesh(geo, mat);
  mesh.position.copy(start.clone().lerp(end, 0.5));
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  mesh.castShadow = true;
  mesh.scale.y = 0;
  mesh.userData.order = b.order;
  branchGroup.add(mesh);
  branchMeshes.push(mesh);
}

// ── Texture canvas helpers ──
function makeCircleTex(size, color, blur=0.3) {
  const c = document.createElement('canvas'); c.width=c.height=size;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
  g.addColorStop(0, color);
  g.addColorStop(1-blur, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle=g; x.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function makeLeafTex(size, hue, light=0.45) {
  const c = document.createElement('canvas'); c.width=size; c.height=size*0.6;
  const x = c.getContext('2d');
  // leaf shape
  x.save();
  x.translate(size/2, size*0.3);
  x.beginPath();
  x.moveTo(0, -size*0.28);
  x.bezierCurveTo(size*0.35,-size*0.18, size*0.38,size*0.05, 0,size*0.24);
  x.bezierCurveTo(-size*0.38,size*0.05, -size*0.35,-size*0.18, 0,-size*0.28);
  const g = x.createRadialGradient(0,-size*0.05,0, 0,0,size*0.35);
  g.addColorStop(0, `hsla(${hue},70%,${light*100+15}%,1)`);
  g.addColorStop(0.6, `hsla(${hue},65%,${light*100}%,0.9)`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle=g; x.fill();
  // midrib
  x.beginPath(); x.moveTo(0,-size*0.26); x.lineTo(0,size*0.22);
  x.strokeStyle=`hsla(${hue},50%,${light*100-10}%,0.6)`; x.lineWidth=size*0.025; x.stroke();
  x.restore();
  return new THREE.CanvasTexture(c);
}

function makeFlowerTex(size) {
  const c = document.createElement('canvas'); c.width=c.height=size;
  const x = c.getContext('2d');
  const cx=size/2, cy=size/2, pr=size*0.38;
  for (let i=0;i<5;i++) {
    const a=(i/5)*Math.PI*2;
    x.beginPath();
    x.ellipse(cx+Math.cos(a)*pr*0.9, cy+Math.sin(a)*pr*0.9, pr*0.55,pr*0.32, a,0,Math.PI*2);
    const g=x.createRadialGradient(cx+Math.cos(a)*pr*0.9,cy+Math.sin(a)*pr*0.9,0,cx,cy,pr*1.5);
    g.addColorStop(0,'rgba(255,210,220,0.95)');
    g.addColorStop(0.5,'rgba(240,160,180,0.8)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.fill();
  }
  // center
  x.beginPath(); x.arc(cx,cy,pr*0.25,0,Math.PI*2);
  x.fillStyle='rgba(255,180,100,0.95)'; x.fill();
  return new THREE.CanvasTexture(c);
}

// ── Textures ──
const flowerTex  = makeFlowerTex(64);
const greenLeafTex  = makeLeafTex(64, 105, 0.35);  // green
const yellowLeafTex = makeLeafTex(64, 28,  0.5);   // autumn yellow
const fruitTex   = makeCircleTex(32, 'rgba(240,80,30,0.95)', 0.25);

// ── Particle systems ──
function makeParticles(count, tex, size, positions) {
  const posArr = new Float32Array(count*3);
  for (let i=0;i<count;i++) {
    const p = positions[i % positions.length];
    posArr[i*3]   = p.x + (Math.random()-.5)*0.5;
    posArr[i*3+1] = p.y + (Math.random()-.5)*0.5;
    posArr[i*3+2] = p.z + (Math.random()-.5)*0.5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(posArr,3));
  const mat = new THREE.PointsMaterial({
    map: tex, size, transparent:true, opacity:0,
    depthWrite:false, alphaTest:0.05,
    blending: THREE.NormalBlending,
  });
  return new THREE.Points(geo, mat);
}

// Tip positions for attaching particles
const tipPositions = tips.map(b=>new THREE.Vector3(b.ex,b.ey,b.ez));
const allTipPos = [];
for (const b of tips) {
  for (let k=0;k<4;k++) {
    allTipPos.push(new THREE.Vector3(
      b.ex+(Math.random()-.5)*0.6,
      b.ey+(Math.random()-.5)*0.4,
      b.ez+(Math.random()-.5)*0.6
    ));
  }
}

const flowerParticles  = makeParticles(500, flowerTex, 0.35, allTipPos);
const greenLeafParticles = makeParticles(400, greenLeafTex, 0.3, allTipPos);
const fruitParticles   = makeParticles(120, fruitTex, 0.22, tipPositions);
scene.add(flowerParticles);
scene.add(greenLeafParticles);
scene.add(fruitParticles);

// ── Falling leaf system (dynamic) ──
const FALL_COUNT = 350;
const fallGeo = new THREE.BufferGeometry();
const fallPos = new Float32Array(FALL_COUNT*3);
const fallVel = [];
function resetLeaf(i) {
  fallPos[i*3]   = (Math.random()-.5)*16;
  fallPos[i*3+1] = 6 + Math.random()*8;
  fallPos[i*3+2] = (Math.random()-.5)*8;
  fallVel[i] = {
    vx:(Math.random()-.5)*0.04,
    vy:-(0.025+Math.random()*0.04),
    vz:(Math.random()-.5)*0.02,
    phase:Math.random()*Math.PI*2,
  };
}
for (let i=0;i<FALL_COUNT;i++) resetLeaf(i);
fallGeo.setAttribute('position', new THREE.BufferAttribute(fallPos,3));
const fallMat = new THREE.PointsMaterial({
  map: yellowLeafTex, size:0.32, transparent:true,
  opacity:0, depthWrite:false, alphaTest:0.05,
});
const fallingLeaves = new THREE.Points(fallGeo, fallMat);
scene.add(fallingLeaves);

// ── Sprout mesh ──
const sproutGroup = new THREE.Group();
// stem
const stemGeo = new THREE.CylinderGeometry(0.025, 0.05, 0.5, 5);
const stemMat = new THREE.MeshLambertMaterial({ color:0x4a8a20 });
const stemMesh = new THREE.Mesh(stemGeo, stemMat);
stemMesh.position.y = 0.25; stemMesh.scale.y = 0; stemMesh.castShadow=true;
sproutGroup.add(stemMesh);
// two small leaves on sprout
for (let side of [-1,1]) {
  const lg = new THREE.PlaneGeometry(0.4, 0.25);
  const lm = new THREE.MeshLambertMaterial({ map:greenLeafTex, transparent:true, alphaTest:0.05, side:THREE.DoubleSide });
  const lmesh = new THREE.Mesh(lg, lm);
  lmesh.position.set(side*0.18, 0.42, 0);
  lmesh.rotation.z = side * 0.6;
  lmesh.scale.setScalar(0);
  lmesh.userData.isSproutLeaf = true;
  sproutGroup.add(lmesh);
}
scene.add(sproutGroup);

// ── State ──
const CAPTIONS = ['种子破土','枝叶生长','繁花盛开','硕果累累','落叶归根'];
let targetStage = 0;
const state = { sprout:0, grow:0, greenLeaf:0, flower:0, fruit:0, fall:0 };

const btns = document.querySelectorAll('.btn');
window.goStage = s => {
  targetStage = s;
  btns.forEach((b,i)=>b.classList.toggle('active',i===s));
  const cap=document.getElementById('caption');
  cap.style.opacity='0';
  setTimeout(()=>{cap.textContent=CAPTIONS[s];cap.style.opacity='1';},350);
  updateSky(SKY_CONFIGS[s]);
  // adjust lights
  const sunIntensities=[0.6,1.2,0.9,1.5,0.7];
  sunLight.intensity = sunIntensities[s];
  const ambColors=[0x88aadd,0x88aacc,0x9988cc,0xaa9988,0x998877];
  ambientLight.color.setHex(ambColors[s]);
  // 天空颜色同步更新
  scene.background = new THREE.Color(SKY_CONFIGS[s].top);
};

// ── Helpers ──
const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const clamp=(t)=>Math.min(1,Math.max(0,t));
const easeOut=(t)=>1-Math.pow(1-clamp(t),2);
const easeBack=(t)=>{t=clamp(t);return 1+2.7*Math.pow(t-1,3)+1.7*Math.pow(t-1,2);};
const easeIO=(t)=>{t=clamp(t);return t<.5?2*t*t:-1+(4-2*t)*t;};

// ── Animate ──
const clock = new THREE.Clock();
let elapsed = 0;

renderer.setAnimationLoop(()=>{
  const dt = clock.getDelta();
  elapsed += dt;
  const sp = dt * 0.7;

  // State transitions
  state.sprout    = lerp(state.sprout,   targetStage>=0?1:0, sp*2.0);
  state.grow      = lerp(state.grow,     targetStage>=1?1:0, sp*0.65);
  state.greenLeaf = lerp(state.greenLeaf,(targetStage===1||targetStage===3)?1:0, sp*0.5);
  state.flower    = lerp(state.flower,   targetStage===2?1:0, sp*0.6);
  state.fruit     = lerp(state.fruit,    targetStage===3?1:0, sp*0.5);
  state.fall      = lerp(state.fall,     targetStage===4?1:0, sp*0.55);
  // 落叶阶段：sprout叶片消失
  const sproutVisible = targetStage < 4;

  // Sprout — 完全隐藏在生长/落叶阶段
  const sproutFade = clamp(1 - state.grow/0.4) * (targetStage < 4 ? 1 : clamp(1-state.fall/0.3));
  stemMesh.scale.y  = easeBack(clamp(state.sprout*1.8)) * sproutFade;
  sproutGroup.children.forEach(c=>{
    if (c.userData.isSproutLeaf) {
      const s = easeBack(clamp((state.sprout-0.5)*2)) * sproutFade;
      c.scale.setScalar(s);
    }
  });

  // Branches
  const bReveal = easeIO(state.grow) * TOTAL;
  for (const m of branchMeshes) {
    const localT = clamp((bReveal - m.userData.order) / Math.max(1,TOTAL*0.05));
    m.scale.y = easeIO(localT);
  }

  // Green leaves (生长 + 结果)
  greenLeafParticles.material.opacity = easeOut(state.greenLeaf) * 0.88;

  // Flowers
  flowerParticles.material.opacity = easeOut(state.flower) * 0.92;
  flowerParticles.material.size = 0.32 + Math.sin(elapsed*1.5)*0.02;

  // Fruits
  fruitParticles.material.opacity = easeOut(state.fruit) * 0.9;
  fruitParticles.rotation.y += dt*0.05;

  // Falling leaves
  fallMat.opacity = easeOut(state.fall) * 0.88;
  if (state.fall > 0.05) {
    const posAttr = fallGeo.getAttribute('position');
    for (let i=0;i<FALL_COUNT;i++) {
      const v = fallVel[i];
      posAttr.array[i*3]   += v.vx + Math.sin(elapsed*0.7+v.phase)*0.015;
      posAttr.array[i*3+1] += v.vy * state.fall;
      posAttr.array[i*3+2] += v.vz;
      if (posAttr.array[i*3+1] < -0.3) resetLeaf(i);
    }
    posAttr.needsUpdate = true;
  }

  // Camera gentle orbit
  camera.position.x = Math.sin(elapsed*0.1)*2.5;
  camera.position.z = 22 + Math.sin(elapsed*0.07)*1.5;
  camera.position.y = 6  + Math.sin(elapsed*0.08)*0.5;
  camera.lookAt(0, 7, 0);

  // 云朵漂移
  if (scene.userData.clouds) {
    for (const c of scene.userData.clouds) {
      c.mesh.position.x += c.speed;
      if (c.mesh.position.x > 60) c.mesh.position.x = -60;
    }
  }

  // Sun drift
  sunLight.position.x = 8+Math.sin(elapsed*0.05)*3;
  sunLight.position.z = 10+Math.cos(elapsed*0.05)*3;

  renderer.render(scene, camera);
});
</script>
</body>
</html>
