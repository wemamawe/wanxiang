<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree of Life</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; display:flex; flex-direction:column; align-items:center;
       justify-content:center; min-height:100vh; overflow:hidden; }
canvas { display:block; }
#ui {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:10;
}
.btn {
  padding:8px 18px; border-radius:20px; border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7);
  cursor:pointer; font-size:13px; font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  transition:all .25s; user-select:none;
}
.btn:hover { background:rgba(255,255,255,0.14); }
.btn.active { background:rgba(255,210,140,0.2); border-color:rgba(255,210,140,0.6); color:#ffd88a; }
#caption {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.65); font-size:17px; letter-spacing:5px;
  font-family:'PingFang SC','Microsoft YaHei',serif;
  pointer-events:none; transition:opacity .7s;
  text-shadow: 0 0 18px rgba(255,200,120,0.4);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="caption">种子破土</div>
<div id="ui">
  <button class="btn active" onclick="goStage(0)">🌱 发芽</button>
  <button class="btn" onclick="goStage(1)">🌿 生长</button>
  <button class="btn" onclick="goStage(2)">🌸 开花</button>
  <button class="btn" onclick="goStage(3)">🍑 结果</button>
  <button class="btn" onclick="goStage(4)">🍂 落叶</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, OX, OY;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  OX = W / 2;
  OY = H * 0.82;
}
resize();
window.addEventListener('resize', resize);

// ── Build tree ──
// Each node: {x1,y1,x2,y2,depth,len,angle}
const NODES = [];
function buildTree(x, y, angle, len, depth) {
  if (depth > 10 || len < 3) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  NODES.push({ x1:x, y1:y, x2, y2, depth, len,
               sw: Math.max(0.5, (10-depth)*0.55 + 0.5) });
  const spread = 0.38 + (Math.random()-.5)*0.08;
  buildTree(x2, y2, angle - spread*(0.85+Math.random()*0.3),
            len*(0.68+Math.random()*0.06), depth+1);
  buildTree(x2, y2, angle + spread*(0.72+Math.random()*0.3),
            len*(0.65+Math.random()*0.06), depth+1);
  if (depth < 4 && Math.random() < 0.28) {
    buildTree(x2, y2, angle + (Math.random()-.5)*0.4,
              len*0.55, depth+2);
  }
}
// seed for consistency
let _s = 42;
const _r = () => { _s=(_s*1664525+1013904223)&0xffffffff; return (_s>>>0)/0xffffffff; };
const origRnd = Math.random;
Math.random = _r;
buildTree(0, 0, -Math.PI/2, 110, 0);
Math.random = origRnd;

const TOTAL = NODES.length;
const TIPS  = NODES.filter(n => n.depth >= 6);

// ── Flowers ──
const FLOWERS = [];
for (const n of TIPS) {
  const count = 2 + Math.floor(Math.random()*4);
  for (let k=0; k<count; k++) {
    const t = 0.5 + Math.random()*0.5;
    FLOWERS.push({
      x: n.x1+(n.x2-n.x1)*t + (Math.random()-.5)*12,
      y: n.y1+(n.y2-n.y1)*t + (Math.random()-.5)*12,
      r: 3.5 + Math.random()*4,
      hue: 338 + Math.floor(Math.random()*18),
      phase: Math.random()*Math.PI*2,
    });
  }
}

// ── Fruits ──
const FRUITS = [];
for (const n of TIPS) {
  if (Math.random() < 0.45) {
    FRUITS.push({
      x: n.x2 + (Math.random()-.5)*8,
      y: n.y2 + Math.random()*6,
      r: 5 + Math.random()*4,
      hue: 10 + Math.floor(Math.random()*25),
      phase: Math.random()*Math.PI*2,
    });
  }
}

// ── Falling leaves ──
const LEAVES = Array.from({length:280}, (_, i) => ({
  x: (Math.random()-.5)*600,
  y: -Math.random()*400,
  vx: (Math.random()-.5)*0.8,
  vy: 0.6+Math.random()*1.0,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-.5)*0.06,
  rx: 5+Math.random()*4,
  ry: 2.5+Math.random()*2,
  hue: 22+Math.floor(Math.random()*30),
  phase: Math.random()*Math.PI*2,
}));

// ── State ──
const CAPTIONS = ['种子破土','枝叶生长','繁花盛开','硕果累累','落叶归根'];
let targetStage = 0;
const state = { sprout:0, grow:0, flower:0, fruit:0, fall:0 };

const buttons = document.querySelectorAll('.btn');
window.goStage = s => {
  targetStage = s;
  buttons.forEach((b,i) => b.classList.toggle('active', i===s));
  const cap = document.getElementById('caption');
  cap.style.opacity = '0';
  setTimeout(()=>{ cap.textContent = CAPTIONS[s]; cap.style.opacity='1'; }, 350);
};

// ── Helpers ──
function lerp(a,b,t){ return a+(b-a)*Math.min(1,Math.max(0,t)); }
function easeOut(t){ return 1-Math.pow(1-Math.min(1,Math.max(0,t)),2); }
function easeBack(t){
  t=Math.min(1,Math.max(0,t));
  return 1+2.7*Math.pow(t-1,3)+1.7*Math.pow(t-1,2);
}
function easeInOut(t){ t=Math.min(1,Math.max(0,t)); return t<.5?2*t*t:-1+(4-2*t)*t; }

// ── Draw helpers ──
function drawFlower(x, y, r, hue, alpha, pulse) {
  const pr = r * (1 + pulse*0.06);
  for (let i=0;i<5;i++) {
    const a=(i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*pr*1.1, y+Math.sin(a)*pr*1.1,
                pr*0.85, pr*0.45, a, 0, Math.PI*2);
    ctx.fillStyle=`hsla(${hue},70%,82%,${0.88*alpha})`;
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(x,y,pr*0.42,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue+10},85%,62%,${0.95*alpha})`; ctx.fill();
}

function drawFruit(x, y, r, hue, alpha, sway) {
  const sx = x + sway;
  // stem
  ctx.beginPath(); ctx.moveTo(sx,y-r); ctx.lineTo(sx,y-r-6);
  ctx.strokeStyle=`rgba(60,100,30,${alpha*0.7})`; ctx.lineWidth=1; ctx.stroke();
  // body
  const g = ctx.createRadialGradient(sx-r*0.3,y-r*0.3,r*0.1,sx,y,r);
  g.addColorStop(0,`hsla(${hue},90%,72%,${alpha})`);
  g.addColorStop(1,`hsla(${hue+10},80%,40%,${alpha})`);
  ctx.beginPath(); ctx.arc(sx,y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  // shine
  ctx.beginPath(); ctx.ellipse(sx-r*0.28,y-r*0.28,r*0.25,r*0.15,-0.4,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${alpha*0.4})`; ctx.fill();
}

// ── Main loop ──
let frame=0;
const SP = 0.012; // transition speed per frame

function loop() {
  requestAnimationFrame(loop);
  frame++;
  const t = frame/60;

  // Advance state
  const tgt = targetStage;
  const sp = SP;
  state.sprout  = lerp(state.sprout,  tgt>=0?1:0, sp*2);
  state.grow    = lerp(state.grow,    tgt>=1?1:0, sp*0.8);
  state.flower  = lerp(state.flower,  tgt===2||tgt===3?1:0, sp*0.7);
  state.fruit   = lerp(state.fruit,   tgt>=3?1:0, sp*0.5);
  state.fall    = lerp(state.fall,    tgt===4?1:0, sp*0.6);

  // Clear
  ctx.clearRect(0,0,W,H);

  // Background gradient by stage
  const bgColors = [
    ['#0d1117','#0d1117'],
    ['#0d1520','#0a1018'],
    ['#150818','#0d0d18'],
    ['#180c08','#100808'],
    ['#080808','#050505'],
  ];
  const bc = bgColors[targetStage];
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, bc[0]); bg.addColorStop(1, bc[1]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Ground glow
  const gg = ctx.createRadialGradient(OX,OY,0,OX,OY,200);
  gg.addColorStop(0,'rgba(40,60,30,0.35)');
  gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg; ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(OX, OY);

  // ── Sprout ──
  if (state.sprout > 0.01) {
    const sh = 40 * easeBack(Math.min(1,state.sprout*2));
    const sa = Math.min(1, state.grow > 0.3 ? 1-(state.grow-0.3)/0.4 : 1);
    ctx.save();
    ctx.globalAlpha = sa;
    // stem
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-sh);
    ctx.strokeStyle='#6aaa30'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    // tiny leaves
    if (state.sprout > 0.5) {
      const la = easeOut((state.sprout-0.5)*2);
      ctx.globalAlpha=sa*la;
      ctx.beginPath(); ctx.ellipse(-8,-sh*0.7,10,5,-0.5,0,Math.PI*2);
      ctx.fillStyle='#7ac435'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(8,-sh*0.65,10,5,0.5,0,Math.PI*2);
      ctx.fillStyle='#88cc40'; ctx.fill();
    }
    ctx.restore();
  }

  // ── Branches ──
  const growReveal = easeInOut(state.grow) * TOTAL;
  if (state.grow > 0.01) {
    for (let i=0;i<TOTAL;i++) {
      const n = NODES[i];
      const localT = clamp01((growReveal - i) / Math.max(1, TOTAL*0.04));
      if (localT <= 0) continue;
      const bAlpha = easeOut(localT);
      // branch color darkens with depth
      const lightness = Math.max(18, 40-n.depth*3);
      ctx.beginPath();
      ctx.moveTo(n.x1, n.y1); ctx.lineTo(n.x2, n.y2);
      ctx.strokeStyle=`hsla(25,40%,${lightness}%,${bAlpha})`;
      ctx.lineWidth=n.sw; ctx.lineCap='round'; ctx.stroke();
    }
    // green leaf dots on tips
    if (state.grow > 0.6 && state.flower < 0.5) {
      const leafAlpha = easeOut((state.grow-0.6)/0.4) * (1-state.flower*2);
      for (const n of TIPS) {
        ctx.beginPath(); ctx.arc(n.x2,n.y2, 3.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(100,180,60,${leafAlpha*0.6})`; ctx.fill();
      }
    }
  }

  // ── Flowers ──
  if (state.flower > 0.01) {
    for (let i=0;i<FLOWERS.length;i++) {
      const f = FLOWERS[i];
      const delay = i/FLOWERS.length * 0.6;
      const localT = clamp01((state.flower - delay)/0.4);
      if (localT <= 0) continue;
      const alpha = easeOut(localT) * (1 - state.fall*0.8);
      const pulse = Math.sin(t*1.8 + f.phase)*0.5+0.5;
      drawFlower(f.x, f.y, f.r*easeBack(localT), f.hue, alpha, pulse);
    }
  }

  // ── Fruits ──
  if (state.fruit > 0.01) {
    for (let i=0;i<FRUITS.length;i++) {
      const f = FRUITS[i];
      const delay = i/FRUITS.length * 0.5;
      const localT = clamp01((state.fruit - delay)/0.5);
      if (localT <= 0) continue;
      const alpha = easeOut(localT) * (1-state.fall*0.7);
      const sway = Math.sin(t*1.2+f.phase)*2*localT;
      drawFruit(f.x, f.y, f.r*easeBack(localT), f.hue, alpha, sway);
    }
  }

  ctx.restore(); // un-translate

  // ── Falling leaves ──
  if (state.fall > 0.01) {
    for (const l of LEAVES) {
      l.x += l.vx * state.fall + Math.sin(t*0.8+l.phase)*0.5;
      l.y += l.vy * state.fall;
      l.rot += l.vrot * state.fall;
      if (l.y > H+20) { l.y=-20-Math.random()*100; l.x=OX+(Math.random()-.5)*W*0.9; }
      const alpha = Math.min(1, state.fall*1.5) * 0.8;
      ctx.save();
      ctx.translate(OX+l.x, OY+l.y);
      ctx.rotate(l.rot);
      ctx.beginPath();
      ctx.ellipse(0,0,l.rx,l.ry,0,0,Math.PI*2);
      ctx.fillStyle=`hsla(${l.hue},85%,52%,${alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }
}

function clamp01(t){ return Math.max(0,Math.min(1,t)); }

loop();
</script>
</body>
</html>
