<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please do not approach.</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #faf9f7;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 620;
canvas.width = W; canvas.height = H;

// ── Tree structure (fan-shape, coords relative to canvas) ──
// Origin: tree base at (240, 440)
const OX = 240, OY = 440;

const BRANCHES = [
  // [x1,y1, x2,y2, strokeW]  — absolute canvas coords
  // trunk
  [240,440, 236,330, 4],
  // main branches
  [236,330, 150,310, 2.4],
  [236,330, 310,308, 2.4],
  [236,330, 195,260, 2.2],
  [236,330, 280,258, 2.2],
  [236,330, 240,252, 2.0],
  // sub branches left
  [150,310,  90,285, 1.8],
  [150,310, 120,260, 1.6],
  [ 90,285,  58,265, 1.3],
  [ 90,285,  75,248, 1.2],
  [120,260,  95,238, 1.1],
  [120,260, 108,222, 1.0],
  // sub branches right
  [310,308, 370,282, 1.8],
  [310,308, 340,258, 1.6],
  [370,282, 402,260, 1.3],
  [370,282, 385,244, 1.2],
  [340,258, 365,235, 1.1],
  [340,258, 352,218, 1.0],
  // center top
  [195,260, 175,228, 1.4],
  [195,260, 190,215, 1.2],
  [280,258, 300,225, 1.4],
  [280,258, 285,212, 1.2],
  [240,252, 225,218, 1.1],
  [240,252, 252,215, 1.1],
];

// ── Flowers: [cx, cy, r, hue] ──
const FLOWERS = [
  // left cluster
  [ 58,260, 7, 345], [ 72,245, 6, 340], [ 88,258, 6.5, 348],
  [ 95,235, 5.5, 342], [108,220, 5, 345], [115,238, 6, 340],
  [ 78,265, 5, 348], [ 62,272, 4.5, 344],
  // left-mid
  [118,255, 6, 342], [125,240, 5.5, 346], [135,268, 5, 344],
  [105,248, 5, 340], [ 98,262, 4.5, 347],
  // right cluster
  [402,255, 7, 343], [388,240, 6, 347], [372,255, 6.5, 341],
  [395,268, 5.5, 345], [380,228, 5, 342],
  // right-mid
  [362,232, 6, 344], [370,248, 5.5, 340], [358,262, 5, 346],
  [350,215, 4.5, 343], [345,238, 5, 347],
  // center top
  [175,222, 6, 342], [185,208, 5.5, 346], [192,230, 5, 344],
  [250,210, 6, 340], [265,225, 5.5, 345], [278,210, 5, 343],
  [225,212, 5, 346], [240,205, 5.5, 341], [255,195, 4.5, 344],
  // scattered outer
  [ 48,268, 4, 345], [410,262, 4, 343],
  [168,215, 4.5, 340], [288,218, 4.5, 347],
  // tiny dots
  [ 80,272, 3, 344], [102,228, 3, 342], [128,244, 3, 346],
  [362,268, 3, 344], [394,250, 3, 342], [376,238, 3, 345],
  [198,218, 3, 343], [235,218, 3, 347], [262,205, 3, 344],
  // leaves (will draw as green ellipses separately)
];

const LEAVES = [
  [172,224, 5, 2.2, -0.5],
  [256,198, 4.5, 2, 0.4],
  [112,240, 4, 2, -0.3],
  [352,228, 4, 2, 0.35],
  [228,212, 4, 2, -0.2],
];

// ── Animation state ──
const TOTAL_BRANCH_FRAMES = 90;
const TOTAL_BLOOM_FRAMES  = 60;
const FENCE_START = 110;
const TEXT_START  = 145;

let frame = 0;

// Petal particles
const petals = Array.from({length:6}, (_, i) => ({
  x: 180 + i*20, y: 280 + (i%3)*15,
  vx: -0.3 - Math.random()*0.4,
  vy: 0.5 + Math.random()*0.6,
  rot: Math.random()*Math.PI*2,
  vrot: (Math.random()-0.5)*0.04,
  rx: 4, ry: 2.2,
  delay: 160 + i*25,
}));

function easeOut(t) { return 1 - Math.pow(1-t, 2); }
function easeBack(t) {
  const c1=1.70158, c3=c1+1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}

function drawBranch(b, alpha) {
  ctx.beginPath();
  ctx.moveTo(b[0], b[1]);
  ctx.lineTo(b[2], b[3]);
  ctx.strokeStyle = `rgba(38,30,24,${alpha})`;
  ctx.lineWidth = b[4];
  ctx.lineCap = 'round';
  ctx.stroke();
}

function drawFlower(cx, cy, r, hue, alpha) {
  if (r < 0.1 || alpha <= 0) return;
  for (let i=0; i<5; i++) {
    const a = (i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(
      cx + Math.cos(a)*r*1.1,
      cy + Math.sin(a)*r*1.1,
      r*0.85, r*0.48, a, 0, Math.PI*2
    );
    ctx.fillStyle = `hsla(${hue},68%,83%,${0.88*alpha})`;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, r*0.45, 0, Math.PI*2);
  ctx.fillStyle = `hsla(${hue+8},82%,62%,${0.95*alpha})`;
  ctx.fill();
}

function drawLeaf(lx, ly, rx, ry, angle, alpha) {
  ctx.save();
  ctx.translate(lx, ly);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(110,185,75,${0.78*alpha})`;
  ctx.fill();
  ctx.restore();
}

function drawFencePost(x, y, alpha) {
  if (alpha <= 0) return;
  const dy = (1-alpha)*14;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(x, y+dy); ctx.lineTo(x, y+42+dy);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.6; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y+dy, 2.8, 0, Math.PI*2);
  ctx.fillStyle = '#aaa'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(x, y+42+dy, 4, 2, 0, 0, Math.PI*2);
  ctx.fillStyle = '#bbb'; ctx.fill();
  ctx.restore();
}

function drawRope(t, yBase, alpha) {
  if (alpha <= 0) return;
  // draw rope from left to right proportional to t
  const x0=110, x1=160, x2=240, x3=320, x4=370;
  const pts = [
    [x0, yBase+12],
    [x1, yBase+28],
    [x2, yBase+24],
    [x3, yBase+20],
    [x4, yBase+12],
  ];
  // find point along the path at progress t
  const totalSegs = 4;
  const drawSegs = t * totalSegs;
  ctx.save();
  ctx.strokeStyle = `rgba(192,48,80,${alpha})`;
  ctx.lineWidth = 1.4;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let s=0; s<totalSegs; s++) {
    const segT = Math.min(1, drawSegs - s);
    if (segT <= 0) break;
    const px = pts[s][0] + (pts[s+1][0]-pts[s][0])*segT;
    const py = pts[s][1] + (pts[s+1][1]-pts[s][1])*segT;
    ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function loop() {
  requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#faf9f7'; ctx.fillRect(0,0,W,H);

  // base ring
  const baseA = Math.min(1, frame/20);
  ctx.beginPath();
  ctx.ellipse(OX, OY+8, 30, 9, 0, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(185,185,185,${baseA})`; ctx.lineWidth=1.2; ctx.stroke();

  // branches — reveal one by one
  const bProgress = Math.min(1, frame / TOTAL_BRANCH_FRAMES);
  const bReveal = bProgress * BRANCHES.length;
  for (let i=0; i<BRANCHES.length; i++) {
    if (i > bReveal) break;
    const a = Math.min(1, bReveal - i);
    drawBranch(BRANCHES[i], easeOut(a));
  }

  // flowers — start after half branches done, staggered
  const fStart = TOTAL_BRANCH_FRAMES * 0.4;
  if (frame > fStart) {
    const ft = frame - fStart;
    for (let i=0; i<FLOWERS.length; i++) {
      const delay = i * 1.8;
      const t = Math.min(1, Math.max(0, (ft - delay) / 18));
      if (t <= 0) continue;
      const [cx,cy,maxR,hue] = FLOWERS[i];
      const scale = easeBack(t);
      drawFlower(cx, cy, maxR * scale, hue, Math.min(1, t*3));
    }
    // leaves
    for (let i=0; i<LEAVES.length; i++) {
      const delay = i * 3 + 10;
      const t = Math.min(1, Math.max(0, (ft - delay) / 15));
      if (t <= 0) continue;
      const [lx,ly,rx,ry,ang] = LEAVES[i];
      drawLeaf(lx, ly, rx*t, ry*t, ang, Math.min(1,t*2));
    }
  }

  // fence posts
  if (frame > FENCE_START) {
    const ft = frame - FENCE_START;
    const posts = [[110,390],[160,394],[320,394],[370,390]];
    posts.forEach(([px,py], i) => {
      const t = Math.min(1, Math.max(0,(ft - i*5)/15));
      drawFencePost(px, py, easeOut(t));
    });
    // ropes
    const r1t = Math.min(1, Math.max(0,(ft-25)/30));
    const r2t = Math.min(1, Math.max(0,(ft-40)/30));
    drawRope(r1t, 390, r1t);
    drawRope(r2t, 404, r2t);
  }

  // caption
  if (frame > TEXT_START) {
    const ta = Math.min(1,(frame-TEXT_START)/30);
    ctx.save();
    ctx.globalAlpha = ta;
    ctx.font = 'italic 15px "Palatino Linotype","Book Antiqua",Palatino,serif';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0.5px';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Please do not approach.', W/2, 545);
    ctx.restore();
  }

  // falling petals
  if (frame > 160) {
    for (const p of petals) {
      if (frame < p.delay) continue;
      p.x += p.vx + Math.sin(frame*0.02+p.delay)*0.3;
      p.y += p.vy; p.rot += p.vrot;
      if (p.y > H+10) { p.y=-10; p.x=160+Math.random()*160; }
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);
      ctx.fillStyle = 'hsla(345,72%,80%,0.75)';
      ctx.fill(); ctx.restore();
    }
  }
}

loop();
</script>
</body>
</html>
