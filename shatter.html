<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>碎 · Shatter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; cursor: none; }
canvas { display: block; width: 100%; height: 100%; }
#info {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.3); font: 14px 'PingFang SC', sans-serif;
  pointer-events: none; z-index: 10; transition: opacity 1s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">点击敲碎</div>
<script>
// ============================================================
//  碎 · Shatter — Voronoi paper-smash scene
//  - click only shatters pieces near the impact point
//  - fragments stay in place (no flying/scattering)
//  - repeated clicks break big pieces into smaller ones
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

// ---------- classic text ----------
const TEXT = `天地玄黄，宇宙洪荒。日月盈昃，辰宿列张。寒来暑往，秋收冬藏。闰余成岁，律吕调阳。云腾致雨，露结为霜。金生丽水，玉出昆冈。剑号巨阙，珠称夜光。果珍李柰，菜重芥姜。海咸河淡，鳞潜羽翔。龙师火帝，鸟官人皇。始制文字，乃服衣裳。推位让国，有虞陶唐。吊民伐罪，周发殷汤。坐朝问道，垂拱平章。爱育黎首，臣伏戎羌。遐迩一体，率宾归王。鸣凤在竹，白驹食场。化被草木，赖及万方。`;

// ---------- state ----------
let paperTexture = null;
let pieces = [];           // {polygon, crackAge}
let hammerX = -100, hammerY = -100;
let hammerSwingT = -1;
let shakeT = -1;
let shakeIntensity = 0;
let firstClick = true;
let audioCtx = null;
let totalHits = 0;

// ---------- resize ----------
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildPaperTexture();
  resetPaper();
}

// ---------- paper texture ----------
function buildPaperTexture() {
  const c = document.createElement('canvas');
  c.width = W * dpr;
  c.height = H * dpr;
  const g = c.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);

  // paper background
  g.fillStyle = '#f5f0e8';
  g.fillRect(0, 0, W, H);

  // fiber noise
  const imgData = g.getImageData(0, 0, c.width, c.height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 15;
    d[i] += n; d[i+1] += n; d[i+2] += n;
  }
  g.putImageData(imgData, 0, 0);

  // vignette
  const grad = g.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.06)');
  g.fillStyle = grad;
  g.fillRect(0, 0, W, H);

  // write text
  const fontSize = Math.max(16, Math.min(W, H) * 0.028);
  const lineHeight = fontSize * 1.8;
  const margin = fontSize * 2;

  g.font = `${fontSize}px 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', serif`;
  g.fillStyle = '#2c2c2c';
  g.textBaseline = 'top';

  let fullText = TEXT;
  while (fullText.length < 2000) fullText += TEXT;

  let x = margin, y = margin;
  for (let i = 0; i < fullText.length && y < H - margin; i++) {
    const ch = fullText[i];
    if (ch === '\n') { x = margin; y += lineHeight; continue; }
    const cw = g.measureText(ch).width;
    if (x + cw > W - margin) { x = margin; y += lineHeight; }
    if (y > H - margin) break;
    g.fillText(ch, x, y);
    x += cw + fontSize * 0.1;
  }

  paperTexture = c;
}

// ---------- geometry helpers ----------
function clipPolygon(poly, nx, ny, d) {
  const out = [];
  const n = poly.length;
  for (let i = 0; i < n; i++) {
    const curr = poly[i];
    const next = poly[(i + 1) % n];
    const dc = nx * curr[0] + ny * curr[1] - d;
    const dn = nx * next[0] + ny * next[1] - d;
    if (dc <= 0) out.push(curr);
    if ((dc <= 0) !== (dn <= 0)) {
      const t = dc / (dc - dn);
      out.push([
        curr[0] + t * (next[0] - curr[0]),
        curr[1] + t * (next[1] - curr[1])
      ]);
    }
  }
  return out;
}

function clipToPolygon(subject, clip) {
  let output = subject.slice();
  const n = clip.length;
  for (let i = 0; i < n; i++) {
    if (output.length < 3) return output;
    const a = clip[i];
    const b = clip[(i + 1) % n];
    const nx = b[1] - a[1];
    const ny = a[0] - b[0];
    const d = nx * a[0] + ny * a[1];
    output = clipPolygon(output, nx, ny, d);
  }
  return output;
}

function polygonCentroid(poly) {
  let cx = 0, cy = 0;
  for (const p of poly) { cx += p[0]; cy += p[1]; }
  return [cx / poly.length, cy / poly.length];
}

function polygonArea(poly) {
  let area = 0;
  const n = poly.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    area += poly[i][0] * poly[j][1];
    area -= poly[j][0] * poly[i][1];
  }
  return Math.abs(area) / 2;
}

function polyBBox(poly) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of poly) {
    if (p[0] < minX) minX = p[0];
    if (p[1] < minY) minY = p[1];
    if (p[0] > maxX) maxX = p[0];
    if (p[1] > maxY) maxY = p[1];
  }
  return [minX, minY, maxX, maxY];
}

function pointInPolygon(x, y, poly) {
  let inside = false;
  const n = poly.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i][0], yi = poly[i][1];
    const xj = poly[j][0], yj = poly[j][1];
    if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// ---------- Voronoi cells via half-plane intersection ----------
function voronoiCells(seeds) {
  const n = seeds.length;
  const cells = [];
  // Use a large bounding box
  const pad = Math.max(W, H) * 2;
  for (let i = 0; i < n; i++) {
    let poly = [[-pad, -pad], [pad*2, -pad], [pad*2, pad*2], [-pad, pad*2]];
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const mx = (seeds[i][0] + seeds[j][0]) / 2;
      const my = (seeds[i][1] + seeds[j][1]) / 2;
      const dx = seeds[j][0] - seeds[i][0];
      const dy = seeds[j][1] - seeds[i][1];
      poly = clipPolygon(poly, dx, dy, dx * mx + dy * my);
      if (poly.length < 3) break;
    }
    cells.push(poly);
  }
  return cells;
}

// ---------- piece management ----------
function resetPaper() {
  pieces = [];
  totalHits = 0;
  pieces.push({
    polygon: [[0, 0], [W, 0], [W, H], [0, H]],
    crackAge: 0
  });
}

// impact radius — how far from click the cracks reach
function impactRadius() {
  return Math.min(W, H) * 0.18;
}

function smash(mx, my) {
  const newPieces = [];
  let didSmash = false;
  const radius = impactRadius();
  const minArea = W * H * 0.0003; // very small minimum

  for (const piece of pieces) {
    const area = polygonArea(piece.polygon);
    const [cx, cy] = polygonCentroid(piece.polygon);
    const dist = Math.hypot(cx - mx, cy - my);

    // Only shatter pieces whose centroid is within impact radius
    // AND the click point is inside the piece or very close
    const clickInside = pointInPolygon(mx, my, piece.polygon);
    const closeEnough = dist < radius;

    if ((!clickInside && !closeEnough) || area < minArea) {
      newPieces.push(piece);
      continue;
    }

    // Determine how many sub-pieces based on current size
    const relativeSize = area / (W * H);
    let numSeeds;
    if (relativeSize > 0.3) {
      numSeeds = 8 + Math.floor(Math.random() * 5); // big piece: 8-12 fragments
    } else if (relativeSize > 0.05) {
      numSeeds = 5 + Math.floor(Math.random() * 4); // medium: 5-8
    } else if (relativeSize > 0.005) {
      numSeeds = 3 + Math.floor(Math.random() * 3); // small: 3-5
    } else {
      // too small, don't break
      newPieces.push(piece);
      continue;
    }

    didSmash = true;

    // Generate seeds within this piece, biased toward impact point
    const bbox = polyBBox(piece.polygon);
    const seeds = [];
    for (let i = 0; i < numSeeds; i++) {
      let sx, sy;
      let placed = false;
      for (let tries = 0; tries < 80; tries++) {
        if (Math.random() < 0.5 && clickInside) {
          // bias toward impact
          const r = Math.sqrt(Math.random()) * radius * 0.8;
          const a = Math.random() * Math.PI * 2;
          sx = mx + Math.cos(a) * r;
          sy = my + Math.sin(a) * r;
        } else {
          sx = bbox[0] + Math.random() * (bbox[2] - bbox[0]);
          sy = bbox[1] + Math.random() * (bbox[3] - bbox[1]);
        }
        if (pointInPolygon(sx, sy, piece.polygon)) { placed = true; break; }
      }
      if (placed) seeds.push([sx, sy]);
    }

    if (seeds.length < 2) {
      newPieces.push(piece);
      continue;
    }

    // Compute Voronoi, clip to parent polygon
    const rawCells = voronoiCells(seeds);
    for (let i = 0; i < rawCells.length; i++) {
      let cell = clipToPolygon(rawCells[i], piece.polygon);
      if (cell.length < 3) continue;
      if (polygonArea(cell) < minArea * 0.5) continue;
      newPieces.push({
        polygon: cell,
        crackAge: piece.crackAge + 1
      });
    }
  }

  pieces = newPieces;

  if (didSmash) {
    totalHits++;
    shakeT = 0;
    shakeIntensity = Math.min(6, 3 + totalHits * 0.3);
    playSmashSound();
    if (firstClick) {
      document.getElementById('info').style.opacity = '0';
      firstClick = false;
    }
  }
}

// ---------- audio ----------
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSmashSound() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // impact thud
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.2);

  // crack noise
  const bufLen = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 4);
  }
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  noise.buffer = buf;
  noiseGain.gain.setValueAtTime(0.25, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  noise.connect(noiseGain).connect(audioCtx.destination);
  noise.start(now);
}

// ---------- hammer ----------
function drawHammer(x, y, swing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-0.3 + swing);

  // handle
  const handleLen = 55;
  const handleW = 5;
  ctx.fillStyle = '#8B6914';
  ctx.strokeStyle = '#6B4F12';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(-handleW/2, 0, handleW, handleLen, 2);
  ctx.fill();
  ctx.stroke();

  // grip lines
  ctx.strokeStyle = '#5a3e0e';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    const gy = handleLen - 12 + i * 3;
    ctx.beginPath();
    ctx.moveTo(-handleW/2 + 1, gy);
    ctx.lineTo(handleW/2 - 1, gy);
    ctx.stroke();
  }

  // head
  const headW = 28, headH = 18;
  ctx.fillStyle = '#555';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-headW/2, -headH + 2, headW, headH, 3);
  ctx.fill();
  ctx.stroke();

  // shine
  const shine = ctx.createLinearGradient(-headW/2, -headH+2, headW/2, 2);
  shine.addColorStop(0, 'rgba(255,255,255,0.15)');
  shine.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  shine.addColorStop(1, 'rgba(0,0,0,0.1)');
  ctx.fillStyle = shine;
  ctx.beginPath();
  ctx.roundRect(-headW/2, -headH + 2, headW, headH, 3);
  ctx.fill();

  ctx.restore();
}

// ---------- crack line rendering ----------
function drawCrackLine(x1, y1, x2, y2, age) {
  // Gap width: narrow and subtle
  const gapWidth = Math.min(2.5, 0.6 + age * 0.35);
  const outerWidth = gapWidth + 1;

  // 1) Outer soft shadow (subtle depth)
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(0, 0, 0, ${Math.min(0.12, 0.03 + age * 0.02)})`;
  ctx.lineWidth = outerWidth + 1.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 2) Crack gap — lighter tone, like cardboard interior
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(120, 100, 75, ${Math.min(0.7, 0.35 + age * 0.08)})`;
  ctx.lineWidth = gapWidth;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 3) Bright edge highlights (paper edge catching light)
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 1) return;
  const nx = -dy / len * gapWidth * 0.4;
  const ny = dx / len * gapWidth * 0.4;
  const edgeAlpha = Math.min(0.35, 0.12 + age * 0.05);

  ctx.beginPath();
  ctx.moveTo(x1 + nx, y1 + ny);
  ctx.lineTo(x2 + nx, y2 + ny);
  ctx.strokeStyle = `rgba(240, 230, 215, ${edgeAlpha})`;
  ctx.lineWidth = 0.8;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x1 - nx, y1 - ny);
  ctx.lineTo(x2 - nx, y2 - ny);
  ctx.strokeStyle = `rgba(180, 160, 130, ${edgeAlpha * 0.6})`;
  ctx.lineWidth = 0.6;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// ---------- render ----------
function render() {
  // screen shake
  let shakeX = 0, shakeY = 0;
  if (shakeT >= 0) {
    shakeT += 0.016;
    if (shakeT < 0.25) {
      const decay = 1 - shakeT / 0.25;
      shakeX = Math.sin(shakeT * 60) * shakeIntensity * decay;
      shakeY = Math.cos(shakeT * 45) * shakeIntensity * decay * 0.7;
    } else {
      shakeT = -1;
    }
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // background
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Draw all pieces
  for (const p of pieces) {
    const poly = p.polygon;
    if (poly.length < 3) continue;

    ctx.save();

    // clip and draw paper texture
    ctx.beginPath();
    ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) {
      ctx.lineTo(poly[i][0], poly[i][1]);
    }
    ctx.closePath();
    ctx.save();
    ctx.clip();
    if (paperTexture) {
      ctx.drawImage(paperTexture, 0, 0, paperTexture.width, paperTexture.height, 0, 0, W, H);
    }
    ctx.restore();

    // Pieces shift slightly apart for visible gap
    if (p.crackAge > 0) {
      // micro-offset each piece away from its centroid → creates visible gap
      const [pcx, pcy] = polygonCentroid(poly);
      const paperCX = W / 2, paperCY = H / 2;
      const offDist = Math.min(1.5, 0.3 + p.crackAge * 0.3);
      const offAngle = Math.atan2(pcy - paperCY, pcx - paperCX);
      const offX = Math.cos(offAngle) * offDist;
      const offY = Math.sin(offAngle) * offDist;

      // re-draw with slight offset (overwrite on top)
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(poly[0][0] + offX, poly[0][1] + offY);
      for (let i = 1; i < poly.length; i++) {
        ctx.lineTo(poly[i][0] + offX, poly[i][1] + offY);
      }
      ctx.closePath();
      ctx.clip();
      if (paperTexture) {
        ctx.drawImage(paperTexture, 0, 0, paperTexture.width, paperTexture.height,
                      offX, offY, W, H);
      }
      ctx.restore();
    }

    ctx.restore();
  }

  // Draw crack lines on top (edges between pieces)
  // Collect all edges
  if (pieces.length > 1) {
    const edgeSet = new Set();
    for (const p of pieces) {
      const poly = p.polygon;
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        // round coords to create edge keys
        const key = edgeKey(a[0], a[1], b[0], b[1]);
        if (!edgeSet.has(key)) {
          edgeSet.add(key);
          drawCrackLine(a[0], a[1], b[0], b[1], p.crackAge);
        }
      }
    }
  }

  ctx.restore(); // end shake

  // hammer cursor
  let swing = 0;
  if (hammerSwingT >= 0) {
    hammerSwingT += 0.016;
    if (hammerSwingT < 0.12) {
      swing = Math.sin(hammerSwingT / 0.12 * Math.PI) * 0.6;
    } else if (hammerSwingT < 0.35) {
      swing = Math.sin((hammerSwingT - 0.12) / 0.23 * Math.PI) * -0.15;
    } else {
      hammerSwingT = -1;
    }
  }
  drawHammer(hammerX, hammerY, swing);

  requestAnimationFrame(render);
}

function edgeKey(x1, y1, x2, y2) {
  const ax = Math.round(x1 * 10), ay = Math.round(y1 * 10);
  const bx = Math.round(x2 * 10), by = Math.round(y2 * 10);
  if (ax < bx || (ax === bx && ay < by)) {
    return `${ax},${ay}-${bx},${by}`;
  }
  return `${bx},${by}-${ax},${ay}`;
}

// ---------- events ----------
canvas.addEventListener('mousemove', e => {
  hammerX = e.clientX;
  hammerY = e.clientY;
});

canvas.addEventListener('mousedown', e => {
  initAudio();
  hammerSwingT = 0;
  hammerX = e.clientX;
  hammerY = e.clientY;
  smash(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const t = e.touches[0];
  hammerX = t.clientX;
  hammerY = t.clientY;
  hammerSwingT = 0;
  smash(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  hammerX = t.clientX;
  hammerY = t.clientY;
}, { passive: false });

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
