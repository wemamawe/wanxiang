<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>樱花 · Sakura in Bloom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a0a2e;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;touch-action:none;}
canvas{display:block;}
#ui{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:10;
}
.btn{
  padding:8px 18px;border-radius:20px;border:1px solid rgba(255,200,220,0.5);
  background:rgba(255,255,255,0.15);color:rgba(255,220,235,0.95);
  font-size:13px;cursor:pointer;backdrop-filter:blur(8px);
  transition:all .25s;
}
.btn:hover{background:rgba(255,180,210,0.35);}
.btn.active{background:rgba(255,150,190,0.45);border-color:rgba(255,120,170,0.9);color:#fff;}
#caption{
  position:fixed;top:36px;left:50%;transform:translateX(-50%);
  color:rgba(255,230,240,0.90);font-size:calc(min(100vw,100vh)*0.038);letter-spacing:0.12em;
  text-shadow:0 0 20px rgba(255,150,200,0.8), 0 2px 8px rgba(0,0,0,0.4);
  transition:opacity .5s;pointer-events:none;
}
#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  color:rgba(255,200,220,0.45);font-size:calc(min(100vw,100vh)*0.022);letter-spacing:0.08em;pointer-events:none;
}
</style>
</head>
<body>
<a id="home-btn" href="home.html" style="position:fixed;top:24px;left:24px;z-index:20;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,200,220,0.3);color:rgba(255,220,235,0.8);font-size:12px;letter-spacing:2px;text-decoration:none;backdrop-filter:blur(8px);transition:all .2s;">← 展览馆</a>
<button id="sound-btn" style="position:fixed;top:24px;right:24px;z-index:20;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,200,220,0.3);color:rgba(255,220,235,0.8);font-size:12px;letter-spacing:1px;cursor:pointer;backdrop-filter:blur(8px);">🔇 音效</button>
<div id="caption">花苞初绽</div>
<div id="hint">拖拽旋转 · 滚轮缩放</div>
<div id="ui">
  <button class="btn active" data-stage="0">🌸 花苞</button>
  <button class="btn" data-stage="1">🌸 盛开</button>
  <button class="btn" data-stage="2">🌸 花雨</button>
  <button class="btn" data-stage="3">🌿 新叶</button>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

// ── Renderer ──
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
function handleResize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',handleResize);
handleResize();

// ── Scene & Camera ──
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x2d0a3e,0.018);
const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,300);
camera.position.set(0,5,20);
camera.lookAt(0,4,0);

// ── Sky gradient (sphere) ──
function makeSkyTex(top,mid,bot){
  const c=document.createElement('canvas');c.width=2;c.height=256;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,top); g.addColorStop(0.45,mid); g.addColorStop(1,bot);
  x.fillStyle=g; x.fillRect(0,0,2,256);
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}
const skyGeos=new THREE.SphereGeometry(200,16,8);
const skyMat=new THREE.MeshBasicMaterial({side:THREE.BackSide,
  map:makeSkyTex('#0d0520','#3d1255','#7a2560')});
const skySphere=new THREE.Mesh(skyGeos,skyMat);
scene.add(skySphere);

const SKIES=[
  ['#120830','#2e1050','#6b1f5a'],  // 0 bud  — deep dusk
  ['#1a0a3e','#5a1a7a','#c04090'],  // 1 full — magic hour
  ['#250d3a','#6e2080','#d060a0'],  // 2 fall  — sunset pink
  ['#0d2015','#1a4a30','#3a7050'],  // 3 leaf  — dawn green
];
function setSky(s){
  skyMat.map=makeSkyTex(SKIES[s][0],SKIES[s][1],SKIES[s][2]);
  skyMat.map.needsUpdate=true; skyMat.needsUpdate=true;
}

// ── Lights ──
const ambient=new THREE.AmbientLight(0xffd0e8,0.7);
scene.add(ambient);
const sun=new THREE.DirectionalLight(0xfff0d0,1.6);
sun.position.set(10,18,8);
sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=1; sun.shadow.camera.far=80;
sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
sun.shadow.camera.top=20; sun.shadow.camera.bottom=-20;
scene.add(sun);
// pink rim light
const rim=new THREE.DirectionalLight(0xff80c0,0.4);
rim.position.set(-8,5,-10); scene.add(rim);

// ── Terrain ──
const terrainW=120, terrainD=120, terrainSegs=80;
const terrainGeo=new THREE.PlaneGeometry(terrainW,terrainD,terrainSegs,terrainSegs);
const tPos=terrainGeo.attributes.position;
for(let i=0;i<tPos.count;i++){
  const x=tPos.getX(i), z=tPos.getY(i);
  const h=Math.sin(x*0.10)*1.0+Math.cos(z*0.08)*0.8
          +Math.sin(x*0.22+z*0.15)*0.4+Math.cos(x*0.07-z*0.13)*0.6;
  const d=Math.sqrt(x*x+z*z);
  tPos.setZ(i, h*(1-Math.max(0,1-d/9)));
}
terrainGeo.computeVertexNormals();
const terrainColors=new Float32Array(tPos.count*3);
for(let i=0;i<tPos.count;i++){
  const h=tPos.getZ(i);
  const c=new THREE.Color().setHSL(0.30+h*0.01, 0.45, 0.25+h*0.02);
  terrainColors[i*3]=c.r; terrainColors[i*3+1]=c.g; terrainColors[i*3+2]=c.b;
}
terrainGeo.setAttribute('color',new THREE.BufferAttribute(terrainColors,3));
const terrainMat=new THREE.MeshLambertMaterial({vertexColors:true});
const terrain=new THREE.Mesh(terrainGeo,terrainMat);
terrain.rotation.x=-Math.PI/2; terrain.receiveShadow=true;
scene.add(terrain);

// ── Clouds ──
function makeCloud(){
  const g=new THREE.Group();
  for(let i=0;i<6;i++){
    const s=0.8+Math.random()*1.2;
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(s,7,5),
      new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(0.88,0.25,0.88),transparent:true,opacity:0.55})
    );
    m.position.set((Math.random()-.5)*3.5,(Math.random()-.5)*0.8,(Math.random()-.5)*1.5);
    g.add(m);
  }
  return g;
}
const clouds=[];
for(let i=0;i<6;i++){
  const mesh=makeCloud();
  mesh.position.set((Math.random()-.5)*100, 22+Math.random()*10, (Math.random()-.5)*60);
  mesh.scale.setScalar(0.6+Math.random()*0.8);
  scene.add(mesh);
  clouds.push({mesh,speed:0.012+Math.random()*0.015});
}

// ── Texture makers ──
function makeSakuraTex(){
  const c=document.createElement('canvas'); c.width=128; c.height=128;
  const x=c.getContext('2d');
  x.clearRect(0,0,128,128);
  // 5 heart-shaped petals
  for(let p=0;p<5;p++){
    x.save();
    x.translate(64,64);
    x.rotate(p*Math.PI*2/5-Math.PI/2);
    x.beginPath();
    // heart petal: two bezier lobes
    x.moveTo(0,0);
    x.bezierCurveTo(-18,-8,-28,-32,-8,-38);
    x.bezierCurveTo(2,-42,4,-30,0,-22);
    x.bezierCurveTo(-4,-30,2,-42,8,-38);
    x.bezierCurveTo(28,-32,18,-8,0,0);
    const g=x.createRadialGradient(0,-20,2,0,-10,28);
    g.addColorStop(0,'rgba(255,240,248,1)');
    g.addColorStop(0.4,'rgba(255,190,220,0.95)');
    g.addColorStop(1,'rgba(220,120,170,0.6)');
    x.fillStyle=g; x.fill();
    // vein
    x.strokeStyle='rgba(200,100,150,0.3)'; x.lineWidth=0.8;
    x.beginPath(); x.moveTo(0,0); x.lineTo(0,-36); x.stroke();
    x.restore();
  }
  // center stamens
  x.save(); x.translate(64,64);
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    x.strokeStyle='rgba(255,200,80,0.9)'; x.lineWidth=1;
    x.beginPath();
    x.moveTo(Math.cos(a)*2,Math.sin(a)*2);
    x.lineTo(Math.cos(a)*10,Math.sin(a)*10);
    x.stroke();
    x.beginPath();
    x.arc(Math.cos(a)*10,Math.sin(a)*10,1.5,0,Math.PI*2);
    x.fillStyle='rgba(255,220,60,0.95)'; x.fill();
  }
  x.restore();
  return new THREE.CanvasTexture(c);
}

function makeBudTex(){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  x.clearRect(0,0,64,64);
  // oval bud shape
  x.beginPath();
  x.ellipse(32,32,10,18,0,0,Math.PI*2);
  const g=x.createRadialGradient(32,24,2,32,32,18);
  g.addColorStop(0,'rgba(255,200,220,1)');
  g.addColorStop(0.5,'rgba(220,100,150,0.9)');
  g.addColorStop(1,'rgba(160,60,110,0.5)');
  x.fillStyle=g; x.fill();
  return new THREE.CanvasTexture(c);
}

function makeLeafTex(){
  const c=document.createElement('canvas'); c.width=80; c.height=48;
  const x=c.getContext('2d');
  x.clearRect(0,0,80,48);
  x.save(); x.translate(40,24);
  x.beginPath();
  x.moveTo(0,-20); x.bezierCurveTo(16,-12,18,8,0,18);
  x.bezierCurveTo(-16,8,-16,-12,0,-20);
  const g=x.createLinearGradient(0,-20,0,18);
  g.addColorStop(0,'rgba(100,180,80,1)');
  g.addColorStop(0.5,'rgba(60,150,50,0.95)');
  g.addColorStop(1,'rgba(40,120,40,0.7)');
  x.fillStyle=g; x.fill();
  x.strokeStyle='rgba(30,100,30,0.4)'; x.lineWidth=1.2;
  x.beginPath(); x.moveTo(0,-18); x.lineTo(0,16); x.stroke();
  x.restore();
  return new THREE.CanvasTexture(c);
}

function makePetalFallTex(){
  // single petal for falling
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  x.clearRect(0,0,64,64);
  x.save(); x.translate(32,32);
  x.beginPath();
  x.moveTo(0,0);
  x.bezierCurveTo(-12,-6,-18,-22,-4,-26);
  x.bezierCurveTo(2,-28,2,-18,0,-12);
  x.bezierCurveTo(-2,-18,2,-28,4,-26);
  x.bezierCurveTo(18,-22,12,-6,0,0);
  const g=x.createRadialGradient(0,-14,1,0,-10,18);
  g.addColorStop(0,'rgba(255,235,245,0.95)');
  g.addColorStop(0.5,'rgba(255,180,210,0.85)');
  g.addColorStop(1,'rgba(220,120,170,0.4)');
  x.fillStyle=g; x.fill();
  x.restore();
  return new THREE.CanvasTexture(c);
}

const sakuraTex    = makeSakuraTex();
const budTex       = makeBudTex();
const leafTex      = makeLeafTex();
const petalFallTex = makePetalFallTex();

// ── Tree branches (tall elegant sakura) ──
const bGroup=new THREE.Group(); scene.add(bGroup);
const branches=[];
function buildBranch(px,py,pz,dx,dy,dz,len,rad,depth){
  if(depth>9||len<0.07) return;
  const ex=px+dx*len, ey=py+dy*len, ez=pz+dz*len;
  const id=branches.length;
  branches.push({px,py,pz,ex,ey,ez,rad,depth,id});
  if(depth>=9) return;
  // sakura: tall upright trunk, drooping outer branches
  const spreadBase = depth<2 ? 0.42 : depth<5 ? 0.52 : 0.60;
  const spread = spreadBase + (Math.random()-.5)*0.06;
  const lr = len*(0.68+depth*0.004);
  const up=new THREE.Vector3(0,1,0);
  const dir=new THREE.Vector3(dx,dy,dz).normalize();
  let ax=new THREE.Vector3().crossVectors(dir,up).normalize();
  if(ax.lengthSq()<0.01) ax.set(1,0,0);
  const twist = depth<3?(depth%2===0?0.5:-0.5):(Math.random()-.5)*0.4;
  const lDir=dir.clone().applyAxisAngle(ax,spread).applyAxisAngle(up,twist);
  buildBranch(ex,ey,ez,lDir.x,lDir.y,lDir.z,lr,rad*0.70,depth+1);
  const rDir=dir.clone().applyAxisAngle(ax,-spread*0.9).applyAxisAngle(up,-twist*0.85);
  buildBranch(ex,ey,ez,rDir.x,rDir.y,rDir.z,lr*0.88,rad*0.68,depth+1);
  if(depth<4&&Math.random()<0.35){
    const mDir=dir.clone().applyAxisAngle(up,(Math.random()-.5)*1.2)
                          .applyAxisAngle(ax,(Math.random()-.5)*0.3);
    buildBranch(ex,ey,ez,mDir.x,mDir.y,mDir.z,lr*0.55,rad*0.50,depth+2);
  }
}
buildBranch(0,0,0, 0,1,0, 3.2, 0.22, 0);
const TOTAL=branches.length;

const branchMeshes=[];
for(const b of branches){
  const s=new THREE.Vector3(b.px,b.py,b.pz);
  const e=new THREE.Vector3(b.ex,b.ey,b.ez);
  const d=e.clone().sub(s);
  const l=d.length();
  // dark reddish-gray bark (sakura characteristic)
  const light=Math.max(0.15, 0.28-b.depth*0.014);
  const geo=new THREE.CylinderGeometry(b.rad*0.45,b.rad,l,6,1);
  const mat=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(0.02,0.25,light)});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(s.clone().lerp(e,0.5));
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.normalize());
  m.castShadow=true; m.visible=false; m.scale.y=0; m.userData.id=b.id;
  // store base quaternion and wind params for sway
  m.userData.baseQuat = m.quaternion.clone();
  m.userData.depth = b.depth;
  m.userData.windPhase = Math.random()*Math.PI*2; // random phase per branch
  m.userData.midY = s.clone().lerp(e,0.5).y;     // height for wind scaling
  bGroup.add(m); branchMeshes.push(m);
}

// tip positions — deterministic uniform coverage across ALL branches
const tips=branches.filter(b=>b.depth>=4);
const tipPositions=tips.map(b=>new THREE.Vector3(b.ex,b.ey,b.ez));
const allTipPos=[];
for(const b of branches){
  // fixed t values: cover entire branch segment uniformly
  const samples = b.depth>=6 ? 6 : b.depth>=4 ? 5 : b.depth>=2 ? 3 : 2;
  for(let k=0;k<samples;k++){
    const t = 0.2 + (k/(samples-1||1))*0.78; // evenly spaced 0.2..0.98
    allTipPos.push(new THREE.Vector3(
      b.px+(b.ex-b.px)*t,
      b.py+(b.ey-b.py)*t,
      b.pz+(b.ez-b.pz)*t
    ));
  }
}

// ── Particle helper ──
// 每条枝条直接生成固定数量的粒子，保证全覆盖
function makeParticlesFromBranches(branches, tex, size, perBranch){
  const positions = [];
  for(const b of branches){
    for(let k=0; k<perBranch; k++){
      const t = k/(perBranch-1||1);
      // 均匀分布在枝条全长上
      const x = b.px+(b.ex-b.px)*t;
      const y = b.py+(b.ey-b.py)*t;
      const z = b.pz+(b.ez-b.pz)*t;
      // 微小随机扰动避免重叠
      const jitter = size * (b.depth>=5 ? 0.55 : b.depth>=3 ? 0.35 : 0.20);
      const angle = (k*2.39996)*Math.PI*2;
      positions.push({
        x: x + Math.cos(angle)*jitter,
        y: y + (Math.random()-0.5)*jitter*0.5,
        z: z + Math.sin(angle)*jitter,
      });
    }
  }
  const pa = new Float32Array(positions.length*3);
  for(let i=0;i<positions.length;i++){
    pa[i*3]=positions[i].x; pa[i*3+1]=positions[i].y; pa[i*3+2]=positions[i].z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pa,3));
  const mat = new THREE.PointsMaterial({
    map:tex, size, transparent:true, opacity:0,
    depthWrite:false, alphaTest:0.06, sizeAttenuation:true,
    blending:THREE.NormalBlending,
  });
  return new THREE.Points(geo,mat);
}

// 每条枝8个粒子，根据枝条深度决定每条数量
const budPts    = makeParticlesFromBranches(branches, budTex,    0.28, 5);
const sakuraPts = makeParticlesFromBranches(branches, sakuraTex, 0.52, 9);
const leafPts   = makeParticlesFromBranches(branches, leafTex,   0.42, 8);
scene.add(budPts); scene.add(sakuraPts); scene.add(leafPts);
budPts.visible=false; sakuraPts.visible=false; leafPts.visible=false;

// ── Sprout ──
const sproutGroup=new THREE.Group(); scene.add(sproutGroup);
const stemGeo=new THREE.CylinderGeometry(0.025,0.055,1.1,6);
const stemMat=new THREE.MeshLambertMaterial({color:0x6a2a3a});
const stemMesh=new THREE.Mesh(stemGeo,stemMat);
stemMesh.position.y=0.55; stemMesh.castShadow=true; stemMesh.scale.y=0;
sproutGroup.add(stemMesh);
for(let i=0;i<3;i++){
  const a=i/3*Math.PI*2;
  const lm=new THREE.Mesh(
    new THREE.PlaneGeometry(0.32,0.20),
    new THREE.MeshLambertMaterial({map:leafTex,transparent:true,alphaTest:0.05,side:THREE.DoubleSide})
  );
  lm.position.set(Math.cos(a)*0.2, 1.0, Math.sin(a)*0.2);
  lm.rotation.y=a; lm.rotation.z=0.4;
  lm.scale.setScalar(0); lm.userData.isSproutLeaf=true;
  sproutGroup.add(lm);
}

// ── Falling petals ──
const FALL=600;
const fallGeo=new THREE.BufferGeometry();
const fallPos=new Float32Array(FALL*3);
const fallVel=[];
const fallState=new Array(FALL).fill('falling');
let restCount=0;

function resetPetal(i){
  const tip=allTipPos[Math.floor(Math.random()*allTipPos.length)];
  fallPos[i*3]  =tip.x+(Math.random()-.5)*1.0;
  fallPos[i*3+1]=tip.y+(Math.random()-.5)*0.5;
  fallPos[i*3+2]=tip.z+(Math.random()-.5)*1.0;
  fallVel[i]={
    vx:(Math.random()-.5)*0.035,
    vy:-(0.018+Math.random()*0.025),  // petals fall slower
    vz:(Math.random()-.5)*0.025,
    phase:Math.random()*Math.PI*2,
    spin:Math.random()*0.08-0.04,
  };
  fallState[i]='falling';
}
for(let i=0;i<FALL;i++) resetPetal(i);
fallGeo.setAttribute('position',new THREE.BufferAttribute(fallPos,3));

const fallMat=new THREE.PointsMaterial({
  map:petalFallTex, size:0.32, transparent:true,
  opacity:0, depthWrite:false, alphaTest:0.05,
  blending:THREE.NormalBlending,
});
const fallingPetals=new THREE.Points(fallGeo,fallMat);
fallingPetals.visible=false;
scene.add(fallingPetals);

// ground petal meshes (flat lying)
const groundPetalGroup=new THREE.Group(); scene.add(groundPetalGroup);
groundPetalGroup.visible=false;

function spawnGroundPetal(x,y,z){
  const geo=new THREE.PlaneGeometry(0.22+Math.random()*0.14, 0.14+Math.random()*0.08);
  const mat=new THREE.MeshLambertMaterial({
    map:petalFallTex, transparent:true, alphaTest:0.05,
    side:THREE.DoubleSide, opacity:0.75,
  });
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x, y+0.02, z);
  m.rotation.x=-Math.PI/2;
  m.rotation.z=Math.random()*Math.PI*2;
  groundPetalGroup.add(m);
}

// ── Firefly particles (ambient sparkles) ──
const ffCount=120;
const ffGeo=new THREE.BufferGeometry();
const ffPos=new Float32Array(ffCount*3);
for(let i=0;i<ffCount;i++){
  ffPos[i*3]=(Math.random()-.5)*18;
  ffPos[i*3+1]=1+Math.random()*10;
  ffPos[i*3+2]=(Math.random()-.5)*12;
}
ffGeo.setAttribute('position',new THREE.BufferAttribute(ffPos,3));
function makeSparkTex(){
  const c=document.createElement('canvas'); c.width=32; c.height=32;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(16,16,0,16,16,14);
  g.addColorStop(0,'rgba(255,240,200,1)');
  g.addColorStop(0.4,'rgba(255,200,150,0.6)');
  g.addColorStop(1,'rgba(255,180,100,0)');
  x.fillStyle=g; x.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
}
const ffMat=new THREE.PointsMaterial({
  map:makeSparkTex(), size:0.18, transparent:true, opacity:0.55,
  depthWrite:false, alphaTest:0.02, blending:THREE.AdditiveBlending,
});
const fireflies=new THREE.Points(ffGeo,ffMat);
scene.add(fireflies);

// ── Stage state machine ──
const CAPTIONS=['花苞初绽','繁花盛开','花瓣飞雨','新叶初生'];
let targetStage=0;
const state={sprout:0,bud:0,bloom:0,petal:0,leaf:0};

window.goStage=s=>{
  targetStage=s;
  document.querySelectorAll('.btn').forEach((b,i)=>b.classList.toggle('active',i===s));
  const cap=document.getElementById('caption');
  cap.style.opacity='0';
  setTimeout(()=>{cap.textContent=CAPTIONS[s];cap.style.opacity='1';},350);
  setSky(s);
  const sunI=[1.2,1.8,1.5,1.4]; sun.intensity=sunI[s];
  const ambC=[0xffd0f0,0xff90d0,0xff70c0,0xd0ffd0];
  ambient.color.setHex(ambC[s]);
  if(s===2){
    restCount=0;
    while(groundPetalGroup.children.length>0)
      groundPetalGroup.remove(groundPetalGroup.children[0]);
    for(let i=0;i<FALL;i++) resetPetal(i);
    fallGeo.getAttribute('position').needsUpdate=true;
  }
};

document.querySelectorAll('#ui .btn').forEach(btn=>{
  btn.addEventListener('click',()=>goStage(parseInt(btn.dataset.stage)));
});

// ── Orbit controls ──
let orbitTheta=0, orbitPhi=Math.PI/9, orbitRadius=16;
let isDragging=false, lastX=0, lastY=0;
const TARGET=new THREE.Vector3(0,3,0);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  orbitTheta-=(e.clientX-lastX)*0.005;
  orbitPhi=clamp(orbitPhi-(e.clientY-lastY)*0.005,0.05,Math.PI*0.45);
  lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('wheel',e=>{
  orbitRadius=clamp(orbitRadius+e.deltaY*0.02,5,45);
},{passive:true});
let lastTouchDist=0,lastTouchX=0,lastTouchY=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;lastTouchX=e.touches[0].clientX;lastTouchY=e.touches[0].clientY;}
  if(e.touches.length===2) lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
});
renderer.domElement.addEventListener('touchend',()=>{isDragging=false;});
renderer.domElement.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    orbitTheta-=(e.touches[0].clientX-lastTouchX)*0.005;
    orbitPhi=clamp(orbitPhi-(e.touches[0].clientY-lastTouchY)*0.005,0.05,Math.PI*0.45);
    lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    orbitRadius=clamp(orbitRadius-(d-lastTouchDist)*0.05,5,45);
    lastTouchDist=d;
  }
},{passive:false});

// ── Helpers ──
const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const easeOut=t=>1-Math.pow(1-Math.min(1,Math.max(0,t)),2);
const easeBack=t=>{t=Math.min(1,Math.max(0,t));return 1+2.7*Math.pow(t-1,3)+1.7*Math.pow(t-1,2);};
const easeIO=t=>{t=Math.min(1,Math.max(0,t));return t<.5?2*t*t:-1+(4-2*t)*t;};

const clock=new THREE.Clock();
let elapsed=0;

renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta(); elapsed+=dt;
  const sp=dt*0.75;

  state.sprout =lerp(state.sprout, targetStage>=0?1:0, sp*2.5);
  state.bud    =lerp(state.bud,    targetStage===0?1:0, sp*0.8);
  state.bloom  =lerp(state.bloom,  (targetStage===1||targetStage===2)?1:0, sp*0.65);
  state.petal  =lerp(state.petal,  targetStage===2?1:0, sp*0.5);
  state.leaf   =lerp(state.leaf,   targetStage===3?1:0, sp*0.55);

  // Sprout (only at very start before stage 0 settles, then hide)
  const sproutFade=Math.min(1,Math.max(0,1-state.bud/0.5));
  stemMesh.scale.y=easeBack(Math.min(1,Math.max(0,state.sprout*1.8)))*sproutFade;
  sproutGroup.children.forEach(c=>{
    if(c.userData.isSproutLeaf)
      c.scale.setScalar(easeBack(Math.min(1,Math.max(0,(state.sprout-0.4)*2)))*sproutFade);
  });

  // ── Wind simulation ──
  const windBase = Math.sin(elapsed*0.22)*0.6 + Math.sin(elapsed*0.09)*0.4;
  const windGust = Math.max(0, Math.sin(elapsed*0.37))*1.0;
  const windStrength = Math.max(0, windBase + windGust); // 0..1.6

  // ── Whole tree sways as one unit (most visible effect) ──
  const treeSwayX = Math.sin(elapsed*1.6)*windStrength*0.045
                  + Math.sin(elapsed*2.9)*windStrength*0.018;
  const treeSwayZ = Math.sin(elapsed*1.3+0.5)*windStrength*0.022;
  bGroup.rotation.x = treeSwayX;
  bGroup.rotation.z = treeSwayZ;
  sproutGroup.rotation.x = treeSwayX;
  sproutGroup.rotation.z = treeSwayZ;

  // ── Individual branch micro-tremor (outer branches twitch more) ──
  for(const m of branchMeshes){
    if(!m.visible) continue;
    const d = m.userData.depth;
    if(d < 4) continue; // only outer branches tremble
    const phase = m.userData.windPhase;
    const tremble = windStrength*(0.015+d*0.008);
    const q = m.userData.baseQuat.clone();
    const ang = Math.sin(elapsed*4.5+phase)*tremble;
    const windRot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), ang);
    m.quaternion.copy(windRot.multiply(q));
  }

  // Branches: always fully visible from stage 0 onwards, no grow animation
  for(const m of branchMeshes){
    m.visible = true;
    m.scale.y = 1.0;
  }

  // Particles
  // ── Particle groups follow tree sway ──
  // Just sync particle group rotation to bGroup so flowers/leaves move with branches
  if(sakuraPts.visible){
    sakuraPts.rotation.x = treeSwayX * 0.8;
    sakuraPts.rotation.z = treeSwayZ * 0.8;
  }
  if(leafPts.visible){
    leafPts.rotation.x = treeSwayX * 0.8;
    leafPts.rotation.z = treeSwayZ * 0.8;
  }
  if(budPts.visible){
    budPts.rotation.x = treeSwayX * 0.8;
    budPts.rotation.z = treeSwayZ * 0.8;
  }

  budPts.visible    = targetStage===0 && state.bud>0.02;
  sakuraPts.visible = targetStage===1||targetStage===2;
  leafPts.visible   = targetStage===3;

  budPts.material.opacity    = easeOut(state.bud)*0.90;
  sakuraPts.material.opacity = easeOut(state.bloom)*0.92;
  sakuraPts.material.size    = 0.52+Math.sin(elapsed*1.1)*0.04;
  leafPts.material.opacity   = easeOut(state.leaf)*0.88;

  // Falling petals
  fallingPetals.visible   = targetStage===2 && state.petal>0.02;
  groundPetalGroup.visible= targetStage===2;
  fallMat.opacity=easeOut(state.petal)*0.88;
  if(state.petal>0.05){
    const pa=fallGeo.getAttribute('position');
    let anyMoving=false;
    for(let i=0;i<FALL;i++){
      if(fallState[i]==='resting') continue;
      anyMoving=true;
      const v=fallVel[i];
      // spiral drift + wind push
      pa.array[i*3]  +=v.vx+Math.sin(elapsed*0.8+v.phase)*0.022+v.spin + windStrength*0.022;
      pa.array[i*3+1]+=v.vy*(state.petal + windStrength*0.15); // wind lifts petals slightly
      pa.array[i*3+2]+=v.vz+Math.cos(elapsed*0.7+v.phase)*0.012;
      const lx=pa.array[i*3], lz=pa.array[i*3+2];
      const gH=(Math.sin(lx*0.10)*1.0+Math.cos(lz*0.08)*0.8
               +Math.sin(lx*0.22+lz*0.15)*0.4+Math.cos(lx*0.07-lz*0.13)*0.6)
               *(1-Math.max(0,1-Math.sqrt(lx*lx+lz*lz)/9));
      if(pa.array[i*3+1]<=gH+0.05){
        spawnGroundPetal(lx,gH,lz);
        pa.array[i*3+1]=-10;
        fallState[i]='resting'; restCount++;
        v.vx=0; v.vy=0; v.vz=0;
      }
    }
    if(!anyMoving&&restCount>=FALL)
      fallMat.opacity=Math.max(0,fallMat.opacity-dt*0.1);
    pa.needsUpdate=true;
  }

  // Fireflies float
  const fp=ffGeo.getAttribute('position');
  for(let i=0;i<ffCount;i++){
    fp.array[i*3]  +=Math.sin(elapsed*0.3+i)*0.004;
    fp.array[i*3+1]+=Math.sin(elapsed*0.5+i*0.7)*0.003;
    fp.array[i*3+2]+=Math.cos(elapsed*0.4+i*0.9)*0.004;
  }
  fp.needsUpdate=true;
  ffMat.opacity=0.4+Math.sin(elapsed*0.8)*0.2;

  // Camera orbit
  if(!isDragging) orbitTheta+=dt*0.055;
  const cx=TARGET.x+orbitRadius*Math.sin(orbitPhi)*Math.sin(orbitTheta);
  const cy=TARGET.y+orbitRadius*Math.cos(orbitPhi);
  const cz=TARGET.z+orbitRadius*Math.sin(orbitPhi)*Math.cos(orbitTheta);
  camera.position.set(cx,cy,cz);
  camera.lookAt(TARGET);

  // Clouds
  for(const c of clouds){
    c.mesh.position.x+=c.speed;
    if(c.mesh.position.x>65) c.mesh.position.x=-65;
  }

  // Sun
  sun.position.x=10+Math.sin(elapsed*0.035)*5;
  sun.position.z=14+Math.cos(elapsed*0.035)*5;

  renderer.render(scene,camera);
});
// ── Audio: Wind + Piano via Web Audio API ──
let audioCtx=null, windGain=null, isPlaying=false;

function startAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();

  // Wind: filtered noise
  const bufSize=audioCtx.sampleRate*2;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  const windSrc=audioCtx.createBufferSource();
  windSrc.buffer=buf;windSrc.loop=true;
  const bandpass=audioCtx.createBiquadFilter();
  bandpass.type='bandpass';bandpass.frequency.value=400;bandpass.Q.value=0.8;
  const lowpass=audioCtx.createBiquadFilter();
  lowpass.type='lowpass';lowpass.frequency.value=900;
  windGain=audioCtx.createGain();windGain.gain.value=0.12;
  windSrc.connect(bandpass);bandpass.connect(lowpass);lowpass.connect(windGain);windGain.connect(audioCtx.destination);
  windSrc.start();

  // Piano notes: pentatonic loop (C D E G A)
  const notes=[261.63,293.66,329.63,392,440,523.25,587.33,659.25];
  const melody=[0,2,4,5,4,2,0,1,3,4,3,1,5,4,2,0];
  let noteIdx=0;
  function playNote(){
    if(!isPlaying||!audioCtx) return;
    const freq=notes[melody[noteIdx%melody.length]];
    noteIdx++;
    const osc=audioCtx.createOscillator();
    const env=audioCtx.createGain();
    osc.type='triangle';
    osc.frequency.value=freq;
    env.gain.setValueAtTime(0,audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.06,audioCtx.currentTime+0.02);
    env.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+2.5);
    osc.connect(env);env.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+2.8);
    setTimeout(playNote,1200+Math.random()*1800);
  }
  setTimeout(playNote,500);
  isPlaying=true;
}

document.getElementById('sound-btn').addEventListener('click',()=>{
  if(!audioCtx){
    startAudio();
    document.getElementById('sound-btn').textContent='🔊 音效';
  } else {
    isPlaying=!isPlaying;
    if(windGain) windGain.gain.value=isPlaying?.12:0;
    document.getElementById('sound-btn').textContent=isPlaying?'🔊 音效':'🔇 音效';
  }
});
</script>

<script>
// Generated Audio System - 风铃+微风
// 风铃+微风音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  // 白噪声微风
  const bufSz=ctx.sampleRate*2,buf=ctx.createBuffer(1,bufSz,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bufSz;i++)d[i]=Math.random()*2-1;
  const wind=ctx.createBufferSource();wind.buffer=buf;wind.loop=true;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=300;
  const wg=ctx.createGain();wg.gain.value=0.25;
  wind.connect(lp);lp.connect(wg);wg.connect(master);wind.start();
  
  // 风铃叮当
  function chime(){
    if(!isActive)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=1200+Math.random()*800;o.type='sine';
    g.gain.setValueAtTime(0.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+1.8);
    setTimeout(chime,1500+Math.random()*3500);
  }
  chime();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
