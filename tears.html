<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>泪 · Tears Data</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f0ee;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#ui{position:fixed;bottom:4%;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:18px;pointer-events:auto;}
#ui button{background:rgba(160,175,190,0.15);border:1px solid rgba(140,160,180,0.25);
  color:rgba(80,100,120,0.55);font:italic 11px Georgia,serif;padding:5px 14px;
  border-radius:20px;cursor:pointer;letter-spacing:0.1em;transition:all 0.4s;}
#ui button:hover{background:rgba(130,165,200,0.22);color:rgba(60,90,120,0.8);}
#ui button.active{background:rgba(100,150,200,0.2);border-color:rgba(80,140,200,0.4);
  color:rgba(50,90,130,0.8);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="btn-rain" class="active" onclick="setMode('rain')">雨 · Rain</button>
  <button id="btn-vortex" onclick="setMode('vortex')">涡 · Vortex</button>
</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
C.width = W; C.height = H;
let time = 0;
let mode = 'rain'; // 'rain' or 'vortex'
let modeT = 0;     // 模式过渡 0=rain, 1=vortex
let mouseX = -1, mouseY = -1;

// 诗句
const POEMS = [
  '你来人间一趟',
  '你要看看太阳',
  '和你的心上人',
  '一起走在街上',
  '了解她',
  '也要了解太阳',
  '——海子',
  '',
  '我们终此一生',
  '就是要摆脱',
  '他人的期待',
  '找到真正的自己',
  '——伍尔夫',
];

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  buildLines();
  buildLeaves();
  buildGhostText();
}
window.addEventListener('resize',resize);

function setMode(m) {
  mode = m;
  document.getElementById('btn-rain').classList.toggle('active', m === 'rain');
  document.getElementById('btn-vortex').classList.toggle('active', m === 'vortex');
}

// ══════════════════════════════════════════════════
//  垂直细线 + 水滴
// ══════════════════════════════════════════════════
const LINES = [];
function buildLines() {
  LINES.length = 0;
  const count = Math.floor(W / 4.5);
  for (let i = 0; i < count; i++) {
    const x = (i / count) * W + (Math.random() - 0.5) * 3;
    const drops = [];
    const dropCount = 3 + Math.floor(Math.random() * 5);
    for (let d = 0; d < dropCount; d++) {
      drops.push({
        baseY: Math.random() * H,
        y: 0,
        r: 1.8 + Math.random() * 3.5,
        speed: 0.3 + Math.random() * 0.5,
        phase: Math.random() * Math.PI * 2,
        hue: 185 + Math.random() * 35,
        sat: 40 + Math.random() * 30,
        lit: 60 + Math.random() * 20,
        alpha: 0.4 + Math.random() * 0.35,
      });
    }
    LINES.push({
      x: x,
      baseX: x,
      hue: 220 + Math.random() * 40,
      alpha: 0.08 + Math.random() * 0.12,
      drops: drops,
      phase: Math.random() * Math.PI * 2,
      len: H * (0.4 + Math.random() * 0.6),
      startY: -H * Math.random() * 0.15,
    });
  }
}

// ══════════════════════════════════════════════════
//  草叶装饰
// ══════════════════════════════════════════════════
const LEAVES = [];
function buildLeaves() {
  LEAVES.length = 0;
  const count = 25 + Math.floor(Math.random() * 15);
  for (let i = 0; i < count; i++) {
    LEAVES.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: 6 + Math.random() * 12,
      rot: (Math.random() - 0.5) * Math.PI * 0.6,
      type: Math.floor(Math.random() * 3),
      alpha: 0.12 + Math.random() * 0.15,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ══════════════════════════════════════════════════
//  背景幽灵文字层
// ══════════════════════════════════════════════════
const GHOST = [];
function buildGhostText() {
  GHOST.length = 0;
  const words = ['data','time','tears','flow','memory','silence','rain','void',
    '0.0142','23:47','∞','null','echo','drift','0.618','π',
    'dissolve','fade','ripple','breath'];
  for (let i = 0; i < 40; i++) {
    GHOST.push({
      x: Math.random() * W,
      y: Math.random() * H,
      text: words[Math.floor(Math.random() * words.length)],
      size: 9 + Math.random() * 6,
      alpha: 0.03 + Math.random() * 0.04,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ══════════════════════════════════════════════════
//  漩涡计算（图2的焦点汇聚）
// ══════════════════════════════════════════════════
function vortexPos(baseX, baseY, t) {
  const focusX = W * 0.5;
  const focusY = H * 0.72;
  const dx = focusX - baseX;
  const dy = focusY - baseY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxDist = Math.sqrt(W*W + H*H) * 0.5;
  const pull = t * 0.75;  // 拉力

  // 螺旋偏移
  const angle = Math.atan2(dy, dx);
  const spiral = t * 2.5;
  const spiralOff = dist * 0.003 * spiral;

  return {
    x: baseX + dx * pull + Math.cos(angle + spiralOff + time * 0.3) * dist * (1-pull) * 0.08,
    y: baseY + dy * pull + Math.sin(angle + spiralOff + time * 0.3) * dist * (1-pull) * 0.05,
  };
}

// ══════════════════════════════════════════════════
//  绘制水滴（玻璃质感）
// ══════════════════════════════════════════════════
function drawDrop(x, y, r, hue, sat, lit, alpha) {
  if (r < 0.3) return;
  // 泪滴形状
  ctx.save();
  ctx.translate(x, y);

  // 主体
  const dg = ctx.createRadialGradient(-r*0.2, -r*0.15, 0, 0, r*0.15, r*1.2);
  dg.addColorStop(0, `hsla(${hue},${sat}%,${lit+20}%,${alpha*0.9})`);
  dg.addColorStop(0.5, `hsla(${hue},${sat+10}%,${lit}%,${alpha*0.7})`);
  dg.addColorStop(1, `hsla(${hue},${sat+15}%,${lit-15}%,${alpha*0.2})`);
  ctx.fillStyle = dg;

  ctx.beginPath();
  ctx.moveTo(0, -r * 1.3);
  ctx.quadraticCurveTo(r * 0.9, -r * 0.2, r * 0.72, r * 0.5);
  ctx.quadraticCurveTo(0, r * 1.25, -r * 0.72, r * 0.5);
  ctx.quadraticCurveTo(-r * 0.9, -r * 0.2, 0, -r * 1.3);
  ctx.fill();

  // 高光
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.55})`;
  ctx.beginPath();
  ctx.ellipse(-r * 0.18, -r * 0.35, r * 0.22, r * 0.32, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // 底部反光
  ctx.fillStyle = `rgba(200,230,255,${alpha * 0.2})`;
  ctx.beginPath();
  ctx.ellipse(r * 0.1, r * 0.4, r * 0.28, r * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ══════════════════════════════════════════════════
//  绘制草叶
// ══════════════════════════════════════════════════
function drawLeaf(l) {
  const sway = Math.sin(time * 0.5 + l.phase) * 0.08;
  ctx.save();
  ctx.translate(l.x, l.y);
  ctx.rotate(l.rot + sway);
  ctx.globalAlpha = l.alpha;

  const s = l.size;
  ctx.strokeStyle = `rgba(100,140,110,0.6)`;
  ctx.lineWidth = 0.7;
  ctx.lineCap = 'round';

  if (l.type === 0) {
    // 细长叶
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(s * 0.3, -s * 0.5, 0, -s);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-s * 0.25, -s * 0.5, 0, -s);
    ctx.stroke();
    // 中脉
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s); ctx.stroke();
  } else if (l.type === 1) {
    // 蕨叶
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s); ctx.stroke();
    for (let i = 0; i < 5; i++) {
      const py = -s * (0.2 + i * 0.15);
      const pl = s * (0.35 - i * 0.04);
      ctx.beginPath(); ctx.moveTo(0, py);
      ctx.quadraticCurveTo(pl*0.5, py-pl*0.3, pl, py - pl*0.1);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, py);
      ctx.quadraticCurveTo(-pl*0.5, py-pl*0.3, -pl, py - pl*0.1);
      ctx.stroke();
    }
  } else {
    // 圆叶
    ctx.beginPath();
    ctx.ellipse(0, -s*0.5, s*0.25, s*0.4, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s*0.9); ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  绘制诗句（半透明叠加，图1特征）
// ══════════════════════════════════════════════════
function drawPoem() {
  const poemAlpha = 0.08 + (1 - modeT) * 0.07; // rain模式更明显
  ctx.save();
  ctx.font = 'italic 15px Georgia, "Songti SC", serif';
  ctx.fillStyle = `rgba(100,130,160,${poemAlpha})`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lineH = 28;
  const startY = H * 0.32;
  for (let i = 0; i < POEMS.length; i++) {
    if (POEMS[i]) {
      const wobble = Math.sin(time * 0.3 + i * 0.5) * 3;
      ctx.fillText(POEMS[i], W/2 + wobble, startY + i * lineH);
    }
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  幽灵数据文字层（图2特征）
// ══════════════════════════════════════════════════
function drawGhostLayer() {
  const gAlpha = modeT * 0.8; // vortex模式更明显
  if (gAlpha < 0.01) return;
  ctx.save();
  ctx.font = '10px "Courier New", monospace';
  for (const g of GHOST) {
    const drift = Math.sin(time * 0.2 + g.phase) * 5;
    ctx.fillStyle = `rgba(140,160,180,${g.alpha * (0.3 + gAlpha)})`;
    ctx.fillText(g.text, g.x + drift, g.y);
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  主绘制循环
// ══════════════════════════════════════════════════
function draw() {
  requestAnimationFrame(draw);
  time += 0.01;

  // 模式过渡
  const targetT = mode === 'vortex' ? 1 : 0;
  modeT += (targetT - modeT) * 0.02;

  // 背景
  const bgL = 95 - modeT * 3;
  ctx.fillStyle = `hsl(40,3%,${bgL}%)`;
  ctx.fillRect(0, 0, W, H);

  // 幽灵文字底层
  drawGhostLayer();

  // 焦点光晕（vortex模式）
  if (modeT > 0.05) {
    const focusX = W * 0.5;
    const focusY = H * 0.72;
    const glowR = 80 + modeT * 120;
    const fg = ctx.createRadialGradient(focusX, focusY, 0, focusX, focusY, glowR);
    fg.addColorStop(0, `rgba(140,180,220,${modeT * 0.12})`);
    fg.addColorStop(0.5, `rgba(120,160,200,${modeT * 0.05})`);
    fg.addColorStop(1, 'transparent');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(focusX, focusY, glowR, 0, Math.PI*2); ctx.fill();
  }

  // 鼠标引力点
  let pullX = W * 0.5, pullY = H * 0.72;
  let pullStrength = 0;
  if (mouseX > 0 && mouseX < W) {
    pullX = mouseX; pullY = mouseY;
    pullStrength = 0.35;
  }

  // 线条 + 水滴
  for (const line of LINES) {
    // 计算线的当前位置
    let lx = line.baseX;
    let lyStart = line.startY;
    let lyEnd = lyStart + line.len;

    // vortex 模式下线条弯曲汇聚
    const vp1 = vortexPos(line.baseX, lyStart, modeT);
    const vp2 = vortexPos(line.baseX, lyEnd, modeT);

    // 鼠标微扰
    if (pullStrength > 0) {
      const mdx = pullX - line.baseX;
      const mdy = pullY - (lyStart + line.len * 0.5);
      const md = Math.sqrt(mdx*mdx + mdy*mdy);
      if (md < 200) {
        const f = pullStrength * (1 - md/200) * 12;
        vp1.x += (mdx/md) * f * 0.3;
        vp2.x += (mdx/md) * f;
        vp2.y += (mdy/md) * f * 0.5;
      }
    }

    // 自然微摆
    const sway = Math.sin(time * 0.8 + line.phase) * (2 + modeT * 3);
    vp1.x += sway * 0.3;
    vp2.x += sway;

    // 绘制线条
    ctx.strokeStyle = `hsla(${line.hue},30%,68%,${line.alpha + modeT * 0.04})`;
    ctx.lineWidth = 0.6 + modeT * 0.15;
    ctx.beginPath();
    ctx.moveTo(vp1.x, vp1.y);
    // 中间弯曲点
    const midX = (vp1.x + vp2.x) * 0.5 + sway * 1.5;
    const midY = (vp1.y + vp2.y) * 0.5;
    ctx.quadraticCurveTo(midX, midY, vp2.x, vp2.y);
    ctx.stroke();

    // 水滴
    for (const d of line.drops) {
      // 水滴在线上的位置（0~1）
      const dropT = ((d.baseY + time * d.speed * 40 + d.phase * 100) % (line.len + 40)) / line.len;
      if (dropT < 0 || dropT > 1.15) continue;

      // 沿弯曲线插值
      const t2 = Math.min(1, Math.max(0, dropT));
      const dx = vp1.x + (vp2.x - vp1.x) * t2 + sway * t2 * 0.8;
      const dy = vp1.y + (vp2.y - vp1.y) * t2;

      // 溢出画框效果（图2底部水滴溢出）
      const overflow = dropT > 1;
      const overAlpha = overflow ? Math.max(0, 1 - (dropT - 1) * 6) : 1;

      drawDrop(dx, dy, d.r, d.hue, d.sat, d.lit, d.alpha * overAlpha);
    }
  }

  // 草叶
  const leafAlpha = 1 - modeT * 0.5;
  if (leafAlpha > 0.05) {
    ctx.globalAlpha = leafAlpha;
    for (const l of LEAVES) drawLeaf(l);
    ctx.globalAlpha = 1;
  }

  // 诗句
  drawPoem();

  // vortex 焦点处的水滴溢出喷涌
  if (modeT > 0.3) {
    const fx = W * 0.5, fy = H * 0.72;
    const spillCount = Math.floor(modeT * 8);
    for (let i = 0; i < spillCount; i++) {
      const sa = Math.sin(time * 2 + i * 1.7) * 40;
      const sd = Math.cos(time * 1.5 + i * 2.3) * 20;
      const sr = 1.5 + Math.sin(time * 3 + i) * 1;
      const sy = fy + 20 + (time * 15 + i * 25) % (H - fy + 30);
      drawDrop(fx + sa, sy + sd, sr, 192, 55, 65, modeT * 0.3 * Math.max(0, 1 - (sy - fy) / (H - fy + 30)));
    }
  }
}

// ══════════════════════════════════════════════════
//  事件
// ══════════════════════════════════════════════════
C.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
C.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });
C.addEventListener('touchmove', e => { e.preventDefault(); if(e.touches[0]){mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;} }, { passive: false });
C.addEventListener('touchend', () => { mouseX = -1; mouseY = -1; });

// 键盘切换
document.addEventListener('keydown', e => {
  if (e.key === '1') setMode('rain');
  if (e.key === '2') setMode('vortex');
});

window.addEventListener('resize', resize);
resize();
draw();
</script>

<script>
// Generated Audio System - 雨滴+忧郁钢琴
// 雨滴+忧郁钢琴音效
let ctx, master, isActive=false;
function initAudio(){
  if(ctx) return;
  ctx=new(AudioContext||webkitAudioContext)();
  master=ctx.createGain();master.gain.value=0.15;master.connect(ctx.destination);
  
  // 雨滴噪声
  function rain(){
    if(!isActive)return;
    const bufSz=ctx.sampleRate*0.03,buf=ctx.createBuffer(1,bufSz,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/bufSz*15);
    const src=ctx.createBufferSource();src.buffer=buf;
    const g=ctx.createGain();g.gain.value=0.10;
    src.connect(g);g.connect(master);src.start();
    setTimeout(rain,100+Math.random()*200);
  }
  
  // 钢琴和弦
  const notes=[220,246.94,277.18,293.66];
  function chord(){
    if(!isActive)return;
    const f=notes[Math.floor(Math.random()*notes.length)];
    [f,f*1.2,f*1.5].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.05/(i+1),ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.2);
      o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+2.5);
    });
    setTimeout(chord,2500+Math.random()*2000);
  }
  rain();chord();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
btn.onmouseover=()=>btn.style.background='rgba(255,255,255,0.25)';
btn.onmouseout=()=>btn.style.background='rgba(255,255,255,0.15)';
document.body.appendChild(btn);
btn.onclick=()=>{if(!ctx)initAudio();else{isActive=!isActive;master.gain.value=isActive?0.15:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!ctx)initAudio();},{ once:true });
</script>
</body>
</html>
